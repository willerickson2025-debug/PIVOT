name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --detach --service web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: dff48b54-4bd4-4db6-b3ef-c4e794410da3
          RAILWAY_ENVIRONMENT_ID: d5ff9661-1963-40a1-aeac-d5e2dc292aaf
          RAILWAY_SERVICE_ID: f212ec0e-cde8-4b7f-bb3b-f1e87e92eeee
