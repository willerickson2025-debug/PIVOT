function PlayersCanvas({ dimmed }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    let animId;
    let pulses = [];
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    const N = 65;
    const pts = Array.from({length: N}, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.22,
      vy: (Math.random() - 0.5) * 0.22,
      r: Math.random() * 1.3 + 0.4,
    }));
    const iv = setInterval(() => {
      const p = pts[Math.floor(Math.random() * pts.length)];
      pulses.push({ x: p.x, y: p.y, r: 0, alpha: 0.75 });
    }, 2200);
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pts.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      });
      for (let i = 0; i < pts.length; i++) {
        for (let j = i+1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < 145) {
            ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y);
            ctx.strokeStyle = `rgba(0,255,128,${0.045*(1-d/145)})`; ctx.lineWidth = 0.6; ctx.stroke();
          }
        }
      }
      pts.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,255,128,0.25)'; ctx.fill();
      });
      pulses = pulses.filter(p => p.alpha > 0.015);
      pulses.forEach(p => {
        p.r += 1.4; p.alpha *= 0.964;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0,255,128,${p.alpha*0.55})`; ctx.lineWidth = 0.9; ctx.stroke();
        if (p.r < 30) {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r*0.3, 0, Math.PI*2);
          ctx.fillStyle = `rgba(0,255,128,${p.alpha*0.15})`; ctx.fill();
        }
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); clearInterval(iv); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={canvasRef} style={{position:'fixed', top:70, left:0, right:0, bottom:40, zIndex:0, pointerEvents:'none', opacity: dimmed ? 0.06 : 0.45, transition:'opacity 1.6s ease'}}/>;
}

function TrendBar({ val, avg, maxVal, label, isPct }) {
  const pct = (v) => v != null ? `${(v*100).toFixed(1)}%` : '-';
  const display = isPct ? pct(val) : val;
  const barH = maxVal > 0 ? Math.min(100, (val / maxVal) * 100) : 0;
  const avgH = maxVal > 0 ? Math.min(100, (avg / maxVal) * 100) : 0;
  const up = val >= avg;
  const color = up ? 'var(--green)' : '#ef4444';
  return (
    <div style={{textAlign:'center', flex:1, padding:'0 4px'}}>
      <div style={{height:52, position:'relative', display:'flex', alignItems:'flex-end', justifyContent:'center', marginBottom:8}}>
        <div style={{width:24, background:color, opacity:0.75, height:`${barH}%`, minHeight:2, borderRadius:'3px 3px 0 0', transition:'height 0.8s ease', position:'relative', zIndex:1}}/>
        <div style={{position:'absolute', bottom:`${avgH}%`, left:'10%', right:'10%', borderTop:'1px dashed rgba(255,255,255,0.25)', zIndex:2}}/>
      </div>
      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:15, fontWeight:700, color, letterSpacing:-0.5}}>{display != null ? display : '-'}</div>
      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:2, color:'var(--text-muted)', marginTop:4, textTransform:'uppercase'}}>{label}</div>
      {val!=null && avg!=null && (
        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color, marginTop:2, fontWeight:700}}>
          {up ? '+' : ''}{isPct ? `${((val-avg)*100).toFixed(1)}%` : `${(val-avg).toFixed(1)}`}
        </div>
      )}
    </div>
  );
}

function Players({ pendingPlayerId, onClearPending }) {
  const [query, setQuery] = React.useState('');
  const [selectedId, setSelectedId] = React.useState(null);
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [sectionLoading, setSectionLoading] = React.useState({});
  const [sectionData, setSectionData] = React.useState({});
  const [expandedSection, setExpandedSection] = React.useState(null);
  const [suggestions, setSuggestions] = React.useState([]);
  const [showSugg, setShowSugg] = React.useState(false);
  const [season, setSeason] = React.useState(2025);
  const seasonLabel = s => `${s}–${String(s+1).slice(2)}`;

  const searchById = async (playerId) => {
    if (!playerId) return;
    setLoading(true); setError(null); setResult(null); setSectionData({}); setExpandedSection(null); setShowSugg(false);
    try {
      const resp = await fetch(`${API}/analysis/player/stream?player_id=${playerId}&season=${season}`);
      if (!resp.ok) throw new Error(await resp.text());
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let analysisText = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let evt;
          try { evt = JSON.parse(line.slice(6)); } catch { continue; }
          if (evt.type === 'error') throw new Error(evt.message);
          if (evt.type === 'meta') {
            if (evt.player?.error) throw new Error(evt.player.error);
            setResult({ player: evt.player, averages: evt.averages, last_10: evt.last_10, games_played: evt.games_played, analysis: '' });
            setLoading(false);
          } else if (evt.type === 'chunk') {
            analysisText += evt.text;
            setResult(prev => prev ? { ...prev, analysis: analysisText } : prev);
          }
        }
      }
    } catch(e) { setError(friendlyError(e.message)); setLoading(false); }
  };

  // Re-fetch player when season changes (if one is selected)
  React.useEffect(() => {
    if (selectedId) { searchById(selectedId); }
  }, [season]);

  // Navigate here from Teams tab — load the clicked player immediately
  React.useEffect(() => {
    if (!pendingPlayerId) return;
    setSelectedId(pendingPlayerId);
    searchById(pendingPlayerId);
    if (onClearPending) onClearPending();
  }, [pendingPlayerId]);

  const searchByName = async () => {
    if (selectedId) { searchById(selectedId); return; }
    if (suggestions.length > 0) {
      const top = suggestions[0];
      setSelectedId(top.id); setQuery(`${top.first_name} ${top.last_name}`); searchById(top.id); return;
    }
    const q = query.trim(); if (!q) return;
    try {
      const r = await fetch(`${API}/nba/players?name=${encodeURIComponent(q)}`);
      if (r.ok) { const data = await r.json(); const first = (data.players||[])[0]; if (first) { setSelectedId(first.id); searchById(first.id); return; } }
    } catch(e) {}
    setError('Player not found. Try selecting from the dropdown.');
  };

    if (val.length < 2) { setSuggestions([]); return; }
    try {
      const r = await fetch(`${API}/nba/players?name=${encodeURIComponent(val)}`);
      if (r.ok) { const data = await r.json(); setSuggestions((data.players||[]).slice(0,6)); }
    } catch(e) {}
  };

  const loadSection = async (section) => {
    if (sectionData[section] && !sectionLoading[section]) { setExpandedSection(expandedSection === section ? null : section); return; }
    const pid = result?.player?.id; if (!pid) return;
    setSectionLoading(prev => ({...prev, [section]: true}));
    setSectionData(prev => ({...prev, [section]: ''}));
    setExpandedSection(section);
    try {
      const resp = await fetch(`${API}/analysis/player/section/stream?player_id=${pid}&season=${season}&section=${section}`);
      if (!resp.ok) throw new Error(await resp.text());
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let evt; try { evt = JSON.parse(line.slice(6)); } catch { continue; }
          if (evt.type === 'error') throw new Error(evt.message);
          if (evt.type === 'chunk') setSectionData(prev => ({...prev, [section]: (prev[section] || '') + evt.text}));
        }
      }
    } catch(e) { setSectionData(prev => ({...prev, [section]: 'Failed to load. Try again.'})); }
    finally { setSectionLoading(prev => ({...prev, [section]: false})); }
  };

  const SECTIONS = [

    { id: 237,        nbaId: 2544,    name: 'LeBron James',      position: 'F',   team: 'LAL', pts: 20.8, reb: 6.1, ast: 7.1 },
    { id: 56677822,   nbaId: 1641705, name: 'Victor Wembanyama', position: 'F-C', team: 'SAS', pts: 24.8, reb: 11.5, ast: 3.1 },
    { id: 1057262088, nbaId: 1642843, name: 'Cooper Flagg',       position: 'F',   team: 'DAL', pts: 21.1, reb: 6.6, ast: 4.6 },
    { id: 3547238,    nbaId: 1630162, name: 'Anthony Edwards',    position: 'G',   team: 'MIN', pts: 28.9, reb: 5.0, ast: 3.7 },
  ];

  const [featuredLive, setFeaturedLive] = React.useState({});

  const getLeverage = (used) => Math.max(5, Math.min(95, Math.round(((NBA_CAP.hardCeilingM - used) / (NBA_CAP.hardCeilingM - 110)) * 90 + 5)));

  const getTimeline = (pct) => {
    if (pct >= 0.60) return {label:'WIN-NOW',  color:'#22c55e'};
    if (pct >= 0.48) return {label:'BRIDGE',   color:'#fbbf24'};
    if (pct >= 0.38) return {label:'FRINGE',   color:'#f97316'};
    return               {label:'REBUILD',  color:'#ef4444'};
  };

  const getActions = (capUsed, winPct) => {
    const tier = getCapTier(capUsed);
    const timeline = getTimeline(winPct);
    const actions = [];
    if (capUsed >= 195) {
      actions.push({priority:'CRITICAL', title:'Second Apron Exposure', desc:'At risk of hard-cap restrictions. Identify expiring contracts to shed before deadline.', color:'#ef4444'});
      actions.push({priority:'HIGH',     title:'Trade Aggregation Blocked', desc:'Second apron prevents combining salaries in trades. Target 1-for-1 swaps with teams seeking cap relief.', color:'#f97316'});
    } else if (capUsed >= 183) {
      actions.push({priority:'HIGH',     title:'Tax Optimization Window', desc:'Identify 2–3 non-rotation players to trade for picks or cheaper alternatives to reduce tax bill.', color:'#f97316'});
    } else if (capUsed >= 160) {
      actions.push({priority:'MEDIUM',   title:'Mid-Level Exception Available', desc:'Use taxpayer MLE ($5.1M) to target a high-upside role player before deadline.', color:'#fbbf24'});
    } else {
      actions.push({priority:'MOVE',     title:'Cap Space Opportunity', desc:`$${Math.round(NBA_CAP.firstApronM - capUsed)}M in available space. Prioritize a max or near-max free agent target in the offseason.`, color:'#22c55e'});
    }
    if (winPct >= 0.60 && capUsed < 195) {
      actions.push({priority:'HIGH',     title:'Rental Addition at Deadline', desc:'Win-now window is open. Absorb a short-term deal for an impact player on an expiring contract.', color:'#f97316'});
    } else if (winPct < 0.38) {
      actions.push({priority:'MOVE',     title:'Maximize Draft Capital', desc:'Prioritize lottery positioning. Explore veteran trades that return first-round picks.', color:'#22c55e'});
    } else {
      actions.push({priority:'MEDIUM',   title:'Develop Depth & Extensions', desc:'Identify core pieces approaching extension eligibility. Lock in talent before the market resets.', color:'#fbbf24'});
    }
    if (capUsed < 160 && winPct >= 0.50) {
      actions.push({priority:'MOVE',     title:'Aggressive Extension Play', desc:'Flexibility + winning record = leverage. Use cap room to absorb salary in exchange for future picks.', color:'#22c55e'});
    } else if (capUsed >= 183 && winPct < 0.50) {
      actions.push({priority:'HIGH',     title:'Tear Down or Restructure', desc:'High payroll, low performance. Trade veterans for youth and picks to reset the timeline.', color:'#f97316'});
    } else {
      actions.push({priority:'MEDIUM',   title:'Two-Way Contract Investment', desc:'Identify G-League standouts for two-way deals. Low-cost developmental bets with upside.', color:'#fbbf24'});
    }
    return actions.slice(0, 3);
  };

  const panelStyle = {background:'rgba(17,20,26,0.85)', border:'1px solid rgba(255,255,255,0.07)', borderRadius:12, padding:'24px 28px'};
  const colLabel = {fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:4, color:'rgba(0,255,128,0.92)', fontWeight:700, textTransform:'uppercase', marginBottom:18};


  return (
    <div style={{display:'grid', gridTemplateColumns:'300px 1fr', alignItems:'start'}}>

      {/* ── Left Sidebar ── */}
      <div style={{position:'sticky', top:70, height:'calc(100vh - 110px)', overflowY:'auto', borderRight:'1px solid rgba(255,255,255,0.07)', display:'flex', flexDirection:'column', background:'rgba(9,12,16,0.97)'}}>

        <div style={{padding:'20px 20px 14px', borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
          <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:3}}>
            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:17, fontWeight:700, letterSpacing:-0.5, color:'var(--white)'}}>War Room</div>
            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:3, color:'rgba(0,255,128,0.9)', fontWeight:700, textTransform:'uppercase'}}>Front Office</div>
          </div>
          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:10, color:'rgba(255,255,255,0.82)', fontWeight:700, letterSpacing:0, textTransform:'none', lineHeight:1.5}}>Select a franchise to open its war room.</div>
        </div>

        {/* Tabs — vertical list in sidebar */}
        {!result && (
          <div style={{borderBottom:'1px solid rgba(255,255,255,0.06)', padding:'8px 12px'}}>
            {TABS.map(tab => (
              <button key={tab.id} onClick={()=>setDashTab(tab.id)}
                style={{
                  display:'block', width:'100%', textAlign:'left',
                  background: dashTab===tab.id ? 'rgba(0,255,128,0.07)' : 'transparent',
                  border:'none',
                  borderLeft: dashTab===tab.id ? '2px solid var(--green)' : '2px solid transparent',
                  padding:'8px 12px', cursor:'pointer', borderRadius:'0 6px 6px 0',
                  fontFamily:'Helvetica Neue, sans-serif', fontSize:10, fontWeight:700,
                  letterSpacing:2, textTransform:'uppercase',
                  color: dashTab===tab.id ? 'var(--green)' : 'rgba(255,255,255,0.38)',
                  transition:'all 0.12s', marginBottom:1,
                }}
                onMouseEnter={e=>{ if(dashTab!==tab.id){e.currentTarget.style.color='rgba(255,255,255,0.72)';e.currentTarget.style.background='rgba(255,255,255,0.04)';} }}
                onMouseLeave={e=>{ if(dashTab!==tab.id){e.currentTarget.style.color='rgba(255,255,255,0.38)';e.currentTarget.style.background='transparent';} }}>
                {tab.label}
              </button>
            ))}
          </div>
        )}

        <div style={{padding:'12px 16px 10px', borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
          <div style={{position:'relative', marginBottom:10}}>
            <span style={{position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:'rgba(0,255,128,0.82)', fontSize:13, pointerEvents:'none'}}>⌕</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search teams..."
              style={{width:'100%', background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:6, padding:'7px 10px 7px 32px', color:'var(--white)', fontFamily:'Helvetica Neue, sans-serif', fontSize:12, outline:'none', textTransform:'none', letterSpacing:0, boxSizing:'border-box'}}
              onFocus={e=>e.target.style.borderColor='rgba(0,255,128,0.4)'}
              onBlur={e=>e.target.style.borderColor='rgba(255,255,255,0.08)'}/>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:4}}>
            {filtered.map(t => {
              const capEntry = CAP_DATA.find(c => c.abbr === t.abbr);
              const tier = capEntry ? getCapTier(capEntry.used) : null;
              return (
                <button key={t.abbr} onClick={()=>{ if (!loading) runRoster(t.name); }} title={t.name}
                  style={{background:rosterTeam===t.name?'rgba(0,255,128,0.1)':'rgba(255,255,255,0.02)', border:`1px solid ${rosterTeam===t.name?'rgba(0,255,128,0.4)':'rgba(255,255,255,0.06)'}`, borderRadius:6, padding:'6px 3px', cursor:loading?'not-allowed':'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:2, transition:'all 0.12s', position:'relative', opacity:loading?0.5:1}}
                  onMouseEnter={e=>{e.currentTarget.style.background='rgba(0,255,128,0.06)';e.currentTarget.style.borderColor='rgba(0,255,128,0.3)';}}
                  onMouseLeave={e=>{e.currentTarget.style.background=rosterTeam===t.name?'rgba(0,255,128,0.1)':'rgba(255,255,255,0.02)';e.currentTarget.style.borderColor=rosterTeam===t.name?'rgba(0,255,128,0.4)':'rgba(255,255,255,0.06)';}}>
                  {tier && <div style={{position:'absolute', top:3, right:3, width:4, height:4, borderRadius:'50%', background:tier.color, opacity:0.7}}/>}
                  <img src={`https://a.espn.com/combiner/i?img=/i/teamlogos/nba/500/${t.abbr.toLowerCase()}.png&h=32&w=32`} alt={t.abbr} width={20} height={20} style={{objectFit:'contain'}} onError={e=>e.target.style.display='none'}/>
                  <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:7, letterSpacing:0.5, color:'rgba(255,255,255,0.68)', fontWeight:700}}>{t.abbr}</span>
                </button>
              );
            })}
          </div>
          <div style={{display:'flex', gap:10, marginTop:10, flexWrap:'wrap'}}>
            {[{label:'APRON',color:'#ef4444'},{label:'OVER',color:'#f97316'},{label:'COMMITTED',color:'#fbbf24'},{label:'FLEXIBLE',color:'#22c55e'}].map(({label,color})=>(
              <div key={label} style={{display:'flex', alignItems:'center', gap:4}}>
                <div style={{width:5,height:5,borderRadius:'50%',background:color}}/>
                <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, color:'rgba(255,255,255,0.82)', letterSpacing:0.5}}>{label}</span>
              </div>
            ))}
          </div>
        </div>

        <div style={{flex:1, padding:'14px 16px', overflowY:'auto'}}>
          <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:10}}>
            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:3, color:'rgba(0,255,128,0.86)', fontWeight:700, textTransform:'uppercase'}}>Intel Feed</div>
            <div style={{flex:1, height:1, background:'rgba(255,255,255,0.05)'}}/>
            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, color:'rgba(255,255,255,0.18)'}}>{now}</div>
          </div>
          {(headlines.length ? headlines : []).map((h,i) => {
            const title  = typeof h === 'string' ? h : h.title;
            const url    = typeof h === 'object' ? h.url : null;
            const source = typeof h === 'object' ? h.source : null;
            return (
              <div key={i} style={{display:'flex', gap:8, alignItems:'flex-start', padding:'8px 0', borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                <div style={{width:3, height:3, borderRadius:'50%', background:'rgba(0,255,128,0.4)', marginTop:6, flexShrink:0}}/>
                <div style={{flex:1, minWidth:0}}>
                  {source && <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:1.5, color:'rgba(255,255,255,0.28)', fontWeight:700, textTransform:'uppercase', marginBottom:2}}>{source}</div>}
                  {url ? (
                    <a href={url} target="_blank" rel="noopener noreferrer"
                      style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, color:'rgba(255,255,255,0.75)', lineHeight:1.55, textTransform:'none', letterSpacing:0, fontWeight:700, textDecoration:'none', cursor:'pointer', display:'block'}}
                      onMouseEnter={e=>e.currentTarget.style.color='var(--green)'}
                      onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.75)'}>
                      {title} →
                    </a>
                  ) : (
                    <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, color:'rgba(255,255,255,0.75)', lineHeight:1.55, textTransform:'none', letterSpacing:0, fontWeight:700}}>{title}</span>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Right Panel ── */}
      <div style={{minWidth:0, background:'rgba(8,10,14,0.95)', minHeight:'calc(100vh - 110px)'}}>


        {/* War room back header */}
        {!loading && result && (
          <div style={{display:'flex', justifyContent:'center', padding:'24px 16px 0'}}>
            <div style={{
              display:'flex', alignItems:'center', gap:14,
              background:'rgba(255,255,255,0.045)',
              backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)',
              border:'1px solid rgba(255,255,255,0.11)',
              borderRadius:12,
              boxShadow:'inset 0 1px 0 rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.4)',
              padding:'10px 16px',
            }}>
              <img src={`https://a.espn.com/combiner/i?img=/i/teamlogos/nba/500/${ALL_TEAMS.find(t=>t.name===rosterTeam)?.abbr?.toLowerCase()||''}.png&h=32&w=32`} alt={rosterTeam} width={28} height={28} style={{objectFit:'contain'}} onError={e=>e.target.style.display='none'}/>
              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:14, fontWeight:700, color:'var(--white)', letterSpacing:-0.3}}>{rosterTeam}</div>
              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:3, color:'rgba(0,255,128,0.9)', fontWeight:700, textTransform:'uppercase', background:'rgba(0,255,128,0.07)', border:'1px solid rgba(0,255,128,0.2)', borderRadius:4, padding:'3px 8px'}}>War Room</div>
              <div style={{width:1, height:20, background:'rgba(255,255,255,0.1)', margin:'0 2px'}}/>
              <button onClick={()=>{setResult(null);setRosterTeam('');}}
                style={{fontFamily:'Helvetica Neue, sans-serif', fontWeight:700, fontSize:10, padding:'6px 14px',
                  background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)',
                  color:'rgba(255,255,255,0.65)', cursor:'pointer', borderRadius:8, transition:'all 0.15s',
                  textTransform:'none', letterSpacing:0}}
                onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.12)';e.currentTarget.style.color='var(--white)';}}
                onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.06)';e.currentTarget.style.color='rgba(255,255,255,0.65)';}}>
                ← All Teams
              </button>
            </div>
          </div>
        )}

        {/* Content — scrolls with page */}
        <div>

          {/* Stat strip — cap + warboard tab */}
          {!result && !loading && !error && (dashTab === 'cap' || dashTab === 'warboard') && (() => {
            const teamsOverTax   = CAP_DATA.filter(c => c.used > LUXURY_TAX).length;
            const teamsOverApron = CAP_DATA.filter(c => c.used >= APRON_VAL).length;
            return (
            <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10, padding:'20px 24px 0'}}>
              {[
                {val:`$${NBA_CAP.firstApronM}M`,  label:'First Apron',     sub:'2025-26 threshold'},
                {val:`${teamsOverTax}`,   label:'Teams Over Tax',  sub:`${teamsOverApron} at apron risk`},
                {val:`$${NBA_CAP.hardCeilingM}M`,  label:'Second Apron',    sub:'Hard-cap line'},
                {val:`$${NBA_CAP.taxpayerMleM}M`, label:'Mid-Level Exc.',  sub:'Taxpayer MLE'},
              ].map(({val,label,sub}) => (
                <div key={label} style={{background:'rgba(17,20,26,0.9)', border:'1px solid rgba(255,255,255,0.07)', borderRadius:10, padding:'14px 16px', position:'relative', overflow:'hidden'}}>
                  <div style={{position:'absolute', top:0, left:0, right:0, height:2, background:'linear-gradient(90deg,rgba(0,255,128,0.4),transparent)'}}/>
                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:20, letterSpacing:-0.5, fontWeight:700, color:'var(--green)', lineHeight:1}}>{val}</div>
                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:2, color:'rgba(255,255,255,0.72)', marginTop:5, textTransform:'uppercase'}}>{label}</div>
                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.52)', marginTop:2, textTransform:'none'}}>{sub}</div>
                </div>
              ))}
            </div>
            );
          })()}

          {/* ── War Board tab ── */}
          {!result && !loading && !error && dashTab === 'warboard' && (
            standingsLoading ? (
              <div style={{display:'flex', alignItems:'center', justifyContent:'center', height:200}}>
                <div style={{fontFamily:'Helvetica Neue, sans-serif', fontWeight:700, fontSize:11, letterSpacing:6, color:'var(--green)', textTransform:'uppercase', animation:'blink 1.2s ease-in-out infinite'}}>SYNCING LEAGUE DATA...</div>
              </div>
            ) : standingsError ? (
              <div style={{display:'flex', alignItems:'center', justifyContent:'center', height:120}}>
                <div style={{fontFamily:'Helvetica Neue, sans-serif', fontWeight:700, fontSize:11, letterSpacing:4, color:'rgba(239,68,68,0.6)', textTransform:'uppercase'}}>ADDING LIVE DATA — RETRY SHORTLY</div>
              </div>
            ) : (() => {
              const capMap = {};
              CAP_DATA.forEach(c => { capMap[c.abbr] = c.used; });
              const rows = (standings.league || []).map(t => ({...t, capUsed: capMap[t.abbr] || 150}));
              return (
                <div style={{display:'flex', flexWrap:'wrap', gap:16, padding:'20px 24px 60px'}}>
                  {rows.map((t, i) => {
                    const tier = getCapTier(t.capUsed);
                    const lev = getLeverage(t.capUsed);
                    const timeline = getTimeline(t.pct);
                    const barPct    = Math.min(100,(t.capUsed/BAR_MAX)*100);
                    const capPct    = (CAP_LINE_VAL/BAR_MAX)*100;
                    const apronPct  = (APRON_VAL/BAR_MAX)*100;
                    const div = t.division || '';
                    return (
                      <div key={t.abbr} className="g-card2" onClick={()=>runRoster(t.name)} style={{width:240, padding:20, gap:12}}>
                        {/* Header */}
                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, fontWeight:700, color:i<3?'var(--green)':i<8?'rgba(255,255,255,0.35)':'rgba(255,255,255,0.18)'}}>#{t.rank}</div>
                          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:7, letterSpacing:0.8, fontWeight:700, color:timeline.color, border:`1px solid ${timeline.color}44`, borderRadius:3, padding:'2px 5px', textTransform:'uppercase'}}>{timeline.label}</div>
                        </div>
                        {/* Team identity */}
                        <div style={{display:'flex', alignItems:'center', gap:10}}>
                          <img src={`https://a.espn.com/combiner/i?img=/i/teamlogos/nba/500/${t.abbr.toLowerCase()}.png&h=40&w=40`} alt={t.abbr} width={32} height={32} style={{objectFit:'contain',flexShrink:0}} onError={e=>e.target.style.display='none'}/>
                          <div>
                            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, fontWeight:700, color:'rgba(255,255,255,0.88)'}}>{t.name}</div>
                            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.52)'}}>{t.rec} · {t.conference}{div ? ` · ${div}` : ''}</div>
                          </div>
                        </div>
                        {/* Cap bar — two markers: cap line + apron line */}
                        <div>
                          <div style={{position:'relative', height:8, background:'rgba(255,255,255,0.05)', borderRadius:2, marginBottom:4}}>
                            <div style={{position:'absolute', top:0, left:0, height:'100%', width:`${barPct}%`, background:tier.color==='#ef4444'?'rgba(239,68,68,0.6)':tier.color==='#f97316'?'rgba(249,115,22,0.55)':tier.color==='#fbbf24'?'rgba(251,191,36,0.5)':'rgba(34,197,94,0.5)', borderRadius:2}}/>
                            <div style={{position:'absolute', top:-2, bottom:-2, left:`${capPct}%`, width:1, background:'rgba(255,255,255,0.18)'}} title="Salary Cap"/>
                            <div style={{position:'absolute', top:-2, bottom:-2, left:`${apronPct}%`, width:1, background:'rgba(239,68,68,0.5)'}} title="Second Apron"/>
                          </div>
                          <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
                            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:7, color:'rgba(255,255,255,0.22)'}}>CAP</div>
                            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:7, color:'rgba(239,68,68,0.4)'}}>APRON</div>
                          </div>
                          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:15, fontWeight:700, color:'rgba(255,255,255,0.7)', letterSpacing:-0.3}}>${t.capUsed}M</div>
                            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:7, letterSpacing:0.8, fontWeight:700, color:tier.color, background:tier.bg, border:`1px solid ${tier.border}`, borderRadius:3, padding:'2px 5px', textTransform:'uppercase'}}>{tier.label}</div>
                          </div>
                        </div>
                        {/* Leverage */}
                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', borderTop:'1px solid rgba(255,255,255,0.05)', paddingTop:10, marginTop:'auto'}}>
                          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.82)', letterSpacing:1, textTransform:'uppercase'}}>Leverage</div>
                          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:16, fontWeight:700, color:lev>=60?'#22c55e':lev>=35?'#fbbf24':'#ef4444'}}>{lev}<span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, color:'rgba(255,255,255,0.52)', marginLeft:2}}>/95</span></div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()
          )}

          {/* ── Cap Intel tab ── */}
          {!result && !loading && !error && dashTab === 'cap' && (
            <div style={{display:'flex', flexWrap:'wrap', gap:16, padding:'20px 24px 60px'}}>
              {CAP_DATA.map((t, i) => {
                const barPct   = Math.min(100,(t.used/BAR_MAX)*100);
                const capPct   = (CAP_LINE_VAL/BAR_MAX)*100;
                const apronPct = (APRON_VAL/BAR_MAX)*100;
                const tier = getCapTier(t.used);
                const lev = getLeverage(t.used);
                return (
                  <div key={t.abbr} className="g-card2" onClick={()=>runRoster(t.name)} style={{width:240, padding:20, gap:12}}>
                    {/* Rank + tier */}
                    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.52)'}}># {i+1} by payroll</div>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:7, letterSpacing:0.8, fontWeight:700, color:tier.color, background:tier.bg, border:`1px solid ${tier.border}`, borderRadius:3, padding:'2px 5px', textTransform:'uppercase'}}>{tier.label}</div>
                    </div>
                    {/* Team */}
                    <div style={{display:'flex', alignItems:'center', gap:10}}>
                      <img src={`https://a.espn.com/combiner/i?img=/i/teamlogos/nba/500/${t.abbr.toLowerCase()}.png&h=40&w=40`} alt={t.abbr} width={32} height={32} style={{objectFit:'contain',flexShrink:0}} onError={e=>e.target.style.display='none'}/>
                      <div>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, fontWeight:700, letterSpacing:-0.3, color:'rgba(255,255,255,0.88)'}}>{t.name}</div>

                      <div style={{position:'relative', height:8, background:'rgba(255,255,255,0.05)', borderRadius:2, marginBottom:4}}>
                        <div style={{position:'absolute', top:0, left:0, height:'100%', width:`${barPct}%`, background:tier.color==='#ef4444'?'rgba(239,68,68,0.6)':tier.color==='#f97316'?'rgba(249,115,22,0.55)':tier.color==='#fbbf24'?'rgba(251,191,36,0.5)':'rgba(34,197,94,0.5)', borderRadius:2}}/>
                        <div style={{position:'absolute', top:-2, bottom:-2, left:`${capPct}%`, width:1, background:'rgba(255,255,255,0.18)'}} title="Salary Cap"/>
                        <div style={{position:'absolute', top:-2, bottom:-2, left:`${apronPct}%`, width:1, background:'rgba(239,68,68,0.45)'}} title="Second Apron"/>
                      </div>
                      <div style={{display:'flex', justifyContent:'space-between'}}>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:7, color:'rgba(255,255,255,0.22)'}}>APRON ${NBA_CAP.firstApronM}M</div>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:7, color:'rgba(239,68,68,0.4)'}}>HARD CAP ${NBA_CAP.hardCeilingM}M</div>
                      </div>
                    </div>
                    {/* Leverage + footer */}
                    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', borderTop:'1px solid rgba(255,255,255,0.05)', paddingTop:10, marginTop:'auto'}}>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.82)', letterSpacing:1, textTransform:'uppercase'}}>Leverage</div>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:16, fontWeight:700, color:lev>=60?'#22c55e':lev>=35?'#fbbf24':'#ef4444'}}>{lev}<span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, color:'rgba(255,255,255,0.52)', marginLeft:2}}>/95</span></div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* ── MVP Race tab ── */}
          {!result && !loading && !error && dashTab === 'mvp' && (
            <div style={{display:'flex', flexWrap:'wrap', gap:16, padding:'24px 24px 60px'}}>
              {MVP_PLAYERS.map((p, i) => {
                const live = mvpLive[String(p.bdlId)] || {};
                const pts = live.pts != null ? (+live.pts).toFixed(1) : p.pts;
                const reb = live.reb != null ? (+live.reb).toFixed(1) : p.reb;
                const ast = live.ast != null ? (+live.ast).toFixed(1) : p.ast;
                return (
                <div key={p.name} className="g-card2" style={{width:280, padding:22, gap:14}}>
                  <div className="g-glow-overlay"/>
                  {/* Rank + odds */}
                  <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                    <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:28, fontWeight:700, color:i===0?'var(--green)':'rgba(255,255,255,0.12)', lineHeight:1}}>{i+1}</div>
                    <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:14, fontWeight:700, color:i===0?'var(--green)':'rgba(255,255,255,0.35)'}}>{mvpOdds[p.name] || '—'}</div>
                  </div>
                  {/* Player */}
                  <div>
                    <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:14, fontWeight:700, color:'rgba(255,255,255,0.9)', lineHeight:1.2}}>{p.name}</div>

                  </div>
                </div>
                );
              })}
            </div>
          )}
