// ─── INTEL ────────────────────────────────────────────────────────────────────

function Intel(){
  const[season,setSeason]=React.useState('2025-26');
  const seasonInt=React.useMemo(()=>{
    const map={'2025-26':2025};
    if(map[season])return map[season];
    return season.includes('-')?parseInt(season.split('-')[0])+1:parseInt(season)||2025;
  },[season]);
  const[poolData,setPoolData]=React.useState({});
  const[poolLoading,setPoolLoading]=React.useState(true);
  const[posFilter,setPosFilter]=React.useState('ALL');
  const[termSort,setTermSort]=React.useState({key:'ppg',dir:'desc'});
  const[termExpanded,setTermExpanded]=React.useState(false);
  const[density,setDensity]=React.useState('comfortable');
  const[selected,setSelected]=React.useState(null);
  const[detailStats,setDetailStats]=React.useState(null);
  const[detailAdv,setDetailAdv]=React.useState(null);
  const[detailLoading,setDetailLoading]=React.useState(false);
  const[analysisMode,setAnalysisMode]=React.useState('season');
  const[nbaAdv,setNbaAdv]=React.useState(null);
  const[nbaAdvLoading,setNbaAdvLoading]=React.useState(false);
  const analysis=useStream();

  const ALL_POOL=React.useMemo(()=>[...FEATURED_PLAYERS,...MOVERS_POOL],[]);

  React.useEffect(()=>{
    let cancelled=false;
    setPoolLoading(true);
    const results={};
    const fetchOne=async(entry)=>{
      try{
        const sr=await fetch(`${API}/nba/players?name=${encodeURIComponent(entry.search)}`).then(r=>r.json());
        const players=sr.players||sr.data||[];
        const last=entry.search.split(' ').pop().toLowerCase();
        const p=players.find(x=>x.last_name.toLowerCase()===last)||players[0];
        if(!p||cancelled)return;
        const gr=await fetch(`${API}/nba/players/${p.id}/stats?season=${seasonInt}`).then(r=>r.json());
        const games=gr.stats||gr.data||[];
        if(cancelled)return;
        const seasonAvg=computeAvg(games);
        const l10=games.slice(0,10);
        const l10Avg=computeAvg(l10);
        const prior10=games.slice(10,20);
        const prior10Avg=computeAvg(prior10);
        const delta=seasonAvg&&l10Avg?{
          ppg:l10Avg.ppg-seasonAvg.ppg,rpg:l10Avg.rpg-seasonAvg.rpg,
          apg:l10Avg.apg-seasonAvg.apg,
          min:prior10Avg?l10Avg.min-prior10Avg.min:0,
        }:null;
        // Team margin proxy per game: positive when player's team won by more.
        // This is team +/- (game margin), not individual on-court +/-.
        // BDL game logs don't expose individual box +/-.
        const margins=games.filter(g=>g.game_home_score!=null&&g.game_visitor_score!=null&&g.game_home_team_id!=null).map(g=>{
          const myHome=g.game_home_team_id===p.team?.id;
          const my=myHome?g.game_home_score:g.game_visitor_score;
          const opp=myHome?g.game_visitor_score:g.game_home_score;
          return my-opp;
        });
        const pmAvg=margins.length?Math.round(margins.reduce((a,b)=>a+b,0)/margins.length*10)/10:null;
        results[entry.search]={fp:entry,bdlPlayer:p,games,seasonAvg,l10Avg,delta,
          l10pts:l10.map(g=>g.points).filter(v=>v!=null),status:'ACTIVE',pmAvg};
      }catch(e){}
    };
    Promise.allSettled(ALL_POOL.map(fetchOne)).then(()=>{
      if(!cancelled){setPoolData({...results});setPoolLoading(false);}
    });
    return()=>{cancelled=true;};
  },[seasonInt]);

  function openDetail(p){
    setSelected(p);setDetailStats(null);setDetailAdv(null);analysis.reset();
    setDetailLoading(true);
    fetch(`${API}/nba/players/${p.id}/stats?season=${seasonInt}`).then(r=>r.json())
      .then(d=>{setDetailStats(d.stats||d.data||[]);setDetailLoading(false);}).catch(()=>setDetailLoading(false));
    fetch(`${API}/nba/stats/advanced?player_ids=${p.id}&seasons=${seasonInt}`,{headers:{'X-Pivot-Session':_pivotSessionId}})
      .then(r=>r.json()).then(d=>setDetailAdv(d.stats?.[0]||null)).catch(()=>{});
  }
  function closeDetail(){setSelected(null);setDetailStats(null);setDetailAdv(null);setNbaAdv(null);setNbaAdvLoading(false);analysis.reset();}
  function loadNbaAdv(){
    if(!selected||nbaAdvLoading||nbaAdv)return;
    setNbaAdvLoading(true);
    const pid=selected.id;
    const season=seasonInt;
    Promise.allSettled([
      fetch(`${API}/advanced/${pid}/shot-chart?season=${season}`).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(`${API}/advanced/${pid}/hustle?season=${season}`).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(`${API}/advanced/${pid}/shot-types?season=${season}`).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(`${API}/advanced/${pid}/tracking?season=${season}`).then(r=>r.ok?r.json():null).catch(()=>null),
    ]).then(([sc,hu,st,tr])=>{
      setNbaAdv({
        shots:sc?.value?.shots||null,
        hustle:hu?.value?.hustle||null,
        shotTypes:st?.value?.shot_types||null,
        tracking:tr?.value?.tracking||null,
      });
      setNbaAdvLoading(false);
    });
  }
  function runAI(){
    if(!selected||analysis.loading)return;
    const name=`${selected.first_name||''} ${selected.last_name||''}`.trim();
    if(analysisMode==='season'){analysis.runGet(`${API}/analysis/player/stream?player_id=${selected.id}&season=${seasonInt}`);}
    else{analysis.run(`${API}/chat/message`,{messages:[{role:'user',content:`Analyze ${name} current form and recent performance. Focus on hot/cold streaks, recent game logs, and live season trends.`}]});}
  }
  function toggleSort(key){setTermSort(p=>p.key===key?{key,dir:p.dir==='desc'?'asc':'desc'}:{key,dir:'desc'});}

  const poolArr=Object.values(poolData);
  const f1=v=>v!=null?v.toFixed(1):'--';
  const fp2=v=>v!=null?Math.round(v*100)+'%':'--';

  const moversArr=poolArr.filter(d=>d.seasonAvg&&d.l10Avg&&d.seasonAvg.gp>=5)
    .map(d=>({...d,ppgDelta:d.delta?.ppg||0}))
    .sort((a,b)=>Math.abs(b.ppgDelta)-Math.abs(a.ppgDelta));
  const rising=moversArr.filter(d=>d.ppgDelta>0.4).slice(0,5);
  const fading=moversArr.filter(d=>d.ppgDelta<-0.4).slice(0,5);

  const roleShifts=poolArr.filter(d=>d.delta&&Math.abs(d.delta.min)>1.5)
    .sort((a,b)=>Math.abs(b.delta.min)-Math.abs(a.delta.min)).slice(0,4);

  const rookies=poolArr
    .filter(d=>CURRENT_SEASON_ROOKIES_IDS.has(d.fp?.nbaId))
    .filter(d=>d.l10pts&&d.l10pts.length>0).slice(0,4);

  // Featured: hero auto-selected from the full FEATURED pool
  const featuredPoolArr=FEATURED_PLAYERS.map(fp=>poolData[fp.search]).filter(Boolean);
  const heroData=selectHeroPlayer(featuredPoolArr);
  const heroReasonTags=heroReasons(heroData);
  const supportingData=featuredPoolArr.filter(d=>d.fp?.nbaId!==heroData?.fp?.nbaId).slice(0,4);

  const terminalData=[...poolArr]
    .filter(d=>{
      if(!d.bdlPlayer||!d.seasonAvg)return false;
      const a=d.seasonAvg;
      // Row must have at least one meaningful stat to be displayed.
      // gp>0 AND min>0 guards against incomplete/injected zero rows (e.g. Haliburton DNPs).
      if(!a.gp||a.gp<=0)return false;
      if(!a.min||a.min<=0)return false;
      return(a.ppg>0||a.rpg>0||a.apg>0);
    })
    .filter(d=>posFilter==='ALL'||(d.bdlPlayer?.position||d.fp?.pos||'').includes(posFilter))
    .sort((a,b)=>{
      const v=d=>{const a=d.seasonAvg;if(!a)return 0;
        return{ppg:a.ppg,rpg:a.rpg,apg:a.apg,min:a.min,gp:a.gp,fg:a.fg||0,fg3:a.fg3||0,ts:a.ts||0}[termSort.key]||0;};
      return termSort.dir==='desc'?v(b)-v(a):v(a)-v(b);
    });
  const TERM_COLLAPSE=25;
  const visibleTerminal=termExpanded?terminalData:terminalData.slice(0,TERM_COLLAPSE);

  const seasons=['2025-26','2024-25','2023-24','2022-23','2021-22'];
  return(
    <div className="page" style={{paddingBottom:56}}>

      {/* COMMAND BAR */}
      <div className="intel-cmd">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 40px',borderBottom:'1px solid var(--divider)'}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'.1em',color:'var(--smoke)'}}>PLAYER INTELLIGENCE</div>
          <select style={{minWidth:200,height:32,fontSize:11,background:'var(--carbon)',border:'1px solid var(--wire)',color:'var(--bone)'}}
                  value={season} onChange={e=>setSeason(e.target.value)}>
            {seasons.map(s=><option key={s} value={s}>{s}{s==='2025-26'?' CURRENT':''}</option>)}
          </select>
        </div>
        {/* Search row: NO overflow-x so dropdown is never clipped */}
        <div style={{padding:'6px 40px',borderBottom:'1px solid var(--divider)',position:'relative',zIndex:201}}>
          <PlayerSearchBox onSelect={openDetail} placeholder="SEARCH PLAYER NAME..."/>
        </div>
        <div className="intel-cmd-row">
          <div style={{display:'flex',gap:4,flexShrink:0}}>
            {['ALL','PG','SG','SF','PF','C'].map(p=>(
              <button key={p} className={`intel-chip${posFilter===p?' active':''}`} onClick={()=>setPosFilter(p)}>{p}</button>
            ))}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
            <span style={{fontSize:10,letterSpacing:'.08em',color:'var(--smoke)',fontWeight:700}}>SORT</span>
            <select value={termSort.key} onChange={e=>setTermSort({key:e.target.value,dir:'desc'})}
                    style={{height:28,width:76,fontSize:10,background:'var(--carbon)',border:'1px solid var(--wire)',color:'var(--bone)'}}>
              {[['ppg','PPG'],['rpg','RPG'],['apg','APG'],['min','MIN'],['fg','FG%'],['fg3','3P%'],['ts','TS%']].map(([v,l])=>(
                <option key={v} value={v}>{l}</option>
              ))}
            </select>
          </div>
          <div style={{display:'flex',border:'1px solid rgba(255,255,255,.08)',flexShrink:0}}>
            {['COMFORTABLE','COMPACT'].map(d=>(
              <button key={d} className={`intel-chip${density===d.toLowerCase()?' active':''}`} style={{borderRadius:0,border:'none'}}
                      onClick={()=>setDensity(d.toLowerCase())}>{d}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{padding:'0 40px'}}>

        {/* MODULE 2: FEATURED */}
        <div style={{marginTop:32,marginBottom:40}}>
          <div className="intel-section-label">FEATURED</div>
          {poolLoading?<div className="load-line-wrap"><div className="load-line"/></div>:(
            <div className="feat-hero-row">
              {heroData
                ?<HeroCard data={heroData} reasons={heroReasonTags} onSelect={openDetail}/>
                :<div className="feat-hero" style={{display:'flex',alignItems:'center',justifyContent:'center',padding:32,fontSize:9,color:'var(--smoke)',letterSpacing:'.1em'}}>LOADING...</div>
              }
              {supportingData.map(d=>(
                <SupportingCard key={d.fp.nbaId} data={d} onSelect={openDetail}/>
              ))}
            </div>
          )}
        </div>

        {/* MODULE 3: MOVERS */}
        <div style={{marginBottom:40}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:16}}>
            <span className="intel-section-label" style={{marginBottom:0}}>MOVERS</span>
            <span style={{fontSize:10,letterSpacing:'.08em',color:'var(--smoke)'}}>LAST 10 GAMES</span>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
            {[{label:'RISING',color:'var(--trend-up)',data:rising,sign:true},{label:'FADING',color:'var(--trend-down)',data:fading,sign:false}].map(({label,color,data,sign})=>(
              <div key={label}>
                <div className="intel-col-header" style={{color}}>{label}</div>
                {data.length===0&&!poolLoading&&<div style={{fontSize:11,color:'var(--smoke)',padding:'12px 0',letterSpacing:'.06em'}}>INSUFFICIENT DATA</div>}
                {data.map((d,i)=>{
                  const name=`${d.bdlPlayer.first_name} ${d.bdlPlayer.last_name}`;
                  const team=d.bdlPlayer.team?.abbreviation||d.fp.team;
                  const tc=TEAM_PRIMARY[team]||'#555';
                  return(
                    <div key={d.fp.search} className="intel-row"
                         style={{background:i%2?'rgba(255,255,255,.015)':'transparent'}}
                         onClick={()=>openDetail(d.bdlPlayer)}>
                      <div style={{width:3,height:'100%',background:tc,flexShrink:0}}/>
                      <div style={{flex:1,padding:'0 12px'}}>
                        <div style={{fontSize:13,fontWeight:700}}>{name}</div>
                        <div style={{fontSize:10,color:'var(--smoke)'}}>{team}</div>
                      </div>
                      <div style={{textAlign:'right',padding:'0 12px'}}>
                        <div className="stat-num" style={{fontSize:13,color}}>{sign&&d.ppgDelta>0?'+':''}{d.ppgDelta.toFixed(1)} PPG</div>
                        <div style={{fontSize:9,color:'var(--smoke)'}}>VS SEASON AVG</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>

        {/* MODULE 4: WATCH — hidden if all columns empty */}
        {(!poolLoading&&(roleShifts.length>0||rookies.length>0))&&(
        <div style={{marginBottom:40}}>
          <div className="intel-section-label">WATCH</div>
          <div style={{display:'grid',gridTemplateColumns:[roleShifts.length>0&&'1fr',rookies.length>0&&'1fr'].filter(Boolean).join(' '),gap:24}}>
            {roleShifts.length>0&&(
            <div>
              <div className="intel-col-header">MIN SHIFT</div>
              {roleShifts.map((d,i)=>{
                const name=`${d.bdlPlayer.first_name} ${d.bdlPlayer.last_name}`;
                const team=d.bdlPlayer.team?.abbreviation||d.fp.team;
                const up=d.delta.min>0;
                return(
                  <div key={d.fp.search} className="intel-row intel-row-sm"
                       onClick={()=>openDetail(d.bdlPlayer)}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:700}}>{name}</div>
                      <div style={{fontSize:10,color:'var(--smoke)'}}>{team}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div className="stat-num" style={{fontSize:12,color:up?'var(--trend-up)':'var(--trend-down)'}}>{up?'+':''}{d.delta.min.toFixed(1)} MIN</div>
                      <div style={{fontSize:9,color:'var(--smoke)'}}>L10 VS PRIOR</div>
                    </div>
                  </div>
                );
              })}
            </div>
            )}
            {rookies.length>0&&(
            <div>
              <div className="intel-col-header">ROOKIE BREAKOUT</div>
              {rookies.map(d=>{
                const name=`${d.bdlPlayer.first_name} ${d.bdlPlayer.last_name}`;
                const team=d.bdlPlayer.team?.abbreviation||d.fp.team;
                const peak=Math.max(...(d.l10pts||[0]).slice(0,5));
                return(
                  <div key={d.fp.search} className="intel-row intel-row-sm"
                       onClick={()=>openDetail(d.bdlPlayer)}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:700}}>{name}</div>
                      <div style={{fontSize:10,color:'var(--smoke)'}}>{team}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div className="stat-num" style={{fontSize:12,color:'var(--neon)'}}>{peak} PTS</div>
                      <div style={{fontSize:9,color:'var(--smoke)'}}>L5 PEAK</div>
                    </div>
                  </div>
                );
              })}
            </div>
            )}
          </div>
        </div>
        )}

        {/* MODULE 5: TERMINAL */}
        <div style={{marginBottom:48}}>
          <div className="intel-section-label">TERMINAL</div>
          {poolLoading?<div className="load-line-wrap"><div className="load-line"/></div>:(
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead>
                  <tr>
                    {[
                      {key:'pos',l:'POS',w:48,align:'center',sort:false},
                      {key:'team',l:'TEAM',w:56,align:'center',sort:false},
                      {key:'player',l:'PLAYER',w:'auto',align:'left',sort:false},
                      {key:'gp',l:'GP',w:56,sort:true},
                      {key:'min',l:'MIN',w:64,sort:true},
                      {key:'ppg',l:'PPG',w:64,sort:true},
                      {key:'rpg',l:'RPG',w:64,sort:true},
                      {key:'apg',l:'APG',w:64,sort:true},
                      {key:'fg',l:'FG%',w:64,sort:true},
                      {key:'fg3',l:'3P%',w:64,sort:true},
                      {key:'ft',l:'FT%',w:64,sort:true},
                      {key:'ts',l:'TS%',w:64,sort:true},
                      {key:'usg',l:'USG%',w:64,sort:false},
                      {key:'pm',l:'+/-',w:64,sort:false},
                      {key:'status',l:'STATUS',w:80,align:'center',sort:false},
                    ].map(col=>(
                      <th key={col.key} onClick={()=>col.sort&&toggleSort(col.key)}
                          className={`term-th${col.sort?' sortable':''}${termSort.key===col.key?' sorted':''}`}
                          style={{width:col.w,textAlign:col.align||'right'}}>
                        {col.l}
                        {col.sort&&termSort.key===col.key&&(
                          <span style={{marginLeft:4,fontSize:8}}>{termSort.dir==='desc'?'▼':'▲'}</span>
                        )}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {visibleTerminal.map((d,i)=>{
                    const p=d.bdlPlayer;
                    const a=d.seasonAvg;
                    const name=`${p.first_name} ${p.last_name}`;
                    const team=p.team?.abbreviation||d.fp.team;
                    const rowH=density==='compact'?32:40;
                    const fs=density==='compact'?11:13;
                    const pad=density==='compact'?'5px 8px':'8px 12px';
                    const zbg=i%2?'rgba(255,255,255,.012)':'transparent';
                    return(
                      <tr key={d.fp.search} className="term-tr" onClick={()=>openDetail(p)}
                          style={{height:rowH,background:zbg}}>
                        <td className="term-td" style={{textAlign:'center',color:'var(--smoke)',fontSize:10,padding:pad}}>{p.position||d.fp.pos||'--'}</td>
                        <td className="term-td" style={{textAlign:'center',color:'var(--smoke)',fontSize:10,padding:pad}}>{team}</td>
                        <td className="term-td" style={{textAlign:'left',fontWeight:700,fontSize:fs,padding:pad,whiteSpace:'nowrap'}}>{name}</td>
                        <td className="term-td" style={{fontSize:fs,padding:pad}}>{a?.gp||'--'}</td>
                        <td className="term-td" style={{fontSize:fs,padding:pad}}>{a?.min!=null?a.min.toFixed(1):'--'}</td>
                        <td className="term-td" style={{fontSize:fs,padding:pad,color:a?.ppg>=25?'var(--neon)':a?.ppg>=20?'var(--acid)':'var(--bone)'}}>{f1(a?.ppg)}</td>
                        <td className="term-td" style={{fontSize:fs,padding:pad}}>{f1(a?.rpg)}</td>
                        <td className="term-td" style={{fontSize:fs,padding:pad}}>{f1(a?.apg)}</td>
                        <td className="term-td" style={{fontSize:fs,padding:pad}}>{fp2(a?.fg)}</td>
                        <td className="term-td" style={{fontSize:fs,padding:pad}}>{fp2(a?.fg3)}</td>
                        <td className="term-td" style={{fontSize:fs,padding:pad}}>{fp2(a?.ft)}</td>
                        <td className="term-td" style={{fontSize:fs,padding:pad,color:a?.ts!=null?(a.ts>=0.58?'var(--trend-up)':a.ts>=0.50?'var(--bone)':'var(--trend-down)'):'var(--smoke)'}}>{a?.ts!=null?fp2(a.ts):<span style={{fontSize:9,color:'var(--smoke)'}}>--</span>}</td>
                        <td className="term-td" style={{fontSize:fs,padding:pad,color:'var(--smoke)'}}><span style={{fontSize:9,color:'var(--smoke)'}}>--</span></td>
                        <td className="term-td" style={{fontSize:fs,padding:pad}}>{d.pmAvg!=null?(<span style={{color:d.pmAvg>0?'var(--trend-up)':d.pmAvg<0?'var(--trend-down)':'var(--smoke)',fontVariantNumeric:'tabular-nums'}}>{d.pmAvg>0?'+':''}{d.pmAvg.toFixed(1)}</span>):<span style={{fontSize:9,color:'var(--smoke)'}}>--</span>}</td>
                        <td className="term-td" style={{textAlign:'center',padding:pad}}><StatusPill/></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              {terminalData.length>TERM_COLLAPSE&&(
                <div style={{textAlign:'center',padding:'12px 0'}}>
                  <button className="intel-chip" onClick={()=>setTermExpanded(e=>!e)}
                          style={{padding:'6px 20px',fontSize:10,letterSpacing:'.08em'}}>
                    {termExpanded?'COLLAPSE':(`SHOW ALL ${terminalData.length}`)}
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* DETAIL MODAL */}
      {selected&&(()=>{
        // Build a team ID lookup from NBA_TEAMS
        const teamById={};
        NBA_TEAMS.forEach(t=>{teamById[t.id]=t.abbr;});

        // Sorted newest-first
        const logs=[...(detailStats||[])].reverse();

        // Compute season highs across all games
        const maxPts=logs.length?Math.max(...logs.map(s=>s.points||0)):0;
        const maxReb=logs.length?Math.max(...logs.map(s=>s.rebounds||0)):0;
        const maxAst=logs.length?Math.max(...logs.map(s=>s.assists||0)):0;

        // Advanced stat formatters -- NO percentage on rating metrics
        const RATING_KEYS=new Set(['net_rating','offensive_rating','defensive_rating']);
        const PCT_KEYS=new Set(['true_shooting_percentage','effective_field_goal_percentage','usage_percentage','assist_percentage','pie']);
        function fmtAdv(key,val){
          if(val==null)return'--';
          if(RATING_KEYS.has(key)){
            const n=parseFloat(val);
            if(isNaN(n))return'--';
            return(n>0?'+':'')+n.toFixed(1);
          }
          if(PCT_KEYS.has(key)){
            const n=parseFloat(val);
            if(isNaN(n))return'--';
            // BDL returns 0-1 range for most; PIE is also 0-1
            return Math.round(n*100)+'%';
          }
          return typeof val==='number'?val.toFixed(1):'--';
        }
        function advColor(key,val){
          if(val==null)return'var(--smoke)';
          if(key==='net_rating'){
            const n=parseFloat(val);
            if(n>0)return'var(--trend-up)';
            if(n<0)return'var(--trend-down)';
          }
          if(key==='defensive_rating'){
            const n=parseFloat(val);
            if(n<100)return'var(--trend-up)';
            if(n>115)return'var(--trend-down)';
          }
          return'var(--bone)';
        }

        // The ADVANCED window: season mode uses detailAdv (season avgs); live mode uses L10 computed stats
        const activeAdv=detailAdv;
        const advWindow=analysisMode==='live'?'LAST 10':'SEASON';

        // Shot line formatter: "8-17" or "--" if both null
        const shotLine=(m,a)=>(m!=null&&a!=null)?`${m}-${a}`:'--';
        // Safe pct formatter
        const safePct=(pct)=>pct!=null&&pct>0?Math.round(pct*100)+'%':'--';

        // OPP derivation from game metadata
        function getOpp(s){
          if(!s.game_home_team_id||!s.game_visitor_team_id)return'--';
          const myTeamId=s.player?.team?.id;
          const oppId=s.game_home_team_id===myTeamId?s.game_visitor_team_id:s.game_home_team_id;
          const oppAbbr=teamById[oppId];
          const isHome=s.game_home_team_id===myTeamId;
          return oppAbbr?(isHome?`vs ${oppAbbr}`:`@ ${oppAbbr}`):'--';
        }

        // RESULT derivation
        function getResult(s){
          if(s.game_home_score==null||s.game_visitor_score==null)return null;
          const myTeamId=s.player?.team?.id;
          const myScore=s.game_home_team_id===myTeamId?s.game_home_score:s.game_visitor_score;
          const oppScore=s.game_home_team_id===myTeamId?s.game_visitor_score:s.game_home_score;
          const win=myScore>oppScore;
          return{win,label:(win?'W':'L')+' '+myScore+'-'+oppScore};
        }

        // DATE formatter: MM/DD from ISO string
        function fmtDate(d){
          if(!d)return'--';
          try{const dt=new Date(d+'T12:00:00Z');return(dt.getUTCMonth()+1)+'/'+(dt.getUTCDate());}catch(e){return'--';}
        }

        const fp=[...FEATURED_PLAYERS,...MOVERS_POOL].find(f=>f.search.toLowerCase().includes((selected.last_name||'').toLowerCase()));

        return(
        <div className="modal-overlay" onClick={closeDetail}>
          <div className="modal-box" style={{maxWidth:980}} onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div style={{display:'flex',gap:14,alignItems:'center'}}>
                {fp&&<PlayerPhoto nbaId={fp.nbaId} name={`${selected.first_name} ${selected.last_name}`} size={44} circle={true}/>}
                <div>
                  <div style={{fontSize:9,fontWeight:700,letterSpacing:'.12em',color:'var(--neon)',marginBottom:4}}>{selected.team?.abbreviation||'--'} / {selected.position||'--'}</div>
                  <div style={{fontSize:22,fontWeight:900,letterSpacing:'-.04em',lineHeight:1}}>{selected.first_name} {selected.last_name}</div>
                </div>
              </div>
              <button className="modal-close" onClick={closeDetail}>x</button>
            </div>
            <div className="modal-body">
              {detailLoading&&<div className="load-line-wrap"><div className="load-line"/></div>}

              {/* GAME LOG */}
              {!detailLoading&&logs.length>0&&(
                <div style={{marginBottom:24}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
                    <div style={{fontSize:9,fontWeight:700,letterSpacing:'.12em',color:'var(--smoke)'}}>GAME LOG</div>
                    <div style={{fontSize:9,letterSpacing:'.08em',color:'var(--smoke)'}}>MOST RECENT FIRST</div>
                  </div>
                  <div style={{overflowX:'auto',position:'relative'}}>
                    <table className="box-table" style={{minWidth:720}}>
                      <thead>
                        <tr>
                          <th style={{textAlign:'left',minWidth:28,position:'sticky',left:0,background:'var(--graphite)'}}>#</th>
                          <th style={{textAlign:'right',minWidth:44}}>DATE</th>
                          <th style={{textAlign:'left',minWidth:72}}>OPP</th>
                          <th style={{textAlign:'right',minWidth:88}}>RESULT</th>
                          <th style={{textAlign:'right',minWidth:44}}>MIN</th>
                          <th style={{textAlign:'right',minWidth:40}}>PTS</th>
                          <th style={{textAlign:'right',minWidth:40}}>REB</th>
                          <th style={{textAlign:'right',minWidth:40}}>AST</th>
                          <th style={{textAlign:'right',minWidth:36}}>STL</th>
                          <th style={{textAlign:'right',minWidth:36}}>BLK</th>
                          <th style={{textAlign:'right',minWidth:36}}>TO</th>
                          <th style={{textAlign:'right',minWidth:56}}>FGM-A</th>
                          <th style={{textAlign:'right',minWidth:52}}>3PM-A</th>
                          <th style={{textAlign:'right',minWidth:52}}>FTM-A</th>
                          <th style={{textAlign:'right',minWidth:48}}>FG%</th>
                          <th style={{textAlign:'right',minWidth:44}}>3P%</th>
                          <th style={{textAlign:'right',minWidth:44}}>FT%</th>
                        </tr>
                      </thead>
                      <tbody>
                        {logs.slice(0,15).map((s,i)=>{
                          const isSeasonHighPts=s.points>0&&s.points===maxPts;
                          const isSeasonHighReb=s.rebounds>0&&s.rebounds===maxReb;
                          const isSeasonHighAst=s.assists>0&&s.assists===maxAst;
                          const isSeasonHigh=isSeasonHighPts||isSeasonHighReb||isSeasonHighAst;
                          const notable=s.points>=20||isSeasonHigh;
                          const opp=getOpp(s);
                          const res=getResult(s);
                          const rowBg=notable?'rgba(0,255,136,0.06)':'transparent';
                          return(
                            <tr key={i} style={{background:rowBg}}>
                              <td style={{textAlign:'left',fontSize:10,color:'var(--smoke)',position:'sticky',left:0,background:rowBg}}>
                                {i+1}{isSeasonHigh&&<span style={{width:5,height:5,borderRadius:'50%',background:'var(--neon)',display:'inline-block',marginLeft:4,verticalAlign:'middle'}}/>}
                              </td>
                              <td className="stat-num" style={{textAlign:'right',fontSize:11,color:'var(--smoke)'}}>{fmtDate(s.game_date)}</td>
                              <td style={{textAlign:'left',fontSize:11,color:'var(--smoke)'}}>{opp}</td>
                              <td style={{textAlign:'right',fontSize:11,fontWeight:700}}>
                                {res?<span style={{color:res.win?'var(--trend-up)':'var(--trend-down)'}}>{res.label}</span>:'--'}
                              </td>
                              <td className="stat-num" style={{textAlign:'right'}}>{s.minutes||'--'}</td>
                              <td className="stat-num" style={{textAlign:'right',fontWeight:900}}>{s.points??'--'}</td>
                              <td className="stat-num" style={{textAlign:'right'}}>{s.rebounds??'--'}</td>
                              <td className="stat-num" style={{textAlign:'right'}}>{s.assists??'--'}</td>
                              <td className="stat-num" style={{textAlign:'right'}}>{s.steals??'--'}</td>
                              <td className="stat-num" style={{textAlign:'right'}}>{s.blocks??'--'}</td>
                              <td className="stat-num" style={{textAlign:'right'}}>{s.turnover??'--'}</td>
                              <td className="stat-num" style={{textAlign:'right'}}>{shotLine(s.fgm,s.fga)}</td>
                              <td className="stat-num" style={{textAlign:'right'}}>{shotLine(s.fg3m,s.fg3a)}</td>
                              <td className="stat-num" style={{textAlign:'right'}}>{shotLine(s.ftm,s.fta)}</td>
                              <td className="stat-num" style={{textAlign:'right'}}>{safePct(s.fg_pct)}</td>
                              <td className="stat-num" style={{textAlign:'right'}}>{s.fg3a>0?safePct(s.fg3_pct):'--'}</td>
                              <td className="stat-num" style={{textAlign:'right'}}>{s.fta>0?safePct(s.ft_pct):'--'}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* ADVANCED STATS */}
              {activeAdv&&(
                <div style={{marginBottom:24}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:12}}>
                    <div style={{fontSize:9,fontWeight:700,letterSpacing:'.12em',color:'var(--smoke)'}}>ADVANCED</div>
                    <div style={{fontSize:9,letterSpacing:'.08em',color:'var(--smoke)'}}>{advWindow}</div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(96px,1fr))',gap:16}}>
                    {[
                      {lbl:'NET RTG',key:'net_rating',sub:'PER 100 POSS'},
                      {lbl:'OFF RTG',key:'offensive_rating',sub:'PER 100 POSS'},
                      {lbl:'DEF RTG',key:'defensive_rating',sub:'PER 100 POSS'},
                      {lbl:'TS%',key:'true_shooting_percentage',sub:null},
                      {lbl:'EFG%',key:'effective_field_goal_percentage',sub:null},
                      {lbl:'USG%',key:'usage_percentage',sub:null},
                      {lbl:'AST%',key:'assist_percentage',sub:null},
                      {lbl:'PIE',key:'pie',sub:null},
                    ].filter(({key})=>activeAdv[key]!=null).map(({lbl,key,sub})=>{
                      const val=activeAdv[key];
                      const disp=fmtAdv(key,val);
                      const clr=advColor(key,val);
                      return(
                        <div key={key}>
                          <div style={{fontSize:9,letterSpacing:'.12em',color:'var(--smoke)',fontWeight:700,marginBottom:2}}>{lbl}</div>
                          {sub&&<div style={{fontSize:8,letterSpacing:'.06em',color:'rgba(255,255,255,.25)',marginBottom:4}}>{sub}</div>}
                          <div className="stat-num" style={{fontSize:20,fontWeight:900,letterSpacing:'-.02em',color:clr}}>{disp}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* NBA.COM ADVANCED */}
              <div style={{marginBottom:24}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div style={{fontSize:9,fontWeight:700,letterSpacing:'.12em',color:'var(--smoke)'}}>NBA.COM ADVANCED</div>
                  {!nbaAdvLoading&&!nbaAdv&&(
                    <button className="btn btn-secondary btn-sm" onClick={loadNbaAdv}>LOAD</button>
                  )}
                  {nbaAdvLoading&&<div style={{display:'flex',alignItems:'center',gap:6}}><span className="pulse-dot" style={{width:6,height:6}}/><span style={{fontSize:9,letterSpacing:'.08em',color:'var(--smoke)'}}>FETCHING</span></div>}
                </div>
                {nbaAdv&&(()=>{
                  const{shots,hustle,shotTypes,tracking}=nbaAdv;

                  // ── Shot chart ──────────────────────────────────────────────
                  function ShotChartSVG({shots}){
                    if(!shots||!shots.length)return<div style={{fontSize:10,color:'var(--smoke)'}}>No shot data.</div>;
                    const W=280,H=265;
                    const scX=x=>(x+250)/500*W;
                    const scY=y=>(1-(y+47.5)/470)*H;
                    const made=shots.filter(s=>s.made);
                    const missed=shots.filter(s=>!s.made);
                    const fgPct=shots.length>0?(made.length/shots.length*100).toFixed(1):'--';
                    return(
                      <div style={{position:'relative',display:'inline-block'}}>
                        <svg width={W} height={H} style={{display:'block',background:'var(--graphite)',borderRadius:4}}>
                          {/* Court outline */}
                          <rect x={scX(-250)} y={scY(422.5)} width={W} height={H} fill="none"/>
                          {/* Paint */}
                          <rect x={scX(-80)} y={scY(142.5)} width={scX(80)-scX(-80)} height={scY(-47.5)-scY(142.5)} fill="none" stroke="rgba(255,255,255,.1)" strokeWidth="1"/>
                          {/* Basket */}
                          <circle cx={scX(0)} cy={scY(0)} r={4} fill="none" stroke="rgba(255,255,255,.4)" strokeWidth="1.5"/>
                          {/* 3PT arc (simplified) */}
                          <path d={`M ${scX(-220)} ${scY(-47.5)} L ${scX(-220)} ${scY(89.47)} A 237.5 237.5 0 0 0 ${scX(220)} ${scY(89.47)} L ${scX(220)} ${scY(-47.5)}`} fill="none" stroke="rgba(255,255,255,.12)" strokeWidth="1"/>
                          {/* Missed shots */}
                          {missed.map((s,i)=><circle key={'m'+i} cx={scX(s.x)} cy={scY(s.y)} r={2.5} fill="none" stroke="rgba(229,72,77,.55)" strokeWidth="1"/>)}
                          {/* Made shots */}
                          {made.map((s,i)=><circle key={'h'+i} cx={scX(s.x)} cy={scY(s.y)} r={2.5} fill="rgba(0,255,136,.7)" stroke="none"/>)}
                        </svg>
                        <div style={{display:'flex',gap:16,marginTop:6,fontSize:9,color:'var(--smoke)'}}>
                          <span><span style={{color:'var(--neon)'}}>●</span> MADE ({made.length})</span>
                          <span><span style={{color:'var(--trend-down)'}}>○</span> MISSED ({missed.length})</span>
                          <span style={{marginLeft:'auto',color:'var(--bone)',fontWeight:700}}>FG% {fgPct}%</span>
                        </div>
                      </div>
                    );
                  }

                  // ── Hustle grid ─────────────────────────────────────────────
                  function HustleGrid({hustle}){
                    if(!hustle)return<div style={{fontSize:10,color:'var(--smoke)'}}>No hustle data.</div>;
                    const items=[
                      {lbl:'CONT. 2PT',val:hustle.contested_2pt},
                      {lbl:'CONT. 3PT',val:hustle.contested_3pt},
                      {lbl:'DEFLECTIONS',val:hustle.deflections},
                      {lbl:'CHARGES',val:hustle.charges_drawn},
                      {lbl:'SCR AST',val:hustle.screen_assists},
                      {lbl:'BOX OUTS',val:hustle.box_outs},
                      {lbl:'LOOSE BALLS',val:hustle.loose_balls_recovered},
                    ].filter(x=>x.val!=null);
                    const gp=hustle.games_played||1;
                    return(
                      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(76px,1fr))',gap:8}}>
                        {items.map(({lbl,val})=>(
                          <div key={lbl} style={{background:'var(--void)',borderRadius:4,padding:'6px 8px'}}>
                            <div style={{fontSize:8,letterSpacing:'.1em',color:'var(--smoke)',marginBottom:2}}>{lbl}</div>
                            <div className="stat-num" style={{fontSize:18,fontWeight:900,color:'var(--bone)'}}>{(val/gp).toFixed(1)}</div>
                            <div style={{fontSize:8,color:'rgba(255,255,255,.25)'}}>PER GAME</div>
                          </div>
                        ))}
                      </div>
                    );
                  }

                  // ── Shot type bars ──────────────────────────────────────────
                  function ShotTypeBars({shotTypes}){
                    if(!shotTypes||!shotTypes.length)return<div style={{fontSize:10,color:'var(--smoke)'}}>No shot type data.</div>;
                    const maxFreq=Math.max(...shotTypes.map(s=>s.freq||0),0.01);
                    return(
                      <div style={{display:'flex',flexDirection:'column',gap:5}}>
                        {shotTypes.slice(0,6).map(s=>{
                          const pct=Math.round((s.fg_pct||0)*100);
                          const barW=Math.round((s.freq||0)/maxFreq*100);
                          const clr=pct>=55?'var(--neon)':pct>=45?'var(--trend-up)':pct>=38?'var(--bone)':'var(--trend-down)';
                          return(
                            <div key={s.shot_type}>
                              <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--smoke)',marginBottom:2}}>
                                <span style={{letterSpacing:'.06em'}}>{s.shot_type.toUpperCase()}</span>
                                <span style={{color:clr,fontWeight:700}}>{pct}%</span>
                              </div>
                              <div style={{height:4,background:'rgba(255,255,255,.06)',borderRadius:2,overflow:'hidden'}}>
                                <div style={{height:'100%',width:barW+'%',background:clr,borderRadius:2,transition:'width .3s'}}/>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  }

                  // ── Tracking grid ───────────────────────────────────────────
                  function TrackingGrid({tracking}){
                    if(!tracking||!Object.keys(tracking).length)return<div style={{fontSize:10,color:'var(--smoke)'}}>No tracking data.</div>;
                    const items=[
                      {lbl:'AVG SPEED',val:tracking.avg_speed,fmt:v=>v!=null?v.toFixed(1)+' MPH':'--'},
                      {lbl:'DIST/GM',val:tracking.dist_feet,fmt:v=>v!=null?(v/5280).toFixed(2)+' MI':'--'},
                      {lbl:'TOUCHES',val:tracking.touches,fmt:v=>v!=null?v.toFixed(1):'--'},
                      {lbl:'POSS TIME',val:tracking.time_of_poss,fmt:v=>v!=null?v.toFixed(1)+'s':'--'},
                      {lbl:'DRIB/TOUCH',val:tracking.avg_drib_per_touch,fmt:v=>v!=null?v.toFixed(1):'--'},
                      {lbl:'SEC/TOUCH',val:tracking.avg_sec_per_touch,fmt:v=>v!=null?v.toFixed(1)+'s':'--'},
                    ].filter(x=>x.val!=null);
                    if(!items.length)return<div style={{fontSize:10,color:'var(--smoke)'}}>No tracking data.</div>;
                    return(
                      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(88px,1fr))',gap:8}}>
                        {items.map(({lbl,val,fmt})=>(
                          <div key={lbl} style={{background:'var(--void)',borderRadius:4,padding:'6px 8px'}}>
                            <div style={{fontSize:8,letterSpacing:'.1em',color:'var(--smoke)',marginBottom:2}}>{lbl}</div>
                            <div className="stat-num" style={{fontSize:16,fontWeight:900,color:'var(--bone)'}}>{fmt(val)}</div>
                          </div>
                        ))}
                      </div>
                    );
                  }

                  const hasAny=shots||hustle||shotTypes||tracking;
                  if(!hasAny)return<div style={{fontSize:10,color:'var(--smoke)',padding:'8px 0'}}>stats.nba.com returned no data for this player. The server may be blocked on Railway.</div>;

                  return(
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
                      {/* Left column: shot chart + shot types */}
                      <div>
                        {shots&&<>
                          <div style={{fontSize:8,letterSpacing:'.12em',color:'var(--smoke)',fontWeight:700,marginBottom:6}}>SHOT CHART</div>
                          <ShotChartSVG shots={shots}/>
                        </>}
                        {shotTypes&&<>
                          <div style={{fontSize:8,letterSpacing:'.12em',color:'var(--smoke)',fontWeight:700,margin:'14px 0 6px'}}>SHOT TYPES</div>
                          <ShotTypeBars shotTypes={shotTypes}/>
                        </>}
                      </div>
                      {/* Right column: hustle + tracking */}
                      <div>
                        {hustle&&<>
                          <div style={{fontSize:8,letterSpacing:'.12em',color:'var(--smoke)',fontWeight:700,marginBottom:6}}>HUSTLE</div>
                          <HustleGrid hustle={hustle}/>
                        </>}
                        {tracking&&<>
                          <div style={{fontSize:8,letterSpacing:'.12em',color:'var(--smoke)',fontWeight:700,margin:'14px 0 6px'}}>MOVEMENT</div>
                          <TrackingGrid tracking={tracking}/>
                        </>}
                      </div>
                    </div>
                  );
                })()}
              </div>

              {/* PIVOT INTEL */}
              <div>
                <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap',marginBottom:16}}>
                  <div style={{fontSize:9,fontWeight:700,letterSpacing:'.12em',color:'var(--smoke)'}}>PIVOT INTEL</div>
                  <div className="seg" style={{marginLeft:'auto'}}>
                    {[{id:'season',label:'SEASON'},{id:'live',label:'LIVE FORM'}].map(m=>(
                      <button key={m.id} className={`seg-btn${analysisMode===m.id?' active':''}`}
                              onClick={()=>{setAnalysisMode(m.id);analysis.reset();}}>{m.label}</button>
                    ))}
                  </div>
                  {!analysis.lines.length&&!analysis.loading&&(
                    <button className="btn btn-secondary btn-sm" onClick={runAI}>RUN INTEL</button>
                  )}
                  {analysis.loading&&(
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <span className="pulse-dot" style={{width:6,height:6}}/>
                      <span style={{fontSize:9,letterSpacing:'.08em',color:'var(--smoke)'}}>PROCESSING</span>
                    </div>
                  )}
                  {!analysis.loading&&analysis.lines.length>0&&(
                    <button className="btn-ghost" style={{fontSize:9,letterSpacing:'.08em',border:'1px solid rgba(255,255,255,.08)',padding:'4px 10px'}}
                            onClick={()=>{analysis.reset();runAI();}}>REFRESH</button>
                  )}
                </div>
                {analysis.lines.length>0&&<StreamBox lines={analysis.lines} loading={analysis.loading}/>}
                {!analysis.lines.length&&!analysis.loading&&(
                  <div style={{fontSize:11,color:'var(--smoke)',letterSpacing:'.06em'}}>SELECT SEASON OR LIVE FORM, THEN RUN INTEL.</div>
                )}
              </div>
            </div>
          </div>
        </div>
        );
      })()}
    </div>
  );
}

function fmtM(m){if(m==null)return'--';const v=parseFloat(m);return(v<0?'-$':'$')+Math.abs(v).toFixed(1)+'M';}
function fmtMRaw(m){if(m==null)return'--';return'$'+parseFloat(m).toFixed(1)+'M';}
function daysUntil(d){return Math.max(0,Math.round((d-new Date())/(1000*60*60*24)));}

function ApronPill({status}){
  const map={
    'UNDER CAP':['var(--cap-under)','rgba(31,191,122,.12)'],
    'OVER CAP':['var(--cap-over)','rgba(107,114,128,.12)'],
    'OVER TAX':['var(--cap-tax)','rgba(224,179,65,.12)'],
    'OVER 1ST APRON':['var(--cap-apron1)','rgba(232,149,61,.12)'],
    'OVER 2ND APRON':['var(--cap-apron2)','rgba(229,72,77,.12)'],
    'HARD CAPPED':['var(--cap-hard)','transparent'],
  };
  const[color,bg]=map[status]||['var(--smoke)','transparent'];
  const border=status==='HARD CAPPED'?`1px solid ${color}`:'none';
  return(
    <span className="wr-apron-pill" style={{background:bg,color,border}}>
      {status}
    </span>
  );
}

function FAPill({status}){
  const map={UFA:'var(--status-ufa)',RFA:'var(--status-rfa)',PO:'var(--status-po)',TO:'var(--status-to)',ETO:'var(--status-eto)'};
  const c=map[status]||'var(--smoke)';
  return<span style={{fontSize:9,fontWeight:700,letterSpacing:'.08em',color:c,background:`${c}18`,padding:'2px 6px'}}>{status}</span>;
}

function HeaderRibbon(){
  const now=new Date();
  const dd=daysUntil(CBA.draftDeadline);
  const dfa=daysUntil(CBA.faWindow);
  const ddr=daysUntil(CBA.draft);
  const ts=now.toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}).toUpperCase();
  const pills=[
    {l:'SEASON CAP',v:fmtMRaw(CBA.salaryCap)},
    {l:'LUX TAX',v:fmtMRaw(CBA.luxuryTax)},
    {l:'1ST APRON',v:fmtMRaw(CBA.apron1)},
    {l:'2ND APRON',v:fmtMRaw(CBA.apron2)},
    {l:'MIN TEAM SAL',v:fmtMRaw(CBA.minTeamSal)},
    {l:'MAX 0-6Y',v:fmtMRaw(CBA.max06y)},
    {l:'MAX 7-9Y',v:fmtMRaw(CBA.max79y)},
    {l:'MAX 10+Y',v:fmtMRaw(CBA.max10y)},
    {l:'NT MLE',v:fmtMRaw(CBA.ntMLE)},
    {l:'T MLE',v:fmtMRaw(CBA.tMLE)},
    {l:'ROOM MLE',v:fmtMRaw(CBA.roomMLE)},
    {l:'BAE',v:fmtMRaw(CBA.bae)},
    {l:'MIN',v:fmtMRaw(CBA.minVet)},
    null,
    {l:'DAYS TO DEADLINE',v:String(dd)},
    {l:'DAYS TO FA WINDOW',v:String(dfa)},
    {l:'DAYS TO DRAFT',v:String(ddr)},
  ];
  return(
    <div className="wr-ribbon">
      {pills.map((p,i)=>p===null?(
        <div key={i} className="wr-pill-divider"/>
      ):(
        <div key={i} className="wr-pill">
          <div className="wr-pill-label">{p.l}</div>
          <div className="wr-pill-value">{p.v}</div>
        </div>
      ))}
      <div className="wr-ribbon-ts">AS OF {ts}</div>
    </div>
  );
}

function TeamsView({openDetail}){
  const[confF,setConfF]=React.useState('ALL');
  const[divF,setDivF]=React.useState('ALL');
  const[capF,setCapF]=React.useState('ALL');
  const[modeF,setModeF]=React.useState('ALL');
  const[sort,setSort]=React.useState('payroll_desc');
  const[search,setSearch]=React.useState('');
  const[expanded,setExpanded]=React.useState(null);

  const filtered=React.useMemo(()=>{
    let arr=[...NBA_TEAMS];
    if(search.trim()){
      const q=search.trim().toLowerCase();
      arr=arr.filter(t=>(t.full_name||t.name||'').toLowerCase().includes(q)||(t.abbr||'').toLowerCase().includes(q));
    }
    if(confF!=='ALL')arr=arr.filter(t=>t.conf===confF);
    if(divF!=='ALL')arr=arr.filter(t=>t.div===divF);
    const ext=t=>TEAM_EXT[t.abbr]||{};
    if(capF!=='ALL')arr=arr.filter(t=>ext(t).apronStatus===capF);
    if(modeF!=='ALL')arr=arr.filter(t=>ext(t).mode===modeF);
    arr.sort((a,b)=>{
      const ea=ext(a),eb=ext(b);
      switch(sort){
        case'payroll_desc':return(eb.payroll||0)-(ea.payroll||0);
        case'cap_space_desc':return(ea.payroll||0)-(eb.payroll||0);
        case'picks_owned_asc':return(ea.picksOwned||0)-(eb.picksOwned||0);
        case'expiring_desc':return(eb.expiring||0)-(ea.expiring||0);
        default:return 0;
      }
    });
    return arr;
  },[confF,divF,capF,modeF,sort,search]);

  return(
    <div style={{padding:'0 0 64px'}}>
      {/* Filter Bar */}
      <div className="wr-filter" style={{gap:16}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
               placeholder="SEARCH TEAM, GM, HEAD COACH"
               style={{height:28,width:200,fontSize:11,flexShrink:0}}/>
        <div style={{display:'flex',gap:3}}>
          {['ALL','East','West'].map(c=><button key={c} className={`wr-chip${confF===c?' active':''}`} onClick={()=>setConfF(c)}>{c}</button>)}
        </div>
        <div style={{width:1,height:20,background:'var(--divider)',flexShrink:0}}/>
        <div style={{display:'flex',gap:3}}>
          {['ALL','Atlantic','Central','Southeast','Northwest','Pacific','Southwest'].map(d=><button key={d} className={`wr-chip${divF===d?' active':''}`} onClick={()=>setDivF(d)}>{d==='ALL'?d:d.substring(0,3).toUpperCase()}</button>)}
        </div>
        <div style={{width:1,height:20,background:'var(--divider)',flexShrink:0}}/>
        <div style={{display:'flex',gap:3}}>
          {['ALL','UNDER CAP','OVER CAP','OVER TAX','OVER 1ST APRON','OVER 2ND APRON'].map(s=><button key={s} className={`wr-chip${capF===s?' active':''}`} onClick={()=>setCapF(s)}>{s}</button>)}
        </div>
        <div style={{width:1,height:20,background:'var(--divider)',flexShrink:0}}/>
        <div style={{display:'flex',gap:3}}>
          {['ALL','CONTENDER','RELOAD','REBUILD'].map(m=><button key={m} className={`wr-chip${modeF===m?' active':''}`} onClick={()=>setModeF(m)}>{m}</button>)}
        </div>
        <select value={sort} onChange={e=>setSort(e.target.value)}

function TradeMachine(){
  const[teams,setTeams]=React.useState([{abbr:'',outgoing:[]},{abbr:'',outgoing:[]}]);
  const[result,setResult]=React.useState(null);

  function addTeam(){if(teams.length<4)setTeams(t=>[...t,{abbr:'',outgoing:[]}]);}
  function removeTeam(i){setTeams(t=>t.filter((_,j)=>j!==i));}
  function setTeamAbbr(i,abbr){setTeams(t=>t.map((x,j)=>j===i?{...x,abbr,outgoing:[]}:x));}
  function addContract(teamIdx,c){setTeams(t=>t.map((x,j)=>j===teamIdx?{...x,outgoing:[...x.outgoing,c]}:x));}
  function removeContract(teamIdx,ci){setTeams(t=>t.map((x,j)=>j===teamIdx?{...x,outgoing:x.outgoing.filter((_,k)=>k!==ci)}:x));}

  function validate(){
    const checks=[];
    const filledTeams=teams.filter(t=>t.abbr);
    if(filledTeams.length<2){checks.push({ok:false,msg:'Need at least 2 teams.'});setResult({valid:false,checks});return;}
    let allValid=true;
    // Salary match check (simplified BYC)
    const totals=filledTeams.map(t=>({abbr:t.abbr,out:t.outgoing.reduce((s,c)=>s+c.sal,0),in:0}));
    totals.forEach((t,i)=>{
      filledTeams.forEach((ot,j)=>{if(j!==i)t.in+=totals[j].out;});
    });
    totals.forEach(t=>{
      const ext=TEAM_EXT[t.abbr]||{};
      const payroll=ext.payroll||140;
      const overTax=payroll>CBA.luxuryTax;
      const over2nd=payroll>CBA.apron2;
      const matchOk=over2nd?t.in>=t.out:t.in>=t.out*0.85;
      if(!matchOk){
        checks.push({ok:false,msg:`${t.abbr}: SALARY MATCH FAIL. OUT $${t.out.toFixed(1)}M, IN $${t.in.toFixed(1)}M${over2nd?' (2ND APRON: NO AGGREGATION)':''}.`});
        allValid=false;
      } else {
        checks.push({ok:true,msg:`${t.abbr}: SALARY MATCH OK ($${t.out.toFixed(1)}M out, $${t.in.toFixed(1)}M in).`});
      }
      // 2nd apron restrictions
      if(over2nd){
        t.outgoing?.forEach(c=>{
          if(c.noTrade)checks.push({ok:false,msg:`${t.abbr}: ${c.player} HAS NO-TRADE CLAUSE.`});
        });
        checks.push({ok:true,msg:`${t.abbr}: 2ND APRON TEAM. MLE limited to minimum. No TPE use.`});
      }
    });
    // Stepien check
    filledTeams.forEach(t=>{
      const dc=DRAFT_CAP[t.abbr];
      if(dc?.stepien)checks.push({ok:false,msg:`${t.abbr}: STEPIEN RISK on outgoing picks.`});
    });
    setResult({valid:allValid,checks});
  }

  return(
    <div style={{padding:'16px 40px 64px'}}>
      <div style={{display:'flex',gap:12,marginBottom:16}}>
        {teams.map((t,i)=>(
          <div key={i} className="tm-team-col" style={{flex:1,minWidth:200}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <select value={t.abbr} onChange={e=>setTeamAbbr(i,e.target.value)}
                      style={{flex:1,height:32,fontSize:11,background:'var(--void)',border:'1px solid var(--wire)',color:'var(--bone)'}}>
                <option value="">SELECT TEAM</option>
                {NBA_TEAMS.map(nt=><option key={nt.abbr} value={nt.abbr}>{nt.abbr} - {nt.name}</option>)}
              </select>
              {teams.length>2&&<button onClick={()=>removeTeam(i)} style={{marginLeft:8,background:'none',border:'none',color:'var(--smoke)',cursor:'pointer',fontSize:16}}>x</button>}
            </div>
            <div style={{fontSize:9,color:'var(--smoke)',letterSpacing:'.08em',marginBottom:8}}>OUTGOING</div>
            {t.abbr&&CONTRACTS.filter(c=>c.team===t.abbr).map((c,ci)=>{
              const selected=t.outgoing.find(x=>x.player===c.player);
              return(
              <div key={ci}
                   onClick={()=>selected?removeContract(i,t.outgoing.findIndex(x=>x.player===c.player)):addContract(i,c)}
                   style={{padding:'5px 8px',background:selected?'rgba(0,255,102,.08)':'var(--void)',border:`1px solid ${selected?'rgba(0,255,102,.3)':'var(--divider)'}`,marginBottom:4,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:11,fontWeight:700}}>{c.player}</span>
                <span className="stat-num" style={{fontSize:11,color:'var(--smoke)'}}>{fmtMRaw(c.sal)}</span>
              </div>
            );})}
            {t.abbr&&(
              <div style={{marginTop:8,padding:'6px 8px',background:'var(--void)',border:'1px solid var(--divider)'}}>
                <div style={{fontSize:9,color:'var(--smoke)',letterSpacing:'.06em'}}>NEW PAYROLL</div>
                <div className="stat-num" style={{fontSize:13,fontWeight:900}}>
                  {fmtMRaw((TEAM_EXT[t.abbr]?.payroll||0)-t.outgoing.reduce((s,c)=>s+c.sal,0))}
                </div>
              </div>
            )}
          </div>
        ))}
        {teams.length<4&&(
          <button onClick={addTeam} style={{width:48,background:'var(--void)',border:'1px solid var(--wire)',color:'var(--smoke)',cursor:'pointer',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
        )}
      </div>
      <div className="tm-center">
        <div style={{display:'flex',gap:12,marginBottom:16}}>
          <button className="btn btn-neon btn-sm" onClick={validate}>VALIDATE TRADE</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>{setTeams([{abbr:'',outgoing:[]},{abbr:'',outgoing:[]}]);setResult(null);}}>RESET</button>
        </div>
        {result&&(
          <>
            <div className={`tm-valid ${result.valid?'ok':'fail'}`}>{result.valid?'VALID':'INVALID'}</div>
            {result.checks.map((c,i)=>(
              <div key={i} style={{fontSize:11,color:c.ok?'var(--smoke)':'var(--cap-apron1)',marginBottom:4,letterSpacing:'.04em'}}>
                {c.ok?'OK':'FAIL'}: {c.msg}
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

                <div className="stat-num" style={{fontSize:11,textAlign:'right'}}>{'*'.repeat(r.conviction)}</div>
                <div style={{fontSize:9,color:'var(--smoke)'}}>{r.lastNote}</div>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

function CapTableView(){
  const[teamFilter,setTeamFilter]=React.useState('ALL');
  const[yearFilter,setYearFilter]=React.useState('THIS YEAR');
  const[typeF,setTypeF]=React.useState('ALL');
  const[statusF,setStatusF]=React.useState('ALL');
  const[sort,setSort]=React.useState({key:'sal',dir:'desc'});
  const[shift,setShift]=React.useState(null);

  function toggleSort(key,e){
    if(e.shiftKey&&sort.key!==key){setShift({key,dir:'desc'});}
    else{setSort(p=>({key,dir:p.key===key&&p.dir==='desc'?'asc':'desc'}));setShift(null);}
  }

  const yearOffset={'THIS YEAR':0,'Y+1':1,'Y+2':2,'Y+3':3}[yearFilter]||0;

  const data=React.useMemo(()=>{
    let arr=[...CONTRACTS];
    if(teamFilter!=='ALL')arr=arr.filter(c=>c.team===teamFilter);
    if(typeF!=='ALL'){
      const typeMap={VETERAN:null,MAX:c=>c.tier===1,MIN:c=>c.sal<=CBA.minVet*1.1,MLE:c=>Math.abs(c.sal-CBA.ntMLE)<3,BAE:c=>Math.abs(c.sal-CBA.bae)<2};
      if(typeMap[typeF])arr=arr.filter(typeMap[typeF]);
    }
    if(statusF!=='ALL'){
      if(statusF==='GUARANTEED')arr=arr.filter(c=>c.nonGuar===0);
      if(statusF==='TEAM OPTION')arr=arr.filter(c=>c.option==='TO');
      if(statusF==='PLAYER OPTION')arr=arr.filter(c=>c.option==='PO');
      if(statusF==='ETO')arr=arr.filter(c=>c.option==='ETO');
    }
    arr.sort((a,b)=>{
      const v=c=>{const adj=c.sal*(1-yearOffset*0.05);return{sal:adj,age:c.age,yrs:c.yrsLeft,guar:c.guar}[sort.key]||0;};
      const diff=sort.dir==='desc'?v(b)-v(a):v(a)-v(b);
      if(diff!==0)return diff;
      if(shift){const sv=c=>({sal:c.sal,age:c.age,yrs:c.yrsLeft,guar:c.guar}[shift.key]||0);return shift.dir==='desc'?sv(b)-sv(a):sv(a)-sv(b);}
      return 0;
    });
    return arr;
  },[teamFilter,typeF,statusF,sort,shift,yearOffset]);

  const filtered=teamFilter!=='ALL'?data:data;
  const totalPay=filtered.reduce((s,c)=>s+c.sal*(1-yearOffset*0.05),0);
  const totalGuar=filtered.reduce((s,c)=>s+c.guar,0);
  const capSpace=CBA.salaryCap-totalPay;
  const taxDist=totalPay-CBA.luxuryTax;
  const ap1Dist=totalPay-CBA.apron1;
  const ap2Dist=totalPay-CBA.apron2;

  const COLS=[
    {key:'player',l:'PLAYER',align:'left',sort:false,w:'auto'},
    {key:'pos',l:'POS',align:'center',sort:false,w:44},
    {key:'age',l:'AGE',align:'right',sort:true,w:44},
    {key:'team',l:'TEAM',align:'center',sort:false,w:52},
    {key:'sal',l:'SALARY',align:'right',sort:true,w:80},
    {key:'guar',l:'GUAR',align:'right',sort:true,w:72},
    {key:'nonGuar',l:'NON GUAR',align:'right',sort:false,w:72},
    {key:'yrs',l:'YRS',align:'right',sort:true,w:44},
    {key:'option',l:'OPTION',align:'center',sort:false,w:60},
    {key:'noTrade',l:'NTC',align:'center',sort:false,w:40},
    {key:'kicker',l:'KICKER',align:'center',sort:false,w:56},
    {key:'bird',l:'BIRD',align:'right',sort:false,w:96},
    {key:'capHold',l:'CAP HOLD',align:'right',sort:false,w:72},
  ];

  return(
    <div style={{padding:'0 0 120px'}}>
      {/* Filters */}
      <div className="wr-filter" style={{top:'auto',position:'sticky',top:163}}>
        <select value={teamFilter} onChange={e=>setTeamFilter(e.target.value)}
                style={{height:28,fontSize:11,background:'var(--carbon)',border:'1px solid var(--wire)',color:'var(--bone)'}}>
          <option value="ALL">ALL TEAMS</option>
          {NBA_TEAMS.map(t=><option key={t.abbr} value={t.abbr}>{t.abbr}</option>)}
        </select>
        <select value={yearFilter} onChange={e=>setYearFilter(e.target.value)}
                style={{height:28,fontSize:11,background:'var(--carbon)',border:'1px solid var(--wire)',color:'var(--bone)'}}>
          {['THIS YEAR','Y+1','Y+2','Y+3'].map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        <div style={{display:'flex',gap:3}}>
          {['ALL','MAX','MLE','MIN','BAE'].map(t=><button key={t} className={`wr-chip${typeF===t?' active':''}`} onClick={()=>setTypeF(t)}>{t}</button>)}
        </div>
        <div style={{display:'flex',gap:3}}>
          {['ALL','GUARANTEED','TEAM OPTION','PLAYER OPTION','ETO'].map(s=><button key={s} className={`wr-chip${statusF===s?' active':''}`} onClick={()=>setStatusF(s)}>{s}</button>)}
        </div>
      </div>

      <div style={{overflowX:'auto',padding:'0 40px'}}>
        <table style={{width:'100%',borderCollapse:'collapse',minWidth:800}}>
          <thead style={{position:'sticky',top:203,background:'var(--void)',zIndex:5}}>
            <tr style={{borderBottom:'1px solid var(--wire)'}}>
              {COLS.map(col=>(
                <th key={col.key} onClick={e=>col.sort&&toggleSort(col.key,e)}
                    className={`cap-th${sort.key===col.key?' sorted':''}${col.sort?' sortable':''}`}
                    style={{textAlign:col.align,width:col.w,cursor:col.sort?'pointer':'default'}}>
                  {col.l}
                  {col.sort&&sort.key===col.key&&<span style={{marginLeft:3,fontSize:8}}>{sort.dir==='desc'?'v':'^'}</span>}
                  {col.sort&&shift?.key===col.key&&<span style={{marginLeft:3,fontSize:7,color:'var(--neon)'}}>2</span>}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {data.map((c,i)=>{
              const adjSal=c.sal*(1-yearOffset*0.05);
              return(
                <tr key={i} className="cap-row" style={{background:i%2?'rgba(255,255,255,.01)':'transparent'}}>
                  <td className="cap-td" style={{textAlign:'left',fontWeight:900,fontSize:13,paddingLeft:0}}>{c.player}</td>
                  <td className="cap-td" style={{textAlign:'center',fontSize:10,color:'var(--smoke)'}}>{c.pos}</td>
                  <td className="cap-td" style={{fontSize:12}}>{c.age}</td>
                  <td className="cap-td" style={{textAlign:'center',fontSize:10,color:'var(--smoke)'}}>{c.team}</td>
                  <td className="cap-td" style={{color:'var(--bone)',fontWeight:900}}>{fmtMRaw(adjSal)}</td>
                  <td className="cap-td" style={{color:c.nonGuar>0?'var(--cap-apron1)':'var(--bone)'}}>{fmtMRaw(c.guar)}</td>
                  <td className="cap-td" style={{color:c.nonGuar>0?'var(--cap-apron1)':'var(--smoke)'}}>{c.nonGuar>0?fmtMRaw(c.nonGuar):'--'}</td>
                  <td className="cap-td">{c.yrsLeft}</td>
                  <td className="cap-td" style={{textAlign:'center',fontSize:10}}>{c.option||'--'}</td>
                  <td className="cap-td" style={{textAlign:'center',fontSize:10,color:c.noTrade?'var(--cap-apron1)':'var(--smoke)'}}>{c.noTrade?'NTC':'--'}</td>
                  <td className="cap-td" style={{textAlign:'center',fontSize:10}}>{c.kicker||'--'}</td>
                  <td className="cap-td" style={{fontSize:10,color:'var(--smoke)',textAlign:'right'}}>{c.bird||'--'}</td>
                  <td className="cap-td" style={{color:'var(--smoke)'}}>{c.capHold?fmtMRaw(c.capHold):'--'}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Summary Footer */}
      <div className="cap-summary">
        {[
          {l:'COMMITTED',v:fmtMRaw(totalPay),c:'var(--bone)'},
          {l:'GUAR TOTAL',v:fmtMRaw(totalGuar),c:'var(--bone)'},
          {l:'CAP SPACE',v:fmtM(capSpace),c:capSpace>0?'var(--cap-under)':'var(--cap-apron2)'},
          {l:'vs LUX TAX',v:fmtM(-taxDist),c:taxDist>0?'var(--cap-apron2)':'var(--cap-under)'},
          {l:'vs 1ST APRON',v:fmtM(-ap1Dist),c:ap1Dist>0?'var(--cap-apron1)':'var(--cap-under)'},
          {l:'vs 2ND APRON',v:fmtM(-ap2Dist),c:ap2Dist>0?'var(--cap-apron2)':'var(--cap-under)'},
          {l:'NT MLE',v:totalPay<CBA.luxuryTax?fmtMRaw(CBA.ntMLE):'N/A',c:totalPay<CBA.luxuryTax?'var(--cap-under)':'var(--smoke)'},
          {l:'T MLE',v:totalPay>=CBA.luxuryTax&&totalPay<CBA.apron1?fmtMRaw(CBA.tMLE):'N/A',c:'var(--smoke)'},
          {l:'BAE',v:totalPay<CBA.apron2?fmtMRaw(CBA.bae):'N/A',c:totalPay<CBA.apron2?'var(--bone)':'var(--smoke)'},
        ].map(({l,v,c})=>(
          <div key={l} className="cap-sum-cell">
            <div className="cap-sum-label">{l}</div>
            <div className="cap-sum-val" style={{color:c}}>{v}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── COMPARE ─────────────────────────────────────────────────────────────────

function Compare() {
  const[pA,setPA]=React.useState(null);
  const[pB,setPB]=React.useState(null);
  const[ctx,setCtx]=React.useState('');
  const[sA,setSA]=React.useState(null);
  const[sB,setSB]=React.useState(null);
  const compare=useStream();

  function loadStats(p,setter){
    if(!p)return;
    fetch(`${API}/nba/players/${p.id}/stats?season=2025`).then(r=>r.json()).then(d=>{
      const g=d.stats||d.data||[];if(!g.length){setter(null);return;}
      const avg=k=>g.reduce((s,x)=>s+(x[k]||0),0)/g.length;
      setter({pts:avg('points').toFixed(1),reb:avg('rebounds').toFixed(1),ast:avg('assists').toFixed(1),stl:avg('steals').toFixed(1),blk:avg('blocks').toFixed(1),fg:(g.reduce((s,x)=>s+(x.fg_pct||0),0)/g.length*100).toFixed(1),games:g.length});
    }).catch(()=>setter(null));
  }
  React.useEffect(()=>{loadStats(pA,setSA);},[pA?.id]);
  React.useEffect(()=>{loadStats(pB,setSB);},[pB?.id]);

  function runCompare(){
    if(!pA||!pB||compare.loading)return;
    const nameA=(pA.first_name||'')+' '+(pA.last_name||'');
    const nameB=(pB.first_name||'')+' '+(pB.last_name||'');
    const ctxLabel=COMPARE_CONTEXTS.find(c=>c.value===ctx)?.label||'general comparison';
    compare.run(`${API}/chat/message`,{messages:[{role:'user',content:`Compare ${nameA} vs ${nameB} for the 2024-25 season. Context: ${ctxLabel}. Cover stats, role fit, contract value, and which player wins this comparison.`}]});
  }

  function PlayerSlot({p,stats,label,onSet}){
    return (
      <div className="card" style={{flex:1,minWidth:220,padding:'22px',background:'var(--graphite)',position:'relative'}}>
        <ConfTag text={label}/>
        <div style={{fontFamily:'var(--font)',fontSize:9,color:'var(--signal)',letterSpacing:'.14em',marginBottom:14,textTransform:'uppercase'}}>{label}</div>
        {!p&&<PlayerSearchBox onSelect={onSet} placeholder={`Select ${label}…`}/>}
        {p&&(
          <div>
            <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:14}}>
              <div>
                <div style={{fontWeight:900,fontSize:16,letterSpacing:'-.03em'}}>{p.first_name} {p.last_name}</div>
                <div style={{fontFamily:'var(--font)',fontSize:9,color:'#fff',marginTop:3,letterSpacing:'.08em'}}>{p.team?.abbreviation||'FA'} / {p.position||'—'}</div>
              </div>
            </div>
            {stats&&<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
              {[['PTS',stats.pts],['REB',stats.reb],['AST',stats.ast],['STL',stats.stl],['BLK',stats.blk],['FG%',stats.fg+'%']].map(([k,v])=>(
                <div key={k} style={{textAlign:'center'}}>
                  <div style={{fontFamily:'var(--font)',fontSize:18,fontWeight:900,letterSpacing:'-.03em'}}>{v||'—'}</div>
                  <div style={{fontFamily:'var(--font)',fontSize:8,color:'#fff',letterSpacing:'.1em',textTransform:'uppercase',marginTop:2}}>{k}</div>
                </div>
              ))}
            </div>}
            <button className="btn-ghost" onClick={()=>{onSet(null);compare.reset();}} style={{fontFamily:'var(--font)',fontSize:9,letterSpacing:'.1em',border:'1px solid rgba(255,255,255,.08)',padding:'5px 12px'}}>CHANGE</button>
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="page page-pad">
      <div style={{paddingTop:24,paddingBottom:8}}></div>
      <div style={{display:'flex',gap:1,marginBottom:14,flexWrap:'wrap'}}>
        <PlayerSlot p={pA} stats={sA} label="PLAYER A" onSet={p=>{setPA(p);compare.reset();}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'0 10px',fontFamily:'var(--font)',fontSize:14,color:'var(--fg4)',fontWeight:900}}>VS</div>
        <PlayerSlot p={pB} stats={sB} label="PLAYER B" onSet={p=>{setPB(p);compare.reset();}}/>
      </div>
      <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:16,flexWrap:'wrap'}}>
        <select value={ctx} onChange={e=>setCtx(e.target.value)} style={{flex:1,maxWidth:400,fontFamily:'var(--font)',fontSize:12}}>
          {COMPARE_CONTEXTS.map(c=><option key={c.value} value={c.value}>{c.label}</option>)}
        </select>
        {pA&&pB&&<button className="btn btn-signal" onClick={runCompare} disabled={compare.loading}>{compare.loading?'COMPARING…':'COMPARE'}</button>}
      </div>
      <StreamBox lines={compare.lines} loading={compare.loading}/>
    </div>
  );
}

            {projPlayer&&<div style={{marginTop:14}}>
              <div style={{display:'flex',gap:12,alignItems:'center',padding:'10px 14px',background:'rgba(204,255,0,.04)',border:'1px solid var(--wire)',marginBottom:12}}>
                <div style={{fontWeight:900,fontSize:13}}>{projPlayer.first_name} {projPlayer.last_name}</div>
                <div style={{fontFamily:'var(--font)',fontSize:9,color:'#fff',letterSpacing:'.08em',marginLeft:'auto'}}>{projPlayer.team?.abbreviation||'FA'}</div>
              </div>
              <button className="btn btn-signal btn-sm" onClick={()=>proj.run(`${API}/chat/message`,{messages:[{role:'user',content:`Project the 2025-26 season stats for ${(projPlayer.first_name||'')+' '+(projPlayer.last_name||'')} (${projPlayer.team?.abbreviation||'FA'}). Include PPG, RPG, APG, shooting splits, and usage. Factor in age, recent trends, team context, and injury history.`}]})} disabled={proj.loading}>{proj.loading?'PROJECTING…':'PROJECT STATS'}</button>
              <div style={{marginTop:12}}><StreamBox lines={proj.lines} loading={proj.loading}/></div>
            </div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── CHAT ─────────────────────────────────────────────────────────────────────

function Chat() {
  const[msgs,setMsgs]=React.useState([]);
  const[input,setInput]=React.useState('');
  const[loading,setLoading]=React.useState(false);
  const[stream,setStream]=React.useState([]);
  const bottom=React.useRef();
  React.useEffect(()=>{if(bottom.current)bottom.current.scrollIntoView({behavior:'smooth'});},[msgs,stream]);

  async function send(){
    const text=input.trim();
    if(!text||loading)return;
    setInput('');
    const newMsgs=[...msgs,{role:'user',content:text}];
    setMsgs(newMsgs);setStream([]);setLoading(true);
    let assembled=[];
    await streamSSE(`${API}/chat/message`,{messages:newMsgs},t=>{assembled=[...assembled,t];setStream([...assembled]);},()=>{setMsgs(m=>[...m,{role:'assistant',content:assembled.join('')}]);setStream([]);setLoading(false);});
  }

  return (
    <div className="page" style={{display:'flex',flexDirection:'column',height:'calc(100vh - 92px)'}}>
      <div style={{padding:'0 32px',borderBottom:'1px solid var(--wire)',flexShrink:0,height:0}}></div>
      <div style={{flex:1,overflowY:'auto',padding:'24px 32px',display:'flex',flexDirection:'column',gap:14}}>
        {!msgs.length&&<div style={{fontFamily:'var(--font)',fontSize:11,letterSpacing:'.14em',color:'#fff',textTransform:'uppercase',textAlign:'center',padding:'80px 0'}}>ASK ANYTHING ABOUT BASKETBALL.</div>}
        {msgs.map((m,i)=>(
          <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
            <div style={{
              maxWidth:'78%',padding:'14px 18px',borderRadius:2,
              background:m.role==='user'?'var(--pulse)':'rgba(8,8,8,.82)',
              backdropFilter:m.role==='user'?'none':'blur(20px)',
              WebkitBackdropFilter:m.role==='user'?'none':'blur(20px)',
              border:m.role==='user'?'none':'1px solid rgba(0,255,102,.14)',
              boxShadow:m.role==='user'?'0 4px 20px rgba(0,255,102,.2)':'none',
              color:m.role==='user'?'#000':'var(--fg)',
              fontSize:13.5,lineHeight:1.8,fontWeight:900,
              whiteSpace:'pre-wrap',wordBreak:'break-word'
            }}>{m.content}</div>
          </div>
        ))}
        {loading&&stream.length>0&&(
          <div style={{display:'flex',justifyContent:'flex-start'}}>
            <div style={{maxWidth:'78%',padding:'14px 18px',background:'rgba(8,8,8,.82)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',border:'1px solid rgba(0,255,102,.14)',fontSize:13.5,lineHeight:1.8,color:'#fff',fontWeight:900,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
              {stream.join('')}<span style={{color:'var(--pulse)',animation:'blink-glow .8s step-end infinite'}}>▋</span>
            </div>
          </div>
        )}
        {loading&&!stream.length&&<div style={{fontFamily:'var(--font)',fontSize:10,color:'#fff',letterSpacing:'.14em',textTransform:'uppercase',padding:'8px 0'}}>PROCESSING…</div>}
        <div ref={bottom}/>
      </div>
      <div style={{padding:'16px 32px 24px',borderTop:'1px solid rgba(0,255,102,.1)',display:'flex',gap:12,flexShrink:0}}>
        <input value={input} onChange={e=>setInput(e.target.value)}
               onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
               placeholder="Ask about any player, team, game, or strategy…"
               disabled={loading} style={{flex:1,fontFamily:'var(--font)',fontSize:13}}/>
        <button className="btn btn-signal" onClick={send} disabled={loading||!input.trim()} style={{flexShrink:0,padding:'10px 28px',fontSize:12}}>{loading?'…':'SEND'}</button>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

const NAV_ITEMS=[
  {id:'home',label:'HOME'},{id:'games',label:'GAMES'},{id:'players',label:'INTEL'},
  {id:'warroom',label:'WAR ROOM'},{id:'compare',label:'COMPARE'},
  {id:'coach',label:'COACH'},{id:'chat',label:'CHAT'},
];

function App() {
  const[tab,setTab]=React.useState('home');
  const isHome=tab==='home';
  return (
    <div style={{position:'relative',minHeight:'100vh'}}>
      {!isHome&&<AppBackground/>}
      {!isHome&&(
        <>
          <div className="nav-wordmark-fixed" onClick={()=>setTab('home')}>PIVOT</div>
          <nav className="nav">
            {NAV_ITEMS.filter(i=>i.id!=='home').map(item=>(
              <button key={item.id} className={`nav-item${tab===item.id?' active':''}`} onClick={()=>setTab(item.id)}>{item.label}</button>
            ))}
          </nav>
          <Ticker/>
        </>
      )}
      <div style={{position:'relative',zIndex:1}}>
        {tab==='home'&&<Home setTab={setTab}/>}
        {tab==='games'&&<Games/>}
        {tab==='players'&&<Intel/>}
        {tab==='warroom'&&<WarRoom/>}
        {tab==='compare'&&<Compare/>}
        {tab==='coach'&&<CoachMode/>}
        {tab==='chat'&&<Chat/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
