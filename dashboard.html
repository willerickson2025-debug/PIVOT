<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PIVOT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* Global cursor glow — follows mouse across entire page */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: radial-gradient(
    280px circle at var(--cursor-x, -9999px) var(--cursor-y, -9999px),
    rgba(0,230,118,0.045),
    transparent 70%
  );
  transition: background 0.06s;
}

:root {
  --black: #0F1115;
  --black-deep: #080A0E;
  --white: #F0F2F5;
  --green: #00E676;
  --green-dim: rgba(0,230,118,0.15);
  --grey: #161B22;
  --grey2: #1C2128;
  --grey3: #242B35;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --text-muted: #6B7280;
  --text-subtle: #374151;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
}
html, body {
  background: var(--black);
  color: var(--white);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  min-height: 100vh;
  overflow-x: hidden;
}
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 70px;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  transition: background 0.3s, border-color 0.3s;
}
nav.solid {
  background: rgba(15,17,21,0.97);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 0 var(--border), var(--shadow);
}
.nav-logo {
  font-size: 18px;
  letter-spacing: 8px;
  color: var(--white);
  cursor: pointer;
  font-weight: 700;
  user-select: none;
}
.nav-logo:hover { color: var(--green); }
.nav-tabs { display: flex; align-items: stretch; height: 70px; }
.nav-tab {
  display: flex;
  align-items: center;
  padding: 0 28px;
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.4);
  border: none;
  background: none;
  cursor: pointer;
  transition: color 0.15s;
  text-transform: uppercase;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  position: relative;
}
.nav-tab:hover { color: var(--white); }
.nav-tab.active { color: var(--white); }
.nav-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
}
.nav-cta {
  background: var(--green);
  color: var(--black);
  border: none;
  padding: 10px 24px;
  font-size: 10px;
  letter-spacing: 3px;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s;
  border-radius: 2px;
}
.nav-cta:hover { opacity: 0.85; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
@keyframes pulse-dot { 0%,80%,100%{opacity:0.15;transform:scale(0.7)} 40%{opacity:1;transform:scale(1)} }
/* ── Home / Landing ──────────────────────────────────────────────────────── */
.home-wrap {
  position: relative;
  width: 100vw;
  min-height: 100vh;
  overflow: hidden;
  background: var(--black);
  display: flex;
  align-items: center;
  justify-content: center;
}
.home-video {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0; opacity: 0.28;
  filter: grayscale(100%) contrast(1.15);
}
.home-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.9) 100%);
}
/* subtle green ambient glow at top-center */
.home-cursor-glow {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(
    700px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(0,255,65,0.07),
    transparent 70%
  );
  transition: background 0.05s;
}
.home-grid-overlay {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 50px 50px;
  -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
  mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
}
.home-hero {
  position: relative; z-index: 3;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: 0 40px;
  width: 100%;
  max-width: 900px;
}
.home-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 14px; border-radius: 99px;
  border: 1px solid rgba(0,255,65,0.35);
  background: rgba(0,255,65,0.08);
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 500; letter-spacing: 2px;
  color: var(--green); text-transform: uppercase;
  margin-bottom: 32px;
}
.home-badge-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  animation: blink 1.4s ease-in-out infinite;
  flex-shrink: 0;
}
.home-pivot-text {
  font-size: clamp(72px, 14vw, 160px);
  letter-spacing: -6px;
  color: var(--white);
  font-weight: 700;
  line-height: 0.92;
  margin-bottom: 28px;
  text-shadow: 0 0 60px rgba(0,255,65,0.12);
}
.home-tagline {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  letter-spacing: 0;
  color: rgba(255,255,255,0.5);
  font-weight: 300;
  text-transform: none;
  max-width: 560px;
  line-height: 1.7;
  margin-bottom: 44px;
  text-align: center;
}
.home-ctas { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
/* glowing primary button */
.home-cta-primary {
  position: relative;
  background: var(--black);
  color: var(--white);
  border: 1px solid rgba(0,255,65,0.5);
  padding: 14px 36px;
  font-size: 10px;
  letter-spacing: 4px;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  box-shadow: 0 0 20px rgba(0,255,65,0.15), inset 0 0 20px rgba(0,255,65,0.04);
}
.home-cta-primary:hover {
  background: rgba(0,255,65,0.08);
  border-color: var(--green);
  box-shadow: 0 0 32px rgba(0,255,65,0.3), inset 0 0 20px rgba(0,255,65,0.06);
  transform: translateY(-1px);
}
.home-cta-secondary {
  background: rgba(255,255,255,0.04);
  color: var(--white);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 14px 36px;
  font-size: 10px;
  letter-spacing: 4px;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.home-cta-secondary:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }
.home-scroll-hint {
  position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%); z-index: 3;
  font-family: 'Inter', sans-serif;
  font-size: 9px; letter-spacing: 4px; color: #333; text-transform: uppercase;
  display: flex; align-items: center; gap: 12px;
  white-space: nowrap;
}
.home-scroll-line { width: 40px; height: 1px; background: #222; }

/* ── Tech Marquee ─────────────────────────────────────────────────────────── */
.home-marquee-wrap {
  overflow: hidden;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.5);
  padding: 14px 0;
  display: flex;
}
.home-marquee-track {
  display: flex; align-items: center;
  white-space: nowrap;
  animation: ticker-scroll 35s linear infinite;
  will-change: transform;
}
.home-marquee-track:hover { animation-play-state: paused; }
.home-marquee-item {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  color: #444; padding: 0 40px;
}
.home-marquee-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); opacity: 0.6; }

/* ── Feature Cards ────────────────────────────────────────────────────────── */
.features-section {
  position: relative;
  padding: 100px 80px;
  background: var(--black);
  text-align: center;
}
@media (max-width: 768px) { .features-section { padding: 80px 24px; } }
.features-label {
  font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 500; letter-spacing: 4px;
  color: var(--green); text-transform: uppercase; margin-bottom: 20px;
}
.features-title {
  font-size: clamp(28px, 3.5vw, 48px);
  letter-spacing: -1px;
  color: var(--white);
  margin-bottom: 16px;
  line-height: 1.15;
  max-width: 640px;
  font-weight: 700;
  margin-left: auto; margin-right: auto;
}
.features-subtitle {
  font-family: 'Inter', sans-serif;
  font-size: 14px; color: #555; font-weight: 300;
  max-width: 480px; margin: 0 auto 64px; line-height: 1.7;
  text-transform: none; letter-spacing: 0;
}
.features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; text-align: left; background: var(--border); }
@media (max-width: 900px) { .features-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 600px) { .features-grid { grid-template-columns: 1fr; } }
.feature-card {
  background: var(--black);
  padding: 40px 36px;
  transition: background 0.2s;
  position: relative;
  overflow: hidden;
}
.feature-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--green);
  box-shadow: 0 0 12px rgba(0,255,65,0.5);
  transform: scaleX(0);
  transition: transform 0.25s;
  transform-origin: left;
}
.feature-card:hover::before { transform: scaleX(1); }
.feature-card:hover { background: #0a0a0a; }
/* cursor-tracking glow inside each card */
.feature-card-glow {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(
    300px circle at var(--cx, 50%) var(--cy, 50%),
    rgba(0,255,65,0.07),
    transparent 60%
  );
  opacity: 0; transition: opacity 0.3s;
}
.feature-card:hover .feature-card-glow { opacity: 1; }
.feature-num { font-size: 9px; letter-spacing: 4px; color: #2a2a2a; margin-bottom: 20px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
.feature-name { font-size: 15px; letter-spacing: 2px; color: var(--white); margin-bottom: 14px; font-weight: 700; }
.feature-desc {
  font-family: 'Inter', sans-serif;
  font-size: 13px; color: #555; font-weight: 300;
  text-transform: none; line-height: 1.8; margin-bottom: 28px; letter-spacing: 0;
}
.feature-stat { font-size: 26px; letter-spacing: -1px; color: var(--green); text-shadow: 0 0 20px rgba(0,255,65,0.25); }
.feature-stat-label { font-size: 8px; letter-spacing: 3px; color: #2a2a2a; margin-top: 4px; }

/* ── CTA Section ──────────────────────────────────────────────────────────── */
.cta-section {
  position: relative;
  padding: 120px 80px;
  background: #040404;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  overflow: hidden;
}
.cta-section::before {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 60%; height: 1px;
  background: linear-gradient(to right, transparent, rgba(0,255,65,0.4), transparent);
}
.cta-title {
  font-size: clamp(28px, 3.5vw, 48px);
  letter-spacing: -1px;
  color: var(--white); margin-bottom: 16px; line-height: 1.1; font-weight: 700;
}
.cta-sub {
  font-family: 'Inter', sans-serif;
  font-size: 14px; color: #555; font-weight: 300;
  text-transform: none; letter-spacing: 0; margin-bottom: 48px;
}
.cta-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

/* ── Footer ───────────────────────────────────────────────────────────────── */
.home-footer {
  background: var(--black);
  border-top: 1px solid var(--border);
  padding: 28px 80px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Inter', sans-serif;
  font-size: 10px; letter-spacing: 1px; color: #333;
}
.home-footer-logo { color: var(--white); font-size: 13px; letter-spacing: 6px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; }
.ticker {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 40px;
  background: var(--black);
  border-top: 2px solid var(--green);
  display: flex;
  align-items: center;
  overflow: hidden;
  z-index: 1000;
}
.ticker-label {
  flex-shrink: 0;
  background: var(--green);
  color: var(--black);
  font-size: 9px;
  letter-spacing: 3px;
  padding: 0 16px;
  height: 100%;
  display: flex; align-items: center;
  font-weight: 700; white-space: nowrap; z-index: 2;
}
.ticker-track-wrap { flex: 1; overflow: hidden; height: 100%; display: flex; align-items: center; }
.ticker-track {
  display: flex; align-items: center; white-space: nowrap;
  animation: ticker-scroll 40s linear infinite;
  will-change: transform;
}
.ticker-track:hover { animation-play-state: paused; }
@keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.ticker-item { font-size: 11px; letter-spacing: 2px; color: var(--green); padding: 0 32px; text-shadow: 0 0 8px rgba(0,255,65,0.4); white-space: nowrap; }
.ticker-sep { color: #1a1a1a; font-size: 14px; padding: 0 8px; }
.toolbar {
  height: 56px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  background: var(--grey);
}
.tb-btn {
  background: transparent; border: none;
  border-right: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 10px; letter-spacing: 3px; font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase; padding: 0 24px;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.tb-btn:hover { background: var(--grey2); color: var(--white); }
.tb-btn:disabled { color: #2a2a2a; cursor: not-allowed; }
.tb-input {
  background: transparent; border: none;
  border-right: 1px solid var(--border);
  color: var(--white);
  font-size: 11px; letter-spacing: 2px; font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase; padding: 0 20px;
  outline: none; width: 220px;
}
.tb-input::placeholder { color: #2a2a2a; }
.tb-info {
  display: flex; align-items: center; padding: 0 24px;
  font-family: 'Inter', sans-serif;
  font-size: 11px; letter-spacing: 0.5px; font-weight: 400;
  color: var(--text-muted); text-transform: none;
  margin-left: auto; border-left: 1px solid var(--border);
}
.g-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 20px;
}
.g-card2 {
  width: 420px;
  flex-shrink: 0;
  background: #111318;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.g-card2:hover {
  border-color: rgba(0,230,118,0.45);
  box-shadow: 0 8px 32px rgba(0,230,118,0.1);
}
.g-status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  letter-spacing: 2px;
  padding: 3px 10px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.1);
  color: #555;
  background: rgba(255,255,255,0.03);
  width: fit-content;
}
.g-status-badge.live {
  background: rgba(0,230,118,0.1);
  border-color: rgba(0,230,118,0.3);
  color: #00E676;
}
.g-live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00E676;
  animation: blink 1s infinite;
  flex-shrink: 0;
}
.g-team-sep { height: 1px; background: rgba(255,255,255,0.05); margin: 4px 0; }
.g-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}
.g-conf-pill {
  font-size: 8px;
  letter-spacing: 2px;
  color: #444;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 99px;
  padding: 2px 8px;
}
.g-box-link {
  font-size: 10px;
  letter-spacing: 2px;
  color: #00E676;
  font-weight: 600;
}
.g-glow-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: 12px;
  background: radial-gradient(circle at var(--cx, 50%) var(--cy, 50%), rgba(0,230,118,0.04) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.2s;
}
.g-card2:hover .g-glow-overlay { opacity: 1; }
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.88);
  z-index: 2000; display: flex; align-items: center; justify-content: center;
  padding: 24px; backdrop-filter: blur(4px);
}
.modal { background: var(--grey); border: 1px solid var(--border-strong); width: 100%; max-width: 1100px; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: var(--shadow-lg); border-radius: 4px; }
.modal-header {
  display: grid; grid-template-columns: 1fr auto 1fr auto;
  align-items: center; padding: 20px 24px;
  border-bottom: 2px solid var(--white);
  position: sticky; top: 0; background: var(--grey); z-index: 10;
}
.modal-team { display: flex; flex-direction: column; }
.modal-team.home { text-align: right; }
.modal-team-city { font-size: 9px; letter-spacing: 3px; color: #555; margin-bottom: 4px; }
.modal-team-name { font-size: 28px; letter-spacing: 2px; line-height: 1; }
.modal-team-abbr { font-size: 9px; letter-spacing: 3px; color: #444; margin-top: 4px; }
.modal-score-center { text-align: center; padding: 0 24px; }
.modal-score-big { font-size: 48px; letter-spacing: 3px; color: var(--green); text-shadow: 0 0 20px rgba(0,255,65,.3); line-height: 1; }
.modal-score-vs { font-size: 11px; letter-spacing: 4px; color: #333; }
.modal-status { font-size: 9px; letter-spacing: 3px; color: var(--green); margin-top: 6px; }
.modal-close {
  background: none; border: 1px solid var(--border);
  color: var(--white); font-size: 16px; width: 32px; height: 32px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.1s; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700;
  margin-left: 16px; flex-shrink: 0; align-self: center;
}
.modal-close:hover { background: var(--white); color: var(--black); }
.modal-tabs { display: flex; border-bottom: 1px solid var(--border); }
.modal-tab {
  padding: 14px 28px; font-size: 10px; letter-spacing: 3px; color: #555;
  cursor: pointer; border: none; background: none;
  border-right: 1px solid var(--border); border-bottom: 2px solid transparent;
  transition: all 0.1s; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700; text-transform: uppercase;
}
.modal-tab:hover { color: var(--white); }
.modal-tab.active { color: var(--green); border-bottom-color: var(--green); }
.box-score { padding: 24px 32px; }
.box-team-label { font-size: 9px; letter-spacing: 4px; color: var(--green); margin-bottom: 12px; margin-top: 24px; }
.box-table { width: 100%; border-collapse: collapse; }
.box-table th { font-size: 8px; letter-spacing: 3px; color: #444; padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border); }
.box-table th:first-child { text-align: left; }
.box-table td { font-size: 11px; letter-spacing: 1px; color: var(--white); padding: 10px 10px; text-align: right; border-bottom: 1px solid #141414; font-weight: 400; }
.box-table td:first-child { text-align: left; font-weight: 700; font-size: 12px; }
.box-table tr:hover td { background: var(--grey); }
.box-pts { color: var(--green) !important; font-weight: 700 !important; font-size: 13px !important; }
.live-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 8px; letter-spacing: 3px; color: var(--green); border: 1px solid var(--green); padding: 3px 8px; animation: blink 1s infinite; }
.loader { display: flex; align-items: center; gap: 14px; padding: 40px 48px; font-size: 11px; letter-spacing: 4px; color: #333; }
.loader-bar { width: 48px; height: 2px; background: #1a1a1a; position: relative; overflow: hidden; }
.loader-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: var(--green); animation: sweep 1s infinite; }
@keyframes sweep { to { left: 100%; } }
.err { background: rgba(255,50,50,.06); border-left: 3px solid #f33; padding: 14px 28px; font-size: 11px; letter-spacing: 2px; color: #f33; }
.empty { padding: 48px; font-size: 11px; letter-spacing: 4px; color: #333; text-align: center; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: #2a2a2a; }
@media print {
  nav, .ticker, .toolbar, .export-btn { display: none !important; }
  body { background: white !important; color: black !important; }
  * { color: black !important; border-color: #ccc !important; background: white !important; text-shadow: none !important; box-shadow: none !important; }
  .home-wrap { display: none !important; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API = "https://web-production-5f6e1.up.railway.app/api/v1";

function localDate(offset = 0) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function getYesterday() { return localDate(-1); }
function getTomorrow()  { return localDate(1); }

function Loader({ label = 'LOADING' }) {
  return <div className="loader"><div className="loader-bar"/>{label}</div>;
}

function parseStatus(s) {
  if (!s) return { label: 'SCHEDULED', type: 'sched' };
  const l = s.toLowerCase();
  if (l.includes('final') || l === 'complete') return { label: 'FINAL', type: 'final' };
  if (l.includes('qtr') || l.includes('half') || l === 'in progress') return { label: 'LIVE', type: 'live' };
  try {
    const d = new Date(s);
    if (!isNaN(d)) return { label: d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' }), type: 'sched' };
  } catch(e) {}
  return { label: s.substring(0,18), type: 'sched' };
}

function Ticker() {
  const [items, setItems] = React.useState([]);
  React.useEffect(() => {
    const today = localDate();
    fetch(`${API}/nba/games?date=${today}`)
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data?.games?.length) return;
        setItems(data.games.map(g => {
          const hasScore = g.home_team_score > 0 || g.visitor_team_score > 0;
          if (hasScore) return `${g.visitor_team.abbreviation} ${g.visitor_team_score} - ${g.home_team_score} ${g.home_team.abbreviation}`;
          try {
            const d = new Date(g.status);
            const t = isNaN(d) ? g.status : d.toLocaleTimeString([], { hour:'numeric', minute:'2-digit', timeZoneName:'short' });
            return `${g.visitor_team.abbreviation} @ ${g.home_team.abbreviation}  ${t}`;
          } catch { return `${g.visitor_team.abbreviation} @ ${g.home_team.abbreviation}`; }
        }));
      }).catch(()=>{});
  }, []);
  const fallback = ['PIVOT — NBA INTELLIGENCE PLATFORM', "TODAY'S SLATE NOW LOADING", 'GAMES · ANALYSIS · PLAYERS', 'POWERED BY PIVOT'];
  const display = items.length ? items : fallback;
  const doubled = [...display, ...display];
  return (
    <div className="ticker">
      <div className="ticker-label">NBA LIVE</div>
      <div className="ticker-track-wrap">
        <div className="ticker-track">
          {doubled.map((item,i) => (
            <React.Fragment key={i}>
              <span className="ticker-item">{item}</span>
              <span className="ticker-sep">◆</span>
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

function Home({ onNavigate }) {
  const audioRef = React.useRef(null);
  const wrapRef = React.useRef(null);

  React.useEffect(() => {
    const a = audioRef.current;
    if (!a) return;

    document.addEventListener('click', unlock);
    return () => document.removeEventListener('click', unlock);
  }, []);

  const handleMouseMove = (e) => {
    const rect = wrapRef.current.getBoundingClientRect();
    wrapRef.current.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
    wrapRef.current.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);

  const FEATURES = [
    { num:'01', name:'Live Game Engine', desc:'Real-time scoring and comprehensive box scores from every NBA game. Auto-refreshes to keep you synced with the floor.', stat:'Live', statLabel:'Auto-Refresh' },
    { num:'02', name:'AI Analysis', desc:'PIVOT-powered breakdowns of matchups, individual performance, and daily slates. No fluff. Just pure, analytical insight.', stat:'Live', statLabel:'AI Powered' },
    { num:'03', name:'Coach Mode', desc:'Dynamic, in-game adjustments backed by live box score feeds. Designed specifically for coaches who need answers on the sideline.', stat:'Live', statLabel:'Box Score Feed' },
    { num:'04', name:'Player Intelligence', desc:'Deep-dive evaluations spanning offense, defense, financials, and off-court factors. Visualize performance with 8-stat grids and last-10 trends.', stat:'8', statLabel:'Stat Dimensions' },
    { num:'05', name:'Front Office AI', desc:'Navigate the trade market and manage the cap with ease. Roster analysis powered by live 2026 data and machine-learning logic.', stat:'2026', statLabel:'Live Season Data' },
    { num:'06', name:'Export Ready', desc:'Export any analysis to PDF. Seamlessly share professional-grade reports with your staff, front office, or investors.', stat:'PDF', statLabel:'Export Format' },
  ];
  const MARQUEE_ITEMS = [
    'Powered by PIVOT', 'Live Box Scores', 'Real-Time Data',
    'Coach Mode', 'Player Intelligence', 'Front Office AI',
    'Powered by PIVOT', 'Live Box Scores', 'Real-Time Data',
    'Coach Mode', 'Player Intelligence', 'Front Office AI',
  ];

  return (
    <div>
      {/* ── Hero ── */}
      <div className="home-wrap" ref={wrapRef} onMouseMove={handleMouseMove}>
        <audio ref={audioRef} src="/static/bg.mp4" loop muted preload="auto"/>
        <video className="home-video" src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260309_042944_4a2205b7-b061-490a-852b-92d9e9955ce9.mp4" autoPlay loop muted playsInline/>
        <div className="home-overlay"/>
        <div className="home-cursor-glow"/>
        <div className="home-grid-overlay"/>
        <div className="home-hero">
          <div className="home-pivot-text">PIVOT</div>
          <div className="home-tagline">
            NBA intelligence for coaches, front offices, and analysts who refuse to guess.
          </div>
          <div className="home-ctas">
            <button className="home-cta-primary" onClick={() => onNavigate('games')}>View Today's Games →</button>
            <button className="home-cta-secondary" onClick={() => onNavigate('players')}>Player Analysis</button>
          </div>
        </div>
        <div className="home-scroll-hint"><div className="home-scroll-line"/>Scroll to Explore</div>
      </div>

      {/* ── Marquee ── */}
      <div className="home-marquee-wrap">
        <div className="home-marquee-track">
          {MARQUEE_ITEMS.map((item, i) => (
            <span key={i} className="home-marquee-item">
              <span className="home-marquee-dot"/>
              {item}
            </span>
          ))}
        </div>
      </div>

      {/* ── Features ── */}
      <div className="features-section">
        <div className="features-label">Platform Features</div>
        <div className="features-title">Precision at every level.</div>
        <div className="features-subtitle">
          Built for coaches, GMs, and analysts who demand actionable answers — not just summaries.
        </div>
        <div className="features-grid">
          {FEATURES.map(f => (
            <div key={f.num} className="feature-card"
              onMouseMove={e => {
                const r = e.currentTarget.getBoundingClientRect();
                e.currentTarget.style.setProperty('--cx', `${e.clientX - r.left}px`);
                e.currentTarget.style.setProperty('--cy', `${e.clientY - r.top}px`);
              }}>
              <div className="feature-card-glow"/>
              <div className="feature-num">{f.num}</div>
              <div className="feature-name">{f.name}</div>
              <div className="feature-desc">{f.desc}</div>
              <div className="feature-stat">{f.stat}</div>
              <div className="feature-stat-label">{f.statLabel}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── CTA ── */}
      <div className="cta-section">
        <div className="features-label">Get Started</div>
        <div className="cta-title">Ready to Outpace the Game?</div>
        <div className="cta-sub">Join coaches and front offices already using PIVOT.</div>
        <div className="cta-btns">
          <button className="home-cta-primary" onClick={() => onNavigate('games')}>Open Live Games →</button>
          <button className="home-cta-secondary" onClick={() => onNavigate('coach')}>Try Coach Mode</button>
        </div>
      </div>

      {/* ── Footer ── */}
      <div className="home-footer">
        <div className="home-footer-logo">PIVOT</div>
        <div>© 2026 PIVOT Analytics. All rights reserved.</div>
      </div>
    </div>
  );
}

function GameModal({ game, onClose }) {
  const [boxScore, setBoxScore] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [activeTab, setActiveTab] = React.useState('boxscore');
  const { label, type } = parseStatus(game.status);
  const hasScore = game.home_team_score > 0 || game.visitor_team_score > 0;

  React.useEffect(() => {
    const load = async () => {
      setLoading(true);
      try {
        const r = await fetch(`${API}/nba/games/${game.id}/boxscore`);
        if (r.ok) setBoxScore(await r.json());
      } catch(e) {} finally { setLoading(false); }
    };
    load();
    if (type === 'live') { const iv = setInterval(load, 10000); return () => clearInterval(iv); }
  }, [game.id]);

  React.useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const StatTable = ({ players, teamName }) => (
    <div>
      <div className="box-team-label">{teamName}</div>
      <table className="box-table">
        <thead><tr>
          <th style={{textAlign:'left', minWidth:160}}>Player</th>
          <th>MIN</th><th>PTS</th><th>REB</th><th>AST</th>
          <th>STL</th><th>BLK</th><th>FG</th><th>3P</th><th>FT</th><th>TO</th>
        </tr></thead>
        <tbody>
          {players.map((p,i) => (
            <tr key={i}>
              <td>{p.player} <span style={{fontSize:9, color:'#444', marginLeft:6}}>{p.pos}</span></td>
              <td>{p.min}</td>
              <td className="box-pts">{p.pts}</td>
              <td>{p.reb}</td><td>{p.ast}</td><td>{p.stl}</td><td>{p.blk}</td>
              <td style={{fontSize:10}}>{p.fg}</td>
              <td style={{fontSize:10}}>{p.fg3}</td>
              <td style={{fontSize:10}}>{p.ft}</td>
              <td>{p.to}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  return (
    <div className="modal-backdrop" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-team">
            <div className="modal-team-city">{game.visitor_team.city}</div>
            <div className="modal-team-name">{game.visitor_team.name.split(' ').pop()}</div>
            <div className="modal-team-abbr">{game.visitor_team.abbreviation}</div>
          </div>
          <div className="modal-score-center">
            {hasScore ? <div className="modal-score-big">{game.visitor_team_score} - {game.home_team_score}</div> : <div className="modal-score-vs">VS</div>}
            <div className="modal-status">{type==='live' ? <span className="live-badge">● LIVE</span> : label}</div>
          </div>
          <div className="modal-team home">
            <div className="modal-team-city">{game.home_team.city}</div>
            <div className="modal-team-name">{game.home_team.name.split(' ').pop()}</div>
            <div className="modal-team-abbr">{game.home_team.abbreviation}</div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div>
          <div className="modal-tabs">
            <button className={`modal-tab ${activeTab==='boxscore'?'active':''}`} onClick={() => setActiveTab('boxscore')}>Box Score</button>
            <button className={`modal-tab ${activeTab==='info'?'active':''}`} onClick={() => setActiveTab('info')}>Game Info</button>
          </div>
          {activeTab === 'boxscore' && (
            <div className="box-score">
              {loading && <Loader label="PIVOT COMPUTING"/>}
              {!loading && (!boxScore || boxScore.total_players === 0) && (
                <div style={{padding:'40px', fontSize:10, letterSpacing:4, color:'#333', textAlign:'center'}}>Box Score Not Available</div>
              )}
              {!loading && boxScore && boxScore.total_players > 0 && (
                <>
                  <StatTable players={boxScore.away_players||[]} teamName={`${game.visitor_team.city} ${game.visitor_team.name} (Away)`}/>
                  <StatTable players={boxScore.home_players||[]} teamName={`${game.home_team.city} ${game.home_team.name} (Home)`}/>
                </>
              )}
            </div>
          )}
          {activeTab === 'info' && (
            <div style={{padding:'32px 40px'}}>
              {[
                {k:'Home Team', v:`${game.home_team.city} ${game.home_team.name}`},
                {k:'Away Team', v:`${game.visitor_team.city} ${game.visitor_team.name}`},
                {k:'Conference', v:`${game.home_team.conference} vs ${game.visitor_team.conference}`},
                {k:'Division', v:`${game.home_team.division} vs ${game.visitor_team.division}`},
                {k:'Date', v:game.date},
                {k:'Status', v:label},
                {k:'Game ID', v:game.id},
              ].map(row => (
                <div key={row.k} style={{display:'flex', borderBottom:'1px solid var(--border)', padding:'14px 0', gap:32}}>
                  <div style={{fontSize:9, letterSpacing:3, color:'#444', width:180, flexShrink:0}}>{row.k}</div>
                  <div style={{fontSize:12, letterSpacing:2}}>{row.v}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const ESPN_TEAM_IDS = {
  ATL:1,BOS:2,BKN:17,CHA:30,CHI:4,CLE:5,DAL:6,DEN:7,DET:8,GSW:9,
  HOU:10,IND:11,LAC:12,LAL:13,MEM:29,MIA:14,MIL:15,MIN:16,NOP:3,
  NYK:18,OKC:25,ORL:19,PHI:20,PHX:21,POR:22,SAC:23,SAS:24,TOR:28,
  UTA:26,WAS:27
};
function teamLogoUrl(abbr) {
  const id = ESPN_TEAM_IDS[abbr];
  return id ? `https://a.espn.com/combiner/i?img=/i/teamlogos/nba/500/${abbr.toLowerCase()}.png&h=80&w=80` : null;
}

function TeamRow({ team, score, isLive, hasScore }) {
  const [logoErr, setLogoErr] = React.useState(false);
  const logoUrl = teamLogoUrl(team.abbreviation);
  return (
    <div style={{display:'flex', alignItems:'center', gap:12, padding:'10px 0'}}>
      <div style={{width:40, height:40, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center'}}>
        {logoUrl && !logoErr
          ? <img src={logoUrl} alt={team.abbreviation} width={40} height={40}
              style={{objectFit:'contain', display:'block'}}
              onError={() => setLogoErr(true)}/>
          : <div style={{width:40, height:40, display:'flex', alignItems:'center', justifyContent:'center',
              background:'rgba(255,255,255,0.04)', borderRadius:6, fontSize:9, letterSpacing:1, color:'#555', fontWeight:700}}>
              {team.abbreviation}
            </div>
        }
      </div>
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontSize:22, fontWeight:700, letterSpacing:1, lineHeight:1}}>{team.abbreviation}</div>
        <div style={{fontSize:10, color:'#555', letterSpacing:1, marginTop:2, textTransform:'uppercase'}}>{team.city}</div>
      </div>
      {hasScore && (
        <div style={{fontSize:28, fontWeight:700, letterSpacing:1, color: isLive ? '#00E676' : '#fff', minWidth:40, textAlign:'right'}}>
          {score}
        </div>
      )}
    </div>
  );
}

function GameCard({ g, onSelect }) {
  const { label, type } = parseStatus(g.status);
  const hasScore = g.home_team_score > 0 || g.visitor_team_score > 0;
  const isLive = type === 'live';
  const [performers, setPerformers] = React.useState([]);

  React.useEffect(() => {
    if (!hasScore) return;
    fetch(`${API}/nba/games/${g.id}/boxscore`)
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data || data.total_players === 0) return;
        const all = [...(data.away_players||[]), ...(data.home_players||[])];
        const top = all
          .filter(p => p.pts > 0)
          .sort((a,b) => (b.pts + b.reb*0.5 + b.ast*0.5) - (a.pts + a.reb*0.5 + a.ast*0.5))
          .slice(0, 3)
          .map(p => ({
            name: p.player.split(' ').slice(-1)[0],
            full: p.player,
            pts: p.pts, reb: p.reb, ast: p.ast,
            team: all.indexOf(p) < (data.away_players||[]).length ? g.visitor_team.abbreviation : g.home_team.abbreviation,
          }));
        setPerformers(top);
      }).catch(() => {});
  }, [g.id, hasScore]);

  const handleMouseMove = (e) => {
    const card = e.currentTarget;
    const rect = card.getBoundingClientRect();
    card.style.setProperty('--cx', ((e.clientX - rect.left) / rect.width * 100).toFixed(1) + '%');
    card.style.setProperty('--cy', ((e.clientY - rect.top) / rect.height * 100).toFixed(1) + '%');
  };

  return (
    <div className="g-card2" onClick={() => onSelect(g)} onMouseMove={handleMouseMove}>
      <div className="g-glow-overlay"/>

      {/* Status */}
      <div className={`g-status-badge${isLive ? ' live' : ''}`}>
        {isLive && <span className="g-live-dot"/>}
        {isLive ? 'LIVE' : label}
      </div>

      {/* Teams */}
      <div>
        <TeamRow team={g.visitor_team} score={g.visitor_team_score} isLive={isLive} hasScore={hasScore}/>
        <div className="g-team-sep"/>
        <TeamRow team={g.home_team} score={g.home_team_score} isLive={isLive} hasScore={hasScore}/>
      </div>

      {/* Top Performers */}
      {performers.length > 0 && (
        <div style={{borderTop:'1px solid rgba(255,255,255,0.05)', paddingTop:14}}>
          <div style={{fontFamily:'Inter, sans-serif', fontSize:8, letterSpacing:3, color:'rgba(0,230,118,0.45)', textTransform:'uppercase', fontWeight:600, marginBottom:10}}>Top Performers</div>
          <div style={{display:'flex', flexDirection:'column', gap:8}}>
            {performers.map((p, i) => (
              <div key={i} style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                <div style={{display:'flex', alignItems:'center', gap:8, minWidth:0}}>
                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:2, fontWeight:700, color:'rgba(255,255,255,0.25)', width:14}}>{i+1}</div>
                  <div style={{fontFamily:'Inter, sans-serif', fontSize:13, fontWeight:600, color:'rgba(255,255,255,0.88)', letterSpacing:0, textTransform:'none', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{p.full}</div>
                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:2, color:'rgba(0,230,118,0.4)', fontWeight:700, flexShrink:0}}>{p.team}</div>
                </div>
                <div style={{display:'flex', gap:10, flexShrink:0, marginLeft:8}}>
                  <span style={{fontFamily:'Inter, sans-serif', fontSize:12, fontWeight:700, color:'var(--green)'}}>{p.pts}<span style={{fontSize:8, letterSpacing:1, color:'rgba(0,230,118,0.45)', fontWeight:500, marginLeft:2}}>PTS</span></span>
                  <span style={{fontFamily:'Inter, sans-serif', fontSize:12, fontWeight:500, color:'rgba(255,255,255,0.35)'}}>{p.reb}<span style={{fontSize:8, letterSpacing:1, color:'rgba(255,255,255,0.2)', marginLeft:2}}>REB</span></span>
                  <span style={{fontFamily:'Inter, sans-serif', fontSize:12, fontWeight:500, color:'rgba(255,255,255,0.35)'}}>{p.ast}<span style={{fontSize:8, letterSpacing:1, color:'rgba(255,255,255,0.2)', marginLeft:2}}>AST</span></span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Footer */}
      <div className="g-card-footer" style={{marginTop:'auto'}}>
        <span className="g-conf-pill">{[g.home_team?.conference, g.home_team?.division].filter(Boolean).join(' · ')}</span>
        <span className="g-box-link">Box Score →</span>
      </div>
    </div>
  );
}

function Games() {
  const [games, setGames] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [selectedGame, setSelectedGame] = React.useState(null);
  const [activeDate, setActiveDate] = React.useState(localDate());
  const today = localDate();

  const fetch_ = async (d) => {
    const date = d || today;
    setActiveDate(date);
    setLoading(true); setError(null);
    try {
      const r = await fetch(`${API}/nba/games?date=${date}&_=${Date.now()}`);
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      setGames(data.games || []);
    } catch(e) { setError(e.message); } finally { setLoading(false); }
  };

  // Auto-refresh only when viewing today and there are live games
  React.useEffect(() => {
    fetch_();
  }, []);

  const hasLive = games.some(g => { const l = g.status?.toLowerCase()||''; return l.includes('qtr')||l.includes('half')||l==='in progress'; });

  React.useEffect(() => {
    if (!hasLive || activeDate !== today) return;
    const iv = setInterval(() => fetch_(today), 10000);
    return () => clearInterval(iv);
  }, [hasLive, activeDate]);

  return (
    <div>
      <div className="toolbar">
        <button className="tb-btn" onClick={() => fetch_(today)} style={{color: activeDate===today ? 'var(--white)' : ''}}>Today</button>
        <button className="tb-btn" onClick={() => fetch_(getYesterday())} style={{color: activeDate===getYesterday() ? 'var(--white)' : ''}}>Yesterday</button>

function PlayersCanvas({ dimmed }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    let animId;
    let pulses = [];
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    const N = 65;
    const pts = Array.from({length: N}, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.22,
      vy: (Math.random() - 0.5) * 0.22,
      r: Math.random() * 1.3 + 0.4,
    }));
    const iv = setInterval(() => {
      const p = pts[Math.floor(Math.random() * pts.length)];
      pulses.push({ x: p.x, y: p.y, r: 0, alpha: 0.75 });
    }, 2200);
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pts.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      });
      for (let i = 0; i < pts.length; i++) {
        for (let j = i+1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < 145) {
            ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y);
            ctx.strokeStyle = `rgba(0,230,118,${0.045*(1-d/145)})`; ctx.lineWidth = 0.6; ctx.stroke();
          }
        }
      }
      pts.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,230,118,0.25)'; ctx.fill();
      });
      pulses = pulses.filter(p => p.alpha > 0.015);
      pulses.forEach(p => {
        p.r += 1.4; p.alpha *= 0.964;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0,230,118,${p.alpha*0.55})`; ctx.lineWidth = 0.9; ctx.stroke();
        if (p.r < 30) {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r*0.3, 0, Math.PI*2);
          ctx.fillStyle = `rgba(0,230,118,${p.alpha*0.15})`; ctx.fill();
        }
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); clearInterval(iv); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={canvasRef} style={{position:'fixed', top:70, left:0, right:0, bottom:40, zIndex:0, pointerEvents:'none', opacity: dimmed ? 0.06 : 0.45, transition:'opacity 1.6s ease'}}/>;
}

function TrendBar({ val, avg, maxVal, label, isPct }) {
  const pct = (v) => v != null ? `${(v*100).toFixed(1)}%` : '-';
  const display = isPct ? pct(val) : val;
  const barH = maxVal > 0 ? Math.min(100, (val / maxVal) * 100) : 0;
  const avgH = maxVal > 0 ? Math.min(100, (avg / maxVal) * 100) : 0;
  const up = val >= avg;
  const color = up ? 'var(--green)' : '#ef4444';
  return (
    <div style={{textAlign:'center', flex:1, padding:'0 4px'}}>
      <div style={{height:52, position:'relative', display:'flex', alignItems:'flex-end', justifyContent:'center', marginBottom:8}}>
        <div style={{width:24, background:color, opacity:0.75, height:`${barH}%`, minHeight:2, borderRadius:'3px 3px 0 0', transition:'height 0.8s ease', position:'relative', zIndex:1}}/>
        <div style={{position:'absolute', bottom:`${avgH}%`, left:'10%', right:'10%', borderTop:'1px dashed rgba(255,255,255,0.25)', zIndex:2}}/>
      </div>
      <div style={{fontFamily:'Inter, sans-serif', fontSize:15, fontWeight:700, color, letterSpacing:-0.5}}>{display != null ? display : '-'}</div>
      <div style={{fontFamily:'Inter, sans-serif', fontSize:8, letterSpacing:2, color:'var(--text-muted)', marginTop:4, textTransform:'uppercase'}}>{label}</div>
      {val!=null && avg!=null && (
        <div style={{fontFamily:'Inter, sans-serif', fontSize:9, color, marginTop:2, fontWeight:500}}>
          {up ? '+' : ''}{isPct ? `${((val-avg)*100).toFixed(1)}%` : `${(val-avg).toFixed(1)}`}
        </div>
      )}
    </div>
  );
}

                      <div style={{position:'absolute', bottom:10, left:12, fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:2, fontWeight:700, color:'rgba(255,255,255,0.3)'}}>{p.pos}</div>
                    </div>

                    {/* Card body */}
                    <div style={{padding:'14px 16px 16px'}}>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:15, fontWeight:700, letterSpacing:0.5, color:'var(--white)', marginBottom:12, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{p.name}</div>

                      {/* Stats row */}
                      {s ? (
                        <div style={{display:'flex', justifyContent:'space-around', marginBottom:14, paddingBottom:14, borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
                          <Stat val={s.pts} val10={s.pts10} label="PTS"/>
                          <Stat val={s.reb} val10={s.reb10} label="REB"/>
                          <Stat val={s.ast} val10={s.ast10} label="AST"/>
                        </div>
                      ) : (
                        <div style={{height:52, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:14, paddingBottom:14, borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
                          <div style={{display:'flex', gap:5}}>
                            {[0,1,2].map(i=><div key={i} style={{width:4,height:4,borderRadius:'50%',background:'rgba(0,230,118,0.3)',animation:`pulse-dot 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}

                      <div style={{display:'inline-flex', alignItems:'center', gap:6, background:'rgba(0,230,118,0.06)', border:'1px solid rgba(0,230,118,0.15)', borderRadius:99, padding:'4px 10px'}}>
                        <div style={{width:4, height:4, borderRadius:'50%', background:'var(--green)', opacity:0.7}}/>
                        <span style={{fontFamily:'Inter, sans-serif', fontSize:10, letterSpacing:0.5, color:'rgba(0,230,118,0.7)', fontWeight:500, textTransform:'none'}}>{p.narrative}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── Loading ── */}
      {loading && (
        <div style={{position:'relative', zIndex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'65vh', gap:24}}>
          <div style={{display:'flex', gap:8}}>
            {[0,1,2].map(i => (
              <div key={i} style={{width:6, height:6, borderRadius:'50%', background:'var(--green)', animation:`pulse-dot 1.2s ease-in-out ${i*0.2}s infinite`}}/>
            ))}
          </div>
          <div style={{fontFamily:'Inter, sans-serif', fontSize:11, letterSpacing:4, color:'rgba(0,230,118,0.6)', textTransform:'uppercase', fontWeight:500}}>Analyzing</div>
        </div>
      )}

      {error && (
        <div style={{position:'relative', zIndex:1, margin:'32px 48px'}}>
          <div style={{background:'rgba(239,68,68,0.06)', border:'1px solid rgba(239,68,68,0.2)', borderRadius:8, padding:'16px 20px', fontFamily:'Inter, sans-serif', fontSize:13, color:'#ef4444', letterSpacing:0, textTransform:'none'}}>{error}</div>
        </div>
      )}

      {/* ── Result ── */}
      {hasResult && (
        <div style={{position:'relative', zIndex:1, padding:'0 0 80px'}}>

          {/* Player hero */}
          <div style={{padding:'40px 52px 32px', borderBottom:'1px solid var(--border)', background:'rgba(8,10,14,0.5)', backdropFilter:'blur(8px)'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:16}}>
              <div>
                <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:'clamp(36px,5vw,72px)', letterSpacing:-1, lineHeight:1, fontWeight:700, color:'var(--white)', textShadow:'0 0 60px rgba(0,230,118,0.1)'}}>

                <div style={{display:'flex', alignItems:'center', gap:12, marginTop:10, flexWrap:'wrap'}}>
                  <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:10, letterSpacing:3, fontWeight:700, color:'var(--green)', background:'rgba(0,230,118,0.08)', border:'1px solid rgba(0,230,118,0.25)', padding:'4px 12px', borderRadius:3}}>{result.player?.team?.abbreviation||'—'}</span>
                  <span style={{fontFamily:'Inter, sans-serif', fontSize:13, color:'rgba(255,255,255,0.5)', fontWeight:400, textTransform:'none', letterSpacing:0}}>{result.player?.team?.full_name||result.player?.team?.name||'—'}</span>
                  <span style={{color:'var(--border-strong)'}}>·</span>
                  <span style={{fontFamily:'Inter, sans-serif', fontSize:13, color:'rgba(255,255,255,0.5)', fontWeight:400, textTransform:'none', letterSpacing:0}}>{result.player?.position||'—'}</span>
                  <span style={{color:'var(--border-strong)'}}>·</span>
                  <span style={{fontFamily:'Inter, sans-serif', fontSize:13, color:'rgba(255,255,255,0.4)', fontWeight:400, textTransform:'none', letterSpacing:0}}>2025–26 Season</span>

              <div style={{display:'flex', gap:8, alignItems:'center'}}>
                <button onClick={() => { setResult(null); setQuery(''); setSelectedId(null); setError(null); }}

                  onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--border-strong)';e.currentTarget.style.color='var(--white)';}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-muted)';}}>
                  ← New Search
                </button>
                <button onClick={() => window.print()}
                  style={{fontFamily:'Helvetica Neue, sans-serif', fontWeight:700, fontSize:9, letterSpacing:3, textTransform:'uppercase', padding:'9px 18px', background:'transparent', border:'1px solid var(--border)', color:'var(--text-muted)', cursor:'pointer', borderRadius:6, transition:'all 0.15s'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--green)';e.currentTarget.style.color='var(--green)';}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-muted)';}}>
                  Export PDF →
                </button>
              </div>
            </div>
          </div>

          {/* Stat cards */}
          {result.averages && (
            <div style={{padding:'32px 52px 0'}}>
              <div style={{fontFamily:'Inter, sans-serif', fontSize:9, letterSpacing:4, color:'rgba(0,230,118,0.5)', fontWeight:600, textTransform:'uppercase', marginBottom:14}}>Season Averages · {result.games_played} GP</div>
              <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:12}}>
                {[
                  {val:result.averages.points, lbl:'PTS', primary:true},
                  {val:result.averages.rebounds, lbl:'REB', primary:true},
                  {val:result.averages.assists, lbl:'AST', primary:true},
                  {val:result.averages.blocks, lbl:'BLK', primary:false},
                ].map(({val,lbl,primary}) => (
                  <div key={lbl} style={{background:'rgba(22,27,34,0.7)', border:'1px solid var(--border)', borderRadius:10, padding:'20px 24px', backdropFilter:'blur(8px)', position:'relative', overflow:'hidden'}}>
                    <div style={{position:'absolute', top:0, left:0, right:0, height:2, background: primary ? 'var(--green)' : 'rgba(0,230,118,0.3)', boxShadow: primary ? '0 0 12px rgba(0,230,118,0.4)' : 'none'}}/>
                    <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:42, letterSpacing:-2, color: primary ? 'var(--green)' : 'var(--white)', fontWeight:700, lineHeight:1, textShadow: primary ? '0 0 30px rgba(0,230,118,0.2)' : 'none'}}>{val}</div>
                    <div style={{fontFamily:'Inter, sans-serif', fontSize:10, letterSpacing:3, color:'var(--text-muted)', marginTop:8, textTransform:'uppercase', fontWeight:500}}>{lbl}</div>
                  </div>
                ))}
              </div>
              <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:36}}>
                {[
                  {val:result.averages.steals, lbl:'STL'},
                  {val:pct(result.averages.fg_pct), lbl:'FG%'},
                  {val:pct(result.averages.fg3_pct), lbl:'3P%'},
                  {val:pct(result.averages.ft_pct), lbl:'FT%'},
                ].map(({val,lbl}) => (
                  <div key={lbl} style={{background:'rgba(15,17,21,0.6)', border:'1px solid var(--border)', borderRadius:8, padding:'14px 20px', backdropFilter:'blur(4px)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                    <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:22, letterSpacing:-0.5, color:'var(--white)', fontWeight:700}}>{val}</div>
                    <div style={{fontFamily:'Inter, sans-serif', fontSize:9, letterSpacing:3, color:'var(--text-muted)', textTransform:'uppercase', fontWeight:500}}>{lbl}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Two-column: analysis + trend bars */}
          <div style={{padding:'0 52px', display:'grid', gridTemplateColumns:'1fr 340px', gap:24, marginBottom:36, alignItems:'start'}}>
            {result.analysis && (
              <div style={{background:'rgba(22,27,34,0.65)', border:'1px solid var(--border)', borderRadius:10, padding:'28px 32px', backdropFilter:'blur(8px)'}}>
                <div style={{fontFamily:'Inter, sans-serif', fontSize:9, letterSpacing:4, color:'rgba(0,230,118,0.5)', fontWeight:600, textTransform:'uppercase', marginBottom:16}}>Overview</div>
                <div style={{fontFamily:'Inter, sans-serif', fontSize:14, lineHeight:1.95, letterSpacing:0, color:'rgba(255,255,255,0.85)', whiteSpace:'pre-wrap', fontWeight:400, textTransform:'none'}}>
                  {result.analysis}
                </div>
              </div>
            )}
            {result.last_10 && result.averages && (
              <div style={{background:'rgba(22,27,34,0.65)', border:'1px solid var(--border)', borderRadius:10, padding:'24px 20px', backdropFilter:'blur(8px)'}}>
                <div style={{fontFamily:'Inter, sans-serif', fontSize:9, letterSpacing:4, color:'rgba(0,230,118,0.5)', fontWeight:600, textTransform:'uppercase', marginBottom:6}}>Last 10 Games</div>
                <div style={{fontFamily:'Inter, sans-serif', fontSize:9, letterSpacing:0, color:'var(--text-muted)', marginBottom:20, textTransform:'none'}}>vs season avg (dashed line)</div>
                <div style={{display:'flex', gap:4}}>
                  {[
                    {k:'points', avg:result.averages.points, max:Math.max(result.averages.points*1.4, 35), lbl:'PTS', isPct:false},
                    {k:'rebounds', avg:result.averages.rebounds, max:Math.max(result.averages.rebounds*1.6, 14), lbl:'REB', isPct:false},
                    {k:'assists', avg:result.averages.assists, max:Math.max(result.averages.assists*1.6, 12), lbl:'AST', isPct:false},
                    {k:'steals', avg:result.averages.steals, max:Math.max(result.averages.steals*2, 3), lbl:'STL', isPct:false},
                    {k:'blocks', avg:result.averages.blocks, max:Math.max(result.averages.blocks*2, 3), lbl:'BLK', isPct:false},
                    {k:'fg_pct', avg:result.averages.fg_pct, max:0.7, lbl:'FG%', isPct:true},
                    {k:'fg3_pct', avg:result.averages.fg3_pct, max:0.6, lbl:'3P%', isPct:true},
                  ].map(({k,avg,max,lbl,isPct}) => (
                    <TrendBar key={k} val={result.last_10[k]} avg={avg} maxVal={max} label={lbl} isPct={isPct} />
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Deep Dive */}
          <div style={{padding:'0 52px'}}>
            <div style={{fontFamily:'Inter, sans-serif', fontSize:9, letterSpacing:4, color:'rgba(0,230,118,0.5)', fontWeight:600, textTransform:'uppercase', marginBottom:14}}>Deep Dive</div>
            <div style={{borderRadius:10, overflow:'hidden', border:'1px solid var(--border)'}}>
              {SECTIONS.map((s,i) => (
                <div key={s.id} style={{borderBottom:i<SECTIONS.length-1?'1px solid var(--border)':'none'}}>
                  <div onClick={() => loadSection(s.id)}
                    style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'18px 24px', cursor:'pointer', background: expandedSection===s.id ? 'rgba(0,230,118,0.04)' : 'rgba(22,27,34,0.5)', transition:'background 0.15s', backdropFilter:'blur(8px)'}}>
                    <div style={{display:'flex', alignItems:'center', gap:14}}>
                      <span style={{fontSize:14, opacity:0.6}}>{s.icon}</span>
                      <span style={{fontFamily:'Inter, sans-serif', fontSize:13, letterSpacing:0, fontWeight:500, color: expandedSection===s.id ? 'var(--white)' : 'rgba(255,255,255,0.7)', textTransform:'none'}}>{s.label}</span>
                    </div>
                    <div style={{display:'flex', alignItems:'center', gap:12}}>
                      {sectionLoading[s.id] && <div style={{fontFamily:'Inter, sans-serif', fontSize:10, letterSpacing:2, color:'var(--green)', fontWeight:500}}>Analyzing…</div>}
                      {sectionData[s.id] && !sectionLoading[s.id] && <div style={{width:6, height:6, borderRadius:'50%', background:'var(--green)', opacity:0.6}}/>}
                      <div style={{fontSize:10, color:'var(--text-muted)', transform:expandedSection===s.id?'rotate(180deg)':'none', transition:'transform 0.2s'}}>▼</div>
                    </div>
                  </div>
                  {expandedSection === s.id && (
                    <div style={{padding:'24px 28px 28px', background:'rgba(12,14,18,0.6)', borderTop:'1px solid var(--border)', backdropFilter:'blur(8px)'}}>
                      {sectionLoading[s.id] && (
                        <div style={{display:'flex', gap:6, alignItems:'center', padding:'8px 0'}}>
                          {[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:'50%',background:'var(--green)',animation:`pulse-dot 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}
                        </div>
                      )}
                      {!sectionLoading[s.id] && sectionData[s.id] && (
                        <div style={{fontFamily:'Inter, sans-serif', fontSize:14, lineHeight:1.95, letterSpacing:0, color:'rgba(255,255,255,0.82)', whiteSpace:'pre-wrap', fontWeight:400, textTransform:'none', maxWidth:900}}>
                          {sectionData[s.id]}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── No Stats Error ── */}
      {!loading && result?.error && (
        <div style={{position:'relative', zIndex:1, padding:'48px 52px'}}>
          {result.player && (
            <div style={{marginBottom:24}}>
              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:'clamp(32px,4vw,60px)', letterSpacing:-1, lineHeight:1, fontWeight:700, marginBottom:10}}>
                {result.player.first_name} {result.player.last_name}
              </div>
              <div style={{display:'flex', alignItems:'center', gap:10}}>
                <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:10, letterSpacing:3, fontWeight:700, color:'var(--green)', background:'rgba(0,230,118,0.08)', border:'1px solid rgba(0,230,118,0.2)', padding:'3px 10px', borderRadius:3}}>{result.player.team?.abbreviation||'—'}</span>
                <span style={{fontFamily:'Inter, sans-serif', fontSize:13, color:'var(--text-muted)', textTransform:'none', letterSpacing:0}}>{result.player.position||'—'}</span>
              </div>
            </div>
          )}
          <div style={{background:'rgba(22,27,34,0.6)', border:'1px solid var(--border)', borderRadius:8, padding:'20px 24px', maxWidth:500, backdropFilter:'blur(8px)'}}>
            <div style={{fontFamily:'Inter, sans-serif', fontSize:13, color:'var(--text-muted)', textTransform:'none', lineHeight:1.7, letterSpacing:0}}>{result.error}</div>
          </div>
        </div>
      )}
    </div>
  );
}


function FrontOfficeCard({ title, accent, children }) {
  return (
    <div style={{background:'var(--grey2)', border:'1px solid var(--border)', borderRadius:8, overflow:'hidden', boxShadow:'var(--shadow)', marginBottom:16}}>
      <div style={{display:'flex', alignItems:'center', gap:10, padding:'14px 20px', borderBottom:'1px solid var(--border)', background:'var(--grey)'}}>
        {accent && <div style={{width:3, height:14, background:'var(--green)', borderRadius:2, flexShrink:0}}/>}
        <div style={{fontFamily:'Inter, sans-serif', fontSize:11, letterSpacing:2, fontWeight:600, color:'var(--white)', textTransform:'uppercase'}}>{title}</div>

      <div style={{padding:'20px'}}>{children}</div>
