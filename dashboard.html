}

function FrontOffice() {
  const [loading, setLoading] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [rosterTeam, setRosterTeam] = React.useState('');

  const runRoster = async () => {
    if (!rosterTeam) return;
    setLoading(true); setError(null); setResult(null);
    try {
      const r = await fetch(`${API}/frontoffice/roster?team_name=${encodeURIComponent(rosterTeam)}`);
      if (!r.ok) throw new Error(await r.text());
      setResult(await r.json());
    } catch(e) { setError(e.message); } finally { setLoading(false); }
  };

  // Parse sections from AI analysis text
  const parseSection = (text, keyword) => {
    if (!text) return null;
    const lines = text.split('\n');
    const idx = lines.findIndex(l => l.toLowerCase().includes(keyword.toLowerCase()));
    if (idx === -1) return null;
    const section = [];
    for (let i = idx + 1; i < Math.min(idx + 8, lines.length); i++) {
      const l = lines[i].trim();
      if (l && !l.match(/^[A-Z\s&]+:$/) && l.length > 3) section.push(l);
      else if (section.length > 0 && !l) break;
    }
    return section.join('\n') || null;
  };

  const inp = { background:'var(--grey2)', border:'1px solid var(--border)', color:'var(--white)', fontFamily:'Inter, sans-serif', fontWeight:500, fontSize:14, letterSpacing:0, textTransform:'none', padding:'12px 16px', outline:'none', width:'100%', borderRadius:6, transition:'border-color 0.15s' };

  return (
    <div style={{display:'grid', gridTemplateColumns:result?'380px 1fr':'480px 1fr', minHeight:'calc(100vh - 56px)'}}>
      {/* Left panel */}
      <div style={{borderRight:'1px solid var(--border)', padding:'40px 36px', overflowY:'auto', background:'var(--grey)'}}>
        <div style={{fontSize:'clamp(24px,2.5vw,40px)', letterSpacing:4, marginBottom:8, fontWeight:700}}>Roster & Cap</div>
        <div style={{fontFamily:'Inter, sans-serif', fontSize:13, letterSpacing:0, color:'var(--text-muted)', fontWeight:400, textTransform:'none', marginBottom:32, lineHeight:1.6}}>
          Full front office breakdown: roster evaluation, cap situation, trade targets, and recommended moves.
        </div>
        <div style={{fontFamily:'Inter, sans-serif', fontSize:11, letterSpacing:1, color:'var(--text-muted)', fontWeight:500, textTransform:'uppercase', marginBottom:8}}>Team Name</div>
        <div style={{display:'flex', gap:0, marginBottom:8}}>
          <input style={{...inp, flex:1, borderRadius:'6px 0 0 6px'}} placeholder="Lakers, Celtics, Warriors…" value={rosterTeam} onChange={e=>setRosterTeam(e.target.value)} onKeyDown={e=>e.key==='Enter'&&runRoster()}
            onFocus={e=>e.currentTarget.style.borderColor='rgba(0,230,118,0.5)'}
            onBlur={e=>e.currentTarget.style.borderColor='var(--border)'}/>
          <button onClick={runRoster} disabled={loading||!rosterTeam}
            style={{background:loading||!rosterTeam?'var(--grey3)':'var(--green)', border:'none', color:loading||!rosterTeam?'var(--text-muted)':'var(--black-deep)', fontFamily:'Helvetica Neue, sans-serif', fontWeight:700, fontSize:10, letterSpacing:2, textTransform:'uppercase', padding:'0 24px', cursor:loading||!rosterTeam?'default':'pointer', borderRadius:'0 6px 6px 0', transition:'all 0.15s'}}>
            {loading ? '…' : '→'}
          </button>
        </div>
        <div style={{fontFamily:'Inter, sans-serif', fontSize:11, letterSpacing:0, color:'var(--text-muted)', lineHeight:1.6, textTransform:'none'}}>
          Enter any NBA team name to generate a complete front office analysis.
        </div>

        {/* Quick access teams */}
        <div style={{marginTop:28}}>
          <div style={{fontFamily:'Inter, sans-serif', fontSize:10, letterSpacing:2, color:'var(--text-muted)', fontWeight:500, textTransform:'uppercase', marginBottom:12}}>Quick Access</div>
          <div style={{display:'flex', flexWrap:'wrap', gap:8}}>
            {['Lakers','Celtics','Warriors','Nuggets','Bucks','Heat','Knicks','Suns'].map(t => (
              <button key={t} onClick={() => { setRosterTeam(t); }}
                style={{fontFamily:'Inter, sans-serif', fontWeight:500, fontSize:11, letterSpacing:0, textTransform:'none', padding:'6px 14px', background:'var(--grey3)', border:'1px solid var(--border)', color:'var(--white)', cursor:'pointer', borderRadius:99, transition:'all 0.15s'}}
                onMouseEnter={e => { e.currentTarget.style.borderColor='var(--green)'; e.currentTarget.style.color='var(--green)'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--white)'; }}>
                {t}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Right panel — results */}
      <div style={{padding:'32px 40px', overflowY:'auto', background:'var(--black)'}}>
        {!result && !loading && !error && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'60vh', gap:16}}>
            <div style={{fontSize:48, color:'#1a1a1a'}}>◈</div>
            <div style={{fontFamily:'Inter, sans-serif', fontSize:13, letterSpacing:0, color:'var(--text-muted)', textAlign:'center', textTransform:'none'}}>Select a team to generate front office analysis</div>
          </div>
        )}
        {loading && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'60vh', gap:16}}>
            <div style={{fontFamily:'Inter, sans-serif', fontSize:12, letterSpacing:2, color:'var(--green)', fontWeight:500}}>PIVOT COMPUTING</div>
            <Loader label=""/>
          </div>
        )}
        {error && <div className="err">{error}</div>}
        {!loading && result && (
          <div style={{maxWidth:780}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:28}}>
              <div>
                <div style={{fontSize:'clamp(24px,3vw,40px)', letterSpacing:2, fontWeight:700, lineHeight:1}}>{rosterTeam}</div>
                <div style={{fontFamily:'Inter, sans-serif', fontSize:12, letterSpacing:0, color:'var(--green)', marginTop:6, textTransform:'none', fontWeight:400}}>2025–26 Season Analysis</div>
              </div>
              <button onClick={() => window.print()} style={{background:'none', border:'1px solid var(--border)', color:'var(--text-muted)', fontFamily:'Helvetica Neue, sans-serif', fontWeight:700, fontSize:9, letterSpacing:3, textTransform:'uppercase', padding:'8px 16px', cursor:'pointer', borderRadius:4, transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--green)';e.currentTarget.style.color='var(--green)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-muted)';}}>
                Export PDF →
              </button>
            </div>

            {/* Summary stat strip */}
            <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:1, background:'var(--border)', borderRadius:8, overflow:'hidden', marginBottom:24}}>
              {[['Team','NBA 2025–26'],['Season','Active'],['Report','AI-Generated']].map(([label,val]) => (
                <div key={label} style={{background:'var(--grey)', padding:'16px 20px', textAlign:'center'}}>
                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:16, letterSpacing:1, fontWeight:700, color:'var(--white)'}}>{val}</div>
                  <div style={{fontFamily:'Inter, sans-serif', fontSize:9, letterSpacing:2, color:'var(--text-muted)', marginTop:4, textTransform:'uppercase'}}>{label}</div>
                </div>
              ))}
            </div>

            {/* Scouting Report card */}
            <FrontOfficeCard title="AI Scouting Report" accent>
              <div style={{fontFamily:'Inter, sans-serif', fontSize:14, lineHeight:1.95, letterSpacing:0, color:'var(--white)', whiteSpace:'pre-wrap', fontWeight:400, textTransform:'none'}}>
                {result.analysis}
              </div>
            </FrontOfficeCard>
          </div>
        )}
      </div>
    </div>
  );
}

function CoachMode() {
  const [games, setGames] = React.useState([]);
  const [selectedGame, setSelectedGame] = React.useState(null);
  const [myTeam, setMyTeam] = React.useState('');
  const [mode, setMode] = React.useState('adjust');
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [history, setHistory] = React.useState([]);
  const [boxScore, setBoxScore] = React.useState(null);
  const today = localDate();

  React.useEffect(() => {
    const loadGames = () => fetch(`${API}/nba/games?date=${today}&_=${Date.now()}`)
      .then(r=>r.ok?r.json():null).then(d=>setGames(d?.games||[])).catch(()=>{});
    loadGames();
    const iv = setInterval(loadGames, 10000);
    return () => clearInterval(iv);
  }, []);

  React.useEffect(() => {
    if (!selectedGame) return;
    const loadBox = () => fetch(`${API}/nba/games/${selectedGame.id}/boxscore`)
      .then(r=>r.ok?r.json():null).then(d=>setBoxScore(d)).catch(()=>{});
    loadBox();
    const iv = setInterval(loadBox, 10000);
    return () => clearInterval(iv);
  }, [selectedGame?.id]);

  const run = async () => {
    setLoading(true); setError(null);
    try {
      const endpoint = mode==='adjust' ? '/coach/adjust' : '/coach/timeout';
      const body = { game_id: selectedGame?.id, my_team: myTeam };
      const r = await fetch(`${API}${endpoint}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      setResult({...data, mode});
      setHistory(prev => [{...data, mode, timestamp:new Date().toLocaleTimeString()}, ...prev.slice(0,9)]);
    } catch(e) { setError(e.message); } finally { setLoading(false); }
  };

  return (
    <div style={{display:'grid', gridTemplateColumns:'300px 1fr 300px', minHeight:'calc(100vh - 56px)'}}>
      <div style={{borderRight:'1px solid var(--border)', background:'var(--grey)', display:'flex', flexDirection:'column', overflowY:'auto'}}>
        <div style={{padding:'20px', borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:9, letterSpacing:4, color:'#444', marginBottom:12}}>Select Game</div>
          {games.length === 0 && <div style={{fontSize:9, letterSpacing:3, color:'#333'}}>No games today</div>}
          {games.map(g => {
            const { label, type } = parseStatus(g.status);
            const sel = selectedGame?.id === g.id;
            return (
              <div key={g.id} onClick={() => { setSelectedGame(g); setMyTeam(''); setResult(null); }}
                style={{ padding:'12px 14px', marginBottom:4, cursor:'pointer', border:sel?'1px solid var(--green)':'1px solid var(--border)', background:sel?'rgba(0,255,65,0.05)':'var(--black)', transition:'all 0.1s' }}>
                <div style={{fontSize:8, letterSpacing:3, color:type==='live'?'var(--green)':'#555', marginBottom:4}}>{type==='live'?'● LIVE':label}</div>
                <div style={{fontSize:13, letterSpacing:1}}>{g.visitor_team.abbreviation} @ {g.home_team.abbreviation}</div>
                {(g.home_team_score > 0 || g.visitor_team_score > 0) && <div style={{fontSize:11, color:'var(--green)', letterSpacing:2, marginTop:2}}>{g.visitor_team_score} - {g.home_team_score}</div>}
              </div>
            );
          })}
        </div>
        {selectedGame && (
          <div style={{padding:'20px', flex:1}}>
            <div style={{fontSize:9, letterSpacing:4, color:'#444', marginBottom:12}}>My Team</div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:4, marginBottom:20}}>
              {[selectedGame.visitor_team, selectedGame.home_team].map(t => (
                <button key={t.id} onClick={() => setMyTeam(t.name)}
                  style={{ background:myTeam===t.name?'var(--green)':'var(--black)', color:myTeam===t.name?'var(--black)':'#555', border:`1px solid ${myTeam===t.name?'var(--green)':'var(--border)'}`, padding:'10px 8px', cursor:'pointer', fontSize:10, letterSpacing:2, fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontWeight:700, textTransform:'uppercase', transition:'all 0.1s' }}>
                  {t.abbreviation}
                </button>
              ))}
            </div>
            <div style={{fontSize:9, letterSpacing:4, color:'#444', marginBottom:8}}>Mode</div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:4, marginBottom:24}}>
              {[['adjust','Adjustment'],['timeout','Draw Play']].map(([id,label]) => (
                <button key={id} onClick={() => setMode(id)}
                  style={{ background:mode===id?'var(--white)':'var(--black)', color:mode===id?'var(--black)':'#555', border:`1px solid ${mode===id?'var(--white)':'var(--border)'}`, padding:'8px 4px', cursor:'pointer', fontSize:9, letterSpacing:2, fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontWeight:700, textTransform:'uppercase', transition:'all 0.1s' }}>
                  {label}
                </button>
              ))}
            </div>
            <div style={{fontSize:9, letterSpacing:3, color:'#222', marginBottom:16, lineHeight:1.8}}>
              PIVOT reads the live box score automatically — score, clock, who's hot, foul trouble. No manual input needed.
            </div>
            <button onClick={run} disabled={loading||!myTeam}
              style={{ width:'100%', padding:'14px', fontSize:11, letterSpacing:4, fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontWeight:700, textTransform:'uppercase', cursor:loading||!myTeam?'default':'pointer', border:'none', transition:'all 0.1s', background:loading?'#222':!myTeam?'#111':'var(--green)', color:loading||!myTeam?'#444':'var(--black)' }}>
              {loading ? 'PIVOT COMPUTING' : !myTeam ? 'SELECT YOUR TEAM' : mode==='adjust' ? 'GET ADJUSTMENTS' : 'DRAW THE PLAY'}
            </button>
          </div>
        )}
        {!selectedGame && <div style={{padding:'32px 20px', fontSize:9, letterSpacing:3, color:'#333', lineHeight:2}}>Select a game to activate coach mode. PIVOT reads the live box score and delivers real adjustments — no manual input required.</div>}
      </div>
      <div style={{borderRight:'1px solid var(--border)', overflowY:'auto'}}>
        {!result && !loading && !error && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'70vh', gap:16}}>
            <div style={{fontSize:'clamp(40px,6vw,80px)', letterSpacing:12, color:'var(--white)', lineHeight:1, textAlign:'center'}}>COACH<br/>MODE</div>
            <div style={{fontSize:9, letterSpacing:4, color:'#333', textAlign:'center', maxWidth:300, lineHeight:2}}>Select a game, pick your team. PIVOT reads the live situation and delivers real coaching.</div>
          </div>
        )}
        {loading && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'70vh', gap:16}}>
            <div style={{fontSize:10, letterSpacing:5, color:'var(--green)'}}>PIVOT COMPUTING</div>
            <Loader label=""/>
          </div>
        )}
        {error && <div className="err" style={{margin:24}}>{error}</div>}
        {!loading && result && (
          <div style={{padding:'40px 48px'}}>
            <div style={{display:'flex', gap:12, alignItems:'center', marginBottom:28}}>
              <div style={{fontSize:9, letterSpacing:4, color:'var(--green)'}}>{result.mode==='timeout'?'⊙ PLAY DRAWN':'⊙ ADJUSTMENTS READY'}</div>
              <div style={{fontSize:9, letterSpacing:2, color:'#333'}}>{result.my_team}</div>
              {result.time_remaining && <div style={{fontSize:9, letterSpacing:2, color:'#333'}}>Q{result.quarter} · {result.time_remaining}</div>}
            </div>
            <div style={{fontSize:15, lineHeight:2.2, letterSpacing:.5, color:'var(--white)', whiteSpace:'pre-wrap', fontWeight:400, textTransform:'none'}}>
              {result.analysis || result.play}
            </div>
          </div>
        )}
      </div>
      <div style={{overflowY:'auto', background:'var(--grey)'}}>
        {selectedGame && boxScore && boxScore.total_players > 0 && (
          <div style={{borderBottom:'1px solid var(--border)'}}>
            <div style={{padding:'14px 20px', fontSize:8, letterSpacing:4, color:'#444', borderBottom:'1px solid var(--border)'}}>
              Live Box — {selectedGame.visitor_team.abbreviation} @ {selectedGame.home_team.abbreviation}
            </div>
            <div style={{padding:'0 16px 16px'}}>
              {['away_players','home_players'].map(key => {
                const team = key==='home_players' ? boxScore.home_team : boxScore.away_team;
                const players = (boxScore[key]||[]).slice(0,6);
                return (
                  <div key={key} style={{marginTop:12}}>
                    <div style={{fontSize:8, letterSpacing:3, color:'var(--green)', marginBottom:6}}>{team?.abbreviation}</div>
                    {players.map((p,i) => (
                      <div key={i} style={{display:'flex', justifyContent:'space-between', padding:'5px 0', borderBottom:'1px solid #141414', fontSize:10}}>
                        <span style={{letterSpacing:1, fontWeight:700, fontSize:11}}>{p.player.split(' ').pop()}</span>
                        <span style={{color:'var(--green)', letterSpacing:1}}>{p.pts}pt {p.reb}rb {p.ast}as</span>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>
        )}
        <div style={{padding:'16px 20px'}}>
          <div style={{fontSize:8, letterSpacing:4, color:'#444', marginBottom:12}}>Call History</div>
          {history.length === 0 && <div style={{fontSize:9, letterSpacing:3, color:'#333'}}>No calls yet this session</div>}
          {history.map((h,i) => (
            <div key={i} style={{padding:'12px', marginBottom:6, border:'1px solid var(--border)', background:'var(--black)', cursor:'pointer'}} onClick={() => setResult(h)}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
                <span style={{fontSize:8, letterSpacing:3, color:'var(--green)'}}>{h.mode?.toUpperCase()}</span>
                <span style={{fontSize:8, letterSpacing:2, color:'#333'}}>{h.timestamp}</span>
              </div>
              <div style={{fontSize:10, letterSpacing:1, color:'#888', fontWeight:400, textTransform:'none'}}>
                {h.my_team}{h.quarter ? ` · Q${h.quarter}` : ''}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState('home');
  const [scrolled, setScrolled] = React.useState(false);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const isHome = tab === 'home';

  return (
    <>
      <nav className={scrolled || !isHome ? 'solid' : ''}>
        <div className="nav-logo" onClick={() => setTab('home')}>PIVOT</div>
        <div className="nav-tabs">
          {[['games','Games'],['players','Players'],['frontoffice','Front Office'],['coach','Coach Mode']].map(([id,label]) => (
            <button key={id} className={`nav-tab ${tab===id?'active':''}`} onClick={() => setTab(id)}>{label}</button>
          ))}
        </div>
        <button className="nav-cta" onClick={() => setTab('players')}>Try Free</button>
      </nav>
      <div style={{paddingTop: isHome ? 0 : 70, paddingBottom: 40}}>
        {tab === 'home'        && <Home onNavigate={setTab}/>}
        {tab === 'games'       && <Games/>}
        {tab === 'players'     && <Players/>}
        {tab === 'frontoffice' && <FrontOffice/>}
        {tab === 'coach'       && <CoachMode/>}
        {tab === 'analysis'    && <Analysis/>}
      </div>
      <Ticker/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  // Global cursor glow — updates CSS vars on <body> on every mousemove
  document.addEventListener('mousemove', e => {
    document.body.style.setProperty('--cursor-x', e.clientX + 'px');
    document.body.style.setProperty('--cursor-y', e.clientY + 'px');
  });
</script>
</body>
</html>
