<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PIVOT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* Global cursor glow — follows mouse across entire page */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: radial-gradient(
    280px circle at var(--cursor-x, -9999px) var(--cursor-y, -9999px),
    rgba(0,255,128,0.045),
    transparent 70%
  );
  transition: background 0.06s;
}

:root {
  --black: #0F1115;
  --black-deep: #080A0E;
  --white: #F0F2F5;
  --green: #00FF80;
  --green-dim: rgba(0,255,128,0.15);
  --grey: #161B22;
  --grey2: #1C2128;
  --grey3: #242B35;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --text-muted: #6B7280;
  --text-subtle: #374151;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
}
html, body {
  background: var(--black);
  color: var(--white);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  min-height: 100vh;
  overflow-x: hidden;
}
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 70px;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  transition: background 0.3s, border-color 0.3s;
}
nav.solid {
  background: rgba(15,17,21,0.97);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 0 var(--border), var(--shadow);
}
.nav-logo {
  font-size: 18px;
  letter-spacing: 8px;
  color: var(--white);
  cursor: pointer;
  font-weight: 700;
  user-select: none;
}
.nav-logo:hover { color: var(--green); }
.nav-tabs { display: flex; align-items: stretch; height: 70px; }
.nav-tab {
  display: flex;
  align-items: center;
  padding: 0 28px;
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.4);
  border: none;
  background: none;
  cursor: pointer;
  transition: color 0.15s;
  text-transform: uppercase;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  position: relative;
}
.nav-tab:hover { color: var(--white); }
.nav-tab.active { color: var(--white); }
.nav-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
}
.nav-cta {
  background: var(--green);
  color: var(--black);
  border: none;
  padding: 10px 24px;
  font-size: 10px;
  letter-spacing: 3px;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s;
  border-radius: 2px;
}
.nav-cta:hover { opacity: 0.85; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
@keyframes pulse-dot { 0%,80%,100%{opacity:0.15;transform:scale(0.7)} 40%{opacity:1;transform:scale(1)} }
/* ── Home / Landing ──────────────────────────────────────────────────────── */
.home-wrap {
  position: relative;
  width: 100vw;
  min-height: 100vh;
  overflow: hidden;
  background: var(--black);
  display: flex;
  align-items: center;
  justify-content: center;
}
.home-video {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0; opacity: 0.28;
  filter: grayscale(100%) contrast(1.15);
}
.home-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.9) 100%);
}
/* subtle green ambient glow at top-center */
.home-cursor-glow {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(
    700px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(0,255,128,0.07),
    transparent 70%
  );
  transition: background 0.05s;
}
.home-grid-overlay {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 50px 50px;
  -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
  mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
}
.home-hero {
  position: relative; z-index: 3;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: 0 40px;
  width: 100%;
  max-width: 900px;
}
.home-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 14px; border-radius: 99px;
  border: 1px solid rgba(0,255,128,0.35);
  background: rgba(0,255,128,0.08);
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 500; letter-spacing: 2px;
  color: var(--green); text-transform: uppercase;
  margin-bottom: 32px;
}
.home-badge-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  animation: blink 1.4s ease-in-out infinite;
  flex-shrink: 0;
}
.home-pivot-text {
  font-size: clamp(72px, 14vw, 160px);
  letter-spacing: -6px;
  color: var(--white);
  font-weight: 700;
  line-height: 0.92;
  margin-bottom: 28px;
  text-shadow: 0 0 60px rgba(0,255,128,0.12);
}
.home-tagline {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  letter-spacing: 0;
  color: rgba(255,255,255,0.5);
  font-weight: 300;
  text-transform: none;
  max-width: 560px;
  line-height: 1.7;
  margin-bottom: 44px;
  text-align: center;
}
.home-ctas { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
/* glowing primary button */
.home-cta-primary {
  position: relative;
  background: var(--black);
  color: var(--white);
  border: 1px solid rgba(0,255,128,0.5);
  padding: 14px 36px;
  font-size: 10px;
  letter-spacing: 4px;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  box-shadow: 0 0 20px rgba(0,255,128,0.15), inset 0 0 20px rgba(0,255,128,0.04);
}
.home-cta-primary:hover {
  background: rgba(0,255,128,0.08);
  border-color: var(--green);
  box-shadow: 0 0 32px rgba(0,255,128,0.3), inset 0 0 20px rgba(0,255,128,0.06);
  transform: translateY(-1px);
}
.home-cta-secondary {
  background: rgba(255,255,255,0.04);
  color: var(--white);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 14px 36px;
  font-size: 10px;
  letter-spacing: 4px;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.home-cta-secondary:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }
.home-scroll-hint {
  position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%); z-index: 3;
  font-family: 'Inter', sans-serif;
  font-size: 9px; letter-spacing: 4px; color: #333; text-transform: uppercase;
  display: flex; align-items: center; gap: 12px;
  white-space: nowrap;
}
.home-scroll-line { width: 40px; height: 1px; background: #222; }

/* ── Tech Marquee ─────────────────────────────────────────────────────────── */
.home-marquee-wrap {
  overflow: hidden;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.5);
  padding: 14px 0;
  display: flex;
}
.home-marquee-track {
  display: flex; align-items: center;
  white-space: nowrap;
  animation: ticker-scroll 35s linear infinite;
  will-change: transform;
}
.home-marquee-track:hover { animation-play-state: paused; }
.home-marquee-item {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  color: #444; padding: 0 40px;
}
.home-marquee-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); opacity: 0.6; }

/* ── Feature Cards ────────────────────────────────────────────────────────── */
.features-section {
  position: relative;
  padding: 100px 80px;
  background: var(--black);
  text-align: center;
}
@media (max-width: 768px) { .features-section { padding: 80px 24px; } }
.features-label {
  font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 500; letter-spacing: 4px;
  color: var(--green); text-transform: uppercase; margin-bottom: 20px;
}
.features-title {
  font-size: clamp(28px, 3.5vw, 48px);
  letter-spacing: -1px;
  color: var(--white);
  margin-bottom: 16px;
  line-height: 1.15;
  max-width: 640px;
  font-weight: 700;
  margin-left: auto; margin-right: auto;
}
.features-subtitle {
  font-family: 'Inter', sans-serif;
  font-size: 14px; color: #555; font-weight: 300;
  max-width: 480px; margin: 0 auto 64px; line-height: 1.7;
  text-transform: none; letter-spacing: 0;
}
.features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; text-align: left; background: var(--border); }
@media (max-width: 900px) { .features-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 600px) { .features-grid { grid-template-columns: 1fr; } }
.feature-card {
  background: var(--black);
  padding: 40px 36px;
  transition: background 0.2s;
  position: relative;
  overflow: hidden;
}
.feature-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--green);
  box-shadow: 0 0 12px rgba(0,255,128,0.5);
  transform: scaleX(0);
  transition: transform 0.25s;
  transform-origin: left;
}
.feature-card:hover::before { transform: scaleX(1); }
.feature-card:hover { background: #0a0a0a; }
/* cursor-tracking glow inside each card */
.feature-card-glow {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(
    300px circle at var(--cx, 50%) var(--cy, 50%),
    rgba(0,255,128,0.07),
    transparent 60%
  );
  opacity: 0; transition: opacity 0.3s;
}
.feature-card:hover .feature-card-glow { opacity: 1; }
.feature-num { font-size: 9px; letter-spacing: 4px; color: #2a2a2a; margin-bottom: 20px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
.feature-name { font-size: 15px; letter-spacing: 2px; color: var(--white); margin-bottom: 14px; font-weight: 700; }
.feature-desc {
  font-family: 'Inter', sans-serif;
  font-size: 13px; color: #555; font-weight: 300;
  text-transform: none; line-height: 1.8; margin-bottom: 28px; letter-spacing: 0;
}
.feature-stat { font-size: 26px; letter-spacing: -1px; color: var(--green); text-shadow: 0 0 20px rgba(0,255,128,0.25); }
.feature-stat-label { font-size: 8px; letter-spacing: 3px; color: #2a2a2a; margin-top: 4px; }

/* ── CTA Section ──────────────────────────────────────────────────────────── */
.cta-section {
  position: relative;
  padding: 120px 80px;
  background: #040404;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  overflow: hidden;
}
.cta-section::before {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 60%; height: 1px;
  background: linear-gradient(to right, transparent, rgba(0,255,128,0.4), transparent);
}
.cta-title {
  font-size: clamp(28px, 3.5vw, 48px);
  letter-spacing: -1px;
  color: var(--white); margin-bottom: 16px; line-height: 1.1; font-weight: 700;
}
.cta-sub {
  font-family: 'Inter', sans-serif;
  font-size: 14px; color: #555; font-weight: 300;
  text-transform: none; letter-spacing: 0; margin-bottom: 48px;
}
.cta-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

/* ── Footer ───────────────────────────────────────────────────────────────── */
.home-footer {
  background: var(--black);
  border-top: 1px solid var(--border);
  padding: 28px 80px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Inter', sans-serif;
  font-size: 10px; letter-spacing: 1px; color: #333;
}
.home-footer-logo { color: var(--white); font-size: 13px; letter-spacing: 6px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; }
.ticker {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 40px;
  background: var(--black);
  border-top: 2px solid var(--green);
  display: flex;
  align-items: center;
  overflow: hidden;
  z-index: 1000;
}
.ticker-label {
  flex-shrink: 0;
  background: var(--green);
  color: var(--black);
  font-size: 9px;
  letter-spacing: 3px;
  padding: 0 16px;
  height: 100%;
  display: flex; align-items: center;
  font-weight: 700; white-space: nowrap; z-index: 2;
}
.ticker-track-wrap { flex: 1; overflow: hidden; height: 100%; display: flex; align-items: center; }
.ticker-track {
  display: flex; align-items: center; white-space: nowrap;
  animation: ticker-scroll 40s linear infinite;
  will-change: transform;
}
.ticker-track:hover { animation-play-state: paused; }
@keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.ticker-item { font-size: 11px; letter-spacing: 2px; color: var(--green); padding: 0 32px; text-shadow: 0 0 8px rgba(0,255,128,0.4); white-space: nowrap; }
.ticker-sep { color: #1a1a1a; font-size: 14px; padding: 0 8px; }
.toolbar {
  height: 56px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  background: var(--grey);
}
.tb-btn {
  background: transparent; border: none;
  border-right: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 10px; letter-spacing: 3px; font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase; padding: 0 24px;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.tb-btn:hover { background: var(--grey2); color: var(--white); }
.tb-btn:disabled { color: #2a2a2a; cursor: not-allowed; }
.tb-input {
  background: transparent; border: none;
  border-right: 1px solid var(--border);
  color: var(--white);
  font-size: 11px; letter-spacing: 2px; font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase; padding: 0 20px;
  outline: none; width: 220px;
}
.tb-input::placeholder { color: #2a2a2a; }
.tb-info {
  display: flex; align-items: center; padding: 0 24px;
  font-family: 'Inter', sans-serif;
  font-size: 11px; letter-spacing: 0.5px; font-weight: 400;
  color: var(--text-muted); text-transform: none;
  margin-left: auto; border-left: 1px solid var(--border);
}
.g-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 20px;
}
.g-card2 {
  width: 420px;
  flex-shrink: 0;
  background: #111318;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.g-card2:hover {
  border-color: rgba(0,255,128,0.45);
  box-shadow: 0 8px 32px rgba(0,255,128,0.1);
}
.g-status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  letter-spacing: 2px;
  padding: 3px 10px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.1);
  color: #555;
  background: rgba(255,255,255,0.03);
  width: fit-content;
}
.g-status-badge.live {
  background: rgba(0,255,128,0.1);
  border-color: rgba(0,255,128,0.3);
  color: #00FF80;
}
.g-live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00FF80;
  animation: blink 1s infinite;
  flex-shrink: 0;
}
.g-team-sep { height: 1px; background: rgba(255,255,255,0.05); margin: 4px 0; }
.g-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}
.g-conf-pill {
  font-size: 8px;
  letter-spacing: 2px;
  color: #444;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 99px;
  padding: 2px 8px;
}
.g-box-link {
  font-size: 10px;
  letter-spacing: 2px;
  color: #00FF80;
  font-weight: 600;
}
.g-glow-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: 12px;
  background: radial-gradient(circle at var(--cx, 50%) var(--cy, 50%), rgba(0,255,128,0.04) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.2s;
}
.g-card2:hover .g-glow-overlay { opacity: 1; }
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.88);
  z-index: 2000; display: flex; align-items: center; justify-content: center;
  padding: 24px; backdrop-filter: blur(4px);
}
.modal { background: var(--grey); border: 1px solid var(--border-strong); width: 100%; max-width: 1100px; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: var(--shadow-lg); border-radius: 4px; }
.modal-header {
  display: grid; grid-template-columns: 1fr auto 1fr auto;
  align-items: center; padding: 20px 24px;
  border-bottom: 2px solid var(--white);
  position: sticky; top: 0; background: var(--grey); z-index: 10;
}
.modal-team { display: flex; flex-direction: column; }
.modal-team.home { text-align: right; }
.modal-team-city { font-size: 9px; letter-spacing: 3px; color: #555; margin-bottom: 4px; }
.modal-team-name { font-size: 28px; letter-spacing: 2px; line-height: 1; }
.modal-team-abbr { font-size: 9px; letter-spacing: 3px; color: #444; margin-top: 4px; }
.modal-score-center { text-align: center; padding: 0 24px; }
.modal-score-big { font-size: 48px; letter-spacing: 3px; color: var(--green); text-shadow: 0 0 20px rgba(0,255,128,.3); line-height: 1; }
.modal-score-vs { font-size: 11px; letter-spacing: 4px; color: #333; }
.modal-status { font-size: 9px; letter-spacing: 3px; color: var(--green); margin-top: 6px; }
.modal-close {
  background: none; border: 1px solid var(--border);
  color: var(--white); font-size: 16px; width: 32px; height: 32px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.1s; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700;
  margin-left: 16px; flex-shrink: 0; align-self: center;
}
.modal-close:hover { background: var(--white); color: var(--black); }
.modal-tabs { display: flex; border-bottom: 1px solid var(--border); }
.modal-tab {
  padding: 14px 28px; font-size: 10px; letter-spacing: 3px; color: #555;
  cursor: pointer; border: none; background: none;
  border-right: 1px solid var(--border); border-bottom: 2px solid transparent;
  transition: all 0.1s; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700; text-transform: uppercase;
}
.modal-tab:hover { color: var(--white); }
.modal-tab.active { color: var(--green); border-bottom-color: var(--green); }
.box-score { padding: 24px 32px; }
.box-team-label { font-size: 9px; letter-spacing: 4px; color: var(--green); margin-bottom: 12px; margin-top: 24px; }
.box-table { width: 100%; border-collapse: collapse; }
.box-table th { font-size: 8px; letter-spacing: 3px; color: #444; padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border); }
.box-table th:first-child { text-align: left; }
.box-table td { font-size: 11px; letter-spacing: 1px; color: var(--white); padding: 10px 10px; text-align: right; border-bottom: 1px solid #141414; font-weight: 400; }
.box-table td:first-child { text-align: left; font-weight: 700; font-size: 12px; }
.box-table tr:hover td { background: var(--grey); }
.box-pts { color: var(--green) !important; font-weight: 700 !important; font-size: 13px !important; }

<body>
<div id="root"></div>
<script type="text/babel">
const API = "https://web-production-5f6e1.up.railway.app/api/v1";

function localDate(offset = 0) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function getYesterday() { return localDate(-1); }
function getTomorrow()  { return localDate(1); }

function Loader({ label = 'LOADING' }) {
  return <div className="loader"><div className="loader-bar"/>{label}</div>;
}

function parseStatus(s) {
  if (!s) return { label: 'SCHEDULED', type: 'sched' };
  const l = s.toLowerCase();
  if (l.includes('final') || l === 'complete') return { label: 'FINAL', type: 'final' };
  if (l.includes('qtr') || l.includes('half') || l === 'in progress') return { label: 'LIVE', type: 'live' };
  try {
    const d = new Date(s);
    if (!isNaN(d)) return { label: d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' }), type: 'sched' };
  } catch(e) {}
  return { label: s.substring(0,18), type: 'sched' };
}

function Ticker() {
  const [scores, setScores] = React.useState([]);
  const [news, setNews] = React.useState([]);

  React.useEffect(() => {
    const today = localDate();
    const loadScores = () =>
      fetch(`${API}/nba/games?date=${today}&_=${Date.now()}`)
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (!data?.games?.length) return;
          setScores(data.games.map(g => {
            const hasScore = g.home_team_score > 0 || g.visitor_team_score > 0;
            const { label, type } = parseStatus(g.status);
            const liveTag = type === 'live' ? `● ${label}  ` : '';
            if (hasScore) return `${liveTag}${g.visitor_team.abbreviation} ${g.visitor_team_score}–${g.home_team_score} ${g.home_team.abbreviation}`;
            try {
              const d = new Date(g.status);
              const t = isNaN(d) ? g.status : d.toLocaleTimeString([], { hour:'numeric', minute:'2-digit', timeZoneName:'short' });
              return `${g.visitor_team.abbreviation} @ ${g.home_team.abbreviation}  ${t}`;
            } catch { return `${g.visitor_team.abbreviation} @ ${g.home_team.abbreviation}`; }
          }));
        }).catch(() => {});

    const loadNews = () =>
      fetch(`${API}/nba/news`)
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d?.headlines?.length) setNews(d.headlines.slice(0, 12)); })
        .catch(() => {});

    loadScores();
    loadNews();
    const scoreIv = setInterval(loadScores, 30000);
    const newsIv = setInterval(loadNews, 300000); // refresh news every 5 min
    return () => { clearInterval(scoreIv); clearInterval(newsIv); };
  }, []);

  // Interleave: score, news, score, news...
  const interleaved = React.useMemo(() => {
    const out = [];
    const maxLen = Math.max(scores.length, news.length);
    for (let i = 0; i < maxLen; i++) {
      if (i < scores.length) out.push({ text: scores[i], type: 'score' });
      if (i < news.length)   out.push({ text: news[i],   type: 'news'  });
    }
    if (!out.length) {
      return [
        { text: 'PIVOT — NBA INTELLIGENCE PLATFORM', type: 'news' },
        { text: "TODAY'S SLATE LOADING", type: 'score' },
        { text: 'GAMES · ANALYSIS · PLAYERS · COACH MODE', type: 'news' },
        { text: 'POWERED BY PIVOT', type: 'score' },
      ];
    }
    return out;
  }, [scores, news]);

  const doubled = [...interleaved, ...interleaved];

  return (
    <div className="ticker">
      <div className="ticker-label">LIVE WIRE</div>
      <div className="ticker-track-wrap">
        <div className="ticker-track">
          {doubled.map((item, i) => (
            <React.Fragment key={i}>
              <span className="ticker-item" style={item.type === 'score' ? {color:'var(--green)', textShadow:'0 0 8px rgba(0,255,128,0.5)'} : {color:'rgba(255,255,255,0.75)', textShadow:'none', fontWeight:700, letterSpacing:'1.5px'}}>
                {item.text}
              </span>
              <span className="ticker-sep">{item.type === 'score' ? '◆' : '·'}</span>
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

function Home({ onNavigate }) {
  const audioRef = React.useRef(null);
  const wrapRef = React.useRef(null);

  React.useEffect(() => {
    const a = audioRef.current;
    if (!a) return;
    const unlock = () => { a.play().catch(() => {}); document.removeEventListener('click', unlock); };
    document.addEventListener('click', unlock);
    return () => document.removeEventListener('click', unlock);
  }, []);

  const handleMouseMove = (e) => {
    const rect = wrapRef.current.getBoundingClientRect();
    wrapRef.current.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
    wrapRef.current.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
  };

  const FEATURES = [
    { num:'01', name:'Live Game Engine',    desc:'PIVOT pulls live scoring, play-by-play, and full box scores from every NBA game simultaneously. Auto-syncs every 30 seconds — no manual refresh, no stale data.',   stat:'30s',   statLabel:'Auto-Refresh' },
    { num:'02', name:'AI Analysis',         desc:'PIVOT runs every query through Claude, delivering structured breakdowns of matchups, slates, and player performance in under 15 seconds. No filler — just signal.',   stat:'~15s',  statLabel:'Response Time' },
    { num:'03', name:'Coach Mode',          desc:'PIVOT reads the live box score in real time and returns tactical adjustments, timeout plays, and lineup calls in seconds. Built for the 20-second huddle.',            stat:'20s',   statLabel:'Huddle Window' },
    { num:'04', name:'Player Intelligence', desc:'PIVOT profiles every player across offense, defense, financials, and off-court factors — 8-stat visual grids with last-10-game trend lines built in.',               stat:'8',     statLabel:'Stat Dimensions' },
    { num:'05', name:'Front Office AI',     desc:'PIVOT surfaces cap exposure, salary leverage, and roster construction gaps for all 30 teams using live 2025-26 data. Built for GMs who move before the market does.',stat:'30',    statLabel:'Teams Covered' },
    { num:'06', name:'Export Ready',        desc:'Every PIVOT analysis exports to a clean, shareable PDF in one click. Send professional-grade intelligence to your staff, front office, or investors instantly.',      stat:'1-Click',statLabel:'PDF Export' },
  ];
  const MARQUEE_ITEMS = [
    'Powered by PIVOT', 'Live Box Scores', 'Real-Time Data',
    'Coach Mode', 'Player Intelligence', 'Front Office AI',
    'Powered by PIVOT', 'Live Box Scores', 'Real-Time Data',
    'Coach Mode', 'Player Intelligence', 'Front Office AI',
  ];

  return (
    <div>
      {/* ── Hero ── */}
      <div className="home-wrap" ref={wrapRef} onMouseMove={handleMouseMove}>
        <audio ref={audioRef} src="/static/bg.mp4" loop muted preload="auto"/>
        <video className="home-video" src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260309_042944_4a2205b7-b061-490a-852b-92d9e9955ce9.mp4" autoPlay loop muted playsInline/>
        <div className="home-overlay"/>
        <div className="home-cursor-glow"/>
        <div className="home-grid-overlay"/>
        <div className="home-hero">
          <div className="home-pivot-text">PIVOT</div>
          <div className="home-tagline">
            NBA intelligence for coaches, front offices, and analysts who refuse to guess.
          </div>
          <div className="home-ctas">
            <button className="home-cta-primary" onClick={() => onNavigate('games')}>View Today's Games →</button>
            <button className="home-cta-secondary" onClick={() => onNavigate('players')}>Player Analysis</button>
          </div>
        </div>
        <div className="home-scroll-hint"><div className="home-scroll-line"/>Scroll to Explore</div>
      </div>

      {/* ── Marquee ── */}
      <div className="home-marquee-wrap">
        <div className="home-marquee-track">
          {MARQUEE_ITEMS.map((item, i) => (
            <span key={i} className="home-marquee-item">
              <span className="home-marquee-dot"/>
              {item}
            </span>
          ))}
        </div>
      </div>

      {/* ── Features ── */}
      <div className="features-section">
        <div className="features-label">Platform Features</div>
        <div className="features-title">Precision at every level.</div>
        <div className="features-subtitle">
          Built for coaches, GMs, and analysts who demand actionable answers — not just summaries.
        </div>
        <div className="features-grid">
          {FEATURES.map(f => (
            <div key={f.num} className="feature-card"
              onMouseMove={e => {
                const r = e.currentTarget.getBoundingClientRect();
                e.currentTarget.style.setProperty('--cx', `${e.clientX - r.left}px`);
                e.currentTarget.style.setProperty('--cy', `${e.clientY - r.top}px`);
              }}>
              <div className="feature-card-glow"/>
              <div className="feature-num">{f.num}</div>
              <div className="feature-name">{f.name}</div>
              <div className="feature-desc">{f.desc}</div>
              <div className="feature-stat">{f.stat}</div>
              <div className="feature-stat-label">{f.statLabel}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── CTA ── */}
      <div className="cta-section">
        <div className="features-label">Get Started</div>
        <div className="cta-title">Ready to Outpace the Game?</div>
        <div className="cta-sub">Join coaches and front offices already using PIVOT.</div>
        <div className="cta-btns">
          <button className="home-cta-primary" onClick={() => onNavigate('games')}>Open Live Games →</button>
          <button className="home-cta-secondary" onClick={() => onNavigate('coach')}>Try Coach Mode</button>
        </div>
      </div>

      {/* ── Footer ── */}
      <div className="home-footer">
        <div className="home-footer-logo">PIVOT</div>
        <div>© 2026 PIVOT Analytics. All rights reserved.</div>
      </div>
    </div>
  );
}

function GameModal({ game, onClose }) {
  const [boxScore, setBoxScore] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [activeTab, setActiveTab] = React.useState('boxscore');
  const { label, type } = parseStatus(game.status);
  const hasScore = game.home_team_score > 0 || game.visitor_team_score > 0;

  React.useEffect(() => {
    const load = async () => {
      setLoading(true);
      try {
        const r = await fetch(`${API}/nba/games/${game.id}/boxscore`);
        if (r.ok) setBoxScore(await r.json());
      } catch(e) {} finally { setLoading(false); }
    };
    load();
    if (type === 'live') { const iv = setInterval(load, 10000); return () => clearInterval(iv); }
  }, [game.id]);

  React.useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const StatTable = ({ players, teamName }) => (
    <div>
      <div className="box-team-label">{teamName}</div>
      <table className="box-table">
        <thead><tr>
          <th style={{textAlign:'left', minWidth:160}}>Player</th>
          <th>MIN</th><th>PTS</th><th>REB</th><th>AST</th>
          <th>STL</th><th>BLK</th><th>FG</th><th>3P</th><th>FT</th><th>TO</th>
        </tr></thead>
        <tbody>
          {players.map((p,i) => (
            <tr key={i}>
              <td>{p.player} <span style={{fontSize:9, color:'#444', marginLeft:6}}>{p.pos}</span></td>
              <td>{p.min}</td>
              <td className="box-pts">{p.pts}</td>
              <td>{p.reb}</td><td>{p.ast}</td><td>{p.stl}</td><td>{p.blk}</td>
              <td style={{fontSize:10}}>{p.fg}</td>
              <td style={{fontSize:10}}>{p.fg3}</td>
              <td style={{fontSize:10}}>{p.ft}</td>
              <td>{p.to}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  return (
    <div className="modal-backdrop" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-team">
            <div className="modal-team-city">{game.visitor_team.city}</div>
            <div className="modal-team-name">{game.visitor_team.name.split(' ').pop()}</div>
            <div className="modal-team-abbr">{game.visitor_team.abbreviation}</div>
          </div>
          <div className="modal-score-center">
            {hasScore ? <div className="modal-score-big">{game.visitor_team_score} - {game.home_team_score}</div> : <div className="modal-score-vs">VS</div>}
            <div className="modal-status">{type==='live' ? <span className="live-badge">● LIVE</span> : label}</div>
          </div>
          <div className="modal-team home">
            <div className="modal-team-city">{game.home_team.city}</div>
            <div className="modal-team-name">{game.home_team.name.split(' ').pop()}</div>
            <div className="modal-team-abbr">{game.home_team.abbreviation}</div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div>
          <div className="modal-tabs">
            <button className={`modal-tab ${activeTab==='boxscore'?'active':''}`} onClick={() => setActiveTab('boxscore')}>Box Score</button>
            <button className={`modal-tab ${activeTab==='info'?'active':''}`} onClick={() => setActiveTab('info')}>Game Info</button>
          </div>
          {activeTab === 'boxscore' && (
            <div className="box-score">
              {loading && <Loader label="PIVOT COMPUTING"/>}
              {!loading && (!boxScore || boxScore.total_players === 0) && (
                <div style={{padding:'40px', fontSize:10, letterSpacing:4, color:'#333', textAlign:'center'}}>Box Score Not Available</div>
              )}
              {!loading && boxScore && boxScore.total_players > 0 && (
                <>
                  <StatTable players={boxScore.away_players||[]} teamName={`${game.visitor_team.city} ${game.visitor_team.name} (Away)`}/>
                  <StatTable players={boxScore.home_players||[]} teamName={`${game.home_team.city} ${game.home_team.name} (Home)`}/>
                </>
              )}
            </div>
          )}
          {activeTab === 'info' && (
            <div style={{padding:'32px 40px'}}>
              {[
                {k:'Home Team', v:`${game.home_team.city} ${game.home_team.name}`},
                {k:'Away Team', v:`${game.visitor_team.city} ${game.visitor_team.name}`},
                {k:'Conference', v:`${game.home_team.conference} vs ${game.visitor_team.conference}`},
                {k:'Division', v:`${game.home_team.division} vs ${game.visitor_team.division}`},
                {k:'Date', v:game.date},
                {k:'Status', v:label},
                {k:'Game ID', v:game.id},
              ].map(row => (
                <div key={row.k} style={{display:'flex', borderBottom:'1px solid var(--border)', padding:'14px 0', gap:32}}>
                  <div style={{fontSize:9, letterSpacing:3, color:'#444', width:180, flexShrink:0}}>{row.k}</div>
                  <div style={{fontSize:12, letterSpacing:2}}>{row.v}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function teamLogoUrl(abbr) {
  const id = ESPN_TEAM_IDS[abbr];
  return id ? `https://a.espn.com/combiner/i?img=/i/teamlogos/nba/500/${abbr.toLowerCase()}.png&h=80&w=80` : null;

function TeamRow({ team, score, isLive, hasScore }) {
  const [logoErr, setLogoErr] = React.useState(false);
  const logoUrl = teamLogoUrl(team.abbreviation);
  return (
    <div style={{display:'flex', alignItems:'center', gap:12, padding:'10px 0'}}>

        const all = [...(data.away_players||[]), ...(data.home_players||[])];
        const top = all
          .filter(p => p.pts > 0)

function PlayersCanvas({ dimmed }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    let animId;
    let pulses = [];
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    const N = 65;
    const pts = Array.from({length: N}, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.22,
      vy: (Math.random() - 0.5) * 0.22,
      r: Math.random() * 1.3 + 0.4,
    }));
    const iv = setInterval(() => {
      const p = pts[Math.floor(Math.random() * pts.length)];
      pulses.push({ x: p.x, y: p.y, r: 0, alpha: 0.75 });
    }, 2200);
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pts.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      });
      for (let i = 0; i < pts.length; i++) {
        for (let j = i+1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < 145) {
            ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y);
            ctx.strokeStyle = `rgba(0,255,128,${0.045*(1-d/145)})`; ctx.lineWidth = 0.6; ctx.stroke();
          }
        }
      }
      pts.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,255,128,0.25)'; ctx.fill();
      });
      pulses = pulses.filter(p => p.alpha > 0.015);
      pulses.forEach(p => {
        p.r += 1.4; p.alpha *= 0.964;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0,255,128,${p.alpha*0.55})`; ctx.lineWidth = 0.9; ctx.stroke();
        if (p.r < 30) {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r*0.3, 0, Math.PI*2);
          ctx.fillStyle = `rgba(0,255,128,${p.alpha*0.15})`; ctx.fill();
        }
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); clearInterval(iv); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={canvasRef} style={{position:'fixed', top:70, left:0, right:0, bottom:40, zIndex:0, pointerEvents:'none', opacity: dimmed ? 0.06 : 0.45, transition:'opacity 1.6s ease'}}/>;
}

function TrendBar({ val, avg, maxVal, label, isPct }) {
  const pct = (v) => v != null ? `${(v*100).toFixed(1)}%` : '-';
  const display = isPct ? pct(val) : val;
  const barH = maxVal > 0 ? Math.min(100, (val / maxVal) * 100) : 0;
  const avgH = maxVal > 0 ? Math.min(100, (avg / maxVal) * 100) : 0;
  const up = val >= avg;
  const color = up ? 'var(--green)' : '#ef4444';
  return (
    <div style={{textAlign:'center', flex:1, padding:'0 4px'}}>
      <div style={{height:52, position:'relative', display:'flex', alignItems:'flex-end', justifyContent:'center', marginBottom:8}}>
        <div style={{width:24, background:color, opacity:0.75, height:`${barH}%`, minHeight:2, borderRadius:'3px 3px 0 0', transition:'height 0.8s ease', position:'relative', zIndex:1}}/>
        <div style={{position:'absolute', bottom:`${avgH}%`, left:'10%', right:'10%', borderTop:'1px dashed rgba(255,255,255,0.25)', zIndex:2}}/>
      </div>
      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:15, fontWeight:700, color, letterSpacing:-0.5}}>{display != null ? display : '-'}</div>
      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:2, color:'var(--text-muted)', marginTop:4, textTransform:'uppercase'}}>{label}</div>
      {val!=null && avg!=null && (
        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color, marginTop:2, fontWeight:700}}>
          {up ? '+' : ''}{isPct ? `${((val-avg)*100).toFixed(1)}%` : `${(val-avg).toFixed(1)}`}
        </div>
      )}
    </div>
  );
}

    if (!playerId) return;
    setLoading(true); setError(null); setResult(null); setSectionData({}); setExpandedSection(null); setShowSugg(false);
    try {
      const resp = await fetch(`${API}/analysis/player/stream?player_id=${playerId}&season=2025`);
      if (!resp.ok) throw new Error(await resp.text());
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let analysisText = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let evt;
          try { evt = JSON.parse(line.slice(6)); } catch { continue; }
          if (evt.type === 'error') throw new Error(evt.message);
          if (evt.type === 'meta') {
            if (evt.player?.error) throw new Error(evt.player.error);
            setResult({ player: evt.player, averages: evt.averages, last_10: evt.last_10, games_played: evt.games_played, analysis: '' });
            setLoading(false);
          } else if (evt.type === 'chunk') {
            analysisText += evt.text;
            setResult(prev => prev ? { ...prev, analysis: analysisText } : prev);
          }
        }
      }
    } catch(e) { setError(e.message); setLoading(false); }
  };

                    {k:'fg_pct', avg:result.averages.fg_pct, max:0.7, lbl:'FG%', isPct:true},
                    {k:'fg3_pct', avg:result.averages.fg3_pct, max:0.6, lbl:'3P%', isPct:true},
                  ].map(({k,avg,max,lbl,isPct}) => (
                    <TrendBar key={k} val={result.last_10[k]} avg={avg} maxVal={max} label={lbl} isPct={isPct} />
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Deep Dive */}
          <div style={{padding:'0 52px'}}>

                      <div style={{fontSize:10, color:'var(--text-muted)', transform:expandedSection===s.id?'rotate(180deg)':'none', transition:'transform 0.2s'}}>▼</div>
                    </div>
                  </div>
                  {expandedSection === s.id && (
                    <div style={{padding:'24px 28px 28px', background:'rgba(12,14,18,0.6)', borderTop:'1px solid var(--border)', backdropFilter:'blur(8px)'}}>
                      {sectionLoading[s.id] && (

                          {[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:'50%',background:'var(--green)',animation:`pulse-dot 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}
                        </div>

                      {!sectionLoading[s.id] && sectionData[s.id] && (
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:14, lineHeight:1.95, letterSpacing:0, color:'rgba(255,255,255,0.82)', whiteSpace:'pre-wrap', fontWeight:700, textTransform:'none', maxWidth:900}}>
                          {sectionData[s.id]}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
        );
      })()}

      {/* ── No Stats Error ── */}
      {!loading && result?.error && (
        <div style={{position:'relative', zIndex:1, padding:'48px 52px'}}>
          {result.player && (
            <div style={{marginBottom:24}}>
              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:'clamp(32px,4vw,60px)', letterSpacing:-1, lineHeight:1, fontWeight:700, marginBottom:10}}>
                {result.player.first_name} {result.player.last_name}
              </div>
              <div style={{display:'flex', alignItems:'center', gap:10}}>
                <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:10, letterSpacing:3, fontWeight:700, color:'var(--green)', background:'rgba(0,255,128,0.08)', border:'1px solid rgba(0,255,128,0.2)', padding:'3px 10px', borderRadius:3}}>{result.player.team?.abbreviation||'—'}</span>
                <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, color:'var(--text-muted)', textTransform:'none', letterSpacing:0}}>{result.player.position||'—'}</span>
              </div>

          )}
          <div style={{background:'rgba(22,27,34,0.6)', border:'1px solid var(--border)', borderRadius:8, padding:'20px 24px', maxWidth:500, backdropFilter:'blur(8px)'}}>
            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, color:'var(--text-muted)', textTransform:'none', lineHeight:1.7, letterSpacing:0}}>{result.error}</div>
          </div>
        </div>
      )}
    </div>
  );
}

}


function CourtDiagram({ diagram }) {
  if (!diagram) return null;
  const W = 380, H = 320;
  const toX = p => p / 100 * W;
  const toY = p => p / 100 * H;

  // Hardcoded court pixel coordinates (NBA dimensions scaled to 380×320)
  const BX = 190, BY = 284;           // basket center
  const KEY_L = 129, KEY_R = 251;
  const KEY_TOP = 190, BASELINE = 292;
  const FT_R = 41;
  const C3L = 23, C3R = 357, C3Y = 225;

  const players = diagram.p || [];
  const moves   = diagram.moves || [];
  const ball    = diagram.ball;

  const psvg = {};
  players.forEach(p => { psvg[p.n] = [toX(p.x), toY(p.y)]; });

  const curvedPath = (sx, sy, tx, ty) => {
    const mx = (sx + tx) / 2 + (ty - sy) * 0.25;
    const my = (sy + ty) / 2 - (tx - sx) * 0.25;
    return `M ${sx} ${sy} Q ${mx} ${my} ${tx} ${ty}`;
  };

  return (
    <svg width={W} height={H} style={{display:'block', background:'#070A0E', borderRadius:3}}>
      <defs>
        <marker id="arr-cut"  viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#00FF80"/></marker>
        <marker id="arr-ball" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#FFB800"/></marker>
        <marker id="arr-scr"  viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#FFB800"/></marker>
      </defs>

      {/* Paint */}
      <rect x={KEY_L} y={KEY_TOP} width={KEY_R - KEY_L} height={BASELINE - KEY_TOP}
        fill="rgba(0,80,180,0.07)" stroke="rgba(255,255,255,0.18)" strokeWidth={1.5}/>

      {/* FT circle top (solid) */}
      <path d={`M ${KEY_L} ${KEY_TOP} A ${FT_R} ${FT_R} 0 0 1 ${KEY_R} ${KEY_TOP}`}
        fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth={1.5}/>
      {/* FT circle bottom (dashed) */}
      <path d={`M ${KEY_L} ${KEY_TOP} A ${FT_R} ${FT_R} 0 0 0 ${KEY_R} ${KEY_TOP}`}
        fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={1.5} strokeDasharray="5,4"/>

      {/* 3pt corners */}
      <line x1={C3L} y1={BASELINE} x2={C3L} y2={C3Y} stroke="rgba(255,255,255,0.18)" strokeWidth={1.5}/>
      <line x1={C3R} y1={BASELINE} x2={C3R} y2={C3Y} stroke="rgba(255,255,255,0.18)" strokeWidth={1.5}/>

      {/* 3pt arc */}
      <path d={`M ${C3L} ${C3Y} A 180 162 0 0 1 ${C3R} ${C3Y}`}
        fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth={1.5}/>

      {/* Restricted area */}
      <path d={`M ${BX-30} ${BASELINE} A 30 30 0 0 1 ${BX+30} ${BASELINE}`}
        fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth={1.5}/>

      {/* Backboard */}
      <line x1={167} y1={292} x2={213} y2={292} stroke="rgba(255,140,0,0.75)" strokeWidth={2.5}/>

      {/* Basket ring */}
      <circle cx={BX} cy={BY} r={9} fill="none" stroke="rgba(255,140,0,0.75)" strokeWidth={2}/>

      {/* Baseline */}
      <line x1={0} y1={BASELINE} x2={W} y2={BASELINE} stroke="rgba(255,255,255,0.1)" strokeWidth={1}/>

      {/* Ball pass */}
      {ball && psvg[ball.from] && psvg[ball.to] && (
        <line
          x1={psvg[ball.from][0]} y1={psvg[ball.from][1]}
          x2={psvg[ball.to][0]}   y2={psvg[ball.to][1]}
          stroke="#FFB800" strokeWidth={2} strokeDasharray="8,5"
          markerEnd="url(#arr-ball)" opacity={0.9}/>
      )}

      {/* Moves */}
      {moves.map((m, i) => {
        if (!psvg[m.n]) return null;
        const [sx, sy] = psvg[m.n];
        const tx2 = toX(m.tx), ty2 = toY(m.ty);
        if (m.type === 'screen') {
          return (
            <g key={i}>
              <line x1={sx} y1={sy} x2={tx2} y2={ty2} stroke="#FFB800" strokeWidth={1.5} markerEnd="url(#arr-scr)"/>
              <line x1={tx2-10} y1={ty2} x2={tx2+10} y2={ty2} stroke="#FFB800" strokeWidth={3}/>
            </g>
          );
        }
        return (
          <path key={i} d={curvedPath(sx, sy, tx2, ty2)}
            fill="none" stroke="#00FF80" strokeWidth={1.5}
            markerEnd="url(#arr-cut)"/>
        );
      })}

      {/* Players */}
      {players.map(p => {
        const [px2, py2] = psvg[p.n] || [0, 0];
        const isReceiver = ball && ball.to === p.n;
        const posLabel = {1:'PG', 2:'SG', 3:'SF', 4:'PF', 5:'C'}[p.n] || p.n;
        const nameLabel = p.name ? p.name.split(' ').slice(-1)[0].slice(0, 6).toUpperCase() : null;
        return (
          <g key={p.n}>
            {isReceiver && <circle cx={px2} cy={py2} r={22} fill="rgba(0,255,128,0.08)"/>}
            <circle cx={px2} cy={py2} r={14} fill="#0D1117"
              stroke={isReceiver ? '#00FF80' : 'rgba(0,255,128,0.55)'}
              strokeWidth={isReceiver ? 2.5 : 1.5}/>
            <text x={px2} y={py2+5} textAnchor="middle"
              fill={isReceiver ? '#00FF80' : 'rgba(0,255,128,0.75)'}
              fontSize={12} fontWeight="bold" fontFamily="Helvetica Neue, Helvetica, Arial, sans-serif">{p.n}</text>
            <text x={px2} y={py2+27} textAnchor="middle"
              fill={isReceiver ? 'rgba(0,255,128,0.9)' : 'rgba(255,255,255,0.4)'}
              fontSize={8} fontWeight="600" fontFamily="Helvetica Neue, Helvetica, Arial, sans-serif" letterSpacing="1">{nameLabel || posLabel}</text>
          </g>
        );
      })}
    </svg>
  );
}

function CoachGameCard({ g, onSelect }) {
  const { label, type } = parseStatus(g.status);
  const hasScore = g.home_team_score > 0 || g.visitor_team_score > 0;
  const isLive = type === 'live';

  const handleMouseMove = (e) => {
    const card = e.currentTarget;
    const rect = card.getBoundingClientRect();
    card.style.setProperty('--cx', ((e.clientX - rect.left) / rect.width * 100).toFixed(1) + '%');
    card.style.setProperty('--cy', ((e.clientY - rect.top) / rect.height * 100).toFixed(1) + '%');
  };

  return (
    <div className="g-card2" onClick={() => onSelect(g)} onMouseMove={handleMouseMove} style={{cursor:'pointer'}}>
      <div className="g-glow-overlay"/>

      <div className={`g-status-badge${isLive ? ' live' : ''}`}>
        {isLive && <span className="g-live-dot"/>}
        {isLive ? 'LIVE' : label}
      </div>

      <div>
        <TeamRow team={g.visitor_team} score={g.visitor_team_score} isLive={isLive} hasScore={hasScore}/>
        <div className="g-team-sep"/>
        <TeamRow team={g.home_team} score={g.home_team_score} isLive={isLive} hasScore={hasScore}/>
      </div>

      <div className="g-card-footer" style={{marginTop:'auto'}}>
        <span className="g-conf-pill">{[g.home_team?.conference, g.home_team?.division].filter(Boolean).join(' · ')}</span>
        <div style={{display:'inline-flex', alignItems:'center', gap:6, background:'rgba(0,255,128,0.06)', border:'1px solid rgba(0,255,128,0.2)', borderRadius:3, padding:'7px 14px'}}>
          <div style={{width:4, height:4, borderRadius:'50%', background:'var(--green)', opacity:0.8}}/>
          <span style={{fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontSize:9, letterSpacing:3, fontWeight:700, color:'var(--green)', textTransform:'uppercase'}}>Coach Mode</span>
        </div>
      </div>
    </div>
  );
}

function CoachMode() {
  const [games, setGames] = React.useState([]);
  const [selectedGame, setSelectedGame] = React.useState(null);
  const [myTeam, setMyTeam] = React.useState('');
  const [mode, setMode] = React.useState('adjust');
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [history, setHistory] = React.useState([]);
  const [boxScore, setBoxScore] = React.useState(null);
  const today = localDate();

  React.useEffect(() => {
    const load = () => fetch(`${API}/nba/games?date=${today}&_=${Date.now()}`)
      .then(r => r.ok ? r.json() : null).then(d => setGames(d?.games || [])).catch(() => {});
    load();
    const iv = setInterval(load, 15000);
    return () => clearInterval(iv);
  }, []);

  React.useEffect(() => {
    if (!selectedGame) return;
    const load = () => fetch(`${API}/nba/games/${selectedGame.id}/boxscore`)
      .then(r => r.ok ? r.json() : null).then(d => setBoxScore(d)).catch(() => {});
    load();
    const iv = setInterval(load, 10000);
    return () => clearInterval(iv);
  }, [selectedGame?.id]);

  const run = async () => {
    setLoading(true); setError(null);
    try {
      const endpoint = mode === 'adjust' ? '/coach/adjust' : '/coach/timeout';
      const r = await fetch(`${API}${endpoint}`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ game_id: selectedGame?.id, my_team: myTeam }),
      });
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      setResult({...data, mode});
      setHistory(prev => [{...data, mode, timestamp: new Date().toLocaleTimeString()}, ...prev.slice(0, 9)]);
    } catch(e) { setError(e.message); } finally { setLoading(false); }
  };

  // Heat class for box score
  const heatClass = (pts, minStr) => {
    const min = parseInt(minStr) || 0;
    if (min < 2) return 'heat-cold';
    if (pts >= 20) return 'heat-fire';
    if (pts >= 15) return 'heat-hot';
    if (pts >= 10) return 'heat-warm';
    if (pts >= 5)  return 'heat-ok';
    return 'heat-cold';
  };

  const formatName = n => {
    if (!n) return '—';
    const parts = n.trim().split(' ');
    if (parts.length <= 1) return parts[0];
    const last = parts[parts.length - 1];
    return ['Jr','Jr.','Sr','Sr.','II','III','IV'].includes(last)
      ? `${parts[parts.length - 2]} ${last}` : last;
  };

  const gameStatus = selectedGame ? (() => {
    const { label, type } = parseStatus(selectedGame.status);
    const sa = selectedGame.visitor_team_score, sb = selectedGame.home_team_score;
    const hasScore = sa > 0 || sb > 0;
    return {
      statusLabel: type === 'live' ? `● ${label}` : label,
      isLive: type === 'live',
      scoreStr: hasScore ? `${selectedGame.visitor_team.abbreviation} ${sa} — ${sb} ${selectedGame.home_team.abbreviation}` : `${selectedGame.visitor_team.abbreviation} @ ${selectedGame.home_team.abbreviation}`,
    };
  })() : null;

  // Game grid view — shown before a game is selected
  if (!selectedGame) {
    return (
      <div style={{padding:'40px 32px 80px', maxWidth:1200, margin:'0 auto'}}>
        <div style={{display:'flex', alignItems:'center', gap:16, marginBottom:32}}>
          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:'clamp(28px,4vw,48px)', fontWeight:900, letterSpacing:-1, color:'var(--white)', lineHeight:1}}>COACH MODE</div>
          <div style={{flex:1, height:1, background:'rgba(255,255,255,0.05)'}}/>
          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:4, color:'rgba(0,255,128,0.9)', textTransform:'uppercase', fontWeight:700}}>Select a game to begin</div>
        </div>

        {games.length === 0 ? (
          <div style={{textAlign:'center', padding:'80px 0', fontFamily:'Helvetica Neue, sans-serif', fontSize:11, letterSpacing:4, color:'rgba(255,255,255,0.15)', textTransform:'uppercase'}}>No games scheduled today</div>
        ) : (
          <div className="g-grid">
            {games.map(g => (
              <CoachGameCard key={g.id} g={g} onSelect={g => { setSelectedGame(g); setMyTeam(''); setResult(null); setError(null); }}/>
            ))}
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="war-room war-room-grid" style={{display:'grid', gridTemplateColumns:'22% 1fr 22%', minHeight:'calc(100vh - 56px)'}}>

      {/* ── Left: Command Panel ── */}
      <div style={{borderRight:'1px solid var(--border)', background:'rgba(0,0,0,0.4)', display:'flex', flexDirection:'column', overflowY:'auto'}}>
        <div style={{padding:'16px', borderBottom:'1px solid var(--border)'}}>
          {/* Back button */}
          <button onClick={() => { setSelectedGame(null); setResult(null); setError(null); setHistory([]); }}
            style={{display:'flex', alignItems:'center', gap:6, background:'transparent', border:'1px solid var(--border)', color:'var(--text-muted)', cursor:'pointer', padding:'7px 12px', borderRadius:4, marginBottom:16, fontFamily:'Helvetica Neue, sans-serif', fontSize:10, letterSpacing:2, fontWeight:700, transition:'all 0.15s', width:'100%'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--border-strong)';e.currentTarget.style.color='var(--white)';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-muted)';}}>
            ← All Games
          </button>

          {/* Selected game summary */}
          <div style={{padding:'12px 14px', borderRadius:6, border:'1px solid rgba(0,255,128,0.3)', background:'rgba(0,255,128,0.04)', marginBottom:16}}>
            {(() => { const {label,type} = parseStatus(selectedGame.status); const isLive = type==='live'; return (
              <>
                <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:6}}>
                  {isLive && <span style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',display:'inline-block',animation:'live-ping 1.2s ease-out infinite'}}/>}
                  <span style={{fontSize:7,letterSpacing:3,color:isLive?'var(--green)':'#555',fontFamily:'Helvetica Neue, sans-serif',fontWeight:700,textTransform:'uppercase'}}>{isLive?'LIVE':label}</span>
                </div>
                <div style={{fontSize:15,letterSpacing:1,fontFamily:'Helvetica Neue, sans-serif',fontWeight:700,color:'#fff'}}>
                  {selectedGame.visitor_team.abbreviation} <span style={{color:'rgba(255,255,255,0.82)'}}>@</span> {selectedGame.home_team.abbreviation}

                {(selectedGame.home_team_score > 0 || selectedGame.visitor_team_score > 0) && (
                  <div style={{fontSize:13,color:'var(--green)',letterSpacing:2,marginTop:4,fontFamily:'Helvetica Neue, sans-serif',fontWeight:800}}>
                    {selectedGame.visitor_team_score} — {selectedGame.home_team_score}
                  </div>
                )}
              </>

          <div style={{fontSize:8, letterSpacing:5, color:'rgba(0,255,128,0.82)', marginBottom:10, fontFamily:'Helvetica Neue, sans-serif'}}>⬡ MY TEAM</div>

                  <div style={{padding:'8px 16px 4px', fontSize:7, letterSpacing:4,
                    color: isMyTeam ? 'var(--green)' : '#444',

                    fontFamily:'Helvetica Neue, sans-serif', borderBottom:'1px solid rgba(255,255,255,0.03)'}}>

          </div>
          <div style={{fontSize:7, letterSpacing:3, color:'var(--green)', fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontWeight:700, marginBottom:14, opacity:0.6}}>[ SYSTEM READY ]</div>
          {history.length === 0 && (
            <div style={{display:'flex', flexDirection:'column', gap:6}}>
              {[0,1,2,3].map(i => (
                <div key={i} style={{padding:'12px 10px', borderRadius:4,
                  border:'1px dashed rgba(255,255,255,0.1)',
                  background:'transparent', opacity: 1 - i * 0.18}}>
                  <div style={{height:6, width:'55%', background:'rgba(255,255,255,0.06)', borderRadius:2, marginBottom:6}}/>

              ))}
            </div>
          )}
          {history.map((h, i) => (
            <div key={i} onClick={() => setResult(h)} style={{padding:'10px 12px', marginBottom:4, cursor:'pointer',
              border:'1px solid rgba(255,255,255,0.04)', background:'rgba(0,0,0,0.3)',
              transition:'border-color 0.1s'}}
              onMouseEnter={e => e.currentTarget.style.borderColor='rgba(0,255,128,0.2)'}
              onMouseLeave={e => e.currentTarget.style.borderColor='rgba(255,255,255,0.04)'}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:3}}>
                <span style={{fontSize:7, letterSpacing:3, color: h.mode==='timeout'?'#FFB800':'var(--green)',
                  fontFamily:'Helvetica Neue, sans-serif'}}>{h.mode?.toUpperCase()}</span>
                <span style={{fontSize:7, letterSpacing:1, color:'#222', fontFamily:'Helvetica Neue, sans-serif'}}>{h.timestamp}</span>
              </div>
              <div style={{fontSize:9, letterSpacing:1, color:'#555', fontFamily:'Helvetica Neue, sans-serif'}}>
                {h.my_team}{h.quarter ? ` · Q${h.quarter}` : ''}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function PlayerSearchBox({ label, onSelect }) {
  const [query, setQuery] = React.useState('');
  const [suggestions, setSuggestions] = React.useState([]);
  const [showSugg, setShowSugg] = React.useState(false);
  const [chosen, setChosen] = React.useState(null);

  const fetchSugg = async (val) => {
    if (val.length < 2) { setSuggestions([]); return; }
    try {
      const r = await fetch(`${API}/nba/players?name=${encodeURIComponent(val)}`);
      if (r.ok) { const d = await r.json(); setSuggestions((d.players||[]).slice(0,6)); }
    } catch(_) {}
  };

  const pick = (p) => {
    const name = `${p.first_name} ${p.last_name}`;
    setQuery(name); setChosen(p); setSuggestions([]); setShowSugg(false);
    onSelect(p);
  };

  const clear = () => { setQuery(''); setChosen(null); setSuggestions([]); onSelect(null); };

  return (
    <div style={{flex:1, minWidth:0}}>
      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:4, color:'rgba(0,255,128,0.72)', fontWeight:700, textTransform:'uppercase', marginBottom:10}}>{label}</div>
      <div style={{position:'relative'}}>
        <div style={{display:'flex', alignItems:'center', background:'rgba(22,27,34,0.9)', border:`1px solid ${chosen ? 'rgba(0,255,128,0.5)' : 'rgba(255,255,255,0.1)'}`, borderRadius:6, overflow:'visible', transition:'border-color 0.15s'}}>
          <span style={{padding:'0 14px', color:'rgba(0,255,128,0.7)', fontSize:16, flexShrink:0}}>⌕</span>
          <input
            style={{flex:1, background:'transparent', border:'none', outline:'none', color:'var(--white)', fontFamily:'Helvetica Neue, sans-serif', fontWeight:700, fontSize:14, letterSpacing:0, padding:'14px 0', textTransform:'none'}}
            placeholder="Search player…"
            value={query}
            onChange={e => { setQuery(e.target.value); setChosen(null); fetchSugg(e.target.value); setShowSugg(true); onSelect(null); }}
            onKeyDown={e => { if(e.key==='Escape') setShowSugg(false); }}
            onBlur={() => setTimeout(() => setShowSugg(false), 150)}
          />
          {chosen && (
            <button onClick={clear} style={{background:'none', border:'none', color:'rgba(255,255,255,0.3)', cursor:'pointer', padding:'0 14px', fontSize:16, flexShrink:0}}>×</button>
          )}
        </div>
        {showSugg && suggestions.length > 0 && (
          <div style={{position:'absolute', top:'100%', left:0, right:0, background:'rgba(22,27,34,0.98)', backdropFilter:'blur(20px)', border:'1px solid var(--border-strong)', borderTop:'none', zIndex:9999, borderRadius:'0 0 8px 8px', overflow:'hidden', boxShadow:'0 20px 60px rgba(0,0,0,0.7)'}}>
            {suggestions.map(p => (
              <div key={p.id} onMouseDown={() => pick(p)}
                style={{padding:'12px 16px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:'1px solid rgba(255,255,255,0.04)'}}
                onMouseEnter={e => e.currentTarget.style.background='rgba(0,255,128,0.06)'}
                onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, fontWeight:700, color:'var(--white)', letterSpacing:0, textTransform:'none'}}>{p.first_name} {p.last_name}</span>
                <div style={{display:'flex', gap:8}}>
                  {p.team?.abbreviation && <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:2, color:'rgba(0,255,128,0.8)', fontWeight:700}}>{p.team.abbreviation}</span>}
                  {p.position && <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:2, color:'rgba(255,255,255,0.4)', fontWeight:700}}>{p.position}</span>}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
      {chosen && (
        <div style={{marginTop:10, display:'flex', alignItems:'center', gap:10}}>
          <img src={`${API}/headshot/${chosen.id}`} style={{width:44, height:44, borderRadius:'50%', objectFit:'cover', border:'2px solid rgba(0,255,128,0.4)', background:'rgba(255,255,255,0.04)'}} onError={e=>e.target.style.display='none'}/>
          <div>
            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, fontWeight:700, color:'var(--white)', letterSpacing:0, textTransform:'none'}}>{chosen.first_name} {chosen.last_name}</div>
            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:3, color:'rgba(0,255,128,0.72)', fontWeight:700}}>{chosen.team?.abbreviation || ''} · {chosen.position || ''}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function StatCompareRow({ label, a, b, higher='more' }) {
  const aNum = parseFloat(a) || 0;
  const bNum = parseFloat(b) || 0;
  const aWins = higher === 'more' ? aNum > bNum : aNum < bNum;
  const bWins = higher === 'more' ? bNum > aNum : bNum < aNum;
  const green = 'var(--green)';
  const dim = 'rgba(255,255,255,0.52)';
  return (
    <div style={{display:'grid', gridTemplateColumns:'1fr 56px 1fr', alignItems:'center', padding:'8px 0', borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, fontWeight:700, color: aWins ? green : 'rgba(255,255,255,0.82)', letterSpacing:0, textTransform:'none', textAlign:'right', textShadow: aWins ? '0 0 18px rgba(0,255,128,0.5)' : 'none'}}>{a}</div>
      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:3, color:'rgba(255,255,255,0.3)', fontWeight:700, textAlign:'center', textTransform:'uppercase'}}>{label}</div>
      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, fontWeight:700, color: bWins ? green : 'rgba(255,255,255,0.82)', letterSpacing:0, textTransform:'none', textShadow: bWins ? '0 0 18px rgba(0,255,128,0.5)' : 'none'}}>{b}</div>
    </div>
  );
}

function Compare() {
  const [playerA, setPlayerA] = React.useState(null);
  const [playerB, setPlayerB] = React.useState(null);
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);

  const canCompare = playerA && playerB && playerA.id !== playerB.id;

  const runCompare = async () => {
    if (!canCompare) return;
    setLoading(true); setError(null); setResult(null);
    try {
      const r = await fetch(`${API}/analysis/compare?player_a=${playerA.id}&player_b=${playerB.id}&season=2025`);
      if (!r.ok) throw new Error(await r.text());
      setResult(await r.json());
    } catch(e) { setError(e.message); } finally { setLoading(false); }
  };

  const pct = v => v != null ? `${(v*100).toFixed(1)}%` : '-';

  return (
    <div style={{maxWidth:1100, margin:'0 auto', padding:'40px 32px'}}>

      {/* Search row */}
      <div style={{display:'flex', gap:24, alignItems:'flex-start', marginBottom:32}}>
        <PlayerSearchBox label="Player A" onSelect={p => { setPlayerA(p); setResult(null); setError(null); }}/>
        <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', paddingTop:36, flexShrink:0}}>
          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:18, fontWeight:700, letterSpacing:6, color:'rgba(255,255,255,0.15)'}}>VS</div>
        </div>
        <PlayerSearchBox label="Player B" onSelect={p => { setPlayerB(p); setResult(null); setError(null); }}/>
      </div>

      {/* Compare button */}
      {canCompare && !result && !loading && (
        <div style={{display:'flex', justifyContent:'center', marginBottom:40}}>
          <button onClick={runCompare}
            style={{background:'var(--green)', color:'var(--black-deep)', border:'none', padding:'16px 48px', fontSize:11, letterSpacing:5, fontWeight:700, fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', textTransform:'uppercase', cursor:'pointer', borderRadius:4, boxShadow:'0 0 32px rgba(0,255,128,0.35)', transition:'all 0.15s'}}
            onMouseEnter={e => e.currentTarget.style.boxShadow='0 0 52px rgba(0,255,128,0.6)'}
            onMouseLeave={e => e.currentTarget.style.boxShadow='0 0 32px rgba(0,255,128,0.35)'}>
            RUN COMPARISON →
          </button>
        </div>
      )}

      {error && <div className="err" style={{margin:'0 0 24px'}}>{error}</div>}

      {loading && (
        <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:16, padding:'60px 0'}}>
          <Loader label="PIVOT COMPUTING"/>
          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:10, letterSpacing:5, color:'rgba(0,255,128,0.5)', fontWeight:700}}>ANALYZING MATCHUP</div>
        </div>
      )}

      {!loading && result && (() => {
        const a = result.player_a;
        const b = result.player_b;
        return (
          <div>
            {/* Player stat cards */}
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:24, marginBottom:28}}>
              {[a, b].map((p, idx) => (
                <div key={idx} className="g-card2" style={{padding:28}}>
                  <div style={{display:'flex', alignItems:'center', gap:14, marginBottom:22}}>
                    <img src={`${API}/headshot/${p.id}`} style={{width:56, height:56, borderRadius:'50%', objectFit:'cover', border:'2px solid rgba(0,255,128,0.35)', background:'rgba(255,255,255,0.04)', flexShrink:0}} onError={e=>e.target.style.display='none'}/>
                    <div>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:15, fontWeight:700, color:'var(--white)', letterSpacing:0, textTransform:'none', marginBottom:4}}>{p.name}</div>
                      <div style={{display:'flex', gap:8}}>
                        <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:3, color:'rgba(0,255,128,0.82)', fontWeight:700}}>{p.team}</span>
                        <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:3, color:'rgba(255,255,255,0.4)', fontWeight:700}}>{p.position}</span>
                        <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:3, color:'rgba(255,255,255,0.3)', fontWeight:700}}>{p.games_played} GP</span>
                      </div>
                    </div>
                    <div style={{marginLeft:'auto', fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:3, fontWeight:700, color:'rgba(0,255,128,0.6)', textTransform:'uppercase'}}>Player {idx === 0 ? 'A' : 'B'}</div>
                  </div>

                  {/* Season stat grid */}
                  <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:20}}>
                    {[['PTS', p.avg_pts], ['REB', p.avg_reb], ['AST', p.avg_ast], ['STL', p.avg_stl], ['BLK', p.avg_blk], ['FG%', pct(p.avg_fg)]].map(([lbl, val]) => (
                      <div key={lbl} style={{textAlign:'center', background:'rgba(255,255,255,0.03)', borderRadius:4, padding:'10px 0'}}>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:16, fontWeight:700, color:'var(--green)', letterSpacing:0, textShadow:'0 0 20px rgba(0,255,128,0.5)'}}>{val}</div>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:3, color:'rgba(255,255,255,0.35)', fontWeight:700, marginTop:3}}>{lbl}</div>
                      </div>
                    ))}
                  </div>

                  {/* Shooting */}
                  <div style={{display:'flex', gap:16, paddingTop:14, borderTop:'1px solid rgba(255,255,255,0.05)'}}>
                    {[['3P%', pct(p.avg_fg3)], ['FT%', pct(p.avg_ft)]].map(([lbl, val]) => (
                      <div key={lbl} style={{flex:1, textAlign:'center'}}>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, fontWeight:700, color:'rgba(255,255,255,0.82)'}}>{val}</div>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:3, color:'rgba(255,255,255,0.3)', fontWeight:700, marginTop:2}}>{lbl}</div>
                      </div>
                    ))}
                    <div style={{flex:2, borderLeft:'1px solid rgba(255,255,255,0.05)', paddingLeft:16}}>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:3, color:'rgba(0,255,128,0.6)', fontWeight:700, marginBottom:6}}>LAST 10 AVG</div>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, fontWeight:700, color:'rgba(255,255,255,0.7)', letterSpacing:0, textTransform:'none'}}>
                        {p.recent_pts}pts · {p.recent_reb}reb · {p.recent_ast}ast
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Head-to-head stat comparison */}
            <div className="g-card2" style={{padding:'24px 32px', marginBottom:24}}>
              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:5, color:'rgba(0,255,128,0.82)', fontWeight:700, textTransform:'uppercase', marginBottom:18, textAlign:'center'}}>Head-to-Head · Season Averages</div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 56px 1fr', marginBottom:12}}>
                <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, fontWeight:700, color:'rgba(255,255,255,0.5)', letterSpacing:2, textAlign:'right', paddingRight:8, textTransform:'none'}}>{a.name.split(' ').slice(-1)[0]}</div>
                <div/>
                <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, fontWeight:700, color:'rgba(255,255,255,0.5)', letterSpacing:2, textTransform:'none'}}>{b.name.split(' ').slice(-1)[0]}</div>
              </div>
              <StatCompareRow label="PTS"  a={a.avg_pts} b={b.avg_pts}/>
              <StatCompareRow label="REB"  a={a.avg_reb} b={b.avg_reb}/>
              <StatCompareRow label="AST"  a={a.avg_ast} b={b.avg_ast}/>
              <StatCompareRow label="STL"  a={a.avg_stl} b={b.avg_stl}/>
              <StatCompareRow label="BLK"  a={a.avg_blk} b={b.avg_blk}/>
              <StatCompareRow label="FG%"  a={pct(a.avg_fg)}  b={pct(b.avg_fg)}/>
              <StatCompareRow label="3P%"  a={pct(a.avg_fg3)} b={pct(b.avg_fg3)}/>
              <StatCompareRow label="FT%"  a={pct(a.avg_ft)}  b={pct(b.avg_ft)}/>
            </div>

            {/* Claude verdict */}
            <div className="g-card2" style={{padding:'28px 32px'}}>
              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:5, color:'rgba(0,255,128,0.82)', fontWeight:700, textTransform:'uppercase', marginBottom:20}}>PIVOT Matchup Analysis</div>
              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:14, lineHeight:1.9, letterSpacing:0, color:'rgba(255,255,255,0.88)', whiteSpace:'pre-wrap', fontWeight:700, textTransform:'none'}}>{result.analysis}</div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState('home');
  const [scrolled, setScrolled] = React.useState(false);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const isHome = tab === 'home';

  return (
    <>
      <nav className={scrolled || !isHome ? 'solid' : ''}>
        <div className="nav-logo" onClick={() => setTab('home')}>PIVOT</div>
        <div className="nav-tabs">
          {[['games','Games'],['players','Players'],['compare','Compare'],['frontoffice','Front Office'],['coach','Coach Mode'],['about','About PIVOT']].map(([id,label]) => (
            <button key={id} className={`nav-tab ${tab===id?'active':''}`} onClick={() => setTab(id)}>{label}</button>
          ))}
        </div>
        <button className="nav-cta" onClick={() => setTab('players')}>Try Free</button>
      </nav>
      <div style={{paddingTop: isHome ? 0 : 70, paddingBottom: 40}}>
        {tab === 'home'        && <Home onNavigate={setTab}/>}
        {tab === 'games'       && <Games/>}
        {tab === 'players'     && <Players/>}
        {tab === 'compare'     && <Compare/>}
        {tab === 'frontoffice' && <FrontOffice/>}
        {tab === 'coach'       && <CoachMode/>}
        {tab === 'analysis'    && <Analysis/>}
        {tab === 'about'       && <About/>}
      </div>
      <Ticker/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  // Global cursor glow — updates CSS vars on <body> on every mousemove
  document.addEventListener('mousemove', e => {
    document.body.style.setProperty('--cursor-x', e.clientX + 'px');
    document.body.style.setProperty('--cursor-y', e.clientY + 'px');
  });
</script>
</body>
</html>
