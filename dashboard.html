*{box-sizing:border-box;margin:0;padding:0;border-radius:0!important;}
html,body{background:var(--bg);color:var(--fg);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.06em;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--fg-4)}
button{font-family:inherit;font-weight:700;cursor:pointer;text-transform:uppercase;}
input,select,textarea{font-family:inherit;font-weight:700;}
select{appearance:none;-webkit-appearance:none;}
nav{position:fixed;top:0;left:0;right:0;height:60px;z-index:1000;display:flex;align-items:center;padding:0 40px;background:var(--bg);border-bottom:1px solid var(--border);}
.nav-logo{font-size:15px;letter-spacing:10px;cursor:pointer;flex-shrink:0;color:var(--fg);margin-right:40px;user-select:none;}
.nav-tabs{display:flex;height:60px;flex:1;}
.nav-tab{height:60px;display:flex;align-items:center;padding:0 16px;font-size:8px;letter-spacing:4px;color:var(--fg-3);background:none;border:none;cursor:pointer;transition:color 120ms var(--ease);position:relative;white-space:nowrap;}
.nav-tab:hover{color:var(--fg-2);}
.nav-tab.active{color:var(--fg);}
.nav-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);}
.nav-right{margin-left:auto;display:flex;align-items:center;}
.nav-tag{font-size:7px;letter-spacing:3px;color:var(--accent);border:1px solid var(--accent);padding:3px 8px;}
.ticker{position:fixed;bottom:0;left:0;right:0;height:36px;background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;overflow:hidden;z-index:1000;}
.ticker-label{flex-shrink:0;padding:0 16px;height:100%;display:flex;align-items:center;font-size:7px;letter-spacing:5px;color:var(--fg-3);border-right:1px solid var(--border);white-space:nowrap;}
.ticker-track-wrap{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;}
.ticker-track{display:flex;align-items:center;white-space:nowrap;animation:ticker-scroll 180s linear infinite;will-change:transform;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{font-size:10px;letter-spacing:2px;padding:0 28px;white-space:nowrap;}
.ticker-sep{color:var(--fg-4);padding:0 4px;}
@keyframes loader-run{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
.loader{display:flex;align-items:center;gap:16px;padding:40px;font-size:8px;letter-spacing:5px;color:var(--fg-3);}
.loader-bar{width:40px;height:1px;background:var(--fg-4);position:relative;overflow:hidden;flex-shrink:0;}
.loader-bar::after{content:'';position:absolute;inset:0;background:var(--accent);animation:loader-run .7s ease-in-out infinite;}
.card{background:var(--bg);border:1px solid var(--border);transition:border-color 220ms var(--ease);}
.card:hover{border-color:var(--border-strong);}
.err{font-size:11px;color:rgba(255,80,80,.8);border:1px solid rgba(255,80,80,.18);padding:12px 16px;letter-spacing:.5px;text-transform:none;font-weight:400;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:7px;letter-spacing:3px;color:var(--accent);border:1px solid var(--accent);padding:2px 8px;animation:blink 1.2s ease-in-out infinite;}
.modal-backdrop{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.94);display:flex;align-items:center;justify-content:center;padding:24px;}
.modal{background:var(--bg);border:1px solid var(--border-strong);width:100%;max-width:1100px;max-height:90vh;overflow-y:auto;position:relative;}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);}
.modal-tab{height:48px;display:flex;align-items:center;padding:0 24px;font-size:8px;letter-spacing:4px;color:var(--fg-3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color 120ms var(--ease);}
.modal-tab:hover{color:var(--fg-2);}
.modal-tab.active{color:var(--fg);border-bottom-color:var(--accent);}
.box-table{width:100%;border-collapse:collapse;}

.box-table th:first-child{text-align:left;}
.box-table td{font-size:11px;color:var(--fg);padding:9px 10px;text-align:right;border-bottom:1px solid rgba(255,255,255,.03);font-weight:400;letter-spacing:.5px;}
.box-table td:first-child{text-align:left;font-weight:700;font-size:12px;}
.box-table tr:hover td{background:rgba(255,255,255,.02);}
@keyframes marquee-run{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fade-up 420ms var(--ease) both;}
.hero-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:80px 80px;}
.slab{border-top:1px solid var(--border);padding:40px 36px 36px;position:relative;overflow:hidden;transition:background 220ms var(--ease);}
.slab::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform 420ms var(--ease);}
.slab:hover::before{transform:scaleX(1);}
.slab:hover{background:rgba(255,255,255,.015);}
.stat-band{border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);}
.stat-cell{padding:32px 40px;border-right:1px solid var(--border);}
.stat-cell:last-child{border-right:none;}
.outro{border-top:1px solid var(--border);padding:120px 80px;text-align:center;position:relative;}
.outro::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:240px;height:1px;background:linear-gradient(to right,transparent,var(--accent),transparent);}
.drag-strip-wrap{overflow:hidden;cursor:grab;user-select:none;}
.drag-strip-wrap.dragging{cursor:grabbing;}
.drag-strip{display:flex;}
@keyframes live-ping{0%{opacity:1;transform:scale(.8)}70%{opacity:0;transform:scale(2)}100%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes cmp-bar-in{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.btn-accent{background:var(--accent);color:#000;border:none;font-weight:900;font-size:11px;letter-spacing:.12em;padding:10px 22px;cursor:pointer;text-transform:uppercase;transition:opacity 150ms;}
.btn-accent:hover{opacity:.85;}
.btn-accent:disabled{opacity:.4;cursor:not-allowed;}
.btn-ghost{background:none;color:var(--fg-2);border:1px solid var(--border);font-weight:900;font-size:11px;letter-spacing:.1em;padding:10px 22px;cursor:pointer;text-transform:uppercase;transition:border-color 150ms,color 150ms;}
.btn-ghost:hover{border-color:var(--border-strong);color:var(--fg);}

.input-field{background:var(--fg-4);border:1px solid var(--border);color:var(--fg);font-size:13px;font-weight:700;padding:10px 14px;outline:none;width:100%;transition:border-color 150ms;}

.input-field::placeholder{color:var(--fg-3);font-weight:400;text-transform:none;letter-spacing:.03em;}

// ─── LIVE FEED TAB ───────────────────────────────────────────────────────────

function LiveFeedTab({gameId,homeName,awayName}){
  const [lines,setLines]=React.useState([]);
  const [loading,setLoading]=React.useState(false);
  const [started,setStarted]=React.useState(false);

  async function startFeed(){
    if(loading||!gameId)return;
    setLoading(true);setLines([]);setStarted(true);
    try{
      const r=await fetch(`${API}/live-intel`,{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Pivot-Session':_pivotSessionId},
        body:JSON.stringify({game_id:gameId,home:homeName,away:awayName})
      });
      if(!r.ok||!r.body){setLoading(false);return;}
      const reader=r.body.getReader();
      const dec=new TextDecoder();
      let buf='';
      while(true){
        const{done,value}=await reader.read();
        if(done)break;
        buf+=dec.decode(value,{stream:true});
        const parts=buf.split('\n\n');
        buf=parts.pop();
        for(const chunk of parts){
          if(chunk.startsWith('data: ')){
            try{
              const obj=JSON.parse(chunk.slice(6));
              if(obj.type==='token'&&obj.text)setLines(l=>[...l,obj.text]);
              if(obj.type==='done')setLoading(false);
            }catch(e){}
          }
        }
      }
    }catch(e){}finally{setLoading(false);}
  }

  return React.createElement('div',{style:{padding:'16px 0'}},
    !started&&React.createElement('button',{className:'btn-accent',onClick:startFeed,style:{marginBottom:16}},'GET LIVE INTEL'),
    started&&React.createElement(StreamingBlock,{lines,loading})
  );
}

function Intel(){
  const [player,setPlayer]=React.useState(null);
  const [stats,setStats]=React.useState(null);
  const [statsLoading,setStatsLoading]=React.useState(false);
  const [analysis,setAnalysis]=React.useState([]);
  const [analysisLoading,setAnalysisLoading]=React.useState(false);
  const [analysisMode,setAnalysisMode]=React.useState('season');
  const [advStats,setAdvStats]=React.useState(null);
  const [advLoading,setAdvLoading]=React.useState(false);
  const [season,setSeason]=React.useState('2024-25');

  function selectPlayer(p){
    setPlayer(p);setStats(null);setAnalysis([]);setAdvStats(null);
    loadStats(p,season);
  }

  function loadStats(p,s){
    if(!p)return;
    setStatsLoading(true);
    fetch(`${API}/players/${p.id}/stats?season=${s}&per_page=10`)
      .then(r=>r.json())
      .then(d=>{setStats(d.data||d||[]);setStatsLoading(false);})
      .catch(()=>setStatsLoading(false));
    setAdvLoading(true);
    fetch(`${API}/players/${p.id}/advanced-stats?season=${s}`,{headers:{'X-Pivot-Session':_pivotSessionId}})
      .then(r=>r.json())
      .then(d=>{setAdvStats(d);setAdvLoading(false);})
      .catch(()=>setAdvLoading(false));
  }

  async function runAnalysis(){
    if(analysisLoading||!player)return;
    setAnalysis([]);setAnalysisLoading(true);
    const endpoint=analysisMode==='season'?'analyze-player':'analyze-player-live';
    try{
      const r=await fetch(`${API}/${endpoint}`,{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Pivot-Session':_pivotSessionId},
        body:JSON.stringify({player_id:player.id,player_name:(player.first_name||'')+' '+(player.last_name||''),season})
      });
      if(!r.ok||!r.body){setAnalysisLoading(false);return;}
      const reader=r.body.getReader();
      const dec=new TextDecoder();
      let buf='';
      while(true){
        const{done,value}=await reader.read();
        if(done)break;
        buf+=dec.decode(value,{stream:true});
        const parts=buf.split('\n\n');
        buf=parts.pop();
        for(const chunk of parts){
          if(chunk.startsWith('data: ')){
            try{
              const obj=JSON.parse(chunk.slice(6));
              if(obj.type==='token'&&obj.text)setAnalysis(l=>[...l,obj.text]);
              if(obj.type==='done')setAnalysisLoading(false);
            }catch(e){}
          }
        }

    player&&React.createElement('div',null,
      React.createElement('div',{className:'card',style:{padding:'20px 24px',display:'flex',gap:20,alignItems:'center',marginBottom:16,flexWrap:'wrap'}},
        React.createElement(HeadshotCutout,{playerId:player.id,name:(player.first_name||'')+' '+(player.last_name||''),size:100}),
        React.createElement('div',{style:{flex:1}},
          React.createElement('h3',{style:{fontWeight:900,fontSize:24,letterSpacing:'-0.02em',marginBottom:4}},

        )
      ),

      // Stats table
      statsLoading?React.createElement(Loader):
      stats&&stats.length>0&&React.createElement('div',{className:'card',style:{padding:'20px 24px',marginBottom:16}},
        React.createElement('div',{style:{fontWeight:900,fontSize:12,letterSpacing:'0.1em',color:'var(--accent)',marginBottom:14}},'RECENT STATS'),
        React.createElement('div',{style:{overflowX:'auto'}},

function Compare(){
  const [playerA,setPlayerA]=React.useState(null);
  const [playerB,setPlayerB]=React.useState(null);
  const [context,setContext]=React.useState('');
  const [lines,setLines]=React.useState([]);
  const [loading,setLoading]=React.useState(false);
  const [statsA,setStatsA]=React.useState(null);
  const [statsB,setStatsB]=React.useState(null);

  function loadPlayerStats(p,setter){
    if(!p)return;
    fetch(`${API}/players/${p.id}/stats?season=2024-25&per_page=82`)
      .then(r=>r.json())
      .then(d=>{
        const games=d.data||d||[];
        if(!games.length){setter(null);return;}
        const avg=(key)=>games.reduce((s,g)=>s+(g[key]||0),0)/games.length;
        setter({
          pts:avg('pts').toFixed(1),reb:avg('reb').toFixed(1),ast:avg('ast').toFixed(1),
          stl:avg('stl').toFixed(1),blk:avg('blk').toFixed(1),
          fg_pct:(games.reduce((s,g)=>s+(g.fg_pct||0),0)/games.length*100).toFixed(1),
          games:games.length
        });
      })
      .catch(()=>setter(null));
  }

  React.useEffect(()=>{loadPlayerStats(playerA,setStatsA);},[playerA?.id]);
  React.useEffect(()=>{loadPlayerStats(playerB,setStatsB);},[playerB?.id]);

  async function runCompare(){
    if(!playerA||!playerB||loading)return;
    setLines([]);setLoading(true);
    try{
      const r=await fetch(`${API}/compare-players`,{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Pivot-Session':_pivotSessionId},
        body:JSON.stringify({
          player_a_id:playerA.id,player_a_name:(playerA.first_name||'')+' '+(playerA.last_name||''),
          player_b_id:playerB.id,player_b_name:(playerB.first_name||'')+' '+(playerB.last_name||''),
          context
        })
      });
      if(!r.ok||!r.body){setLoading(false);return;}
      const reader=r.body.getReader();const dec=new TextDecoder();let buf='';
      while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});
        const parts=buf.split('\n\n');buf=parts.pop();
        for(const chunk of parts){if(chunk.startsWith('data: ')){try{const obj=JSON.parse(chunk.slice(6));
          if(obj.type==='token'&&obj.text)setLines(l=>[...l,obj.text]);
          if(obj.type==='done')setLoading(false);}catch(e){}}}
      }
    }catch(e){}finally{setLoading(false);}
  }

  function PlayerCard({player,stats,label,onSelect}){
    return React.createElement('div',{className:'card',style:{padding:'20px',flex:1,minWidth:220}},
      React.createElement('div',{style:{fontWeight:900,fontSize:11,letterSpacing:'0.12em',color:'var(--accent)',marginBottom:12,textTransform:'uppercase'}},(label)),
      !player&&React.createElement(PlayerSearchBox,{onSelect}),
      player&&React.createElement('div',null,
        React.createElement('div',{style:{display:'flex',gap:12,alignItems:'center',marginBottom:12}},
          React.createElement(HeadshotCutout,{playerId:player.id,name:(player.first_name||'')+' '+(player.last_name||''),size:72}),
          React.createElement('div',null,
            React.createElement('div',{style:{fontWeight:900,fontSize:17,lineHeight:1.2}},(player.first_name||'')+' '+(player.last_name||'')),
            React.createElement('div',{style:{fontSize:13,color:'var(--fg-3)',marginTop:4}},(player.team?.abbreviation||'FA')+' · '+(player.position||'—'))
          )
        ),
        stats&&React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}},
          [['PTS',stats.pts],['REB',stats.reb],['AST',stats.ast],['STL',stats.stl],['BLK',stats.blk],['FG%',stats.fg_pct+'%']].map(([k,v])=>
            React.createElement('div',{key:k,style:{textAlign:'center'}},
              React.createElement('div',{style:{fontWeight:900,fontSize:18,color:'var(--fg)'}},(v||'—')),
              React.createElement('div',{style:{fontSize:10,color:'var(--fg-3)',letterSpacing:'0.1em'}},(k))
            )
          )
        ),
        React.createElement('button',{
          className:'btn-ghost',style:{marginTop:12,width:'100%',fontSize:11},
          onClick:()=>onSelect(null)
        },'CHANGE')
      )
    );
  }

  return React.createElement('div',{style:{padding:'0 40px 60px'}},
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:20,padding:'28px 0',borderBottom:'1px solid var(--border)',marginBottom:24,flexWrap:'wrap'}},
      React.createElement('h2',{style:{fontWeight:900,fontSize:22,letterSpacing:'0.04em',textTransform:'uppercase'}},'COMPARE')
    ),
    React.createElement('div',{style:{display:'flex',gap:2,marginBottom:16,flexWrap:'wrap'}},
      React.createElement(PlayerCard,{player:playerA,stats:statsA,label:'Player A',onSelect:p=>{setPlayerA(p);setLines([]);}}),
      React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',padding:'0 8px',fontWeight:900,fontSize:22,color:'var(--fg-3)'}},'vs'),
      React.createElement(PlayerCard,{player:playerB,stats:statsB,label:'Player B',onSelect:p=>{setPlayerB(p);setLines([]);}}),
    ),
    React.createElement('div',{style:{marginBottom:16}},
      React.createElement('select',{className:'input-field',value:context,onChange:e=>setContext(e.target.value),style:{width:'100%',maxWidth:400}},
        ...COMPARE_CONTEXTS.map(c=>React.createElement('option',{key:c.value,value:c.value},(c.label)))
      )
    ),
    playerA&&playerB&&React.createElement('button',{className:'btn-accent',onClick:runCompare,disabled:loading,style:{marginBottom:20}},loading?'COMPARING…':'COMPARE PLAYERS'),

// ─── CHAT ─────────────────────────────────────────────────────────────────────

function Chat(){
  const [messages,setMessages]=React.useState([]);
  const [input,setInput]=React.useState('');
  const [loading,setLoading]=React.useState(false);
  const [streamLines,setStreamLines]=React.useState([]);
  const bottomRef=React.useRef();

  React.useEffect(()=>{
    if(bottomRef.current)bottomRef.current.scrollIntoView({behavior:'smooth'});
  },[messages,streamLines]);

  async function send(){
    const text=input.trim();
    if(!text||loading)return;
    setInput('');
    setMessages(m=>[...m,{role:'user',content:text}]);
    setStreamLines([]);setLoading(true);

    try{
      const r=await fetch(`${API}/chat`,{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Pivot-Session':_pivotSessionId},
        body:JSON.stringify({messages:[...messages,{role:'user',content:text}]})
      });
      if(!r.ok||!r.body){setLoading(false);return;}
      const reader=r.body.getReader();const dec=new TextDecoder();let buf='';let assembled=[];
      while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});
        const parts=buf.split('\n\n');buf=parts.pop();
        for(const chunk of parts){if(chunk.startsWith('data: ')){try{const obj=JSON.parse(chunk.slice(6));
          if(obj.type==='token'&&obj.text){assembled=[...assembled,obj.text];setStreamLines([...assembled]);}
          if(obj.type==='done'){
            setMessages(m=>[...m,{role:'assistant',content:assembled.join('')}]);
            setStreamLines([]);setLoading(false);
          }}catch(e){}}}
      }
    }catch(e){}finally{setLoading(false);}
  }

  return React.createElement('div',{style:{padding:'0 40px 60px',display:'flex',flexDirection:'column',height:'calc(100vh - 120px)'}},
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:20,padding:'28px 0',borderBottom:'1px solid var(--border)',marginBottom:0,flexShrink:0}},
      React.createElement('h2',{style:{fontWeight:900,fontSize:22,letterSpacing:'0.04em',textTransform:'uppercase'}},'CHAT'),
      React.createElement('span',{style:{fontSize:13,color:'var(--fg-3)'}},'Free-form basketball intelligence')
    ),
    React.createElement('div',{style:{flex:1,overflowY:'auto',padding:'20px 0',display:'flex',flexDirection:'column',gap:16}},
      messages.length===0&&React.createElement('div',{style:{color:'var(--fg-3)',fontSize:15,textAlign:'center',padding:'60px 0'}},
        'Ask anything about basketball — players, teams, strategy, history, stats.'
      ),
      ...messages.map((m,i)=>React.createElement('div',{key:i,style:{
        display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'
      }},
        React.createElement('div',{style:{
          maxWidth:'80%',padding:'12px 16px',
          background:m.role==='user'?'var(--accent)':'var(--fg-4)',
          color:m.role==='user'?'#000':'var(--fg)',
          fontSize:14,lineHeight:1.6,fontWeight:m.role==='user'?700:400,
          whiteSpace:'pre-wrap',wordBreak:'break-word'
        }},(m.content))
      )),
      loading&&streamLines.length>0&&React.createElement('div',{style:{display:'flex',justifyContent:'flex-start'}},
        React.createElement('div',{style:{
          maxWidth:'80%',padding:'12px 16px',background:'var(--fg-4)',
          fontSize:14,lineHeight:1.6,whiteSpace:'pre-wrap',wordBreak:'break-word'
        }},
          streamLines.join(''),
          React.createElement('span',{style:{color:'var(--accent)',marginLeft:4,animation:'blink 1s step-end infinite'}},'█')
        )
      ),
      loading&&streamLines.length===0&&React.createElement('div',{style:{color:'var(--fg-3)',fontSize:13,padding:'8px 0'}},'Thinking…'),
      React.createElement('div',{ref:bottomRef})
    ),
    React.createElement('div',{style:{display:'flex',gap:8,padding:'16px 0 0',borderTop:'1px solid var(--border)',flexShrink:0}},
      React.createElement('input',{
        className:'input-field',style:{flex:1},value:input,
        onChange:e=>setInput(e.target.value),
        onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}},
        placeholder:'Ask about any player, team, game, or strategy…',
        disabled:loading
      }),
      React.createElement('button',{className:'btn-accent',onClick:send,disabled:loading||!input.trim()},loading?'…':'SEND')
    )
  );
}
