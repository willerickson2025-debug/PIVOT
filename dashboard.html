                    <div style={{display:'flex', gap:6, marginTop:3, alignItems:'center'}}>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:2, color:'var(--green)', fontWeight:700}}>{p.team}</div>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, color:'rgba(255,255,255,0.52)'}}>Age {playerAge(p.name) || '—'} · {p.pos}</div>
                    </div>
                  </div>
                  {/* Stats — live from API */}
                  <div style={{display:'flex', gap:0, borderTop:'1px solid rgba(255,255,255,0.06)', paddingTop:12}}>
                    {[['PTS',pts],['REB',reb],['AST',ast]].map(([l,v], si) => (
                      <div key={l} style={{flex:1, textAlign:'center', borderRight: si < 2 ? '1px solid rgba(255,255,255,0.06)' : 'none'}}>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:17, fontWeight:700, color:'var(--white)', letterSpacing:-0.5}}>{v}</div>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:7, letterSpacing:2, color:'rgba(255,255,255,0.82)', textTransform:'uppercase', marginTop:2}}>{l}</div>
                      </div>
                    ))}
                  </div>
                  {/* Note */}
                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, color:'rgba(255,255,255,0.68)', lineHeight:1.55, textTransform:'none', letterSpacing:0}}>
                    {youngNotes[p.name] || <span style={{color:'rgba(255,255,255,0.25)', fontStyle:'italic'}}>Generating scout note...</span>}
                  </div>
                </div>
                );
              })}
            </div>
          )}

          {/* ── Injury Report tab ── */}
          {!result && !loading && !error && dashTab === 'injuries' && (
            injuriesLoading ? (
              <div style={{display:'flex', alignItems:'center', justifyContent:'center', height:200}}>
                <div style={{fontFamily:'Helvetica Neue, sans-serif', fontWeight:700, fontSize:11, letterSpacing:6, color:'var(--green)', textTransform:'uppercase', animation:'blink 1.2s ease-in-out infinite'}}>SYNCING INJURY REPORT...</div>
              </div>
            ) : injuriesError ? (
              <div style={{display:'flex', alignItems:'center', justifyContent:'center', height:120}}>
                <div style={{fontFamily:'Helvetica Neue, sans-serif', fontWeight:700, fontSize:11, letterSpacing:4, color:'rgba(239,68,68,0.6)', textTransform:'uppercase'}}>INJURY FEED OFFLINE</div>
              </div>
            ) : injuries && (() => {
              const INJTM = {'Atlanta Hawks':'ATL','Boston Celtics':'BOS','Brooklyn Nets':'BKN','Charlotte Hornets':'CHA','Chicago Bulls':'CHI','Cleveland Cavaliers':'CLE','Dallas Mavericks':'DAL','Denver Nuggets':'DEN','Detroit Pistons':'DET','Golden State Warriors':'GSW','Houston Rockets':'HOU','Indiana Pacers':'IND','LA Clippers':'LAC','Los Angeles Lakers':'LAL','Memphis Grizzlies':'MEM','Miami Heat':'MIA','Milwaukee Bucks':'MIL','Minnesota Timberwolves':'MIN','New Orleans Pelicans':'NOP','New York Knicks':'NYK','Oklahoma City Thunder':'OKC','Orlando Magic':'ORL','Philadelphia 76ers':'PHI','Phoenix Suns':'PHX','Portland Trail Blazers':'POR','Sacramento Kings':'SAC','San Antonio Spurs':'SAS','Toronto Raptors':'TOR','Utah Jazz':'UTA','Washington Wizards':'WAS'};
              const statusDot = s => { const l = s.toLowerCase(); return l.includes('out') ? '#ef4444' : l.includes('questionable') ? '#f59e0b' : l.includes('day') ? '#fbbf24' : l.includes('probable') ? 'rgba(0,255,128,0.7)' : 'rgba(255,255,255,0.25)'; };
              return (
                <div style={{display:'flex', flexWrap:'wrap', gap:16, padding:'24px 24px 60px', alignItems:'flex-start'}}>
                  {injuries.teams.map(team => {
                    const abbr = INJTM[team.team] || '';
                    return (
                      <div key={team.team} className="g-card2" style={{width:280, padding:20, gap:0, cursor:'default'}}>
                        <div className="g-glow-overlay"/>
                        {/* Team header */}
                        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:14}}>
                          {abbr && <img src={`https://a.espn.com/combiner/i?img=/i/teamlogos/nba/500/${abbr.toLowerCase()}.png&h=28&w=28`} alt={abbr} width={22} height={22} style={{objectFit:'contain',flexShrink:0}} onError={e=>e.target.style.display='none'}/>}
                          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontWeight:700, fontSize:12, letterSpacing:1, color:'rgba(255,255,255,0.7)', textTransform:'uppercase', flex:1}}>{team.team}</div>
                          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.52)'}}>{team.players.length}</div>
                        </div>
                        {/* Player list */}
                        <div style={{display:'flex', flexDirection:'column', gap:0}}>
                          {team.players.map((p, pi) => {
                            const dot = statusDot(p.status);
                            return (
                              <div key={p.name} style={{display:'flex', alignItems:'flex-start', gap:10, padding:'9px 0', borderTop: pi > 0 ? '1px solid rgba(255,255,255,0.04)' : 'none'}}>
                                <div style={{width:6, height:6, borderRadius:'50%', background:dot, flexShrink:0, marginTop:5}}/>
                                <div style={{flex:1, minWidth:0}}>
                                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.82)'}}>{p.name}</div>
                                  <div style={{display:'flex', alignItems:'center', gap:6, marginTop:2}}>
                                    <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:1, fontWeight:700, color:dot, textTransform:'uppercase'}}>{p.status}</div>
                                    {p.comment && <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.62)', textTransform:'none', letterSpacing:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{p.comment}</div>}
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()
          )}

          {/* ── Trade Analyzer tab ── */}
          {!result && !loading && !error && dashTab === 'trade' && (() => {
            const runTrade = async () => {
              if (!tradeTeamA || !tradeTeamB) { setTradeError('Set both team names before running.'); return; }
              if (tradePlayersA.length === 0 && tradePlayersB.length === 0) { setTradeError('Add at least one player to the trade.'); return; }
              setTradeLoading(true); setTradeError(null); setTradeResult(null);
              try {
                const r = await fetch(`${API}/frontoffice/trade`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'X-Pivot-Session': _pivotSessionId },
                  body: JSON.stringify({
                    team_a: tradeTeamA, team_a_players: tradePlayersA,
                    team_b: tradeTeamB, team_b_players: tradePlayersB,
                    archetype: tradeArchetype || undefined,
                    team_a_cap: CAP_DATA.find(c => ALL_TEAMS.find(t => t.name === tradeTeamA)?.abbr === c.abbr)?.used ?? null,
                    team_b_cap: CAP_DATA.find(c => ALL_TEAMS.find(t => t.name === tradeTeamB)?.abbr === c.abbr)?.used ?? null,
                    cap_tax: NBA_CAP.luxuryTaxM,
                    cap_first_apron: NBA_CAP.firstApronM,
                    cap_second_apron: NBA_CAP.secondApronM,
                  }),
                });
                if (!r.ok) throw new Error(await r.text());
                const data = await r.json();
                if (data.error) throw new Error(data.error);
                setTradeResult(data);
              } catch(e) { setTradeError(friendlyError(e.message)); }
              finally { setTradeLoading(false); }
            };

            const addPlayer = (side, player) => {
              if (!player?.id) return;
              const setter = side === 'a' ? setTradePlayersA : setTradePlayersB;
              const fullName = `${player.first_name} ${player.last_name}`.trim();
              const contract = PLAYER_CONTRACTS[fullName] || null;
              setter(prev => prev.find(p => p.id === player.id) ? prev : [...prev, {
                id: player.id,
                name: fullName,
                pos: player.position || '?',
                salary: contract?.salary ?? null,
                years: contract?.years ?? null,
                contract_type: contract?.type ?? null,
              }]);
            };
            const removePlayer = (side, id) => {
              const setter = side === 'a' ? setTradePlayersA : setTradePlayersB;
              setter(prev => prev.filter(p => p.id !== id));
            };

            const gradeColor = g => ({ A:'#22c55e', B:'rgba(0,255,128,0.7)', C:'#fbbf24', D:'#f97316', F:'#ef4444' }[g?.[0]] || 'rgba(255,255,255,0.4)');

            const TeamSide = ({ side, teamName, setTeamName, players, label, accentColor }) => (
              <div style={{flex:1, minWidth:0, display:'flex', flexDirection:'column', gap:12}}>
                <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:4, fontWeight:700, color:accentColor, textTransform:'uppercase'}}>{label}</div>
                {/* Team name input */}
                <div style={{position:'relative'}}>
                  <select value={teamName} onChange={e=>{setTeamName(e.target.value); setTradeResult(null);}}
                    style={{width:'100%', background:'rgba(20,25,35,0.9)', border:`1px solid ${teamName ? accentColor+'44' : 'rgba(255,255,255,0.1)'}`, color: teamName ? 'var(--white)' : 'rgba(255,255,255,0.35)', padding:'9px 12px', fontSize:12, fontFamily:'Helvetica Neue, sans-serif', borderRadius:8, cursor:'pointer', outline:'none', appearance:'none', WebkitAppearance:'none', boxSizing:'border-box'}}>
                    <option value="">Select team…</option>
                    {ALL_TEAMS.map(t => <option key={t.abbr} value={t.name}>{t.abbr} — {t.name}</option>)}
                  </select>
                  {teamName && (() => {
                    const abbr = ALL_TEAMS.find(t=>t.name===teamName)?.abbr;
                    return abbr ? <img src={`https://a.espn.com/combiner/i?img=/i/teamlogos/nba/500/${abbr.toLowerCase()}.png&h=28&w=28`} alt={abbr} width={18} height={18} style={{position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', objectFit:'contain', pointerEvents:'none'}} onError={e=>e.currentTarget.style.display='none'}/> : null;
                  })()}
                </div>
                {/* Player search */}
                <PlayerSearchBox label={`Add player to ${label}`} side={side} onSelect={p=>{ addPlayer(side, p); setTradeResult(null); }}/>
                {/* Player chips */}
                <div style={{display:'flex', flexDirection:'column', gap:6, minHeight:60}}>
                  {players.length === 0 && (
                    <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:10, color:'rgba(255,255,255,0.18)', textAlign:'center', padding:'16px 0', border:'1px dashed rgba(255,255,255,0.08)', borderRadius:8}}>No players added</div>
                  )}
                  {players.map(p => (
                    <div key={p.id} style={{display:'flex', alignItems:'center', gap:10, background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:8, padding:'8px 12px'}}>
                      <div style={{width:4, height:4, borderRadius:'50%', background:accentColor, flexShrink:0}}/>
                      <div style={{flex:1, minWidth:0}}>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.85)'}}>{p.name}</div>
                        {p.salary != null && (
                          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.35)', marginTop:2}}>
                            ${p.salary}M · {p.years}yr · <span style={{color: p.contract_type==='supermax'||p.contract_type==='max' ? 'rgba(239,68,68,0.65)' : p.contract_type==='rookie-scale' ? 'rgba(34,197,94,0.65)' : 'rgba(255,255,255,0.3)', textTransform:'uppercase', letterSpacing:1}}>{p.contract_type}</span>
                          </div>
                        )}
                        {p.salary == null && <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.2)', marginTop:2}}>contract unknown</div>}
                      </div>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.35)', letterSpacing:1}}>{p.pos}</div>
                      <button onClick={()=>{removePlayer(side, p.id); setTradeResult(null);}}
                        style={{background:'none', border:'none', color:'rgba(255,255,255,0.25)', cursor:'pointer', fontSize:14, padding:'0 0 0 6px', lineHeight:1, transition:'color 0.12s'}}
                        onMouseEnter={e=>e.currentTarget.style.color='#ef4444'}
                        onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.25)'}>×</button>
                    </div>
                  ))}
                </div>
              </div>
            );

            return (
              <div style={{padding:'28px 32px 60px'}}>

                {/* Header */}
                <div style={{display:'flex', alignItems:'baseline', gap:12, marginBottom:24}}>
                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:20, fontWeight:700, color:'var(--white)', letterSpacing:-0.5}}>Trade Analyzer</div>
                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:4, color:'rgba(0,255,128,0.7)', fontWeight:700, textTransform:'uppercase'}}>Front Office</div>
                </div>

                {/* Trade Builder */}
                <div style={{background:'rgba(13,16,22,0.9)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:14, padding:'28px 28px 24px', marginBottom:20, position:'relative', overflow:'hidden'}}>
                  <div style={{position:'absolute', top:0, left:0, right:0, height:1, background:'linear-gradient(to right, rgba(0,255,128,0.25), transparent 50%, rgba(160,120,255,0.25))'}}/>

                  {/* Two-side builder */}
                  <div style={{display:'grid', gridTemplateColumns:'1fr 56px 1fr', gap:0, alignItems:'start'}}>
                    <TeamSide side="a" teamName={tradeTeamA} setTeamName={setTradeTeamA} players={tradePlayersA} label="Team A Sends" accentColor="rgba(0,255,128,0.8)"/>
                    {/* Arrow */}
                    <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-start', paddingTop:32, gap:4}}>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:14, color:'rgba(255,255,255,0.18)'}}>⇄</div>
                    </div>
                    <TeamSide side="b" teamName={tradeTeamB} setTeamName={setTradeTeamB} players={tradePlayersB} label="Team B Sends" accentColor="rgba(160,120,255,0.85)"/>
                  </div>

                  {/* Archetype + Run */}
                  <div style={{display:'flex', alignItems:'center', gap:12, marginTop:24, paddingTop:20, borderTop:'1px solid rgba(255,255,255,0.06)'}}>
                    <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:4, color:'rgba(255,255,255,0.32)', fontWeight:700, whiteSpace:'nowrap'}}>LENS</div>
                    <select value={tradeArchetype} onChange={e=>{setTradeArchetype(e.target.value); setTradeResult(null);}}
                      style={{flex:1, background:'rgba(20,25,35,0.9)', border:'1px solid rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.75)', padding:'8px 12px', fontSize:11, fontFamily:'Helvetica Neue, sans-serif', letterSpacing:0.5, borderRadius:6, cursor:'pointer', outline:'none', appearance:'none', WebkitAppearance:'none'}}>
                      {COACHING_ARCHETYPES.map(a => <option key={a.value} value={a.value}>{a.label}</option>)}
                    </select>
                    <button
                      onClick={runTrade}
                      disabled={tradeLoading || !tradeTeamA || !tradeTeamB}
                      style={{background:'var(--green)', color:'#080A0E', border:'none', padding:'10px 28px', fontSize:11, letterSpacing:3, fontWeight:800, fontFamily:'Helvetica Neue, sans-serif', textTransform:'uppercase', cursor: (tradeLoading || !tradeTeamA || !tradeTeamB) ? 'not-allowed' : 'pointer', borderRadius:6, opacity:(tradeLoading || !tradeTeamA || !tradeTeamB) ? 0.4 : 1, transition:'opacity 0.15s', whiteSpace:'nowrap'}}>
                      {tradeLoading ? 'ANALYZING…' : 'ANALYZE →'}
                    </button>
                  </div>
                </div>

                {tradeError && <div style={{marginBottom:20, background:'rgba(239,68,68,0.06)', border:'1px solid rgba(239,68,68,0.2)', borderRadius:8, padding:'12px 18px', fontFamily:'Helvetica Neue, sans-serif', fontSize:13, color:'#ef4444'}}>{tradeError}</div>}

                {tradeLoading && (
                  <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:14, padding:'40px 0'}}>
                    <div style={{display:'flex', gap:8}}>
                      {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',animation:`pulse-dot 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}
                    </div>
                    <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, letterSpacing:5, color:'rgba(0,255,128,0.6)', fontWeight:700, textTransform:'uppercase'}}>Evaluating Trade</div>
                  </div>
                )}

                {/* Results */}
                {!tradeLoading && tradeResult && (() => {
                  const s = tradeResult.structured;
                  const aColor = 'rgba(0,255,128,0.8)';
                  const bColor = 'rgba(160,120,255,0.85)';
                  const winnerIsA = s.winner === tradeResult.team_a;
                  const winnerIsB = s.winner === tradeResult.team_b;
                  const isEven = !winnerIsA && !winnerIsB;
                  const archetypeLabel = tradeArchetype ? COACHING_ARCHETYPES.find(x=>x.value===tradeArchetype)?.label?.split('(')[0]?.trim() : null;

                  return (
                    <div style={{background:'rgba(8,10,16,0.95)', border:'1px solid rgba(0,255,128,0.18)', borderRadius:14, padding:'28px 32px', boxShadow:'0 0 60px rgba(0,255,128,0.05), 0 8px 40px rgba(0,0,0,0.6)', position:'relative', overflow:'hidden'}}>
                      <div style={{position:'absolute', top:0, left:0, right:0, height:1, background:'linear-gradient(to right, transparent, rgba(0,255,128,0.4), transparent)'}}/>

                      {/* Header row */}
                      <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:24, flexWrap:'wrap'}}>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:16, color:'rgba(0,255,128,0.9)', lineHeight:1}}>✦</div>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, letterSpacing:5, color:'rgba(0,255,128,0.85)', fontWeight:700, textTransform:'uppercase'}}>Trade Verdict</div>
                        {archetypeLabel && (
                          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:3, color:'rgba(160,120,255,0.8)', fontWeight:700, background:'rgba(160,120,255,0.08)', border:'1px solid rgba(160,120,255,0.2)', borderRadius:4, padding:'3px 8px', textTransform:'uppercase'}}>{archetypeLabel}</div>
                        )}
                      </div>

                      {/* Winner banner */}
                      <div style={{background: isEven ? 'rgba(255,255,255,0.04)' : winnerIsA ? 'rgba(0,255,128,0.06)' : 'rgba(160,120,255,0.06)', border:`1px solid ${isEven ? 'rgba(255,255,255,0.1)' : winnerIsA ? 'rgba(0,255,128,0.25)' : 'rgba(160,120,255,0.25)'}`, borderRadius:10, padding:'16px 20px', marginBottom:20, display:'flex', alignItems:'center', gap:14}}>
                        <div>
                          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:4, color:'rgba(255,255,255,0.35)', fontWeight:700, textTransform:'uppercase', marginBottom:6}}>Winner</div>
                          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:22, fontWeight:700, color: isEven ? 'rgba(255,255,255,0.6)' : winnerIsA ? aColor : bColor, letterSpacing:-0.3}}>{s.winner}</div>
                        </div>
                      </div>

                      {/* Grade cards */}
                      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:20}}>
                        {[
                          {name: tradeResult.team_a, grade: s.team_a_grade, verdict: s.team_a_verdict, color: aColor, players: tradeResult.team_b_players},
                          {name: tradeResult.team_b, grade: s.team_b_grade, verdict: s.team_b_verdict, color: bColor, players: tradeResult.team_a_players},
                        ].map(({name, grade, verdict, color, players}) => {
                          const abbr = ALL_TEAMS.find(t=>t.name===name)?.abbr;
                          return (
                            <div key={name} style={{background:'rgba(17,20,26,0.9)', border:`1px solid ${color}22`, borderRadius:10, padding:'18px 20px'}}>
                              <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:12}}>
                                {abbr && <img src={`https://a.espn.com/combiner/i?img=/i/teamlogos/nba/500/${abbr.toLowerCase()}.png&h=28&w=28`} alt={abbr} width={22} height={22} style={{objectFit:'contain'}} onError={e=>e.currentTarget.style.display='none'}/>}
                                <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, fontWeight:700, color:color, flex:1}}>{name}</div>
                                <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:28, fontWeight:700, color:gradeColor(grade), lineHeight:1}}>{grade}</div>
                              </div>
                              {/* What they receive */}
                              {players.length > 0 && (
                                <div style={{marginBottom:10}}>
                                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:2, color:'rgba(255,255,255,0.3)', fontWeight:700, textTransform:'uppercase', marginBottom:6}}>Receives</div>
                                  {players.map(p=>(
                                    <div key={p.name} style={{marginBottom:5}}>
                                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, color:'rgba(255,255,255,0.82)', fontWeight:700}}>{p.name}</div>
                                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.35)', marginTop:1}}>
                                        {p.pos}{p.pts!=null?` · ${p.pts}pts`:''}{p.reb!=null?`/${p.reb}reb`:''}{p.ast!=null?`/${p.ast}ast`:''}
                                        {p.salary!=null && <span style={{color:'rgba(251,191,36,0.6)', marginLeft:6}}>${p.salary}M · {p.years}yr{p.contract_type ? ` · ${p.contract_type}` : ''}</span>}
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              )}
                              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:12, lineHeight:1.65, color:'rgba(255,255,255,0.78)', textTransform:'none', letterSpacing:0}}>{verdict}</div>
                            </div>
                          );
                        })}
                      </div>

                      {/* Cap verdict */}
                      {s.cap_verdict && (
                        <div style={{background:'rgba(251,191,36,0.04)', border:'1px solid rgba(251,191,36,0.15)', borderRadius:10, padding:'14px 18px', marginBottom:16}}>
                          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:4, color:'rgba(251,191,36,0.7)', fontWeight:700, textTransform:'uppercase', marginBottom:8}}>Cap Impact</div>
                          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:12, lineHeight:1.65, color:'rgba(255,255,255,0.8)', textTransform:'none', letterSpacing:0}}>{s.cap_verdict}</div>
                        </div>
                      )}

                      {/* Key factors */}
                      {s.key_factors?.length > 0 && (
                        <div style={{marginBottom:16}}>
                          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:4, color:'rgba(0,255,128,0.6)', fontWeight:700, textTransform:'uppercase', marginBottom:10}}>Key Factors</div>
                          <div style={{display:'flex', flexDirection:'column', gap:7}}>
                            {s.key_factors.map((f,i) => (
                              <div key={i} style={{display:'flex', alignItems:'flex-start', gap:10}}>
                                <div style={{width:4, height:4, borderRadius:'50%', background:'rgba(0,255,128,0.45)', marginTop:6, flexShrink:0}}/>
                                <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:12, lineHeight:1.65, color:'rgba(255,255,255,0.8)', textTransform:'none', letterSpacing:0}}>{f}</div>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* Risk + Limitation */}
                      {(s.risk || s.limitation) && (
                        <div style={{display:'flex', flexDirection:'column', gap:8, opacity:0.65, borderTop:'1px solid rgba(255,255,255,0.06)', paddingTop:14}}>
                          {s.risk && (
                            <div style={{display:'flex', alignItems:'flex-start', gap:8}}>
                              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:2, color:'#f97316', fontWeight:700, textTransform:'uppercase', flexShrink:0, paddingTop:2}}>Risk</div>
                              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, lineHeight:1.6, color:'rgba(255,255,255,0.6)', textTransform:'none', letterSpacing:0}}>{s.risk}</div>
                            </div>
                          )}
                          {s.limitation && (
                            <div style={{display:'flex', alignItems:'flex-start', gap:8}}>
                              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:2, color:'rgba(255,255,255,0.35)', fontWeight:700, textTransform:'uppercase', flexShrink:0, paddingTop:2}}>Note</div>
                              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, lineHeight:1.6, color:'rgba(255,255,255,0.5)', textTransform:'none', letterSpacing:0}}>{s.limitation}</div>
                            </div>
                          )}
                        </div>
                      )}

                      <div style={{marginTop:20, display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:3, color:'rgba(255,255,255,0.18)', fontWeight:700, textTransform:'uppercase'}}>Powered by Claude AI</div>
                        <button onClick={runTrade}
                          style={{background:'none', border:'1px solid rgba(0,255,128,0.3)', color:'rgba(0,255,128,0.8)', padding:'8px 20px', fontSize:10, letterSpacing:4, fontWeight:700, fontFamily:'Helvetica Neue, sans-serif', textTransform:'uppercase', cursor:'pointer', borderRadius:6, transition:'border-color 0.15s, color 0.15s'}}
                          onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(0,255,128,0.7)';e.currentTarget.style.color='var(--green)';}}
                          onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(0,255,128,0.3)';e.currentTarget.style.color='rgba(0,255,128,0.8)';}}>
                          RE-ANALYZE →
                        </button>
                      </div>
                    </div>
                  );
                })()}
              </div>
            );
          })()}

          {/* Loading */}
          {loading && (
            <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'60vh', gap:20}}>
              <div style={{display:'flex', gap:8}}>
                {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',animation:`pulse-dot 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}
              </div>
              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, letterSpacing:4, color:'var(--green)', textTransform:'uppercase'}}>Opening War Room · {rosterTeam}</div>
              <button onClick={()=>{ setLoading(false); setError('Cancelled.'); }}
                style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:3, color:'rgba(255,255,255,0.35)', background:'transparent', border:'1px solid rgba(255,255,255,0.1)', borderRadius:4, padding:'6px 14px', cursor:'pointer', textTransform:'uppercase', marginTop:4}}>
                Cancel
              </button>
            </div>
          )}

          {error && <div style={{margin:'32px 40px', background:'rgba(239,68,68,0.06)', border:'1px solid rgba(239,68,68,0.2)', borderRadius:8, padding:'16px 20px', fontFamily:'Helvetica Neue, sans-serif', fontSize:13, color:'#ef4444'}}>{error}</div>}

          {/* ── Team War Room ── */}
          {!loading && result && (() => {
            const selAbbr = ALL_TEAMS.find(t => t.name === rosterTeam)?.abbr;
            const capEntry = selAbbr ? CAP_DATA.find(c => c.abbr === selAbbr) : null;
            const selCap = capEntry ? capEntry.used : 150;
            const selStandings = standings?.league?.find(t => t.abbr === selAbbr);
            const selPct = selStandings?.pct ?? 0.5;
            const selRec = selStandings?.rec || '—';
            const selRank = selStandings?.rank || '—';
            const selTier = getCapTier(selCap);
            const selLev = getLeverage(selCap);
            const selTime = getTimeline(selPct);
            const selActions = getActions(selCap, selPct);
            return (
              <div style={{padding:'28px 32px 60px'}}>

                {/* Command Strip — 4 metric cards */}
                <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10, marginBottom:24}}>
                  {[
                    {val:`$${selCap}M`, label:'Payroll Used', sub:selTier.label, color:selTier.color},
                    {val:selRec,        label:'Record',        sub:`#${selRank} League`, color:selRank<=8?'var(--green)':selRank<=16?'#fbbf24':'rgba(255,255,255,0.4)'},
                    {val:`${selLev}`,   label:'Leverage Score',sub:'Trade flexibility', color:selLev>=60?'#22c55e':selLev>=35?'#fbbf24':'#ef4444'},
                    {val:selTime.label, label:'Timeline',       sub:`${Math.round(selPct*100)}% win rate`, color:selTime.color},
                  ].map(({val,label,sub,color}) => (
                    <div key={label} style={{background:'rgba(17,20,26,0.9)', border:'1px solid rgba(255,255,255,0.07)', borderRadius:10, padding:'14px 16px', position:'relative', overflow:'hidden'}}>
                      <div style={{position:'absolute', top:0, left:0, right:0, height:2, background:`linear-gradient(90deg,${color}66,transparent)`}}/>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:20, letterSpacing:-0.5, fontWeight:700, color:color, lineHeight:1}}>{val}</div>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:2, color:'rgba(255,255,255,0.72)', marginTop:5, textTransform:'uppercase'}}>{label}</div>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.52)', marginTop:2, textTransform:'none'}}>{sub}</div>
                    </div>
                  ))}
                </div>

                {/* Action Center */}
                <div style={{marginBottom:24}}>
                  <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:14}}>
                    <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, letterSpacing:4, color:'rgba(0,255,128,0.92)', fontWeight:700, textTransform:'uppercase'}}>Action Center</div>
                    <div style={{flex:1, height:1, background:'rgba(255,255,255,0.06)'}}/>
                    <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.52)'}}>Top recommended moves</div>
                  </div>
                  <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12}}>
                    {selActions.map((a,i) => (
                      <div key={i} style={{background:'rgba(17,20,26,0.9)', border:`1px solid ${a.color}33`, borderRadius:10, padding:'16px 18px', position:'relative', overflow:'hidden'}}>
                        <div style={{position:'absolute', top:0, left:0, bottom:0, width:3, background:a.color, opacity:0.7}}/>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:7, letterSpacing:2, fontWeight:700, color:a.color, textTransform:'uppercase', marginBottom:8}}>{a.priority}</div>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, fontWeight:700, color:'var(--white)', letterSpacing:-0.2, marginBottom:8, lineHeight:1.3}}>{a.title}</div>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, color:'rgba(255,255,255,0.75)', lineHeight:1.6, textTransform:'none', letterSpacing:0}}>{a.desc}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* PIVOT Intelligence Report */}
                <div style={{background:'rgba(17,20,26,0.9)', border:'1px solid rgba(255,255,255,0.07)', borderRadius:12, overflow:'hidden'}}>
                  <div style={{display:'flex', alignItems:'center', gap:10, padding:'14px 24px', borderBottom:'1px solid rgba(255,255,255,0.07)', background:'rgba(0,255,128,0.03)'}}>
                    <div style={{width:3, height:16, background:'var(--green)', borderRadius:2, flexShrink:0}}/>
                    <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:10, letterSpacing:2, fontWeight:700, color:'var(--white)', textTransform:'uppercase'}}>PIVOT Intelligence Report</div>
                    <div style={{marginLeft:'auto', display:'flex', alignItems:'center', gap:10}}>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:1, color:selTier.color, fontWeight:700, textTransform:'uppercase', border:`1px solid ${selTier.border}`, background:selTier.bg, borderRadius:3, padding:'2px 6px'}}>{selTier.label}</div>
                      <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:9, color:'rgba(255,255,255,0.52)', letterSpacing:0, textTransform:'none'}}>Generated {new Date().toLocaleDateString()}</div>
                    </div>
                  </div>
                  <div style={{padding:'24px 28px'}}>
                    <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:14, lineHeight:1.95, letterSpacing:0, color:'rgba(255,255,255,0.85)', whiteSpace:'pre-wrap', fontWeight:700, textTransform:'none'}}>{result.analysis}</div>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      </div>
    </div>
  );
}


function CourtDiagram({ diagram }) {
  if (!diagram) return null;
  const W = 380, H = 320;
  const toX = p => p / 100 * W;
  const toY = p => p / 100 * H;

  // Hardcoded court pixel coordinates (NBA dimensions scaled to 380×320)
  const BX = 190, BY = 284;           // basket center
  const KEY_L = 129, KEY_R = 251;
  const KEY_TOP = 190, BASELINE = 292;
  const FT_R = 41;
  const C3L = 23, C3R = 357, C3Y = 225;

  const players = diagram.p || [];
  const moves   = diagram.moves || [];
  const ball    = diagram.ball;

  const psvg = {};
  players.forEach(p => { psvg[p.n] = [toX(p.x), toY(p.y)]; });

  const curvedPath = (sx, sy, tx, ty) => {
    const mx = (sx + tx) / 2 + (ty - sy) * 0.25;
    const my = (sy + ty) / 2 - (tx - sx) * 0.25;
    return `M ${sx} ${sy} Q ${mx} ${my} ${tx} ${ty}`;
  };

  return (
    <svg width={W} height={H} style={{display:'block', background:'#070A0E', borderRadius:3}}>
      <defs>
        <marker id="arr-cut"  viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#00FF80"/></marker>
        <marker id="arr-ball" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#FFB800"/></marker>
        <marker id="arr-scr"  viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#FFB800"/></marker>
      </defs>

      {/* Paint */}
      <rect x={KEY_L} y={KEY_TOP} width={KEY_R - KEY_L} height={BASELINE - KEY_TOP}
        fill="rgba(0,80,180,0.07)" stroke="rgba(255,255,255,0.18)" strokeWidth={1.5}/>

      {/* FT circle top (solid) */}
      <path d={`M ${KEY_L} ${KEY_TOP} A ${FT_R} ${FT_R} 0 0 1 ${KEY_R} ${KEY_TOP}`}
        fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth={1.5}/>
      {/* FT circle bottom (dashed) */}
      <path d={`M ${KEY_L} ${KEY_TOP} A ${FT_R} ${FT_R} 0 0 0 ${KEY_R} ${KEY_TOP}`}
        fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={1.5} strokeDasharray="5,4"/>

      {/* 3pt corners */}
      <line x1={C3L} y1={BASELINE} x2={C3L} y2={C3Y} stroke="rgba(255,255,255,0.18)" strokeWidth={1.5}/>
      <line x1={C3R} y1={BASELINE} x2={C3R} y2={C3Y} stroke="rgba(255,255,255,0.18)" strokeWidth={1.5}/>

      {/* 3pt arc */}
      <path d={`M ${C3L} ${C3Y} A 180 162 0 0 1 ${C3R} ${C3Y}`}
        fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth={1.5}/>

      {/* Restricted area */}
      <path d={`M ${BX-30} ${BASELINE} A 30 30 0 0 1 ${BX+30} ${BASELINE}`}
        fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth={1.5}/>

      {/* Backboard */}
      <line x1={167} y1={292} x2={213} y2={292} stroke="rgba(255,140,0,0.75)" strokeWidth={2.5}/>

      {/* Basket ring */}
      <circle cx={BX} cy={BY} r={9} fill="none" stroke="rgba(255,140,0,0.75)" strokeWidth={2}/>

      {/* Baseline */}
      <line x1={0} y1={BASELINE} x2={W} y2={BASELINE} stroke="rgba(255,255,255,0.1)" strokeWidth={1}/>

      {/* Ball pass */}
      {ball && psvg[ball.from] && psvg[ball.to] && (
        <line
          x1={psvg[ball.from][0]} y1={psvg[ball.from][1]}
          x2={psvg[ball.to][0]}   y2={psvg[ball.to][1]}
          stroke="#FFB800" strokeWidth={2} strokeDasharray="8,5"
          markerEnd="url(#arr-ball)" opacity={0.9}/>
      )}

      {/* Moves */}
      {moves.map((m, i) => {
        if (!psvg[m.n]) return null;
        const [sx, sy] = psvg[m.n];
        const tx2 = toX(m.tx), ty2 = toY(m.ty);
        if (m.type === 'screen') {
          return (
            <g key={i}>
              <line x1={sx} y1={sy} x2={tx2} y2={ty2} stroke="#FFB800" strokeWidth={1.5} markerEnd="url(#arr-scr)"/>
              <line x1={tx2-10} y1={ty2} x2={tx2+10} y2={ty2} stroke="#FFB800" strokeWidth={3}/>
            </g>
          );
        }
        return (
          <path key={i} d={curvedPath(sx, sy, tx2, ty2)}
            fill="none" stroke="#00FF80" strokeWidth={1.5}
            markerEnd="url(#arr-cut)"/>
        );
      })}

      {/* Players */}
      {players.map(p => {
        const [px2, py2] = psvg[p.n] || [0, 0];
        const isReceiver = ball && ball.to === p.n;
        const posLabel = {1:'PG', 2:'SG', 3:'SF', 4:'PF', 5:'C'}[p.n] || p.n;
        const nameLabel = p.name ? p.name.split(' ').slice(-1)[0].slice(0, 6).toUpperCase() : null;
        return (
          <g key={p.n}>
            {isReceiver && <circle cx={px2} cy={py2} r={22} fill="rgba(0,255,128,0.08)"/>}
            <circle cx={px2} cy={py2} r={14} fill="#0D1117"
              stroke={isReceiver ? '#00FF80' : 'rgba(0,255,128,0.55)'}
              strokeWidth={isReceiver ? 2.5 : 1.5}/>
            <text x={px2} y={py2+5} textAnchor="middle"
              fill={isReceiver ? '#00FF80' : 'rgba(0,255,128,0.75)'}
              fontSize={12} fontWeight="bold" fontFamily="Helvetica Neue, Helvetica, Arial, sans-serif">{p.n}</text>
            <text x={px2} y={py2+27} textAnchor="middle"
              fill={isReceiver ? 'rgba(0,255,128,0.9)' : 'rgba(255,255,255,0.4)'}
              fontSize={8} fontWeight="600" fontFamily="Helvetica Neue, Helvetica, Arial, sans-serif" letterSpacing="1">{nameLabel || posLabel}</text>
          </g>
        );
      })}
    </svg>
  );
}

function CoachGameCard({ g, onSelect, records = {} }) {
  const { label, type } = parseStatus(g.status);
  const hasScore = g.home_team_score > 0 || g.visitor_team_score > 0;
  const isLive = type === 'live';

  return (
    <div className="g-card2" onClick={() => onSelect(g)} style={{cursor:'pointer'}}>

      <div className={`g-status-badge${isLive ? ' live' : ''}`}>
        {isLive && <span className="g-live-dot"/>}
        {isLive ? 'LIVE' : label}
      </div>

      <div>
        <TeamRow team={g.visitor_team} score={g.visitor_team_score} isLive={isLive} hasScore={hasScore} record={records[g.visitor_team.abbreviation]}/>
        <div className="g-team-sep"/>
        <TeamRow team={g.home_team} score={g.home_team_score} isLive={isLive} hasScore={hasScore} record={records[g.home_team.abbreviation]}/>
      </div>

      <div className="g-card-footer" style={{marginTop:'auto'}}>
        {(() => {
          const ps = getPostseasonLabel(g);
          if (ps) return <span className={`g-postseason-banner ${ps === 'PLAY-IN' ? 'playin' : 'playoffs'}`}>{ps === 'PLAYOFFS' ? '🏆' : '⚡'} {ps}</span>;
          const hc = g.home_team?.conference, ac = g.visitor_team?.conference;
          const hd = g.home_team?.division,   ad = g.visitor_team?.division;
          const pill = hd && hd === ad ? `${hd} · DIVISION` : hc && hc !== ac ? `${hc} vs ${ac} · CROSS-CONF` : [hc, hd].filter(Boolean).join(' · ');
          return <span className="g-conf-pill">{pill}</span>;
        })()}
        <div style={{display:'inline-flex', alignItems:'center', gap:6, background:'rgba(0,255,128,0.06)', border:'1px solid rgba(0,255,128,0.2)', borderRadius:3, padding:'7px 14px'}}>
          <div style={{width:4, height:4, borderRadius:'50%', background:'var(--green)', opacity:0.8}}/>
          <span style={{fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontSize:9, letterSpacing:3, fontWeight:700, color:'var(--green)', textTransform:'uppercase'}}>Coach Mode</span>
        </div>
      </div>
    </div>
  );
}

function CoachingStylesView() {
  const HV = "'Helvetica Neue',Helvetica,Arial,sans-serif";
  const [phase, setPhase] = React.useState('landing');
  const [qIdx, setQIdx] = React.useState(0);
  const [scores, setScores] = React.useState({});
  const [activeStyleId, setActiveStyleId] = React.useState(null);
  const [revealStep, setRevealStep] = React.useState(0);

  React.useEffect(() => {
    try {
      const saved = localStorage.getItem('pivot_coach_style');
      if (saved && COACHING_STYLES[saved]) { setActiveStyleId(saved); setPhase('dashboard'); }
    } catch(_) {}
  }, []);

  const handleAnswer = (opt) => {
    const ns = {...scores};
    Object.entries(opt.s).forEach(([k, v]) => { ns[k] = (ns[k] || 0) + v; });
    if (qIdx < QUIZ_QUESTIONS.length - 1) {
      setScores(ns); setQIdx(qIdx + 1);
    } else {
      const winner = Object.entries(ns).sort((a,b) => b[1]-a[1])[0][0];
      setScores(ns); setActiveStyleId(winner); setPhase('result'); setRevealStep(0);
      setTimeout(() => setRevealStep(1), 500);
      setTimeout(() => setRevealStep(2), 1100);
      try { localStorage.setItem('pivot_coach_style', winner); } catch(_) {}
    }
  };

  const retake = () => { setPhase('quiz'); setQIdx(0); setScores({}); setRevealStep(0); };
  const switchStyle = (id) => { setActiveStyleId(id); try { localStorage.setItem('pivot_coach_style', id); } catch(_) {} };
  const sty = activeStyleId ? COACHING_STYLES[activeStyleId] : null;

  // LANDING

    <div style={{maxWidth:720, margin:'0 auto', padding:'56px 32px 80px'}}>

    <div style={{padding:'28px 0 80px', maxWidth:1100, margin:'0 auto'}}>

      {/* Header */}
      <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:24, marginBottom:36, paddingBottom:28, borderBottom:`1px solid rgba(255,255,255,0.06)`, flexWrap:'wrap'}}>
        <div>
          <div style={{fontFamily:HV, fontSize:8, letterSpacing:6, color:sty.color, fontWeight:700, marginBottom:10}}>YOUR COACHING ARCHETYPE</div>
          <div style={{fontFamily:HV, fontSize:'clamp(28px,4.5vw,56px)', fontWeight:900, letterSpacing:'-2px', lineHeight:0.95, color:'var(--white)', textTransform:'uppercase'}}>{sty.name}</div>
          <div style={{fontFamily:HV, fontSize:9, letterSpacing:5, fontWeight:700, color:`${sty.color}90`, marginTop:10, textTransform:'uppercase'}}>{sty.tagline}</div>
          <div style={{fontFamily:HV, fontSize:13, lineHeight:1.85, color:'rgba(255,255,255,0.45)', marginTop:12, maxWidth:460, fontWeight:500}}>{sty.description}</div>
        </div>
        <button onClick={retake} style={{
          background:'var(--glass-bg)', border:'1px solid var(--glass-border)', boxShadow:'var(--glass-hi)',
          color:'rgba(255,255,255,0.45)', padding:'9px 16px', cursor:'pointer',
          fontFamily:HV, fontSize:8, letterSpacing:3, fontWeight:700, transition:'all 0.15s', flexShrink:0,
        }}
          onMouseEnter={e=>{e.currentTarget.style.background='var(--glass-bg-hover)';e.currentTarget.style.borderColor='var(--glass-border-hover)';e.currentTarget.style.color='var(--white)';}}
          onMouseLeave={e=>{e.currentTarget.style.background='var(--glass-bg)';e.currentTarget.style.borderColor='var(--glass-border)';e.currentTarget.style.color='rgba(255,255,255,0.45)';}}>
          RETAKE ASSESSMENT
        </button>
      </div>

      {/* 3-col grid */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16, marginBottom:28}}>

        {/* Metrics */}
        <div style={{background:'rgba(0,0,0,0.28)', border:`1px solid ${sty.color}14`, borderRadius:4, padding:'20px'}}>
          <div style={{fontFamily:HV, fontSize:8, letterSpacing:5, color:`${sty.color}70`, fontWeight:700, marginBottom:20}}>PROFILE METRICS</div>
          {sty.metrics.map((m, i) => (
            <div key={i} style={{marginBottom:16}}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:6}}>
                <span style={{fontFamily:HV, fontSize:9, letterSpacing:2, color:'rgba(255,255,255,0.45)', fontWeight:700}}>{m.label.toUpperCase()}</span>
                <span style={{fontFamily:HV, fontSize:9, letterSpacing:1, color:sty.color, fontWeight:700}}>{m.value}</span>
              </div>
              <div style={{height:3, background:'rgba(255,255,255,0.05)', borderRadius:2}}>
                <div style={{height:'100%', width:`${m.value}%`, background:sty.color, borderRadius:2, opacity:0.82}}/>
              </div>
            </div>
          ))}
          <div style={{marginTop:22, paddingTop:16, borderTop:`1px solid ${sty.color}12`}}>
            <div style={{fontFamily:HV, fontSize:8, letterSpacing:4, color:'rgba(255,255,255,0.18)', marginBottom:10, fontWeight:700}}>NBA COMPS</div>
            {sty.nba_comps.map((c, i) => (
              <div key={i} style={{fontFamily:HV, fontSize:10, letterSpacing:1, color:'rgba(255,255,255,0.42)', marginBottom:5, fontWeight:500}}>· {c}</div>
            ))}
          </div>
        </div>

        {/* Insights */}
        <div style={{background:'rgba(0,0,0,0.28)', border:`1px solid ${sty.color}14`, borderRadius:4, padding:'20px'}}>
          <div style={{fontFamily:HV, fontSize:8, letterSpacing:5, color:`${sty.color}70`, fontWeight:700, marginBottom:20}}>STYLE INSIGHTS</div>
          {sty.insights.map((ins, i) => (
            <div key={i} style={{marginBottom:10, padding:'11px 13px', background:`${sty.color}05`, border:`1px solid ${sty.color}10`, borderRadius:3, borderLeft:`2px solid ${sty.color}55`}}>
              <div style={{fontFamily:HV, fontSize:11, lineHeight:1.75, color:'rgba(255,255,255,0.6)', fontWeight:500, letterSpacing:0.2}}>{ins}</div>
            </div>
          ))}
        </div>

        {/* Recommendations */}
        <div style={{background:'rgba(0,0,0,0.28)', border:`1px solid ${sty.color}14`, borderRadius:4, padding:'20px'}}>
          <div style={{fontFamily:HV, fontSize:8, letterSpacing:5, color:`${sty.color}70`, fontWeight:700, marginBottom:20}}>RECOMMENDATIONS</div>
          {sty.recommendations.map((rec, i) => (
            <div key={i} style={{marginBottom:18, paddingBottom:18, borderBottom: i < 2 ? '1px solid rgba(255,255,255,0.04)' : 'none'}}>
              <div style={{fontFamily:HV, fontSize:9, letterSpacing:2, color:'var(--white)', fontWeight:700, marginBottom:7}}>{rec.title.toUpperCase()}</div>
              <div style={{fontFamily:HV, fontSize:11, lineHeight:1.75, color:'rgba(255,255,255,0.42)', fontWeight:500}}>{rec.detail}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Style Switcher */}
      <div style={{borderTop:'1px solid rgba(255,255,255,0.05)', paddingTop:24}}>
        <div style={{fontFamily:HV, fontSize:8, letterSpacing:5, color:'rgba(255,255,255,0.18)', marginBottom:14, fontWeight:700}}>EXPLORE OTHER ARCHETYPES</div>
        <div style={{display:'flex', flexWrap:'wrap', gap:8}}>
          {Object.values(COACHING_STYLES).map(s => (
            <button key={s.id} onClick={() => switchStyle(s.id)} style={{
              padding:'8px 16px',
              background: s.id===sty.id ? `${s.color}12` : 'var(--glass-bg)',
              border:`1px solid ${s.id===sty.id ? `${s.color}65` : 'var(--glass-border)'}`,
              boxShadow: s.id===sty.id ? `inset 0 1px 0 ${s.color}18, 0 0 12px ${s.color}0a` : 'var(--glass-hi)',
              color: s.id===sty.id ? s.color : 'rgba(255,255,255,0.38)',
              cursor:'pointer', fontFamily:HV, fontSize:8, letterSpacing:3, fontWeight:700,
              textTransform:'uppercase', transition:'all 0.15s', borderRadius:2,
            }}
              onMouseEnter={e=>{ if(s.id!==sty.id){e.currentTarget.style.background=`${s.color}08`;e.currentTarget.style.borderColor=`${s.color}45`;e.currentTarget.style.color=s.color;}}}
              onMouseLeave={e=>{ if(s.id!==sty.id){e.currentTarget.style.background='var(--glass-bg)';e.currentTarget.style.borderColor='var(--glass-border)';e.currentTarget.style.color='rgba(255,255,255,0.38)';}}}
            >{s.name}</button>
          ))}
        </div>
      </div>
    </div>
  );

  return null;
}

function CoachMode() {
  const [games, setGames] = React.useState([]);
  const [selectedGame, setSelectedGame] = React.useState(null);
  const [myTeam, setMyTeam] = React.useState('');
  const [mode, setMode] = React.useState('adjust');
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [history, setHistory] = React.useState([]);
  const [boxScore, setBoxScore] = React.useState(null);
  const [coachTab, setCoachTab] = React.useState('games');
  const [nextGameDate, setNextGameDate] = React.useState(null);
  const [recordMap, setRecordMap] = React.useState({});
  const today = localDate();

  React.useEffect(() => {
    fetch(`${API}/standings`)
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data?.league) return;
        const map = {};
        data.league.forEach(t => { map[t.abbr] = t.rec || `${t.wins}-${t.losses}`; });
        setRecordMap(map);
      }).catch(() => {});
  }, []);

  React.useEffect(() => {
    const load = () => fetch(`${API}/nba/games?date=${today}&_=${Date.now()}`)
      .then(r => r.ok ? r.json() : null).then(d => setGames(d?.games || [])).catch(() => {});
    load();
    const iv = setInterval(load, 15000);
    return () => clearInterval(iv);
  }, []);

  // When today has no games, find the next day that does (up to 14 days out)
  React.useEffect(() => {
    if (games.length > 0) { setNextGameDate(null); return; }
    let cancelled = false;
    (async () => {
      for (let i = 1; i <= 14; i++) {
        if (cancelled) return;
        const d = shiftDate(today, i);
        try {
          const r = await fetch(`${API}/nba/games?date=${d}`);
          const data = r.ok ? await r.json() : null;
          if (data?.games?.length > 0) { if (!cancelled) setNextGameDate(d); return; }
        } catch(_) {}
      }
    })();
    return () => { cancelled = true; };
  }, [games.length]);

  React.useEffect(() => {
    if (!selectedGame) return;
    const load = () => fetch(`${API}/nba/games/${selectedGame.id}/boxscore`)
      .then(r => r.ok ? r.json() : null).then(d => setBoxScore(d)).catch(() => {});
    load();
    const iv = setInterval(load, 10000);
    return () => clearInterval(iv);
  }, [selectedGame?.id]);

  const run = async () => {
    setLoading(true); setError(null);
    try {
      const endpoint = mode === 'live'    ? '/analysis/coach-live'
                     : mode === 'adjust'  ? '/coach/adjust'
                     : mode === 'defense' ? '/coach/defense'
                     :                     '/coach/timeout';
      const r = await fetch(`${API}${endpoint}`, {
        method: 'POST', headers: {'Content-Type': 'application/json', 'X-Pivot-Session': _pivotSessionId},
        body: JSON.stringify({ game_id: selectedGame?.id, my_team: myTeam }),
      });
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      setResult({...data, mode});
      setHistory(prev => [{...data, mode, timestamp: new Date().toLocaleTimeString()}, ...prev.slice(0, 9)]);
    } catch(e) { setError(friendlyError(e.message)); } finally { setLoading(false); }
  };

  // Heat class for box score
  const heatClass = (pts, minStr) => {
    const min = parseInt(minStr) || 0;
    if (min < 2) return 'heat-cold';
    if (pts >= 20) return 'heat-fire';
    if (pts >= 15) return 'heat-hot';
    if (pts >= 10) return 'heat-warm';
    if (pts >= 5)  return 'heat-ok';
    return 'heat-cold';
  };

  const formatName = n => {
    if (!n) return '—';
    const parts = n.trim().split(' ');
    if (parts.length <= 1) return parts[0];
    const last = parts[parts.length - 1];
    return ['Jr','Jr.','Sr','Sr.','II','III','IV'].includes(last)
      ? `${parts[parts.length - 2]} ${last}` : last;
  };

  const gameStatus = selectedGame ? (() => {
    const { label, type } = parseStatus(selectedGame.status);
    const sa = selectedGame.visitor_team_score, sb = selectedGame.home_team_score;
    const hasScore = sa > 0 || sb > 0;
    return {
      statusLabel: type === 'live' ? `● ${label}` : label,
      isLive: type === 'live',
      scoreStr: hasScore ? `${selectedGame.visitor_team.abbreviation} ${sa} — ${sb} ${selectedGame.home_team.abbreviation}` : `${selectedGame.visitor_team.abbreviation} @ ${selectedGame.home_team.abbreviation}`,
    };
  })() : null;

  // Game grid view — shown before a game is selected
  if (!selectedGame) {
    return (
      <div style={{padding:'40px 32px 80px', maxWidth:1200, margin:'0 auto'}}>
        <div style={{display:'flex', alignItems:'center', gap:16, marginBottom:32, flexWrap:'wrap'}}>
          <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:'clamp(28px,4vw,48px)', fontWeight:900, letterSpacing:-1, color:'var(--white)', lineHeight:1}}>COACH MODE</div>
          <div style={{flex:1, height:1, background:'rgba(255,255,255,0.05)', minWidth:20}}/>
          <div style={{display:'flex', gap:4}}>
            {[['games',"TODAY'S GAMES"],['styles','COACHING STYLES']].map(([id, label]) => (
              <button key={id} onClick={() => setCoachTab(id)} style={{
                background: coachTab===id ? 'rgba(0,255,128,0.08)' : 'var(--glass-bg)',
                border: `1px solid ${coachTab===id ? 'rgba(0,255,128,0.45)' : 'var(--glass-border)'}`,
                boxShadow: coachTab===id ? 'inset 0 1px 0 rgba(0,255,128,0.16), 0 0 14px rgba(0,255,128,0.07)' : 'var(--glass-hi)',
                color: coachTab===id ? 'rgba(0,255,128,0.9)' : 'rgba(255,255,255,0.4)',
                padding:'8px 16px', cursor:'pointer', transition:'all 0.15s',
                fontFamily:'Helvetica Neue, sans-serif', fontSize:8, letterSpacing:3, fontWeight:700, textTransform:'uppercase',
              }}
                onMouseEnter={e=>{ if(coachTab!==id){e.currentTarget.style.background='var(--glass-bg-hover)';e.currentTarget.style.borderColor='var(--glass-border-hover)';e.currentTarget.style.color='rgba(255,255,255,0.7)';}}}
                onMouseLeave={e=>{ if(coachTab!==id){e.currentTarget.style.background='var(--glass-bg)';e.currentTarget.style.borderColor='var(--glass-border)';e.currentTarget.style.color='rgba(255,255,255,0.4)';}}}
              >{label}</button>
            ))}
          </div>
        </div>

        {coachTab === 'games' ? (
          games.length === 0 ? (
            <div style={{textAlign:'center', padding:'80px 32px'}}>
              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, letterSpacing:4, color:'rgba(255,255,255,0.18)', textTransform:'uppercase', marginBottom:12}}>No games today</div>
              {nextGameDate ? (
                <>
                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, color:'rgba(255,255,255,0.35)', fontWeight:500, marginBottom:6}}>
                    Next games scheduled
                  </div>
                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:22, fontWeight:700, color:'var(--green)', letterSpacing:-0.5, marginBottom:4}}>
                    {fmtDateLabel(nextGameDate)}
                  </div>
                  <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, color:'rgba(255,255,255,0.22)', letterSpacing:1, marginBottom:0}}>
                    {nextGameDate}
                  </div>
                </>
              ) : (
                <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:12, color:'rgba(255,255,255,0.28)', fontWeight:500}}>
                  Check back later
                </div>
              )}
            </div>
          ) : (
            <div className="g-grid">
              {games.map(g => (
                <CoachGameCard key={g.id} g={g} onSelect={g => { setSelectedGame(g); setMyTeam(''); setResult(null); setError(null); }} records={recordMap}/>
              ))}
            </div>
          )
        ) : (
          <CoachingStylesView />
        )}
      </div>
    );
  }

  return (
    <div className="war-room war-room-grid" style={{display:'grid', gridTemplateColumns:'22% 1fr 22%', minHeight:'calc(100vh - 110px)'}}>

      {/* ── Left: Command Panel ── */}
      <div style={{borderRight:'1px solid var(--border)', background:'rgba(0,0,0,0.4)', display:'flex', flexDirection:'column', overflowY:'auto'}}>
        <div style={{padding:'16px', borderBottom:'1px solid var(--border)'}}>
          {/* Back button */}
          <button onClick={() => { setSelectedGame(null); setResult(null); setError(null); setHistory([]); }}
            style={{display:'flex', alignItems:'center', gap:6, background:'transparent', border:'1px solid var(--border)', color:'var(--text-muted)', cursor:'pointer', padding:'7px 12px', borderRadius:4, marginBottom:16, fontFamily:'Helvetica Neue, sans-serif', fontSize:10, letterSpacing:2, fontWeight:700, transition:'all 0.15s', width:'100%'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--border-strong)';e.currentTarget.style.color='var(--white)';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-muted)';}}>
            ← All Games
          </button>

          {/* Selected game summary */}
          <div style={{padding:'12px 14px', borderRadius:6, border:'1px solid rgba(0,255,128,0.3)', background:'rgba(0,255,128,0.04)', marginBottom:16}}>
            {(() => { const {label,type} = parseStatus(selectedGame.status); const isLive = type==='live'; return (
              <>
                <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:6}}>
                  {isLive && <span style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',display:'inline-block',animation:'live-ping 1.2s ease-out infinite'}}/>}
                  <span style={{fontSize:7,letterSpacing:3,color:isLive?'var(--green)':'#555',fontFamily:'Helvetica Neue, sans-serif',fontWeight:700,textTransform:'uppercase'}}>{isLive?'LIVE':label}</span>
                </div>
                <div style={{display:'flex', alignItems:'center', gap:7, marginBottom:2}}>
                  {teamLogoUrl(selectedGame.visitor_team.abbreviation) && <img src={teamLogoUrl(selectedGame.visitor_team.abbreviation)} alt={selectedGame.visitor_team.abbreviation} width={22} height={22} style={{objectFit:'contain'}} onError={e=>e.currentTarget.style.display='none'}/>}
                  <span style={{fontSize:15,letterSpacing:1,fontFamily:'Helvetica Neue, sans-serif',fontWeight:700,color:'#fff'}}>{selectedGame.visitor_team.abbreviation}</span>
                  <span style={{fontSize:11,color:'rgba(255,255,255,0.4)',fontFamily:'Helvetica Neue, sans-serif'}}>@</span>
                  <span style={{fontSize:15,letterSpacing:1,fontFamily:'Helvetica Neue, sans-serif',fontWeight:700,color:'#fff'}}>{selectedGame.home_team.abbreviation}</span>
                  {teamLogoUrl(selectedGame.home_team.abbreviation) && <img src={teamLogoUrl(selectedGame.home_team.abbreviation)} alt={selectedGame.home_team.abbreviation} width={22} height={22} style={{objectFit:'contain'}} onError={e=>e.currentTarget.style.display='none'}/>}
                </div>
                {(selectedGame.home_team_score > 0 || selectedGame.visitor_team_score > 0) && (
                  <div style={{fontSize:13,color:'var(--green)',letterSpacing:2,marginTop:4,fontFamily:'Helvetica Neue, sans-serif',fontWeight:800}}>
                    {selectedGame.visitor_team_score} — {selectedGame.home_team_score}
                  </div>
                )}
              </>
            );})()}
          </div>

          <div style={{fontSize:8, letterSpacing:5, color:'rgba(0,255,128,0.82)', marginBottom:10, fontFamily:'Helvetica Neue, sans-serif'}}>⬡ MY TEAM</div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:4, marginBottom:20}}>
            {[selectedGame.visitor_team, selectedGame.home_team].map(t => (
              <button key={t.id} onClick={() => setMyTeam(t.name)}
                style={{background: myTeam===t.name ? 'var(--green)' : 'rgba(0,0,0,0.5)',
                  color: myTeam===t.name ? '#000' : '#444',
                  border: `1px solid ${myTeam===t.name ? 'var(--green)' : 'rgba(255,255,255,0.08)'}`,
                  padding:'10px 6px', cursor:'pointer', fontSize:10, letterSpacing:3,
                  fontFamily:'Helvetica Neue, sans-serif', fontWeight:700, textTransform:'uppercase', transition:'all 0.1s',
                  display:'flex', flexDirection:'column', alignItems:'center', gap:5}}>
                {teamLogoUrl(t.abbreviation) && (
                  <img src={teamLogoUrl(t.abbreviation)} alt={t.abbreviation} width={28} height={28}
                    style={{objectFit:'contain', filter: myTeam===t.name ? 'none' : 'grayscale(0.6) brightness(0.5)'}}
                    onError={e=>e.currentTarget.style.display='none'}/>
                )}
                {t.abbreviation}
              </button>
            ))}
          </div>

          <div style={{fontSize:8, letterSpacing:5, color:'rgba(0,255,128,0.82)', marginBottom:10, fontFamily:'Helvetica Neue, sans-serif'}}>⬡ MODE</div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:4, marginBottom:24}}>
            {[['live','LIVE INTEL'],['adjust','ADJUST'],['defense','DEF PLAY'],['timeout','OFF PLAY']].map(([id, lbl]) => (
              <button key={id} onClick={() => setMode(id)}
                style={{background: mode===id ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.5)',
                  color: mode===id ? '#000' : '#333',
                  border: `1px solid ${mode===id ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.06)'}`,
                  padding:'8px 4px', cursor:'pointer', fontSize:8, letterSpacing:3,
                  fontFamily:'Helvetica Neue, sans-serif', fontWeight:700, transition:'all 0.1s'}}>
                {lbl}
              </button>
            ))}
          </div>

          <button onClick={run} disabled={loading || !myTeam}
            style={{width:'100%', padding:'13px', fontSize:9, letterSpacing:4,
              fontFamily:'Helvetica Neue, sans-serif', fontWeight:700, textTransform:'uppercase',
              cursor: loading||!myTeam ? 'default' : 'pointer', border:'none', transition:'all 0.15s',
              background: loading ? '#111' : !myTeam ? '#0a0a0a' : 'var(--green)',
              color: loading||!myTeam ? '#2a2a2a' : '#000',
              boxShadow: (!loading && myTeam) ? '0 0 20px rgba(0,255,128,0.2)' : 'none'}}>
            {loading ? '◌ COMPUTING' : !myTeam ? 'SELECT TEAM' : mode==='live' ? 'GET LIVE INTEL' : mode==='adjust' ? 'GET ADJUSTMENTS' : mode==='defense' ? 'DESIGN DEFENSE' : 'DRAW THE PLAY'}
          </button>
        </div>
      </div>

      {/* ── Center: Tactical Display ── */}
      <div style={{borderRight:'1px solid var(--border)', overflowY:'auto', position:'relative'}}>

        {/* Status bar at top when game selected */}
        {selectedGame && gameStatus && (
          <div style={{padding:'10px 24px', borderBottom:'1px solid var(--border)',
            display:'flex', alignItems:'center', gap:24, background:'rgba(0,0,0,0.5)', position:'sticky', top:0, zIndex:10}}>
            <div style={{fontSize:8, letterSpacing:3, color: gameStatus.isLive ? 'var(--green)' : '#444', fontFamily:'Helvetica Neue, sans-serif'}}>
              {gameStatus.statusLabel}
            </div>
            <div style={{fontSize:13, letterSpacing:2, color:'var(--white)', fontFamily:'Helvetica Neue, sans-serif'}}>
              {gameStatus.scoreStr}
            </div>
            {myTeam && <div style={{fontSize:8, letterSpacing:2, color:'rgba(0,255,128,0.9)', marginLeft:'auto', fontFamily:'Helvetica Neue, sans-serif'}}>
              ◎ {myTeam.toUpperCase()}
            </div>}
          </div>
        )}

        {/* Tactical Board Standby HUD */}
        {!result && !loading && !error && (
          <div style={{position:'relative', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'calc(100vh - 136px)', overflow:'hidden'}}>

            {/* Ghosted wireframe court SVG background */}
            <svg style={{position:'absolute', width:'72%', maxWidth:520, opacity:0.055, pointerEvents:'none'}} viewBox="0 0 380 320" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="129" y="190" width="122" height="102" stroke="white" strokeWidth="1.5"/>
              <path d="M 129 190 A 41 41 0 0 1 251 190" stroke="white" strokeWidth="1.5"/>
              <path d="M 129 190 A 41 41 0 0 0 251 190" stroke="white" strokeWidth="1.5" strokeDasharray="5,4"/>
              <line x1="23" y1="292" x2="23" y2="225" stroke="white" strokeWidth="1.5"/>
              <line x1="357" y1="292" x2="357" y2="225" stroke="white" strokeWidth="1.5"/>
              <path d="M 23 225 A 180 162 0 0 1 357 225" stroke="white" strokeWidth="1.5"/>
              <path d="M 160 292 A 30 30 0 0 1 220 292" stroke="white" strokeWidth="1.5"/>
              <line x1="167" y1="292" x2="213" y2="292" stroke="white" strokeWidth="2.5"/>
              <circle cx="190" cy="284" r="9" stroke="white" strokeWidth="2"/>
              <line x1="0" y1="292" x2="380" y2="292" stroke="white" strokeWidth="1"/>

            {/* Main headline */}
            <div style={{position:'relative', textAlign:'center', zIndex:1}}>
              <div style={{
                fontSize:'clamp(28px,4.5vw,58px)', lineHeight:1.05, fontWeight:900,
                fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif',
                letterSpacing:8,
                background:'linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.35) 100%)',

              }}>
                TACTICAL<br/>BOARD
              </div>
              <div style={{
                marginTop:14, fontSize:9, letterSpacing:6,
                fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontWeight:700,
                color:'rgba(0,255,128,0.86)', textTransform:'uppercase',
              }}>
                {selectedGame && myTeam

                  : selectedGame
                    ? 'SELECT YOUR TEAM'
                    : 'AWAITING GAME FEED'}
              </div>

              {/* Scanning pulse */}
              <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:8, marginTop:24}}>
                <div style={{width:32, height:1, background:'rgba(0,255,128,0.2)'}}/>
                <div style={{width:5, height:5, borderRadius:'50%', background:'rgba(0,255,128,0.5)', animation:'scan-pulse 2s ease-in-out infinite'}}/>
                <div style={{fontSize:7, letterSpacing:4, color:'rgba(0,255,128,0.3)', fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontWeight:700, animation:'scan-pulse 2s ease-in-out 0.3s infinite'}}>
                  SCANNING
                </div>
                <div style={{width:5, height:5, borderRadius:'50%', background:'rgba(0,255,128,0.5)', animation:'scan-pulse 2s ease-in-out 0.6s infinite'}}/>
                <div style={{width:32, height:1, background:'rgba(0,255,128,0.2)'}}/>
              </div>
            </div>
          </div>

        {/* Loading */}
        {loading && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'70vh', gap:20}}>
            <div style={{display:'flex', gap:8}}>
              {[0,1,2].map(i => (
                <div key={i} style={{width:6, height:6, borderRadius:'50%', background:'var(--green)',
                  animation:`pulse-dot 1.2s ease-in-out ${i*0.2}s infinite`}}/>
              ))}
            </div>
            <div style={{fontSize:8, letterSpacing:6, color:'rgba(0,255,128,0.9)', fontFamily:'Helvetica Neue, sans-serif'}}>
              {mode === 'live' ? 'READING LIVE STATE' : mode === 'defense' ? 'DESIGNING DEFENSE' : mode === 'timeout' ? 'DRAWING PLAY' : 'COMPUTING ADJUSTMENTS'}
            </div>
          </div>
        )}

        {error && <div className="err" style={{margin:24}}>{error}</div>}

        {/* Result */}
        {!loading && result && (
          <div style={{padding:'32px 40px'}}>
            <div style={{display:'flex', gap:16, alignItems:'center', marginBottom:24, flexWrap:'wrap'}}>
              <div style={{fontSize:8, letterSpacing:4, color:'var(--green)', fontFamily:'Helvetica Neue, sans-serif'}}>
                {result.mode === 'live' ? '⊙ LIVE INTEL' : result.mode === 'defense' ? '⊙ DEFENSE SET' : result.mode === 'timeout' ? '⊙ PLAY DRAWN' : '⊙ ADJUSTMENTS READY'}
              </div>
              <div style={{fontSize:8, letterSpacing:2, color:'#333', fontFamily:'Helvetica Neue, sans-serif'}}>{result.my_team?.toUpperCase()}</div>
              {result.game_state?.period && (
                <div style={{fontSize:8, letterSpacing:2, color:'rgba(0,255,128,0.5)', fontFamily:'Helvetica Neue, sans-serif'}}>
                  {result.game_state.period} · {result.game_state.clock} · {result.game_state.diff}
                </div>
              )}
            </div>

            {/* ── LIVE INTEL structured display ── */}
            {result.mode === 'live' && result.adjustment && (() => {
              const adj = result.adjustment;
              const urgencyColor = {low:'rgba(255,255,255,0.4)', medium:'rgba(255,200,50,0.8)', high:'rgba(255,120,40,0.9)', critical:'rgba(255,50,50,1)'}[adj.urgency] || 'var(--green)';
              const sections = [
                { key:'priority_adjustment', label:'PRIORITY ADJUSTMENT', color:'var(--green)' },
                { key:'run_response',         label:'RUN RESPONSE',        color:'rgba(255,180,60,0.9)' },
                { key:'defensive_call',       label:'DEFENSIVE CALL',      color:'rgba(100,180,255,0.9)' },
                { key:'offensive_call',       label:'OFFENSIVE CALL',      color:'rgba(0,255,128,0.7)' },
                { key:'clock_management',     label:'CLOCK MANAGEMENT',    color:'rgba(200,160,255,0.9)' },
                { key:'foul_management',      label:'FOUL MANAGEMENT',     color:'rgba(255,80,80,0.8)' },
                { key:'lineup_change',        label:'LINEUP CHANGE',       color:'rgba(255,255,255,0.6)' },
              ];
              return (
                <div style={{display:'flex', flexDirection:'column', gap:16}}>
                  {/* Urgency + momentum */}
                  <div style={{display:'flex', gap:12, alignItems:'center', paddingBottom:14, borderBottom:'1px solid var(--border)'}}>
                    <span style={{fontSize:9, letterSpacing:3, color:urgencyColor, fontWeight:700, background:'rgba(255,255,255,0.04)', border:`1px solid ${urgencyColor}44`, borderRadius:4, padding:'4px 10px'}}>
                      {(adj.urgency || 'medium').toUpperCase()}
                    </span>
                    {adj.momentum_read && <span style={{fontSize:12, color:'rgba(255,255,255,0.6)', lineHeight:1.4}}>{adj.momentum_read}</span>}
                  </div>

                  {/* Quarter summary with run flags */}
                  {result.quarter_summary?.length > 0 && (
                    <div>
                      <div style={{fontSize:8, letterSpacing:3, color:'rgba(255,255,255,0.3)', fontWeight:700, marginBottom:8}}>QUARTER BREAKDOWN</div>
                      <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                        {result.quarter_summary.map((q, i) => {
                          const myPts = result.my_team?.toLowerCase().includes(result.game_state?.score?.split(' ')[0]?.toLowerCase()) ? q.home : q.away;
                          const oppPts = myPts === q.home ? q.away : q.home;
                          const isRun = Math.abs(q.home - q.away) >= 8;
                          return (
                            <div key={i} style={{padding:'6px 12px', borderRadius:5, background: isRun ? 'rgba(255,180,60,0.08)' : 'rgba(255,255,255,0.03)', border:`1px solid ${isRun ? 'rgba(255,180,60,0.25)' : 'rgba(255,255,255,0.06)'}`, textAlign:'center', minWidth:52}}>

                              <div style={{fontSize:12, fontWeight:700, color: q.home > q.away ? 'rgba(0,255,128,0.85)' : 'rgba(255,255,255,0.55)'}}>{q.home}–{q.away}</div>
                              {isRun && <div style={{fontSize:7, letterSpacing:1, color:'rgba(255,180,60,0.8)', fontWeight:700, marginTop:2}}>RUN</div>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* Action sections */}
                  {sections.map(({ key, label, color }) => adj[key] && adj[key] !== 'null' && adj[key] !== null ? (
                    <div key={key} style={{padding:'14px 16px', background:'rgba(255,255,255,0.025)', border:'1px solid rgba(255,255,255,0.06)', borderLeft:`3px solid ${color}`, borderRadius:'0 6px 6px 0'}}>

                    </div>
                  ) : null)}

                  {/* Hot/cold flags */}
                  {(result.hot_shooters?.length > 0 || result.cold_shooters?.length > 0) && (
                    <div style={{display:'flex', flexWrap:'wrap', gap:8, paddingTop:8, borderTop:'1px solid var(--border)'}}>
                      {result.hot_shooters?.map(h => (
                        <span key={h.player} style={{fontSize:9, letterSpacing:1, color:'rgba(0,255,128,0.85)', background:'rgba(0,255,128,0.06)', border:'1px solid rgba(0,255,128,0.2)', borderRadius:4, padding:'3px 10px', fontWeight:700}}>
                          🔥 {h.player.split(' ').pop()} {h.fgm}/{h.fga} FG
                        </span>
                      ))}
                      {result.cold_shooters?.map(c => (
                        <span key={c.player} style={{fontSize:9, letterSpacing:1, color:'rgba(150,150,255,0.75)', background:'rgba(100,100,255,0.05)', border:'1px solid rgba(100,100,255,0.15)', borderRadius:4, padding:'3px 10px', fontWeight:700}}>
