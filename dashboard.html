<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PIVOT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* Global cursor glow — follows mouse across entire page */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: radial-gradient(
    280px circle at var(--cursor-x, -9999px) var(--cursor-y, -9999px),
    rgba(0,255,128,0.045),
    transparent 70%
  );
  transition: background 0.06s;
}

:root {
  --black: #0F1115;
  --black-deep: #080A0E;
  --white: #F0F2F5;
  --green: #00FF80;
  --green-dim: rgba(0,255,128,0.15);
  --grey: #161B22;
  --grey2: #1C2128;
  --grey3: #242B35;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --text-muted: #6B7280;
  --text-subtle: #374151;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
  /* ── Glass system ── */
  --glass-bg:           rgba(255,255,255,0.055);
  --glass-bg-hover:     rgba(255,255,255,0.095);
  --glass-border:       rgba(255,255,255,0.16);
  --glass-border-hover: rgba(255,255,255,0.30);
  --glass-hi:           inset 0 1px 0 rgba(255,255,255,0.10);
  --glass-hi-hover:     inset 0 1px 0 rgba(255,255,255,0.18);
  --glass-blur:         blur(12px);
  --glass-green-bg:     rgba(0,255,128,0.07);
  --glass-green-border: rgba(0,255,128,0.38);
  --glass-green-hi:     inset 0 1px 0 rgba(0,255,128,0.14), 0 0 18px rgba(0,255,128,0.09);
}
html, body {
  background: var(--black);
  color: var(--white);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  min-height: 100vh;
  overflow-x: hidden;
}
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 70px;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  transition: background 0.3s, border-color 0.3s;
}
nav.solid {
  background: rgba(15,17,21,0.97);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 0 var(--border), var(--shadow);
}
.nav-logo {
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
}
.nav-logo svg { transition: filter 0.2s; }
.nav-logo:hover svg { filter: drop-shadow(0 0 6px rgba(0,255,128,0.7)) brightness(1.1); }
.nav-tabs { display: flex; align-items: stretch; height: 70px; }
/* ── Global glass base for all buttons ──────────────────────────────────── */
button {
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
}
.nav-tab {
  display: flex;
  align-items: center;
  padding: 0 28px;
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.4);
  border: none;
  background: none;
  cursor: pointer;
  transition: color 0.15s;
  text-transform: uppercase;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  position: relative;
}
.nav-tab:hover { color: var(--white); }
.nav-tab.active { color: var(--white); }
.nav-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
}
.nav-cta {
  background: var(--glass-green-bg);
  color: var(--green);
  border: 1px solid var(--glass-green-border);
  padding: 10px 24px;
  font-size: 10px;
  letter-spacing: 3px;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
  box-shadow: var(--glass-green-hi);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
}
.nav-cta:hover {
  background: rgba(0,255,128,0.14);
  border-color: rgba(0,255,128,0.65);
  box-shadow: inset 0 1px 0 rgba(0,255,128,0.22), 0 0 28px rgba(0,255,128,0.18);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
@keyframes pulse-dot { 0%,80%,100%{opacity:0.15;transform:scale(0.7)} 40%{opacity:1;transform:scale(1)} }
/* ── Home / Landing ──────────────────────────────────────────────────────── */
.home-wrap {
  position: relative;
  width: 100vw;
  min-height: 100vh;
  overflow: hidden;
  background: var(--black);
  display: flex;
  align-items: center;
  justify-content: center;
}
/* Extra slow orb just for the landing page, layered behind video */
.home-wrap::after {
  content: '';
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80vw 60vw at 10% 90%, rgba(0,255,128,0.032) 0%, transparent 65%),
    radial-gradient(ellipse 50vw 70vw at 90% 10%, rgba(0,255,128,0.025) 0%, transparent 60%);
  animation: orb-c 44s ease-in-out infinite;
}
.home-video {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0; opacity: 0.28;
  filter: grayscale(100%) contrast(1.15);
}
.home-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.9) 100%);
}
/* subtle green ambient glow at top-center */
.home-cursor-glow {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(
    700px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(0,255,128,0.07),
    transparent 70%
  );
  transition: background 0.05s;
}
.home-grid-overlay {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 50px 50px;
  -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
  mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
}
.home-hero {
  position: relative; z-index: 3;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: 0 40px;
  width: 100%;
  max-width: 900px;
}
.home-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 14px; border-radius: 99px;
  border: 1px solid rgba(0,255,128,0.35);
  background: rgba(0,255,128,0.08);
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 500; letter-spacing: 2px;
  color: var(--green); text-transform: uppercase;
  margin-bottom: 32px;
}
.home-badge-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  animation: blink 1.4s ease-in-out infinite;
  flex-shrink: 0;
}
.home-pivot-text {
  font-size: clamp(72px, 14vw, 160px);
  letter-spacing: -6px;
  color: var(--white);
  font-weight: 700;
  line-height: 0.92;
  margin-bottom: 28px;
  text-shadow: 0 0 60px rgba(0,255,128,0.12);
}
.home-tagline {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  letter-spacing: 0;
  color: rgba(255,255,255,0.5);
  font-weight: 300;
  text-transform: none;
  max-width: 560px;
  line-height: 1.7;
  margin-bottom: 44px;
  text-align: center;
}
.home-ctas { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
/* glowing primary button */
.home-cta-primary {
  position: relative;
  background: var(--glass-green-bg);
  color: var(--white);
  border: 1px solid var(--glass-green-border);
  padding: 14px 36px;
  font-size: 10px;
  letter-spacing: 4px;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  box-shadow: var(--glass-green-hi);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
}
.home-cta-primary:hover {
  background: rgba(0,255,128,0.12);
  border-color: rgba(0,255,128,0.65);
  box-shadow: inset 0 1px 0 rgba(0,255,128,0.25), 0 0 40px rgba(0,255,128,0.22);
  transform: translateY(-1px);
}
.home-cta-secondary {
  background: var(--glass-bg);
  color: var(--white);
  border: 1px solid var(--glass-border);
  padding: 14px 36px;
  font-size: 10px;
  letter-spacing: 4px;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  box-shadow: var(--glass-hi);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
}
.home-cta-secondary:hover {
  background: var(--glass-bg-hover);
  border-color: var(--glass-border-hover);
  box-shadow: var(--glass-hi-hover);
  transform: translateY(-1px);
}
.home-scroll-hint {
  position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%); z-index: 3;
  font-family: 'Inter', sans-serif;
  font-size: 9px; letter-spacing: 4px; color: #333; text-transform: uppercase;
  display: flex; align-items: center; gap: 12px;
  white-space: nowrap;
}
.home-scroll-line { width: 40px; height: 1px; background: #222; }

/* ── Tech Marquee ─────────────────────────────────────────────────────────── */
.home-marquee-wrap {
  overflow: hidden;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.5);
  padding: 14px 0;
  display: flex;
}
.home-marquee-track {
  display: flex; align-items: center;
  white-space: nowrap;
  animation: ticker-scroll 35s linear infinite;
  will-change: transform;
}
.home-marquee-track:hover { animation-play-state: paused; }
.home-marquee-item {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  color: #444; padding: 0 40px;
}
.home-marquee-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); opacity: 0.6; }

/* ── Feature Cards ────────────────────────────────────────────────────────── */
.features-section {
  position: relative;
  padding: 100px 80px;
  background: var(--black);
  text-align: center;
}
@media (max-width: 768px) { .features-section { padding: 80px 24px; } }
.features-label {
  font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 500; letter-spacing: 4px;
  color: var(--green); text-transform: uppercase; margin-bottom: 20px;
}
.features-title {
  font-size: clamp(28px, 3.5vw, 48px);
  letter-spacing: -1px;
  color: var(--white);
  margin-bottom: 16px;
  line-height: 1.15;
  max-width: 640px;
  font-weight: 700;
  margin-left: auto; margin-right: auto;
}
.features-subtitle {
  font-family: 'Inter', sans-serif;
  font-size: 14px; color: #555; font-weight: 300;
  max-width: 480px; margin: 0 auto 64px; line-height: 1.7;
  text-transform: none; letter-spacing: 0;
}
.features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; text-align: left; background: var(--border); }
@media (max-width: 900px) { .features-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 600px) { .features-grid { grid-template-columns: 1fr; } }
.feature-card {
  background: var(--black);
  padding: 40px 36px;
  transition: background 0.2s;
  position: relative;
  overflow: hidden;
}
.feature-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--green);
  box-shadow: 0 0 12px rgba(0,255,128,0.5);
  transform: scaleX(0);
  transition: transform 0.25s;
  transform-origin: left;
}
.feature-card:hover::before { transform: scaleX(1); }
.feature-card:hover { background: #0a0a0a; }
/* cursor-tracking glow inside each card */
.feature-card-glow {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(
    300px circle at var(--cx, 50%) var(--cy, 50%),
    rgba(0,255,128,0.07),
    transparent 60%
  );
  opacity: 0; transition: opacity 0.3s;
}
.feature-card:hover .feature-card-glow { opacity: 1; }
.feature-num { font-size: 9px; letter-spacing: 4px; color: #2a2a2a; margin-bottom: 20px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
.feature-name { font-size: 15px; letter-spacing: 2px; color: var(--white); margin-bottom: 14px; font-weight: 700; }
.feature-desc {
  font-family: 'Inter', sans-serif;
  font-size: 13px; color: #555; font-weight: 300;
  text-transform: none; line-height: 1.8; margin-bottom: 28px; letter-spacing: 0;
}
.feature-stat { font-size: 26px; letter-spacing: -1px; color: var(--green); text-shadow: 0 0 20px rgba(0,255,128,0.25); }
.feature-stat-label { font-size: 8px; letter-spacing: 3px; color: #2a2a2a; margin-top: 4px; }

/* ── CTA Section ──────────────────────────────────────────────────────────── */
.cta-section {
  position: relative;
  padding: 120px 80px;
  background: #040404;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  overflow: hidden;
}
.cta-section::before {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 60%; height: 1px;
  background: linear-gradient(to right, transparent, rgba(0,255,128,0.4), transparent);
}
.cta-title {
  font-size: clamp(28px, 3.5vw, 48px);
  letter-spacing: -1px;
  color: var(--white); margin-bottom: 16px; line-height: 1.1; font-weight: 700;
}
.cta-sub {
  font-family: 'Inter', sans-serif;
  font-size: 14px; color: #555; font-weight: 300;
  text-transform: none; letter-spacing: 0; margin-bottom: 48px;
}
.cta-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

/* ── Footer ───────────────────────────────────────────────────────────────── */
.home-footer {
  background: var(--black);
  border-top: 1px solid var(--border);
  padding: 28px 80px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Inter', sans-serif;
  font-size: 10px; letter-spacing: 1px; color: #333;
}
.home-footer-logo { color: var(--white); font-size: 13px; letter-spacing: 6px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; }
.ticker {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 40px;
  background: #111;
  border-top: 1px solid #222;
  display: flex;
  align-items: center;
  overflow: hidden;
  z-index: 1000;
}
.ticker-label {
  flex-shrink: 0;
  background: #1a1a1a;
  color: rgba(255,255,255,0.5);
  font-size: 9px;
  letter-spacing: 3px;
  padding: 0 16px;
  height: 100%;
  display: flex; align-items: center;
  font-weight: 700; white-space: nowrap; z-index: 2;
  border-right: 1px solid #222;
}
.ticker-track-wrap { flex: 1; overflow: hidden; height: 100%; display: flex; align-items: center; }
.ticker-track {
  display: flex; align-items: center; white-space: nowrap;
  animation: ticker-scroll 70s linear infinite;
  will-change: transform;
}
.ticker-track:hover { animation-play-state: paused; }
@keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.ticker-item { font-size: 11px; letter-spacing: 1.5px; color: rgba(255,255,255,0.75); padding: 0 32px; white-space: nowrap; }
.ticker-sep { color: #2a2a2a; font-size: 14px; padding: 0 8px; }
.toolbar {
  height: 56px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  background: var(--grey);
}
.tb-btn {
  background: var(--glass-bg); border: none;
  border-right: 1px solid var(--glass-border);
  box-shadow: var(--glass-hi);
  color: var(--text-muted);
  font-size: 10px; letter-spacing: 3px; font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase; padding: 0 24px;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
}
.tb-btn:hover {
  background: var(--glass-bg-hover);
  border-right-color: var(--glass-border-hover);
  box-shadow: var(--glass-hi-hover);
  color: var(--white);
}
.tb-btn:disabled { color: #2a2a2a; cursor: not-allowed; background: transparent; }
.tb-input {
  background: transparent; border: none;
  border-right: 1px solid var(--border);
  color: var(--white);
  font-size: 11px; letter-spacing: 2px; font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase; padding: 0 20px;
  outline: none; width: 220px;
}
.tb-input::placeholder { color: #2a2a2a; }
.tb-info {
  display: flex; align-items: center; padding: 0 24px;
  font-family: 'Inter', sans-serif;
  font-size: 11px; letter-spacing: 0.5px; font-weight: 400;
  color: var(--text-muted); text-transform: none;
  margin-left: auto; border-left: 1px solid var(--border);
}
.g-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 20px;
}
.g-card2 {
  width: 300px;
  flex-shrink: 0;
  background: #111318;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.g-card2:hover {
  border-color: rgba(0,255,128,0.35);
  transform: translateY(-2px);
}
.g-status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  letter-spacing: 2px;
  padding: 3px 10px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.1);
  color: #555;
  background: rgba(255,255,255,0.03);
  width: fit-content;
}
.g-status-badge.live {
  background: rgba(0,255,128,0.1);
  border-color: rgba(0,255,128,0.3);
  color: #00FF80;
}
.g-live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00FF80;
  animation: blink 1s infinite;
  flex-shrink: 0;
}
.g-team-sep { height: 1px; background: rgba(255,255,255,0.05); margin: 4px 0; }
.g-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}
.g-conf-pill {
  font-size: 8px;
  letter-spacing: 2px;
  color: #444;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 99px;
  padding: 2px 8px;
}
.g-box-link {
  font-size: 10px;
  letter-spacing: 2px;
  color: #00FF80;
  font-weight: 600;
}
.g-postseason-banner {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 8px;
  letter-spacing: 3px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 4px;
  text-transform: uppercase;
}
.g-postseason-banner.playoffs {
  color: #f59e0b;
  background: rgba(245,158,11,0.1);
  border: 1px solid rgba(245,158,11,0.3);
}
.g-postseason-banner.playin {
  color: #a78bfa;
  background: rgba(167,139,250,0.1);
  border: 1px solid rgba(167,139,250,0.3);
}
.g-glow-overlay { display: none; }
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.88);
  z-index: 2000; display: flex; align-items: center; justify-content: center;
  padding: 24px; backdrop-filter: blur(4px);
}
.modal { background: var(--grey); border: 1px solid var(--border-strong); width: 100%; max-width: 1100px; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: var(--shadow-lg); border-radius: 4px; }
.modal-header {
  display: grid; grid-template-columns: 1fr auto 1fr auto;
  align-items: center; padding: 20px 24px;
  border-bottom: 2px solid var(--white);
  position: sticky; top: 0; background: var(--grey); z-index: 10;
}
.modal-team { display: flex; flex-direction: column; }

<script type="text/babel">
const API = "https://web-production-5f6e1.up.railway.app/api/v1";

function friendlyError(msg) {
  if (!msg) return 'Something went wrong. Try again.';
  const s = msg.toLowerCase();
  if (s.includes('overloaded') || s.includes('529')) return 'Claude is overloaded right now. Try again in a moment.';
  if (s.includes('529')) return 'Claude is overloaded right now. Try again in a moment.';
  if (s.includes('timeout') || s.includes('timed out')) return 'Request timed out. Try again.';
  if (s.includes('502') || s.includes('bad gateway')) return 'We\'re still building out this data. Try again in a moment.';
  if (s.includes('could not compute') || s.includes('no text content')) return 'We\'re adding more data to support this analysis. Try again in a moment.';
  return msg;
}

function localDate(offset = 0) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function getYesterday() { return localDate(-1); }
function getTomorrow()  { return localDate(1); }
function shiftDate(dateStr, delta) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtDateLabel(dateStr) {
  const today = localDate(), yesterday = getYesterday(), tomorrow = getTomorrow();
  if (dateStr === today) return 'Today';
  if (dateStr === yesterday) return 'Yesterday';
  if (dateStr === tomorrow) return 'Tomorrow';
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});
}

function Loader({ label = 'LOADING' }) {
  return <div className="loader"><div className="loader-bar"/>{label}</div>;
}

function getPostseasonLabel(game) {
  if (!game.postseason) return null;
  // Play-in is always the ~4 days before the main playoff bracket opens
  // NBA play-in: typically April 15–18; playoffs: April 19+
  const d = new Date(game.date);
  if (d.getMonth() === 3 && d.getDate() <= 18) return 'PLAY-IN';
  return 'PLAYOFFS';
}

function parseStatus(s) {
  if (!s) return { label: 'SCHEDULED', type: 'sched' };
  const l = s.toLowerCase();
  if (l.includes('final') || l === 'complete') return { label: 'FINAL', type: 'final' };
  if (l.includes('qtr') || l.includes('half') || l === 'in progress') return { label: 'LIVE', type: 'live' };
  try {
    const d = new Date(s);
    if (!isNaN(d)) return { label: d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' }), type: 'sched' };
  } catch(e) {}
  return { label: s.substring(0,18), type: 'sched' };
}

function Ticker() {
  const [scores, setScores] = React.useState([]);
  const [news, setNews] = React.useState([]);

  React.useEffect(() => {
    const today = localDate();
    const loadScores = () =>
      fetch(`${API}/nba/games?date=${today}&_=${Date.now()}`)
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (!data?.games?.length) return;
          setScores(data.games.map(g => {
            const hasScore = g.home_team_score > 0 || g.visitor_team_score > 0;
            const { label, type } = parseStatus(g.status);
            const liveTag = type === 'live' ? `● ${label}  ` : '';
            if (hasScore) return `${liveTag}${g.visitor_team.abbreviation} ${g.visitor_team_score}–${g.home_team_score} ${g.home_team.abbreviation}`;
            try {
              const d = new Date(g.status);
              const t = isNaN(d) ? g.status : d.toLocaleTimeString([], { hour:'numeric', minute:'2-digit', timeZoneName:'short' });
              return `${g.visitor_team.abbreviation} @ ${g.home_team.abbreviation}  ${t}`;
            } catch { return `${g.visitor_team.abbreviation} @ ${g.home_team.abbreviation}`; }
          }));
        }).catch(() => {});

    const loadNews = () =>
      fetch(`${API}/nba/news`)
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d?.headlines?.length) setNews(d.headlines.slice(0, 18)); })
        .catch(() => {});

    loadScores();
    loadNews();
    const scoreIv = setInterval(loadScores, 30000);
    const newsIv = setInterval(loadNews, 300000); // refresh news every 5 min
    return () => { clearInterval(scoreIv); clearInterval(newsIv); };
  }, []);

  // Interleave: score, news, score, news...
  const interleaved = React.useMemo(() => {
    const out = [];
    const maxLen = Math.max(scores.length, news.length);
    for (let i = 0; i < maxLen; i++) {
      if (i < scores.length) out.push({ text: scores[i], type: 'score', source: null });
      if (i < news.length) {
        const n = news[i];
        out.push({ text: n.title || n, type: 'news', source: n.source || null });
      }
    }
    if (!out.length) {
      return [
        { text: 'PIVOT — NBA INTELLIGENCE PLATFORM', type: 'news', source: null },
        { text: "TODAY'S SLATE LOADING", type: 'score', source: null },
        { text: 'GAMES · ANALYSIS · PLAYERS · COACH MODE', type: 'news', source: null },
        { text: 'POWERED BY PIVOT', type: 'score', source: null },
      ];
    }
    return out;
  }, [scores, news]);

  const doubled = [...interleaved, ...interleaved];

  const el = React.useMemo(() => document.getElementById('ticker-root'), []);

  return ReactDOM.createPortal(
    <div className="ticker">
      <div className="ticker-label">LIVE WIRE</div>
      <div className="ticker-track-wrap">
        <div className="ticker-track">
          {doubled.map((item, i) => (
            <React.Fragment key={i}>
              <span className="ticker-item" style={item.type === 'score' ? {color:'var(--green)', textShadow:'0 0 8px rgba(0,255,128,0.5)'} : {color:'rgba(255,255,255,0.75)', textShadow:'none', fontWeight:700, letterSpacing:'1.5px'}}>
                {item.type === 'news' && item.source && (
                  <span style={{color:'rgba(255,255,255,0.32)', fontWeight:700, fontSize:9, letterSpacing:2, marginRight:8, verticalAlign:'middle', textTransform:'uppercase'}}>{item.source}</span>
                )}
                {item.text}
              </span>
              <span className="ticker-sep">{item.type === 'score' ? '◆' : '·'}</span>
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>,
    el
  );
}

function Home({ onNavigate }) {

  const FEATURES = [
    { num:'01', name:'Live Game Engine',    desc:'PIVOT pulls live scoring, play-by-play, and full box scores from every NBA game simultaneously. Auto-syncs every 30 seconds — no manual refresh, no stale data.',   stat:'30s',   statLabel:'Auto-Refresh' },
    { num:'02', name:'AI Analysis',         desc:'PIVOT runs every query through Claude, delivering structured breakdowns of matchups, slates, and player performance in under 15 seconds. No filler — just signal.',   stat:'~15s',  statLabel:'Response Time' },
    { num:'03', name:'Coach Mode',          desc:'PIVOT reads the live box score in real time and returns tactical adjustments, timeout plays, and lineup calls in seconds. Built for the 20-second huddle.',            stat:'20s',   statLabel:'Huddle Window' },
    { num:'04', name:'Player Intelligence', desc:'PIVOT profiles every player across offense, defense, financials, and off-court factors — 8-stat visual grids with last-10-game trend lines built in.',               stat:'8',     statLabel:'Stat Dimensions' },
    { num:'05', name:'Front Office AI',     desc:'PIVOT surfaces cap exposure, salary leverage, and roster construction gaps for all 30 teams using live 2025-26 data. Built for GMs who move before the market does.',stat:'30',    statLabel:'Teams Covered' },
    { num:'06', name:'Export Ready',        desc:'Every PIVOT analysis exports to a clean, shareable PDF in one click. Send professional-grade intelligence to your staff, front office, or investors instantly.',      stat:'1-Click',statLabel:'PDF Export' },
  ];
  const MARQUEE_ITEMS = [
    'Powered by PIVOT', 'Live Box Scores', 'Real-Time Data',
    'Coach Mode', 'Player Intelligence', 'Front Office AI',
    'Powered by PIVOT', 'Live Box Scores', 'Real-Time Data',
    'Coach Mode', 'Player Intelligence', 'Front Office AI',
  ];

  return (
    <div>
      {/* ── Hero ── */}
      <div className="home-wrap" ref={wrapRef}>
        <audio ref={audioRef} src="/static/bg.mp4" loop muted preload="auto"/>
        <video className="home-video" src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260309_042944_4a2205b7-b061-490a-852b-92d9e9955ce9.mp4" autoPlay loop muted playsInline/>
        <div className="home-overlay"/>

          </div>

      {/* ── Marquee ── */}
      <div className="home-marquee-wrap">

}

function GameModal({ game, onClose }) {
  const [boxScore, setBoxScore] = React.useState(null);
  const [bsLoading, setBsLoading] = React.useState(true);
  const { label, type } = parseStatus(game.status);
  const hasScore = game.home_team_score > 0 || game.visitor_team_score > 0;
  const isUpcoming = !hasScore && type === 'sched';

  // Default: live → livefeed, upcoming → analysis, finished → boxscore
  const [activeTab, setActiveTab] = React.useState(type === 'live' ? 'livefeed' : isUpcoming ? 'analysis' : 'boxscore');

  // Analysis tab state
  const [analysisResult, setAnalysisResult] = React.useState(null);
  const [analysisLoading, setAnalysisLoading] = React.useState(false);
  const [analysisError, setAnalysisError] = React.useState(null);
  const analysisFetchedRef = React.useRef(false);

  // Predict tab state (upcoming only)
  const [prediction, setPrediction] = React.useState(null);
  const [predLoading, setPredLoading] = React.useState(false);
  const [predError, setPredError] = React.useState(null);
  const predFetchedRef = React.useRef(false);

  // Shared live state — single poll fed to both LiveStateBanner and LiveFeedTab
  const [liveState, setLiveState] = React.useState(null);
  const [lastUpdated, setLastUpdated] = React.useState(null);
  React.useEffect(() => {
    if (type !== 'live') return;
    const load = () => fetch(`${API}/nba/games/${game.id}/live-state`)
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d) { setLiveState(d); setLastUpdated(new Date()); } })
      .catch(() => {});
    load();
    const iv = setInterval(load, 12000);
    return () => clearInterval(iv);
  }, [game.id]);

  // Box score fetch
  React.useEffect(() => {
    const load = async () => {
      setBsLoading(true);
      try {
        const r = await fetch(`${API}/nba/games/${game.id}/boxscore`);
        if (r.ok) setBoxScore(await r.json());
      } catch(e) {} finally { setBsLoading(false); }
    };
    load();
    if (type === 'live') { const iv = setInterval(load, 10000); return () => clearInterval(iv); }
  }, [game.id]);

  // Lazy-fetch analysis when tab is first activated
  React.useEffect(() => {
    if (activeTab !== 'analysis' || analysisFetchedRef.current) return;
    analysisFetchedRef.current = true;
    setAnalysisLoading(true);
    const doLoad = () => fetch(`${API}/analysis/game`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(game),
    })
      .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail || 'Analysis unavailable'); }))
      .then(data => { setAnalysisResult(data); setAnalysisLoading(false); })
      .catch(e => { setAnalysisError(friendlyError(e.message)); setAnalysisLoading(false); });
    doLoad();
    if (type === 'live') { const iv = setInterval(doLoad, 60000); return () => clearInterval(iv); }
  }, [activeTab]);

  // Lazy-fetch prediction when tab is first activated
  React.useEffect(() => {
    if (activeTab !== 'predict' || predFetchedRef.current) return;
    predFetchedRef.current = true;
    setPredLoading(true);
    fetch(`${API}/analysis/predict-game`, {
      method: 'POST', headers: {'Content-Type':'application/json','X-Pivot-Session':_pivotSessionId},
      body: JSON.stringify(game),
    })
      .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.detail || 'Prediction unavailable'); }))
      .then(data => {
        if (data.error) throw new Error(data.error);
        const confidence = Math.max(55, Math.min(95, parseInt(data.confidence) || 70));
        setPrediction({
          pick: data.pick, confidence,
          key_factor: data.key_factor,
          form_analysis: data.form_analysis,
          injury_impact: data.injury_impact,
          matchup_breakdown: data.matchup_breakdown || data.breakdown,
          player_battles: data.player_battles,
          prediction_rationale: data.prediction_rationale || data.reasoning,
          outlook: data.outlook,
          lineup_matchup: data.lineup_matchup,
          stat_predictions: data.stat_predictions,
          defensive_schemes: data.defensive_schemes,
          offensive_actions: data.offensive_actions,
          lineup_dependencies: data.lineup_dependencies,
        });
        setPredLoading(false);
      })
      .catch(e => { setPredError(friendlyError(e.message)); setPredLoading(false); });
  }, [activeTab]);

  React.useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const StatTable = ({ players, teamName }) => (
    <div>
      <div className="box-team-label">{teamName}</div>
      <table className="box-table">
        <thead><tr>
          <th style={{textAlign:'left', minWidth:160}}>Player</th>
          <th>MIN</th><th>PTS</th><th>REB</th><th>AST</th>
          <th>STL</th><th>BLK</th><th>FG</th><th>3P</th><th>FT</th><th>TO</th>
        </tr></thead>
        <tbody>
          {players.map((p,i) => (
            <tr key={i}>
              <td>{p.player} <span style={{fontSize:9, color:'#444', marginLeft:6}}>{p.pos}</span></td>
              <td>{p.min}</td>
              <td className="box-pts">{p.pts}</td>
              <td>{p.reb}</td><td>{p.ast}</td><td>{p.stl}</td><td>{p.blk}</td>
              <td style={{fontSize:10}}>{p.fg}</td>
              <td style={{fontSize:10}}>{p.fg3}</td>
              <td style={{fontSize:10}}>{p.ft}</td>
              <td>{p.to}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  const tabs = [
    ...(isUpcoming ? [] : [{ id: 'boxscore', label: 'Box Score' }]),
    ...(type === 'live' ? [{ id: 'livefeed', label: '● Live Feed' }] : []),
    { id: 'analysis', label: 'Analysis' },
    ...(isUpcoming ? [{ id: 'predict', label: 'Predict' }] : []),
    { id: 'info', label: 'Game Info' },
  ];

  return (
    <div className="modal-backdrop" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-team">
            {teamLogoUrl(game.visitor_team.abbreviation) && (
              <img src={teamLogoUrl(game.visitor_team.abbreviation)} alt={game.visitor_team.abbreviation}
                width={52} height={52} style={{objectFit:'contain',marginBottom:8}}
                onError={e=>e.currentTarget.style.display='none'}/>
            )}
            <div className="modal-team-city">{game.visitor_team.city}</div>
            <div className="modal-team-name">{game.visitor_team.name.split(' ').pop()}</div>
            <div className="modal-team-abbr">{game.visitor_team.abbreviation}</div>
          </div>
          <div className="modal-score-center">
            {(() => {
              const awayAbbr = game.visitor_team.abbreviation;
              const homeAbbr = game.home_team.abbreviation;
              const awayScore = (type === 'live' && liveState) ? liveState.away_score : game.visitor_team_score;
              const homeScore = (type === 'live' && liveState) ? liveState.home_score  : game.home_team_score;
              const clock = liveState?.clock && liveState.clock !== 'Final' ? liveState.clock : null;
              const showScore = awayScore > 0 || homeScore > 0 || hasScore;

              if (type === 'live' && showScore) {
                return (
                  <div style={{fontFamily:'Helvetica Neue,sans-serif', fontWeight:700, letterSpacing:1, lineHeight:1, textAlign:'center'}}>
                    <div style={{fontSize:13, color:'rgba(255,255,255,0.45)', letterSpacing:3, marginBottom:6, textTransform:'uppercase'}}>
                      {awayAbbr} <span style={{color:'var(--green)', fontSize:36, letterSpacing:2, verticalAlign:'middle'}}>{awayScore} – {homeScore}</span> {homeAbbr}
                      {clock && <span style={{color:'rgba(255,255,255,0.5)', fontSize:13, letterSpacing:3, marginLeft:10}}>| {clock}</span>}
                    </div>
                    <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:10}}>
                      <span className="live-badge">● LIVE</span>
                      {lastUpdated && <span style={{fontSize:8, letterSpacing:2, color:'rgba(255,255,255,0.2)', textTransform:'uppercase'}}>
                        {lastUpdated.toLocaleTimeString([], {hour:'numeric', minute:'2-digit', second:'2-digit'})}
                      </span>}
                    </div>
                  </div>
                );
              }
              return showScore
                ? <><div className="modal-score-big">{awayScore} – {homeScore}</div><div className="modal-status">{label}</div></>
                : <><div className="modal-score-vs">VS</div><div className="modal-status">{label}</div></>;
            })()}
          </div>
          <div className="modal-team home">
            {teamLogoUrl(game.home_team.abbreviation) && (
              <img src={teamLogoUrl(game.home_team.abbreviation)} alt={game.home_team.abbreviation}
                width={52} height={52} style={{objectFit:'contain',marginBottom:8,alignSelf:'flex-end'}}
                onError={e=>e.currentTarget.style.display='none'}/>
            )}
            <div className="modal-team-city">{game.home_team.city}</div>
            <div className="modal-team-name">{game.home_team.name.split(' ').pop()}</div>
            <div className="modal-team-abbr">{game.home_team.abbreviation}</div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {/* Postseason banner */}
        {(() => {
          const ps = getPostseasonLabel(game);
          if (!ps) return null;
          return (
            <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:8, padding:'8px 0',
              background: ps === 'PLAY-IN' ? 'rgba(167,139,250,0.08)' : 'rgba(245,158,11,0.08)',
              borderBottom:'1px solid ' + (ps === 'PLAY-IN' ? 'rgba(167,139,250,0.2)' : 'rgba(245,158,11,0.2)')}}>
              <span style={{fontSize:11}}>{ps === 'PLAYOFFS' ? '🏆' : '⚡'}</span>
              <span style={{fontFamily:'Helvetica Neue,sans-serif', fontSize:9, letterSpacing:4, fontWeight:700,
                color: ps === 'PLAY-IN' ? '#a78bfa' : '#f59e0b', textTransform:'uppercase'}}>
                {ps === 'PLAYOFFS' ? 'NBA Playoffs' : 'NBA Play-In Tournament'}
              </span>
            </div>
          );
        })()}
        {/* Live state banner — quarter scores, clock, momentum, foul trouble */}
        {type === 'live' && (
          <LiveStateBanner state={liveState} homeAbbr={game.home_team.abbreviation} awayAbbr={game.visitor_team.abbreviation}/>
        )}
        <div>
          {/* Green action buttons */}
          <div style={{display:'flex', gap:10, padding:'18px 28px', borderBottom:'1px solid var(--border)', flexWrap:'wrap'}}>
            {tabs.map(t => (

                color: activeTab===t.id ? 'var(--green)' : 'rgba(0,255,128,0.55)',
                border: activeTab===t.id ? '1px solid rgba(0,255,128,0.55)' : '1px solid rgba(0,255,128,0.2)',
                padding:'9px 20px', borderRadius:6,
                fontSize:9, letterSpacing:3, fontWeight:700,
                fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif',
                textTransform:'uppercase', cursor:'pointer', transition:'all 0.15s',
                boxShadow: activeTab===t.id ? 'inset 0 1px 0 rgba(0,255,128,0.18), 0 0 18px rgba(0,255,128,0.1)' : 'none',

          {/* BOX SCORE */}
          {activeTab === 'boxscore' && (
            <div className="box-score">
              {bsLoading && <Loader label="PIVOT COMPUTING"/>}
              {!bsLoading && (!boxScore || boxScore.total_players === 0) && (

              )}
              {!bsLoading && boxScore && boxScore.total_players > 0 && (
                <>
                  <StatTable players={boxScore.away_players||[]} teamName={`${game.visitor_team.city} ${game.visitor_team.name} (Away)`}/>
                  <StatTable players={boxScore.home_players||[]} teamName={`${game.home_team.city} ${game.home_team.name} (Home)`}/>
                </>
              )}
            </div>
          )}

          {/* LIVE FEED */}
          {activeTab === 'livefeed' && (
            <LiveFeedTab state={liveState} homeAbbr={game.home_team.abbreviation} awayAbbr={game.visitor_team.abbreviation}/>

          {/* ANALYSIS */}

                      </span>

                    PIVOT PREDICTION · NOT FINANCIAL ADVICE

          {/* GAME INFO */}
          {activeTab === 'info' && (
            <div style={{padding:'32px 40px'}}>
              {[
                {k:'Home Team', v:`${game.home_team.city} ${game.home_team.name}`},
                {k:'Away Team', v:`${game.visitor_team.city} ${game.visitor_team.name}`},

// ── Shared game-data components used in both Analysis and Predict tabs ─────

// ── Live Feed Tab — play-by-play narrative derived from live state ──────────
function LiveFeedTab({ state, homeAbbr, awayAbbr }) {
  const [events, setEvents] = React.useState([]);
  const prevStateRef = React.useRef(null);

  React.useEffect(() => {
    if (!state) return;
    const s = state;
    const ts = Date.now();
    const p = s.period || 0;
    const periodStr = p <= 4 ? `Q${p}` : p === 5 ? 'OT' : `OT${p-4}`;
    const clock = s.clock && s.clock !== 'Final' ? s.clock : '';
    const timeLabel = `${periodStr}${clock ? ' ' + clock : ''}`;
    const newEvts = [];

    newEvts.push({ id:`score-${ts}`, time:timeLabel, type:'score',
      text:`${awayAbbr} ${s.away_score} — ${homeAbbr} ${s.home_score}` });

    if (s.current_run?.team && s.current_run.points >= 6) {
      const runTeam = s.current_run.team.split(' ').pop();
      newEvts.push({ id:`run-${ts}`, time:periodStr, type:'run',
        text:`${runTeam} on a ${s.current_run.points}-${s.current_run.opponent_points} run in ${s.current_run.period}` });
    }
    if (s.momentum !== 'even') {
      newEvts.push({ id:`mom-${ts}`, time:periodStr, type:'momentum',
        text:`${s.momentum === 'home' ? homeAbbr : awayAbbr} with the momentum edge` });
    }
    (s.top_performers || []).slice(0,3).forEach(pl => {
      const parts = [pl.pts != null && `${pl.pts} PTS`, pl.reb != null && `${pl.reb} REB`, pl.ast != null && `${pl.ast} AST`].filter(Boolean);
      if (parts.length) newEvts.push({ id:`perf-${pl.player}-${ts}`, time:periodStr, type:'performer',
        text:`${pl.player} — ${parts.join(', ')}` });
    });
    (s.hot_shooters || []).forEach(pl => {
      newEvts.push({ id:`hot-${pl.player}-${ts}`, time:periodStr, type:'hot',
        text:`${pl.player} running hot — ${pl.fgm}/${pl.fga} FG` });
    });
    (s.foul_trouble || []).forEach(f => {
      newEvts.push({ id:`foul-${f.player}-${ts}`, time:periodStr, type:'foul',
        text:`${f.player} in foul trouble — ${f.pf} PF` });
    });
    (s.high_turnover_players || []).forEach(pl => {
      newEvts.push({ id:`to-${pl.player}-${ts}`, time:periodStr, type:'to',
        text:`${pl.player} — ${pl.to} turnovers` });
    });

    setEvents(prev => [...newEvts, ...prev].slice(0, 40));
    prevStateRef.current = s;
  }, [state]);

  const TYPE_STYLES = {
    score:     { color: 'var(--white)',             icon: '●', iconColor: 'var(--green)' },
    run:       { color: 'rgba(255,180,60,0.9)',      icon: '▲', iconColor: 'rgba(255,180,60,0.9)' },
    momentum:  { color: 'rgba(0,255,128,0.8)',       icon: '⇉', iconColor: 'rgba(0,255,128,0.8)' },
    performer: { color: 'rgba(255,255,255,0.75)',    icon: '★', iconColor: 'rgba(255,200,80,0.8)' },
    hot:       { color: 'rgba(255,160,60,0.85)',     icon: '🔥', iconColor: 'transparent' },
    foul:      { color: 'rgba(255,80,80,0.8)',       icon: '⊗', iconColor: 'rgba(255,80,80,0.8)' },
    to:        { color: 'rgba(255,120,80,0.75)',     icon: '⚠', iconColor: 'rgba(255,120,80,0.7)' },
  };

  if (!state) return <div style={{padding:'40px', textAlign:'center', fontSize:10, letterSpacing:4, color:'#444'}}>Awaiting live data…</div>;

  const HN = "'Helvetica Neue',Helvetica,Arial,sans-serif";
  const qs = state.quarter_summary || [];
  const p = state.period || 0;
  const periodStr = p <= 4 ? `Q${p}` : p === 5 ? 'OT' : `OT${p-4}`;

  return (
    <div>
      {/* ── Live clock + score ── */}
      <div style={{padding:'16px 28px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:24, background:'rgba(0,0,0,0.2)', flexWrap:'wrap'}}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <span style={{width:8, height:8, borderRadius:'50%', background:'var(--green)', display:'inline-block', animation:'live-ping 1.2s ease-out infinite'}}/>
          <span style={{fontFamily:HN, fontSize:26, fontWeight:700, color:'var(--green)', letterSpacing:1, fontVariantNumeric:'tabular-nums'}}>{periodStr}</span>
          {state.clock && state.clock !== 'Final' && (
            <span style={{fontFamily:HN, fontSize:22, fontWeight:700, color:'rgba(255,255,255,0.85)', letterSpacing:2, fontVariantNumeric:'tabular-nums'}}>{state.clock}</span>
          )}
        </div>
        <div style={{display:'flex', alignItems:'center', gap:14}}>
          <div style={{textAlign:'center'}}>
            <div style={{fontFamily:HN, fontSize:9, letterSpacing:3, color:'rgba(255,255,255,0.38)', fontWeight:700, marginBottom:2}}>{awayAbbr}</div>
            <div style={{fontFamily:HN, fontSize:30, fontWeight:700, color:'var(--white)', letterSpacing:0, lineHeight:1}}>{state.away_score}</div>
          </div>
          <div style={{fontFamily:HN, fontSize:14, color:'rgba(255,255,255,0.2)', fontWeight:700}}>—</div>
          <div style={{textAlign:'center'}}>
            <div style={{fontFamily:HN, fontSize:9, letterSpacing:3, color:'rgba(255,255,255,0.38)', fontWeight:700, marginBottom:2}}>{homeAbbr}</div>
            <div style={{fontFamily:HN, fontSize:30, fontWeight:700, color:'var(--white)', letterSpacing:0, lineHeight:1}}>{state.home_score}</div>
          </div>
        </div>
        {/* Bonus / timeouts */}
        <div style={{display:'flex', gap:8, flexWrap:'wrap', marginLeft:'auto'}}>
          {state.away_in_bonus  && <span style={{fontFamily:HN, fontSize:8, letterSpacing:2, fontWeight:700, color:'rgba(255,180,60,0.85)', background:'rgba(255,180,60,0.08)', border:'1px solid rgba(255,180,60,0.2)', borderRadius:3, padding:'2px 8px'}}>{awayAbbr} BONUS</span>}
          {state.home_in_bonus  && <span style={{fontFamily:HN, fontSize:8, letterSpacing:2, fontWeight:700, color:'rgba(255,180,60,0.85)', background:'rgba(255,180,60,0.08)', border:'1px solid rgba(255,180,60,0.2)', borderRadius:3, padding:'2px 8px'}}>{homeAbbr} BONUS</span>}
          {state.away_timeouts != null && <span style={{fontFamily:HN, fontSize:8, letterSpacing:2, fontWeight:700, color:'rgba(255,255,255,0.3)', padding:'2px 6px'}}>{awayAbbr} TO: {state.away_timeouts}</span>}
          {state.home_timeouts != null && <span style={{fontFamily:HN, fontSize:8, letterSpacing:2, fontWeight:700, color:'rgba(255,255,255,0.3)', padding:'2px 6px'}}>{homeAbbr} TO: {state.home_timeouts}</span>}
          <span style={{fontFamily:HN, fontSize:8, letterSpacing:3, color:'rgba(0,255,128,0.3)', fontWeight:700}}>AUTO-REFRESH 15s</span>
        </div>
      </div>

      {/* ── Quarter history ── */}
      {qs.length > 0 && (
        <div style={{padding:'16px 28px', borderBottom:'1px solid var(--border)', background:'rgba(0,0,0,0.12)'}}>
          <div style={{fontFamily:HN, fontSize:8, letterSpacing:4, color:'rgba(0,255,128,0.6)', fontWeight:700, textTransform:'uppercase', marginBottom:12}}>Quarter History</div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%', borderCollapse:'collapse', fontFamily:HN, fontSize:11}}>
              <thead>
                <tr>
                  <th style={{textAlign:'left', padding:'4px 10px 4px 0', fontFamily:HN, fontSize:8, letterSpacing:3, color:'rgba(255,255,255,0.25)', fontWeight:700, minWidth:44}}>TEAM</th>
                  {qs.map(q => (
                    <th key={q.period} style={{textAlign:'center', padding:'4px 12px', fontFamily:HN, fontSize:8, letterSpacing:3, color:'rgba(255,255,255,0.25)', fontWeight:700}}>{q.period}</th>
                  ))}
                  <th style={{textAlign:'center', padding:'4px 0 4px 12px', fontFamily:HN, fontSize:8, letterSpacing:3, color:'rgba(255,255,255,0.5)', fontWeight:700}}>T</th>
                </tr>
              </thead>
              <tbody>
                {[
                  { abbr: awayAbbr, scores: qs.map(q => ({ v: q.away, won: q.winner === 'away' })), total: state.away_score },
                  { abbr: homeAbbr, scores: qs.map(q => ({ v: q.home, won: q.winner === 'home' })), total: state.home_score },
                ].map(row => (
                  <tr key={row.abbr}>
                    <td style={{padding:'8px 10px 8px 0', fontFamily:HN, fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.75)'}}>{row.abbr}</td>
                    {row.scores.map((cell, i) => (
                      <td key={i} style={{textAlign:'center', padding:'8px 12px', fontFamily:HN, fontSize:13, fontWeight:700,
                        color: cell.won ? 'rgba(0,255,128,0.95)' : 'rgba(255,255,255,0.45)'}}>
                        {cell.v}
                        {cell.won && <span style={{display:'block', width:4, height:2, background:'rgba(0,255,128,0.5)', borderRadius:1, margin:'2px auto 0'}}/>}
                      </td>
                    ))}
                    <td style={{textAlign:'center', padding:'8px 0 8px 12px', fontFamily:HN, fontSize:15, fontWeight:900, color:'var(--white)'}}>{row.total}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {/* Quarter margin summary */}
          <div style={{display:'flex', gap:6, marginTop:10, flexWrap:'wrap'}}>
            {qs.map(q => {
              const winner = q.winner === 'home' ? homeAbbr : q.winner === 'away' ? awayAbbr : null;
              if (!winner) return null;
              return (
                <span key={q.period} style={{fontFamily:HN, fontSize:8, letterSpacing:2, fontWeight:700,
                  color:'rgba(255,255,255,0.45)', background:'rgba(255,255,255,0.04)',
                  border:'1px solid rgba(255,255,255,0.07)', borderRadius:3, padding:'2px 8px'}}>
                  {q.period} → {winner} +{q.margin}
                </span>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Stat leaders ── */}
      {(state.top_performers || []).length > 0 && (
        <div style={{padding:'16px 28px', borderBottom:'1px solid var(--border)'}}>
          <div style={{fontFamily:HN, fontSize:8, letterSpacing:4, color:'rgba(0,255,128,0.6)', fontWeight:700, textTransform:'uppercase', marginBottom:10}}>Stat Leaders</div>
          <div style={{display:'flex', flexDirection:'column', gap:6}}>
            {(state.top_performers || []).map((pl, i) => {
              const stats = [
                pl.pts  != null && { lbl:'PTS', val:pl.pts  },
                pl.reb  != null && { lbl:'REB', val:pl.reb  },
                pl.ast  != null && { lbl:'AST', val:pl.ast  },
                pl.stl  != null && pl.stl > 0 && { lbl:'STL', val:pl.stl },
                pl.blk  != null && pl.blk > 0 && { lbl:'BLK', val:pl.blk },
              ].filter(Boolean);
              return (
                <div key={pl.player} style={{display:'flex', alignItems:'center', gap:12, padding:'8px 12px',
                  background:'rgba(255,255,255,0.025)', borderRadius:6,
                  border:`1px solid ${i === 0 ? 'rgba(0,255,128,0.12)' : 'rgba(255,255,255,0.05)'}`}}>
                  <div style={{fontFamily:HN, fontSize:13, fontWeight:700, color:'rgba(255,255,255,0.85)', textTransform:'none', letterSpacing:0, minWidth:140}}>{pl.player}</div>
                  <div style={{display:'flex', gap:12, flexWrap:'wrap'}}>
                    {stats.map(s => (
                      <div key={s.lbl} style={{textAlign:'center'}}>
                        <div style={{fontFamily:HN, fontSize:15, fontWeight:700, color: i===0 && s.lbl==='PTS' ? 'var(--green)' : 'var(--white)', lineHeight:1}}>{s.val}</div>
                        <div style={{fontFamily:HN, fontSize:7, letterSpacing:2, color:'rgba(255,255,255,0.3)', fontWeight:700, marginTop:2}}>{s.lbl}</div>
                      </div>
                    ))}
                  </div>
                  {pl.fgm != null && pl.fga != null && (
                    <div style={{marginLeft:'auto', fontFamily:HN, fontSize:10, color:'rgba(255,255,255,0.3)', fontWeight:700, textTransform:'none', letterSpacing:0}}>{pl.fgm}/{pl.fga} FG</div>
                  )}
                </div>
              );
            })}
          </div>
          {/* Cold shooters */}
          {(state.cold_shooters || []).length > 0 && (
            <div style={{marginTop:10, display:'flex', gap:6, flexWrap:'wrap'}}>
              {state.cold_shooters.map(pl => (
                <span key={pl.player} style={{fontFamily:HN, fontSize:8, letterSpacing:2, fontWeight:700,
                  color:'rgba(160,160,255,0.7)', background:'rgba(120,120,255,0.05)',
                  border:'1px solid rgba(120,120,255,0.15)', borderRadius:3, padding:'2px 8px'}}>
                  {pl.player.split(' ').pop()} {pl.fgm}/{pl.fga} FG (cold)
                </span>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── Rolling updates ── */}
      <div style={{maxHeight:320, overflowY:'auto'}}>
        <div style={{padding:'12px 28px 6px', fontFamily:HN, fontSize:8, letterSpacing:4, color:'rgba(0,255,128,0.6)', fontWeight:700, textTransform:'uppercase'}}>Live Updates</div>
        {events.map((evt, i) => {
          const st = TYPE_STYLES[evt.type] || TYPE_STYLES.score;
          return (
            <div key={evt.id || i} style={{display:'flex', alignItems:'baseline', gap:12, padding:'9px 28px',
              borderBottom:'1px solid rgba(255,255,255,0.03)',
              background: i === 0 ? 'rgba(0,255,128,0.025)' : 'transparent'}}>
              <span style={{fontFamily:HN, fontSize:9, letterSpacing:2, color:'rgba(255,255,255,0.22)', fontWeight:700, minWidth:52, flexShrink:0, textTransform:'uppercase'}}>{evt.time}</span>
              <span style={{fontSize:10, color:st.iconColor, flexShrink:0, width:14}}>{st.icon}</span>
              <span style={{fontFamily:HN, fontSize:13, color:st.color, fontWeight: i===0 ? 700 : 400, textTransform:'none', letterSpacing:0, lineHeight:1.4}}>{evt.text}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Live State Banner — shown in GameModal for live games ──────────────────
function LiveStateBanner({ state, homeAbbr, awayAbbr }) {
  if (!state) return null;

  const qs = state.quarter_summary || [];
  const labels = ['Q1','Q2','Q3','Q4','OT1','OT2','OT3'];

  return (
    <div style={{borderBottom:'1px solid var(--border)', background:'rgba(0,0,0,0.35)', padding:'14px 28px'}}>
      {/* Score grid */}
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%', borderCollapse:'collapse', fontFamily:'Helvetica Neue, sans-serif', fontSize:11, letterSpacing:1}}>
          <thead>
            <tr style={{color:'rgba(255,255,255,0.3)', fontSize:8, letterSpacing:3}}>
              <th style={{textAlign:'left', padding:'4px 8px 4px 0', minWidth:60}}>TEAM</th>
              {qs.map(q => <th key={q.period} style={{textAlign:'center', padding:'4px 10px', color: q.period === state.period_label ? 'var(--green)' : 'rgba(255,255,255,0.3)'}}>{q.period}</th>)}
              {state.is_live && <th style={{textAlign:'center', padding:'4px 10px', color:'var(--green)'}}>{state.period_label}</th>}
              <th style={{textAlign:'center', padding:'4px 0 4px 10px', color:'rgba(255,255,255,0.55)', minWidth:36}}>T</th>
            </tr>
          </thead>
          <tbody>
            {[
              { abbr: awayAbbr, name: state.away_team?.name, score: state.away_score, qs: qs.map(q => q.away), timeouts: state.away_timeouts, bonus: state.away_in_bonus },
              { abbr: homeAbbr, name: state.home_team?.name, score: state.home_score, qs: qs.map(q => q.home), timeouts: state.home_timeouts, bonus: state.home_in_bonus },
            ].map(row => (
              <tr key={row.abbr}>
                <td style={{padding:'6px 8px 6px 0', fontWeight:700, color:'rgba(255,255,255,0.82)', fontSize:12}}>{row.abbr}</td>
                {row.qs.map((v, i) => (
                  <td key={i} style={{textAlign:'center', padding:'6px 10px',
                    color: v > (i < qs.length ? (row.abbr === awayAbbr ? qs[i].home : qs[i].away) : 0) ? 'rgba(0,255,128,0.9)' : 'rgba(255,255,255,0.5)',
                    fontSize:12, fontWeight:600}}>{v}</td>
                ))}
                {state.is_live && <td style={{textAlign:'center', padding:'6px 10px', color:'rgba(255,255,255,0.25)', fontSize:11}}>—</td>}
                <td style={{textAlign:'center', padding:'6px 0 6px 10px', fontWeight:900, fontSize:14, color:'var(--white)'}}>{row.score}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Clock + flags row */}
      <div style={{display:'flex', flexWrap:'wrap', gap:12, marginTop:10, alignItems:'center'}}>
        <div style={{display:'flex', alignItems:'center', gap:8}}>
          <span style={{width:6, height:6, borderRadius:'50%', background:'var(--green)', display:'inline-block', animation:'live-ping 1.2s ease-out infinite'}}/>
          <span style={{fontSize:10, letterSpacing:3, color:'var(--green)', fontWeight:700}}>{state.period_label}</span>
          {state.clock && state.clock !== 'Final' && <span style={{fontSize:12, color:'rgba(255,255,255,0.75)', fontWeight:700, letterSpacing:1}}>{state.clock}</span>}
        </div>
        {state.momentum !== 'even' && (
          <span style={{fontSize:8, letterSpacing:2, color:'rgba(0,255,128,0.7)', fontWeight:700, background:'rgba(0,255,128,0.06)', border:'1px solid rgba(0,255,128,0.18)', borderRadius:3, padding:'2px 8px'}}>
            {state.momentum === 'home' ? homeAbbr : awayAbbr} MOMENTUM
          </span>
        )}
        {state.current_run?.team && (
          <span style={{fontSize:8, letterSpacing:2, color:'rgba(255,180,60,0.85)', fontWeight:700, background:'rgba(255,180,60,0.06)', border:'1px solid rgba(255,180,60,0.2)', borderRadius:3, padding:'2px 8px'}}>
            {state.current_run.team.split(' ').pop().toUpperCase()} RUN · {state.current_run.points}-{state.current_run.opponent_points} IN {state.current_run.period}
          </span>
        )}
        {state.foul_trouble?.map(f => (
          <span key={f.player} style={{fontSize:8, letterSpacing:2, color:'rgba(255,80,80,0.8)', fontWeight:700, background:'rgba(255,80,80,0.05)', border:'1px solid rgba(255,80,80,0.18)', borderRadius:3, padding:'2px 8px'}}>
            {f.player.split(' ').pop()} {f.pf} PF
          </span>
        ))}
        <span style={{marginLeft:'auto', fontSize:8, letterSpacing:3, color:'rgba(0,255,128,0.35)', fontWeight:700}}>AUTO-REFRESH 15s</span>
      </div>
    </div>
  );
}

function TacticalSection({ title, items, renderRow }) {
  if (!items || items.length === 0) return null;
  return (
    <div>
      <div style={{fontSize:8, letterSpacing:3, color:'rgba(0,255,128,0.55)', fontWeight:700, marginBottom:12}}>{title}</div>
      <div style={{display:'flex', flexDirection:'column', gap:10}}>
        {items.map((item, i) => (
          <div key={i} style={{padding:'12px 16px', background:'rgba(255,255,255,0.025)',
            border:'1px solid rgba(255,255,255,0.06)', borderRadius:7}}>
            {renderRow(item)}
          </div>
        ))}
      </div>
    </div>
  );
}

function DefensiveSchemes({ items }) {
  return (
    <TacticalSection title="DEFENSIVE SCHEMES" items={items} renderRow={item => (
      <div style={{display:'flex', flexDirection:'column', gap:6}}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <span style={{fontSize:9, letterSpacing:2, color:'var(--green)', fontWeight:700}}>{item.team}</span>
          <span style={{fontSize:10, letterSpacing:1, color:'rgba(255,255,255,0.75)', fontWeight:600, textTransform:'none'}}>{item.scheme}</span>

        </div>
        {item.vulnerability && (
          <div style={{fontSize:12, color:'rgba(255,255,255,0.62)', lineHeight:1.6, textTransform:'none', letterSpacing:0}}>

            {item.vulnerability}
          </div>
        )}
      </div>

}

function OffensiveActions({ items }) {

    <TacticalSection title="OFFENSIVE ACTIONS" items={items} renderRow={item => (
      <div style={{display:'flex', flexDirection:'column', gap:6}}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <span style={{fontSize:9, letterSpacing:2, color:'var(--green)', fontWeight:700}}>{item.team}</span>
          <span style={{fontSize:10, letterSpacing:1, color:'rgba(255,255,255,0.75)', fontWeight:600, textTransform:'none'}}>{item.action}</span>
        </div>
        {item.detail && (
          <div style={{fontSize:12, color:'rgba(255,255,255,0.62)', lineHeight:1.6, textTransform:'none', letterSpacing:0}}>{item.detail}</div>
        )}
      </div>
    )}/>
  );
}

function LineupDependencies({ items }) {
  return (
    <TacticalSection title="LINEUP DEPENDENCIES" items={items} renderRow={item => (
      <div style={{display:'flex', flexDirection:'column', gap:6}}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <span style={{fontSize:9, letterSpacing:2, color:'var(--green)', fontWeight:700}}>{item.team}</span>
          <span style={{fontSize:10, letterSpacing:1, color:'rgba(255,255,255,0.75)', fontWeight:600, textTransform:'none'}}>{item.pairing}</span>
        </div>
        {item.effect && (
          <div style={{fontSize:12, color:'rgba(255,255,255,0.62)', lineHeight:1.6, textTransform:'none', letterSpacing:0}}>{item.effect}</div>

        {item.risk && (
          <div style={{fontSize:11, color:'rgba(255,180,60,0.65)', lineHeight:1.5, textTransform:'none', letterSpacing:0}}>
            <span style={{fontSize:8, letterSpacing:2, color:'rgba(255,180,60,0.7)', fontWeight:700, marginRight:6}}>RISK</span>

}

  if (!rows || rows.length === 0) return null;
  return (
    <div style={{marginBottom:4}}>
      <div style={{fontSize:8, letterSpacing:3, color:'rgba(0,255,128,0.55)', fontWeight:700, marginBottom:12}}>{label || 'LINEUP MATCHUP'}</div>
      <div style={{border:'1px solid rgba(255,255,255,0.07)', borderRadius:8, overflow:'hidden'}}>
        {/* Header */}
        <div style={{display:'grid', gridTemplateColumns:'1fr 48px 1fr', background:'rgba(255,255,255,0.04)',
          padding:'8px 16px', borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
          <div style={{fontSize:9, letterSpacing:2, color:'var(--green)', fontWeight:700}}>{awayAbbr} (AWAY)</div>
          <div style={{fontSize:8, letterSpacing:1, color:'rgba(255,255,255,0.25)', fontWeight:700, textAlign:'center'}}>POS</div>
          <div style={{fontSize:9, letterSpacing:2, color:'var(--green)', fontWeight:700, textAlign:'right'}}>{homeAbbr} (HOME)</div>

        {rows.map((r, i) => (
          <div key={i} style={{display:'grid', gridTemplateColumns:'1fr 48px 1fr',

            background: i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.015)'}}>
            <div style={{fontSize:12, fontWeight:600, color:'rgba(255,255,255,0.82)', letterSpacing:0, textTransform:'none'}}>{r.away}</div>
            <div style={{fontSize:9, letterSpacing:1, color:'rgba(0,255,128,0.7)', fontWeight:700, textAlign:'center',
              background:'rgba(0,255,128,0.06)', borderRadius:3, display:'flex', alignItems:'center', justifyContent:'center',
              margin:'0 4px'}}>{r.pos}</div>
            <div style={{fontSize:12, fontWeight:600, color:'rgba(255,255,255,0.82)', letterSpacing:0, textTransform:'none', textAlign:'right'}}>{r.home}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function StatPredictions({ rows, homeAbbr, awayAbbr, label }) {
  if (!rows || rows.length === 0) return null;
  const edgeColor = (edge, side) =>
    edge === side ? 'var(--green)' : edge === 'even' ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.38)';
  return (
    <div style={{marginBottom:4}}>
      <div style={{fontSize:8, letterSpacing:3, color:'rgba(0,255,128,0.55)', fontWeight:700, marginBottom:12}}>{label || 'STAT PROJECTIONS'}</div>
      <div style={{border:'1px solid rgba(255,255,255,0.07)', borderRadius:8, overflow:'hidden'}}>
        {/* Header */}
        <div style={{display:'grid', gridTemplateColumns:'1fr 80px 1fr', background:'rgba(255,255,255,0.04)',
          padding:'8px 16px', borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
          <div style={{fontSize:9, letterSpacing:2, color:'var(--green)', fontWeight:700}}>{awayAbbr}</div>
          <div style={{fontSize:8, letterSpacing:1, color:'rgba(255,255,255,0.25)', fontWeight:700, textAlign:'center'}}>STAT</div>
          <div style={{fontSize:9, letterSpacing:2, color:'var(--green)', fontWeight:700, textAlign:'right'}}>{homeAbbr}</div>
        </div>
        {rows.map((r, i) => {
          const awayWins = r.edge === 'away';
          const homeWins = r.edge === 'home';
          return (
            <div key={i} style={{borderBottom: i < rows.length-1 ? '1px solid rgba(255,255,255,0.04)' : 'none',
              background: i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.015)'}}>
              <div style={{display:'grid', gridTemplateColumns:'1fr 80px 1fr', padding:'10px 16px 4px'}}>
                <div style={{fontSize:14, fontWeight:700, color: edgeColor(r.edge,'away'), letterSpacing:0}}>
                  {typeof r.away_val === 'number' && r.away_val < 1 ? `${(r.away_val*100).toFixed(1)}%` : r.away_val}
                  {awayWins && <span style={{fontSize:8, color:'var(--green)', marginLeft:4}}>▲</span>}
                </div>
                <div style={{fontSize:8, letterSpacing:2, color:'rgba(255,255,255,0.35)', fontWeight:700, textAlign:'center', alignSelf:'center'}}>{r.stat}</div>
                <div style={{fontSize:14, fontWeight:700, color: edgeColor(r.edge,'home'), letterSpacing:0, textAlign:'right'}}>
                  {homeWins && <span style={{fontSize:8, color:'var(--green)', marginRight:4}}>▲</span>}
                  {typeof r.home_val === 'number' && r.home_val < 1 ? `${(r.home_val*100).toFixed(1)}%` : r.home_val}
                </div>
              </div>
              {r.note && (
                <div style={{padding:'0 16px 8px', fontSize:10, color:'rgba(255,255,255,0.32)', letterSpacing:0, textTransform:'none', lineHeight:1.4}}>{r.note}</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// BDL abbreviation → ESPN CDN slug (BDL uses GS/NY/SA/NO; ESPN uses gsw/ny/sas/no)
const BDL_SLUG = {
  ATL:'atl',BOS:'bos',BKN:'bkn',BRK:'bkn',CHA:'cha',CHI:'chi',CLE:'cle',DAL:'dal',DEN:'den',
  DET:'det',GS:'gsw',GSW:'gsw',HOU:'hou',IND:'ind',LAC:'lac',LAL:'lal',MEM:'mem',MIA:'mia',
  MIL:'mil',MIN:'min',NO:'no',NOP:'no',NY:'ny',NYK:'ny',OKC:'okc',ORL:'orl',PHI:'phi',
  PHX:'phx',POR:'por',SAC:'sac',SA:'sas',SAS:'sas',TOR:'tor',UTA:'utah',WAS:'was',WSH:'was',
};
function teamLogoUrl(abbr) {
  if (!abbr) return null;
  const slug = BDL_SLUG[abbr.toUpperCase()];
  return slug ? `https://a.espncdn.com/i/teamlogos/nba/500/${slug}.png` : null;
}

function GameCard({ g, onSelect, records = {} }) {
  const { label, type } = parseStatus(g.status);
  const hasScore = g.home_team_score > 0 || g.visitor_team_score > 0;
  const isLive = type === 'live';

  return (
    <div className="g-card2" onClick={() => onSelect(g)}>

      {/* Status */}
      <div className={`g-status-badge${isLive ? ' live' : ''}`}>
        {isLive && <span className="g-live-dot"/>}
        {isLive ? (() => {
          const p = g.period || 0;
          const periodStr = p === 0 ? 'LIVE' : p <= 4 ? `Q${p}` : p === 5 ? 'OT' : `OT${p-4}`;
          const clockStr = g.time && g.time !== '' ? ` ${g.time}` : '';
          return periodStr + clockStr;
        })() : label}
      </div>

      {/* Teams */}
      <div>
        <TeamRow team={g.visitor_team} score={g.visitor_team_score} isLive={isLive} hasScore={hasScore} record={records[g.visitor_team.abbreviation]}/>
        <div className="g-team-sep"/>
        <TeamRow team={g.home_team} score={g.home_team_score} isLive={isLive} hasScore={hasScore} record={records[g.home_team.abbreviation]}/>
      </div>

      {/* Footer */}
      <div className="g-card-footer" style={{marginTop:'auto'}}>
        {(() => {
          const ps = getPostseasonLabel(g);
          if (ps) return <span className={`g-postseason-banner ${ps === 'PLAY-IN' ? 'playin' : 'playoffs'}`}>{ps === 'PLAYOFFS' ? '🏆' : '⚡'} {ps}</span>;
          const hc = g.home_team?.conference, ac = g.visitor_team?.conference;
          const hd = g.home_team?.division,   ad = g.visitor_team?.division;
          const pill = hd && hd === ad ? `${hd} · DIV` : hc && hc !== ac ? `${hc} vs ${ac}` : [hc, hd].filter(Boolean).join(' · ');
          return <span className="g-conf-pill">{pill}</span>;
        })()}
        <span className="g-box-link">Open →</span>
      </div>
    </div>
  );
}

function Games() {
  const [games, setGames] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [selectedGame, setSelectedGame] = React.useState(null);
  const [activeDate, setActiveDate] = React.useState(localDate());
  const [showCal, setShowCal] = React.useState(false);
  const [calMonth, setCalMonth] = React.useState(() => {
    const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() };
  });
  const [recordMap, setRecordMap] = React.useState({});
  const today = localDate();
  const tomorrow = getTomorrow();
  const HV = "'Helvetica Neue',Helvetica,Arial,sans-serif";

  React.useEffect(() => {
    fetch(`${API}/standings`)
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data?.league) return;
        const map = {};
        data.league.forEach(t => { map[t.abbr] = t.rec || `${t.wins}-${t.losses}`; });
        setRecordMap(map);
      }).catch(() => {});
  }, []);

  const fetch_ = async (d) => {
    const date = d || today;
    setActiveDate(date);
    setShowCal(false);
    setLoading(true); setError(null);
    try {
      const r = await fetch(`${API}/nba/games?date=${date}&_=${Date.now()}`);
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      setGames(data.games || []);
    } catch(e) { setError(friendlyError(e.message)); } finally { setLoading(false); }
  };

  React.useEffect(() => { fetch_(); }, []);

  const hasLive = games.some(g => { const l = g.status?.toLowerCase()||''; return l.includes('qtr')||l.includes('half')||l==='in progress'; });

  React.useEffect(() => {
    if (!hasLive || activeDate !== today) return;
    const iv = setInterval(() => fetch_(today), 10000);
    return () => clearInterval(iv);
  }, [hasLive, activeDate]);

  // Calendar grid helpers
  const calDays = () => {
    const { y, m } = calMonth;
    const first = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < first; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    return cells;
  };
  const calDateStr = (d) => {
    const { y, m } = calMonth;
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  };
  const isFuture = (d) => calDateStr(d) > tomorrow;
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const isTodayDate = activeDate === today;
  const isTomorrowDate = activeDate === tomorrow;
  const canGoForward = activeDate < tomorrow; // allow up to tomorrow
  const dateLabel = fmtDateLabel(activeDate);

  return (
    <div>
