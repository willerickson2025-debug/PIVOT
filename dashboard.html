<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PIVOT</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #000000;
  --white: #FFFFFF;
  --green: #00FF41;
  --grey: #111111;
  --grey2: #1A1A1A;
  --border: #222222;
}
html, body {
  background: var(--black);
  color: var(--white);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  min-height: 100vh;
  overflow-x: hidden;
}
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  gap: 0;
}
nav.scrolled {
  background: rgba(0,0,0,0.95);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  display: flex;
  align-items: center;
  padding: 0 40px;
  font-size: 28px;
  letter-spacing: 14px;
  color: var(--white);
  cursor: pointer;
  white-space: nowrap;
  font-weight: 700;
}
.nav-tabs { display: flex; align-items: stretch; height: 64px; }
.nav-tab {
  display: flex;
  align-items: center;
  padding: 0 36px;
  font-size: 11px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.4);
  border: none;
  background: none;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  position: relative;
}
.nav-tab:hover { color: var(--white); }
.nav-tab.active { color: var(--white); }
.nav-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── HOME ── */
.home-wrap {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.home-video {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
  opacity: 0.35;
}
.home-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%);
  z-index: 1;
}
.home-center {
  position: relative;
  z-index: 2;
  text-align: center;
}
.home-pivot-text {
  font-size: clamp(80px, 18vw, 220px);
  letter-spacing: 24px;
  color: var(--white);
  font-weight: 700;
  line-height: 1;
  text-indent: 24px;
}

/* ── TICKER ── */
.ticker {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 40px;
  background: var(--black);
  border-top: 2px solid var(--green);
  display: flex;
  align-items: center;
  overflow: hidden;
  z-index: 1000;
}
.ticker-label {
  flex-shrink: 0;
  background: var(--green);
  color: var(--black);
  font-size: 9px;
  letter-spacing: 3px;
  padding: 0 16px;
  height: 100%;
  display: flex;
  align-items: center;
  font-weight: 700;
  white-space: nowrap;
  z-index: 2;
}
.ticker-track-wrap {
  flex: 1;
  overflow: hidden;
  height: 100%;
  display: flex;
  align-items: center;
}
.ticker-track {
  display: flex;
  align-items: center;
  white-space: nowrap;
  animation: ticker-scroll 40s linear infinite;
  will-change: transform;
}
.ticker-track:hover { animation-play-state: paused; }
@keyframes ticker-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.ticker-item {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--green);
  padding: 0 32px;
  text-shadow: 0 0 8px rgba(0,255,65,0.4);
  white-space: nowrap;
}
.ticker-sep {
  color: #1a1a1a;
  font-size: 14px;
  padding: 0 8px;
}

.toolbar {
  height: 60px;
  border-bottom: 2px solid var(--white);
  display: flex;
  align-items: stretch;
  background: var(--black);
}
.tb-btn {
  background: var(--black);
  border: none;
  border-right: 1px solid var(--border);
  color: var(--green);
  font-size: 12px;
  letter-spacing: 3px;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  padding: 0 28px;
  cursor: pointer;
  transition: all 0.1s;
  white-space: nowrap;
}
.tb-btn:hover { background: var(--green); color: var(--black); }
.tb-btn:disabled { color: #333; cursor: not-allowed; }
.tb-input {
  background: var(--black);
  border: none;
  border-right: 1px solid var(--border);
  color: var(--white);
  font-size: 12px;
  letter-spacing: 2px;
  font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  padding: 0 20px;
  outline: none;
  width: 220px;
}
.tb-input::placeholder { color: #333; }
.tb-info {
  display: flex;
  align-items: center;
  padding: 0 24px;
  font-size: 11px;
  letter-spacing: 3px;
  color: #333;
  margin-left: auto;
  border-left: 1px solid var(--border);
}

/* ── GAMES GRID ── */
.g-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); }
.g-card {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 28px;
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.g-card:hover { background: var(--grey); }
.g-card.sel { background: var(--grey2); }
.g-card.sel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
}
.g-time { font-size: 11px; letter-spacing: 3px; color: var(--green); margin-bottom: 24px; }
.g-matchup { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; margin-bottom: 20px; }
.g-team-a { text-align: left; }
.g-team-h { text-align: right; }
.g-city { font-size: 9px; letter-spacing: 3px; color: #444; margin-bottom: 4px; }
.g-name { font-size: 28px; letter-spacing: 1px; line-height: 1; }
.g-abbr { font-size: 9px; letter-spacing: 3px; color: #555; margin-top: 4px; }
.g-score { font-size: 34px; letter-spacing: 2px; color: var(--green); text-shadow: 0 0 10px rgba(0,255,65,.4); text-align: center; line-height:1; }
.g-vs { font-size: 12px; letter-spacing: 4px; color: #333; text-align: center; }
.g-badge { display: inline-block; font-size: 9px; letter-spacing: 3px; padding: 4px 10px; border: 1px solid #333; color: #555; }
.g-badge.live { border-color: var(--green); color: var(--green); animation: blink 1s infinite; }

/* ── ANALYSIS ── */
.a-layout { display: grid; grid-template-columns: 1fr 440px; min-height: calc(100vh - 52px - 52px); }
.a-left { border-right: 2px solid var(--white); display: flex; flex-direction: column; }
.a-output { flex: 1; padding: 40px; overflow-y: auto; }
.a-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 12px; }
.a-empty-icon { font-size: 40px; color: #1a1a1a; }
.a-empty-label { font-size: 9px; letter-spacing: 4px; color: #333; }
.a-text { font-size: 15px; line-height: 2.1; letter-spacing: .5px; color: var(--white); white-space: pre-wrap; font-weight: 400; text-transform: none; }
.a-footer { display: flex; border-top: 2px solid var(--white); }
.a-meta { padding: 18px 28px; border-right: 1px solid var(--border); }
.a-mk { font-size: 9px; letter-spacing: 4px; color: #444; margin-bottom: 5px; }
.a-mv { font-size: 15px; letter-spacing: 2px; color: var(--green); }
.a-right { background: var(--grey); display: flex; flex-direction: column; }
.a-right-head { padding: 20px 28px; border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: 4px; color: #444; }
.a-controls { padding: 28px; display: flex; flex-direction: column; gap: 14px; border-bottom: 1px solid var(--border); }
.a-label { font-size: 9px; letter-spacing: 4px; color: #444; margin-bottom: 7px; }
.a-date-input {
  background: var(--black);
  border: 1px solid var(--border);
  color: var(--white);
  font-size: 12px; letter-spacing: 2px; font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  padding: 12px 16px; outline: none; width: 100%;
  transition: border-color 0.1s;
}
.a-date-input:focus { border-color: var(--green); }
.a-run {
  background: var(--green);
  border: none;
  color: var(--black);
  font-size: 12px; letter-spacing: 4px; font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  padding: 16px; cursor: pointer; width: 100%;
  transition: all 0.1s; margin-top: 4px;
}
.a-run:hover { background: var(--white); }
.a-run:disabled { background: #222; color: #444; cursor: not-allowed; }
.a-hint { padding: 28px; font-size: 11px; letter-spacing: 1.5px; color: #333; line-height: 2.2; font-weight: 400; text-transform: none; }

/* ── PLAYERS ── */
.p-layout { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 52px - 52px); }
.p-sidebar { border-right: 2px solid var(--white); display: flex; flex-direction: column; }
.p-search { display: flex; border-bottom: 2px solid var(--white); }
.p-field {
  flex: 1;
  background: var(--black);
  border: none;
  border-right: 1px solid var(--border);
  color: var(--white);
  font-size: 11px; letter-spacing: 2px; font-weight: 700;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  padding: 14px 16px; outline: none;
}
.p-field::placeholder { color: #333; }
.p-go {
  background: var(--black);
  border: none;
  color: var(--green);
  font-size: 18px; padding: 0 20px; cursor: pointer;
  transition: all 0.1s;
}
.p-go:hover { background: var(--green); color: var(--black); }
.p-quick-label { font-size: 7px; letter-spacing: 4px; color: #444; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--grey); }
.p-quick {
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 10px; letter-spacing: 3px; color: #555;
  cursor: pointer; transition: all 0.1s;
}
.p-quick:hover { color: var(--white); background: var(--grey); }
.p-detail { padding: 40px; overflow-y: auto; }
.p-name { font-size: clamp(28px, 4vw, 64px); letter-spacing: 3px; line-height: 1; margin-bottom: 10px; }
.p-meta { font-size: 9px; letter-spacing: 4px; color: var(--green); margin-bottom: 32px; }
.p-stats { display: grid; grid-template-columns: repeat(3, 1fr); border: 2px solid var(--white); margin-bottom: 32px; }
.p-stat { padding: 24px; border-right: 1px solid var(--border); text-align: center; }
.p-stat:last-child { border-right: none; }
.p-stat-v { font-size: 48px; letter-spacing: -2px; color: var(--green); text-shadow: 0 0 20px rgba(0,255,65,.3); line-height: 1; }
.p-stat-k { font-size: 7px; letter-spacing: 4px; color: #444; margin-top: 4px; }
.p-analysis { font-size: 13px; line-height: 2; letter-spacing: .5px; color: var(--white); white-space: pre-wrap; font-weight: 400; text-transform: none; }
.p-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; gap: 12px; }
.p-empty-icon { font-size: 40px; color: #1a1a1a; }
.p-empty-label { font-size: 9px; letter-spacing: 4px; color: #333; }

/* ── SHARED ── */
.loader { display: flex; align-items: center; gap: 14px; padding: 40px 48px; font-size: 11px; letter-spacing: 4px; color: #333; }
.loader-bar { width: 48px; height: 2px; background: #1a1a1a; position: relative; overflow: hidden; }
.loader-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: var(--green); animation: sweep 1s infinite; }
@keyframes sweep { to { left: 100%; } }
.err { background: rgba(255,50,50,.06); border-left: 3px solid #f33; padding: 14px 28px; font-size: 11px; letter-spacing: 2px; color: #f33; margin: 0; }
.empty { padding: 48px; font-size: 11px; letter-spacing: 4px; color: #333; text-align: center; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: #2a2a2a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API = 'http://localhost:8000/api/v1';

function Loader({ label = 'LOADING' }) {
  return <div className="loader"><div className="loader-bar"/>{label}</div>;
}

function parseStatus(s) {
  if (!s) return { label: 'SCHEDULED', type: 'sched' };
  const l = s.toLowerCase();
  if (l.includes('final') || l === 'complete') return { label: 'FINAL', type: 'final' };
  if (l.includes('qtr') || l.includes('half') || l === 'in progress') return { label: 'LIVE', type: 'live' };
  try {
    const d = new Date(s);
    if (!isNaN(d)) return {
      label: d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' }),
      type: 'sched'
    };
  } catch(e) {}
  return { label: s.substring(0, 18), type: 'sched' };
}

// TICKER
function Ticker() {
  const [items, setItems] = React.useState([]);

  React.useEffect(() => {
    const today = new Date().toISOString().split('T')[0];
    fetch(`${API}/nba/games?date=${today}`)
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data?.games?.length) return;
        const gameItems = data.games.map(g => {
          const time = (() => {
            try {
              const d = new Date(g.status);
              return isNaN(d) ? g.status : d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
            } catch { return g.status; }
          })();
          const hasScore = g.home_team_score > 0 || g.visitor_team_score > 0;
          return hasScore
            ? `${g.visitor_team.abbreviation} ${g.visitor_team_score} — ${g.home_team_score} ${g.home_team.abbreviation}`
            : `${g.visitor_team.abbreviation} @ ${g.home_team.abbreviation}  ${time}`;
        });
        setItems(gameItems);
      })
      .catch(() => {});
  }, []);

  const fallback = [
    'PIVOT — NBA INTELLIGENCE PLATFORM',
    'TODAY\'S SLATE NOW LOADING',
    'GAMES · ANALYSIS · PLAYERS',
    'POWERED BY CLAUDE AI',
  ];

  const display = items.length ? items : fallback;
  const doubled = [...display, ...display];

  return (
    <div className="ticker">
      <div className="ticker-label">NBA LIVE</div>
      <div className="ticker-track-wrap">
        <div className="ticker-track">
          {doubled.map((item, i) => (
            <React.Fragment key={i}>
              <span className="ticker-item">{item}</span>
              <span className="ticker-sep">◆</span>
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

// HOME
function Home({ setTab }) {
  return (
    <div className="home-wrap">
      <video
        className="home-video"
        src="bg.mp4"
        autoPlay
        loop
        muted
        playsInline
      />
      <div className="home-overlay"/>
      <div className="home-center">
        <div className="home-pivot-text">PIVOT</div>
      </div>
    </div>
  );
}

function getYesterday() { const d = new Date(); d.setDate(d.getDate()-1); return d.toISOString().split('T')[0]; }
function getTomorrow()  { const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; }

// GAMES
function Games() {
  const [games, setGames] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [date, setDate] = React.useState('');
  const [sel, setSel] = React.useState(null);
  const today = new Date().toISOString().split('T')[0];

  const fetch_ = async (d) => {
    setLoading(true); setError(null);
    try {
      const r = await fetch(`${API}/nba/games?date=${d || today}`);
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      setGames(data.games || []);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  React.useEffect(() => { fetch_(); }, []);

  return (
    <div>
      <div className="toolbar">
        <button className="tb-btn" onClick={() => fetch_(today)}>Today</button>
        <button className="tb-btn" onClick={() => fetch_(getYesterday())}>Yesterday</button>
        <button className="tb-btn" onClick={() => fetch_(getTomorrow())}>Tomorrow</button>
        {games.length > 0 && <div className="tb-info">{games.length} Games</div>}
      </div>
      {error && <div className="err">{error}</div>}
      {loading && <Loader label="Fetching Games"/>}
      {!loading && (
        <div className="g-grid">
          {games.map(g => {
            const { label, type } = parseStatus(g.status);
            const hasScore = g.home_team_score > 0 || g.visitor_team_score > 0;
            return (
              <div key={g.id} className={`g-card ${sel?.id === g.id ? 'sel' : ''}`} onClick={() => setSel(sel?.id === g.id ? null : g)}>
                <div className="g-time">{label}</div>
                <div className="g-matchup">
                  <div className="g-team-a">
                    <div className="g-city">{g.visitor_team.city}</div>
                    <div className="g-name">{g.visitor_team.name.split(' ').pop()}</div>
                    <div className="g-abbr">{g.visitor_team.abbreviation}</div>
                  </div>
                  <div>
                    {hasScore
                      ? <div className="g-score">{g.visitor_team_score}—{g.home_team_score}</div>
                      : <div className="g-vs">VS</div>
                    }
                  </div>
                  <div className="g-team-h">
                    <div className="g-city">{g.home_team.city}</div>
                    <div className="g-name">{g.home_team.name.split(' ').pop()}</div>
                    <div className="g-abbr">{g.home_team.abbreviation}</div>
                  </div>
                </div>
                <span className={`g-badge ${type}`}>{label}</span>
              </div>
            );
          })}
          {!loading && games.length === 0 && <div className="empty">No Games Found</div>}
        </div>
      )}
    </div>
  );
}

// ANALYSIS
function Analysis() {
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [date, setDate] = React.useState('');

  const run = async () => {
    setLoading(true); setError(null);
    try {
      const r = await fetch(`${API}/analysis/today-games${date ? `?date=${date}` : ''}`);
      if (!r.ok) throw new Error(await r.text());
      setResult(await r.json());
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div>
      <div className="toolbar">
        <div className="tb-info" style={{marginLeft:0, borderRight:'1px solid var(--border)', borderLeft:'none'}}>AI Analysis</div>
      </div>
      <div className="a-layout">
        <div className="a-left">
          <div className="a-output">
            {error && <div className="err">{error}</div>}
            {loading && <Loader label="Claude Analyzing"/>}
            {!loading && !result && !error && (
              <div className="a-empty">
                <div className="a-empty-icon">◈</div>
                <div className="a-empty-label">Set a Date and Run Analysis</div>
              </div>
            )}
            {!loading && result && (
              <>
                <div style={{fontSize:8, letterSpacing:4, color:'#444', marginBottom:24}}>
                  {result.game_count} Games Analyzed
                </div>
                <div className="a-text">{result.analysis}</div>
              </>
            )}
          </div>
          {result && (
            <div className="a-footer">
              {[
                { k: 'Model', v: result.model?.split('-').slice(0,3).join('-').toUpperCase() },
                { k: 'Tokens', v: result.tokens_used?.toLocaleString() },
                { k: 'Games', v: result.game_count },
              ].map(m => (
                <div key={m.k} className="a-meta">
                  <div className="a-mk">{m.k}</div>
                  <div className="a-mv">{m.v}</div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="a-right">
          <div className="a-right-head">Controls</div>
          <div className="a-controls">
            <div>
              <div className="a-label">Date (Blank = Today)</div>
              <input className="a-date-input" type="date" value={date} onChange={e => setDate(e.target.value)} />
            </div>
            <button className="a-run" onClick={run} disabled={loading}>
              {loading ? 'Analyzing...' : 'Run Analysis →'}
            </button>
          </div>
          <div className="a-hint">
            Fetches NBA game data for the selected date and sends it to Claude for professional analyst-level breakdown. Returns matchup dynamics, key storylines, and tactical predictions.
          </div>
        </div>
      </div>
    </div>
  );
}

// PLAYERS
function Players() {
  const [query, setQuery] = React.useState('');
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);

  const search = async (name) => {
    const q = name || query;
    if (!q.trim()) return;
    // If full name entered, use last word (last name) for BallDontLie search
    const searchTerm = q.trim().includes(' ') ? q.trim().split(' ').pop() : q.trim();
    setLoading(true); setError(null);
    try {
      const r = await fetch(`${API}/analysis/player?name=${encodeURIComponent(searchTerm)}&season=2025`);
      if (!r.ok) throw new Error(await r.text());
      setResult(await r.json());
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div>
      <div className="toolbar">
        <input
          className="tb-input"
          style={{width:'100%', fontSize:14, letterSpacing:3, padding:'0 28px'}}
          placeholder="Search Player (e.g. LeBron James or Durant)..."
          value={query}
          onChange={e => setQuery(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && search()}
        />
        <button className="tb-btn" style={{fontSize:14, padding:'0 32px'}} onClick={() => search()} disabled={loading}>
          {loading ? '...' : 'Search →'}
        </button>
      </div>
      <div style={{padding:'48px 56px', maxWidth:1200}}>
        {error && <div className="err">{error}</div>}
        {loading && <Loader label="Fetching Player"/>}
        {!loading && !result && !error && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'60vh', gap:20}}>
            <div style={{fontSize:'clamp(60px,10vw,120px)', letterSpacing:16, color:'var(--white)', lineHeight:1, textAlign:'center'}}>
              PLAYERS
            </div>
            <div style={{fontSize:11, letterSpacing:6, color:'#333', textAlign:'center'}}>
              TYPE A NAME ABOVE AND HIT ENTER
            </div>
          </div>
        )}
        {!loading && result && !result.error && (
          <>
            <div style={{fontSize:'clamp(40px,5vw,80px)', letterSpacing:4, lineHeight:1, marginBottom:12}}>
              {result.player?.first_name} {result.player?.last_name}
            </div>
            <div style={{fontSize:13, letterSpacing:5, color:'var(--green)', marginBottom:48}}>
              {result.player?.team?.name || 'N/A'} · {result.player?.position || '—'} · {result.season} Season · {result.games_played} GP
            </div>
            {result.averages && (
              <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', border:'2px solid var(--white)', marginBottom:48, maxWidth:600}}>
                {[['points','PPG'],['rebounds','RPG'],['assists','APG']].map(([k,l]) => (
                  <div key={k} style={{padding:'32px', borderRight:'1px solid var(--border)', textAlign:'center'}}>
                    <div style={{fontSize:64, letterSpacing:-2, color:'var(--green)', textShadow:'0 0 20px rgba(0,255,65,.3)', lineHeight:1}}>{result.averages[k]}</div>
                    <div style={{fontSize:10, letterSpacing:5, color:'#444', marginTop:8}}>{l}</div>
                  </div>
                ))}
              </div>
            )}
            {result.analysis && (
              <div style={{fontSize:15, lineHeight:2, letterSpacing:.5, color:'var(--white)', whiteSpace:'pre-wrap', fontWeight:400, textTransform:'none', maxWidth:800}}>
                {result.analysis}
              </div>
            )}
          </>
        )}
        {!loading && result?.error && <div style={{fontSize:13, letterSpacing:3, color:'#444', padding:'40px 0'}}>{result.error}</div>}
      </div>
    </div>
  );
}

// APP
function App() {
  const [tab, setTab] = React.useState('home');
  const [scrolled, setScrolled] = React.useState(false);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 10);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const isHome = tab === 'home';

  return (
    <>
      <nav className={scrolled || !isHome ? 'scrolled' : ''} style={!isHome ? {background:'var(--black)', borderBottom:'1px solid var(--border)'} : {}}>
        <div className="nav-logo" onClick={() => setTab('home')}>PIVOT</div>
        <div className="nav-tabs">
          {[['games','Games'],['analysis','Analysis'],['players','Players']].map(([id,label]) => (
            <button key={id} className={`nav-tab ${tab===id?'active':''}`} onClick={() => setTab(id)}>{label}</button>
          ))}
        </div>
      </nav>

      <div style={{paddingTop: isHome ? 0 : 64, paddingBottom: 40}}>
        {tab==='home'     && <Home setTab={setTab}/>}
        {tab==='games'    && <Games/>}
        {tab==='analysis' && <Analysis/>}
        {tab==='players'  && <Players/>}
      </div>

      <Ticker/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
