function CapTableView(){
  const[teamFilter,setTeamFilter]=React.useState('ALL');
  const[yearFilter,setYearFilter]=React.useState('THIS YEAR');
  const[typeF,setTypeF]=React.useState('ALL');
  const[statusF,setStatusF]=React.useState('ALL');
  const[sort,setSort]=React.useState({key:'sal',dir:'desc'});
  const[shift,setShift]=React.useState(null);

  function toggleSort(key,e){
    if(e.shiftKey&&sort.key!==key){setShift({key,dir:'desc'});}
    else{setSort(p=>({key,dir:p.key===key&&p.dir==='desc'?'asc':'desc'}));setShift(null);}
  }

  const yearOffset={'THIS YEAR':0,'Y+1':1,'Y+2':2,'Y+3':3}[yearFilter]||0;

  const data=React.useMemo(()=>{
    let arr=[...CONTRACTS];
    if(teamFilter!=='ALL')arr=arr.filter(c=>c.team===teamFilter);
    if(typeF!=='ALL'){
      const typeMap={VETERAN:null,MAX:c=>c.tier===1,MIN:c=>c.sal<=CBA.minVet*1.1,MLE:c=>Math.abs(c.sal-CBA.ntMLE)<3,BAE:c=>Math.abs(c.sal-CBA.bae)<2};
      if(typeMap[typeF])arr=arr.filter(typeMap[typeF]);
    }
    if(statusF!=='ALL'){
      if(statusF==='GUARANTEED')arr=arr.filter(c=>c.nonGuar===0);
      if(statusF==='TEAM OPTION')arr=arr.filter(c=>c.option==='TO');
      if(statusF==='PLAYER OPTION')arr=arr.filter(c=>c.option==='PO');
      if(statusF==='ETO')arr=arr.filter(c=>c.option==='ETO');
    }
    arr.sort((a,b)=>{
      const v=c=>{const adj=c.sal*(1-yearOffset*0.05);return{sal:adj,age:c.age,yrs:c.yrsLeft,guar:c.guar}[sort.key]||0;};
      const diff=sort.dir==='desc'?v(b)-v(a):v(a)-v(b);
      if(diff!==0)return diff;
      if(shift){const sv=c=>({sal:c.sal,age:c.age,yrs:c.yrsLeft,guar:c.guar}[shift.key]||0);return shift.dir==='desc'?sv(b)-sv(a):sv(a)-sv(b);}
      return 0;
    });
    return arr;
  },[teamFilter,typeF,statusF,sort,shift,yearOffset]);

  const filtered=teamFilter!=='ALL'?data:data;
  const totalPay=filtered.reduce((s,c)=>s+c.sal*(1-yearOffset*0.05),0);
  const totalGuar=filtered.reduce((s,c)=>s+c.guar,0);
  const capSpace=CBA.salaryCap-totalPay;
  const taxDist=totalPay-CBA.luxuryTax;
  const ap1Dist=totalPay-CBA.apron1;
  const ap2Dist=totalPay-CBA.apron2;

  const COLS=[
    {key:'player',l:'PLAYER',align:'left',sort:false,w:'auto'},
    {key:'pos',l:'POS',align:'center',sort:false,w:44},
    {key:'age',l:'AGE',align:'right',sort:true,w:44},
    {key:'team',l:'TEAM',align:'center',sort:false,w:52},
    {key:'sal',l:'SALARY',align:'right',sort:true,w:80},
    {key:'guar',l:'GUAR',align:'right',sort:true,w:72},
    {key:'nonGuar',l:'NON GUAR',align:'right',sort:false,w:72},
    {key:'yrs',l:'YRS',align:'right',sort:true,w:44},
    {key:'option',l:'OPTION',align:'center',sort:false,w:60},
    {key:'noTrade',l:'NTC',align:'center',sort:false,w:40},
    {key:'kicker',l:'KICKER',align:'center',sort:false,w:56},
    {key:'bird',l:'BIRD',align:'right',sort:false,w:96},
    {key:'capHold',l:'CAP HOLD',align:'right',sort:false,w:72},
  ];

  return(
    <div style={{padding:'0 0 120px'}}>
      {/* Filters */}
      <div className="wr-filter" style={{top:'auto',position:'sticky',top:163}}>
        <select value={teamFilter} onChange={e=>setTeamFilter(e.target.value)}
                style={{height:28,fontSize:11,background:'var(--carbon)',border:'1px solid var(--wire)',color:'var(--bone)'}}>
          <option value="ALL">ALL TEAMS</option>
          {NBA_TEAMS.map(t=><option key={t.abbr} value={t.abbr}>{t.abbr}</option>)}
        </select>
        <select value={yearFilter} onChange={e=>setYearFilter(e.target.value)}
                style={{height:28,fontSize:11,background:'var(--carbon)',border:'1px solid var(--wire)',color:'var(--bone)'}}>
          {['THIS YEAR','Y+1','Y+2','Y+3'].map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        <div style={{display:'flex',gap:3}}>
          {['ALL','MAX','MLE','MIN','BAE'].map(t=><button key={t} className={`wr-chip${typeF===t?' active':''}`} onClick={()=>setTypeF(t)}>{t}</button>)}
        </div>
        <div style={{display:'flex',gap:3}}>
          {['ALL','GUARANTEED','TEAM OPTION','PLAYER OPTION','ETO'].map(s=><button key={s} className={`wr-chip${statusF===s?' active':''}`} onClick={()=>setStatusF(s)}>{s}</button>)}
        </div>
      </div>

      <div style={{overflowX:'auto',padding:'0 40px'}}>
        <table style={{width:'100%',borderCollapse:'collapse',minWidth:800}}>
          <thead style={{position:'sticky',top:203,background:'var(--void)',zIndex:5}}>
            <tr style={{borderBottom:'1px solid var(--wire)'}}>
              {COLS.map(col=>(
                <th key={col.key} onClick={e=>col.sort&&toggleSort(col.key,e)}
                    className={`cap-th${sort.key===col.key?' sorted':''}${col.sort?' sortable':''}`}
                    style={{textAlign:col.align,width:col.w,cursor:col.sort?'pointer':'default'}}>
                  {col.l}
                  {col.sort&&sort.key===col.key&&<span style={{marginLeft:3,fontSize:8}}>{sort.dir==='desc'?'v':'^'}</span>}
                  {col.sort&&shift?.key===col.key&&<span style={{marginLeft:3,fontSize:7,color:'var(--neon)'}}>2</span>}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {data.map((c,i)=>{
              const adjSal=c.sal*(1-yearOffset*0.05);
              return(
                <tr key={i} className="cap-row" style={{background:i%2?'rgba(255,255,255,.01)':'transparent'}}>
                  <td className="cap-td" style={{textAlign:'left',fontWeight:900,fontSize:13,paddingLeft:0}}>{c.player}</td>
                  <td className="cap-td" style={{textAlign:'center',fontSize:10,color:'var(--smoke)'}}>{c.pos}</td>
                  <td className="cap-td" style={{fontSize:12}}>{c.age}</td>
                  <td className="cap-td" style={{textAlign:'center',fontSize:10,color:'var(--smoke)'}}>{c.team}</td>
                  <td className="cap-td" style={{color:'var(--bone)',fontWeight:900}}>{fmtMRaw(adjSal)}</td>
                  <td className="cap-td" style={{color:c.nonGuar>0?'var(--cap-apron1)':'var(--bone)'}}>{fmtMRaw(c.guar)}</td>
                  <td className="cap-td" style={{color:c.nonGuar>0?'var(--cap-apron1)':'var(--smoke)'}}>{c.nonGuar>0?fmtMRaw(c.nonGuar):'--'}</td>
                  <td className="cap-td">{c.yrsLeft}</td>
                  <td className="cap-td" style={{textAlign:'center',fontSize:10}}>{c.option||'--'}</td>
                  <td className="cap-td" style={{textAlign:'center',fontSize:10,color:c.noTrade?'var(--cap-apron1)':'var(--smoke)'}}>{c.noTrade?'NTC':'--'}</td>
                  <td className="cap-td" style={{textAlign:'center',fontSize:10}}>{c.kicker||'--'}</td>
                  <td className="cap-td" style={{fontSize:10,color:'var(--smoke)',textAlign:'right'}}>{c.bird||'--'}</td>
                  <td className="cap-td" style={{color:'var(--smoke)'}}>{c.capHold?fmtMRaw(c.capHold):'--'}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Summary Footer */}
      <div className="cap-summary">
        {[
          {l:'COMMITTED',v:fmtMRaw(totalPay),c:'var(--bone)'},
          {l:'GUAR TOTAL',v:fmtMRaw(totalGuar),c:'var(--bone)'},
          {l:'CAP SPACE',v:fmtM(capSpace),c:capSpace>0?'var(--cap-under)':'var(--cap-apron2)'},
          {l:'vs LUX TAX',v:fmtM(-taxDist),c:taxDist>0?'var(--cap-apron2)':'var(--cap-under)'},
          {l:'vs 1ST APRON',v:fmtM(-ap1Dist),c:ap1Dist>0?'var(--cap-apron1)':'var(--cap-under)'},
          {l:'vs 2ND APRON',v:fmtM(-ap2Dist),c:ap2Dist>0?'var(--cap-apron2)':'var(--cap-under)'},
          {l:'NT MLE',v:totalPay<CBA.luxuryTax?fmtMRaw(CBA.ntMLE):'N/A',c:totalPay<CBA.luxuryTax?'var(--cap-under)':'var(--smoke)'},
          {l:'T MLE',v:totalPay>=CBA.luxuryTax&&totalPay<CBA.apron1?fmtMRaw(CBA.tMLE):'N/A',c:'var(--smoke)'},
          {l:'BAE',v:totalPay<CBA.apron2?fmtMRaw(CBA.bae):'N/A',c:totalPay<CBA.apron2?'var(--bone)':'var(--smoke)'},
        ].map(({l,v,c})=>(
          <div key={l} className="cap-sum-cell">
            <div className="cap-sum-label">{l}</div>
            <div className="cap-sum-val" style={{color:c}}>{v}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Compare() {
  const[pA,setPA]=React.useState(null);
  const[pB,setPB]=React.useState(null);
  const[ctx,setCtx]=React.useState('');
  const[sA,setSA]=React.useState(null);
  const[sB,setSB]=React.useState(null);
  const compare=useStream();

  function loadStats(p,setter){
    if(!p)return;
    fetch(`${API}/nba/players/${p.id}/stats?season=2025`).then(r=>r.json()).then(d=>{
      const g=d.stats||d.data||[];if(!g.length){setter(null);return;}
      const avg=k=>g.reduce((s,x)=>s+(x[k]||0),0)/g.length;
      setter({pts:avg('points').toFixed(1),reb:avg('rebounds').toFixed(1),ast:avg('assists').toFixed(1),stl:avg('steals').toFixed(1),blk:avg('blocks').toFixed(1),fg:(g.reduce((s,x)=>s+(x.fg_pct||0),0)/g.length*100).toFixed(1),games:g.length});
    }).catch(()=>setter(null));
  }
  React.useEffect(()=>{loadStats(pA,setSA);},[pA?.id]);
  React.useEffect(()=>{loadStats(pB,setSB);},[pB?.id]);

  function runCompare(){
    if(!pA||!pB||compare.loading)return;
    const nameA=(pA.first_name||'')+' '+(pA.last_name||'');
    const nameB=(pB.first_name||'')+' '+(pB.last_name||'');
    const ctxLabel=COMPARE_CONTEXTS.find(c=>c.value===ctx)?.label||'general comparison';
    compare.run(`${API}/chat/message`,{messages:[{role:'user',content:`Compare ${nameA} vs ${nameB} for the 2024-25 season. Context: ${ctxLabel}. Cover stats, role fit, contract value, and which player wins this comparison.`}]});
  }

  function PlayerSlot({p,stats,label,onSet}){
    return (
      <div className="card" style={{flex:1,minWidth:220,padding:'22px',background:'var(--graphite)',position:'relative'}}>
        <ConfTag text={label}/>
        <div style={{fontFamily:'var(--font)',fontSize:9,color:'var(--signal)',letterSpacing:'.14em',marginBottom:14,textTransform:'uppercase'}}>{label}</div>
        {!p&&<PlayerSearchBox onSelect={onSet} placeholder={`Select ${label}…`}/>}
        {p&&(
          <div>
            <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:14}}>
              <div>
                <div style={{fontWeight:900,fontSize:16,letterSpacing:'-.03em'}}>{p.first_name} {p.last_name}</div>
                <div style={{fontFamily:'var(--font)',fontSize:9,color:'#fff',marginTop:3,letterSpacing:'.08em'}}>{p.team?.abbreviation||'FA'} / {p.position||'—'}</div>
              </div>
            </div>
            {stats&&<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
              {[['PTS',stats.pts],['REB',stats.reb],['AST',stats.ast],['STL',stats.stl],['BLK',stats.blk],['FG%',stats.fg+'%']].map(([k,v])=>(
                <div key={k} style={{textAlign:'center'}}>
                  <div style={{fontFamily:'var(--font)',fontSize:18,fontWeight:900,letterSpacing:'-.03em'}}>{v||'—'}</div>
                  <div style={{fontFamily:'var(--font)',fontSize:8,color:'#fff',letterSpacing:'.1em',textTransform:'uppercase',marginTop:2}}>{k}</div>
                </div>
              ))}
            </div>}
            <button className="btn-ghost" onClick={()=>{onSet(null);compare.reset();}} style={{fontFamily:'var(--font)',fontSize:9,letterSpacing:'.1em',border:'1px solid rgba(255,255,255,.08)',padding:'5px 12px'}}>CHANGE</button>
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="page page-pad">
      <div style={{paddingTop:24,paddingBottom:8}}></div>
      <div style={{display:'flex',gap:1,marginBottom:14,flexWrap:'wrap'}}>
        <PlayerSlot p={pA} stats={sA} label="PLAYER A" onSet={p=>{setPA(p);compare.reset();}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'0 10px',fontFamily:'var(--font)',fontSize:14,color:'var(--fg4)',fontWeight:900}}>VS</div>
        <PlayerSlot p={pB} stats={sB} label="PLAYER B" onSet={p=>{setPB(p);compare.reset();}}/>
      </div>
      <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:16,flexWrap:'wrap'}}>
        <select value={ctx} onChange={e=>setCtx(e.target.value)} style={{flex:1,maxWidth:400,fontFamily:'var(--font)',fontSize:12}}>
          {COMPARE_CONTEXTS.map(c=><option key={c.value} value={c.value}>{c.label}</option>)}
        </select>
        {pA&&pB&&<button className="btn btn-signal" onClick={runCompare} disabled={compare.loading}>{compare.loading?'COMPARING…':'COMPARE'}</button>}
      </div>
      <StreamBox lines={compare.lines} loading={compare.loading}/>
    </div>
  );
}

          <select value={defScheme} onChange={e=>setDefScheme(e.target.value)} style={{width:'100%',marginBottom:12,fontFamily:'var(--font)',fontSize:12}}>
            <option value=''>Select scheme…</option>
            {[['man_to_man','Man-to-Man'],['zone_2_3','2-3 Zone'],['zone_3_2','3-2 Zone'],['matchup_zone','Matchup Zone'],['full_court_press','Full Court Press'],['switching_man','Switching Man'],['drop_coverage','Drop Coverage'],['hedge_hard','Hard Hedge / ICE']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </select>
          <input value={offAction} onChange={e=>setOffAction(e.target.value)} placeholder="Offensive action to defend…" style={{marginBottom:12}}/>
          <button className="btn btn-signal btn-sm" onClick={()=>def.run(`${API}/chat/message`,{messages:[{role:'user',content:`Analyze the ${defScheme.replace(/_/g,' ')} defensive scheme${offAction?` against: ${offAction}`:''}${archetype?` (coaching archetype: ${archetype})`:''}. Cover assignments, rotations, vulnerabilities, and how to execute it effectively.`}]})} disabled={def.loading||!defScheme}>{def.loading?'ANALYZING…':'ANALYZE SCHEME'}</button>
          <div style={{marginTop:14}}><StreamBox lines={def.lines} loading={def.loading}/></div>
        </div>
      )}

      {view==='lineup'&&(
        <div style={{display:'grid',gap:1}}>
          <div className="card" style={{padding:'24px',background:'var(--graphite)'}}>
            <div className="label" style={{marginBottom:14}}>Lineup Analysis</div>
            <p style={{fontSize:13,color:'#fff',marginBottom:16,lineHeight:1.6,fontWeight:900}}>Add up to 5 players to analyze chemistry, spacing, and matchup fit.</p>
            <PlayerSearchBox onSelect={p=>{if(lineupPlayers.length>=5||lineupPlayers.find(x=>x.id===p.id))return;setLineupPlayers(l=>[...l,p]);lineup.reset();}}/>
            {lineupPlayers.length>0&&<div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:12,marginBottom:14}}>
              {lineupPlayers.map((p,i)=>(
                <div key={i} style={{display:'flex',gap:8,alignItems:'center',background:'rgba(204,255,0,.06)',border:'1px solid var(--wire)',padding:'5px 10px'}}>
                  <span style={{fontSize:12,fontWeight:600}}>{p.first_name} {p.last_name}</span>
                  <button onClick={()=>{setLineupPlayers(l=>l.filter((_,j)=>j!==i));lineup.reset();}} style={{background:'none',border:'none',color:'#fff',cursor:'pointer',fontSize:16,lineHeight:1}}>×</button>
                </div>
              ))}
            </div>}
            {lineupPlayers.length>=2&&<button className="btn btn-signal btn-sm" onClick={()=>lineup.run(`${API}/chat/message`,{messages:[{role:'user',content:`Analyze this NBA lineup: ${lineupPlayers.map(p=>(p.first_name||'')+' '+(p.last_name||'')).join(', ')}. Cover chemistry, spacing, defensive assignments, weaknesses, and best situations to deploy this lineup.`}]})} disabled={lineup.loading}>{lineup.loading?'ANALYZING…':'ANALYZE LINEUP'}</button>}
            <div style={{marginTop:14}}><StreamBox lines={lineup.lines} loading={lineup.loading}/></div>
          </div>
          <div className="card" style={{padding:'24px',background:'var(--graphite)'}}>
            <div className="label" style={{marginBottom:14}}>Stat Projection</div>
            <PlayerSearchBox onSelect={p=>{setProjPlayer(p);proj.reset();}}/>
            {projPlayer&&<div style={{marginTop:14}}>
              <div style={{display:'flex',gap:12,alignItems:'center',padding:'10px 14px',background:'rgba(204,255,0,.04)',border:'1px solid var(--wire)',marginBottom:12}}>
                <div style={{fontWeight:900,fontSize:13}}>{projPlayer.first_name} {projPlayer.last_name}</div>
                <div style={{fontFamily:'var(--font)',fontSize:9,color:'#fff',letterSpacing:'.08em',marginLeft:'auto'}}>{projPlayer.team?.abbreviation||'FA'}</div>
              </div>
              <button className="btn btn-signal btn-sm" onClick={()=>proj.run(`${API}/chat/message`,{messages:[{role:'user',content:`Project the 2025-26 season stats for ${(projPlayer.first_name||'')+' '+(projPlayer.last_name||'')} (${projPlayer.team?.abbreviation||'FA'}). Include PPG, RPG, APG, shooting splits, and usage. Factor in age, recent trends, team context, and injury history.`}]})} disabled={proj.loading}>{proj.loading?'PROJECTING…':'PROJECT STATS'}</button>
              <div style={{marginTop:12}}><StreamBox lines={proj.lines} loading={proj.loading}/></div>
            </div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── CHAT ─────────────────────────────────────────────────────────────────────

function Chat() {
  const[msgs,setMsgs]=React.useState([]);
  const[input,setInput]=React.useState('');
  const[loading,setLoading]=React.useState(false);
  const[stream,setStream]=React.useState([]);
  const bottom=React.useRef();
  React.useEffect(()=>{if(bottom.current)bottom.current.scrollIntoView({behavior:'smooth'});},[msgs,stream]);

  async function send(){
    const text=input.trim();
    if(!text||loading)return;
    setInput('');
    const newMsgs=[...msgs,{role:'user',content:text}];
    setMsgs(newMsgs);setStream([]);setLoading(true);
    let assembled=[];
    await streamSSE(`${API}/chat/message`,{messages:newMsgs},t=>{assembled=[...assembled,t];setStream([...assembled]);},()=>{setMsgs(m=>[...m,{role:'assistant',content:assembled.join('')}]);setStream([]);setLoading(false);});
  }

  return (
    <div className="page" style={{display:'flex',flexDirection:'column',height:'calc(100vh - 92px)'}}>
      <div style={{padding:'0 32px',borderBottom:'1px solid var(--wire)',flexShrink:0,height:0}}></div>
      <div style={{flex:1,overflowY:'auto',padding:'24px 32px',display:'flex',flexDirection:'column',gap:14}}>
        {!msgs.length&&<div style={{fontFamily:'var(--font)',fontSize:11,letterSpacing:'.14em',color:'#fff',textTransform:'uppercase',textAlign:'center',padding:'80px 0'}}>ASK ANYTHING ABOUT BASKETBALL.</div>}
        {msgs.map((m,i)=>(
          <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
            <div style={{
              maxWidth:'78%',padding:'14px 18px',borderRadius:2,
              background:m.role==='user'?'var(--pulse)':'rgba(8,8,8,.82)',
              backdropFilter:m.role==='user'?'none':'blur(20px)',
              WebkitBackdropFilter:m.role==='user'?'none':'blur(20px)',
              border:m.role==='user'?'none':'1px solid rgba(0,255,102,.14)',
              boxShadow:m.role==='user'?'0 4px 20px rgba(0,255,102,.2)':'none',
              color:m.role==='user'?'#000':'var(--fg)',
              fontSize:13.5,lineHeight:1.8,fontWeight:900,
              whiteSpace:'pre-wrap',wordBreak:'break-word'
            }}>{m.content}</div>
          </div>
        ))}
        {loading&&stream.length>0&&(
          <div style={{display:'flex',justifyContent:'flex-start'}}>
            <div style={{maxWidth:'78%',padding:'14px 18px',background:'rgba(8,8,8,.82)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',border:'1px solid rgba(0,255,102,.14)',fontSize:13.5,lineHeight:1.8,color:'#fff',fontWeight:900,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
              {stream.join('')}<span style={{color:'var(--pulse)',animation:'blink-glow .8s step-end infinite'}}>▋</span>
            </div>
          </div>
        )}
        {loading&&!stream.length&&<div style={{fontFamily:'var(--font)',fontSize:10,color:'#fff',letterSpacing:'.14em',textTransform:'uppercase',padding:'8px 0'}}>PROCESSING…</div>}
        <div ref={bottom}/>
      </div>
      <div style={{padding:'16px 32px 24px',borderTop:'1px solid rgba(0,255,102,.1)',display:'flex',gap:12,flexShrink:0}}>
        <input value={input} onChange={e=>setInput(e.target.value)}
               onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
               placeholder="Ask about any player, team, game, or strategy…"
               disabled={loading} style={{flex:1,fontFamily:'var(--font)',fontSize:13}}/>
        <button className="btn btn-signal" onClick={send} disabled={loading||!input.trim()} style={{flexShrink:0,padding:'10px 28px',fontSize:12}}>{loading?'…':'SEND'}</button>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

const NAV_ITEMS=[
  {id:'home',label:'HOME'},{id:'games',label:'GAMES'},{id:'players',label:'INTEL'},
  {id:'warroom',label:'WAR ROOM'},{id:'compare',label:'COMPARE'},
  {id:'coach',label:'COACH'},{id:'chat',label:'CHAT'},
];

function App() {
  const[tab,setTab]=React.useState('home');
  const isHome=tab==='home';
  return (
    <div style={{position:'relative',minHeight:'100vh'}}>
      {!isHome&&<AppBackground/>}
      {!isHome&&(
        <>
          <div className="nav-wordmark-fixed" onClick={()=>setTab('home')}>PIVOT</div>
          <nav className="nav">
            {NAV_ITEMS.filter(i=>i.id!=='home').map(item=>(
              <button key={item.id} className={`nav-item${tab===item.id?' active':''}`} onClick={()=>setTab(item.id)}>{item.label}</button>
            ))}
          </nav>
          <Ticker/>
        </>
      )}
      <div style={{position:'relative',zIndex:1}}>
        {tab==='home'&&<Home setTab={setTab}/>}
        {tab==='games'&&<Games/>}
        {tab==='players'&&<Intel/>}
        {tab==='warroom'&&<WarRoom/>}
        {tab==='compare'&&<Compare/>}
        {tab==='coach'&&<CoachMode/>}
        {tab==='chat'&&<Chat/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
