                        </span>
                      ))}
                    </div>
                  )}
                </div>
              );
            })()}

            {/* Court diagram for timeout / defensive plays */}
            {(result.mode === 'timeout' || result.mode === 'defense') && result.diagram && (
              <div style={{marginBottom:28, borderRadius:4, overflow:'hidden', border:'1px solid rgba(0,255,128,0.1)'}}>
                <div style={{padding:'8px 12px', background:'rgba(0,0,0,0.6)', borderBottom:'1px solid rgba(0,255,128,0.1)',
                  fontSize:7, letterSpacing:4, color:'rgba(0,255,128,0.82)', fontFamily:'Helvetica Neue, sans-serif'}}>
                  {result.mode === 'defense'
                    ? 'DEFENSIVE DIAGRAM  ·  ● DEFENDER  → ASSIGNMENT  ▦ ZONE'
                    : 'PLAY DIAGRAM  ·  ● OFFENSE  ─ ─ BALL  → CUT'}
                </div>
                <CourtDiagram diagram={result.diagram}/>
              </div>
            )}

            {/* Standard prose result for adjust/timeout/defense modes */}
            {result.mode !== 'live' && (
              <div style={{fontSize:14, lineHeight:2.1, letterSpacing:.3, color:'var(--white)',
                whiteSpace:'pre-wrap', fontWeight:700, textTransform:'none', fontFamily:'Helvetica Neue, sans-serif'}}>
                {result.play || result.analysis}
              </div>
            )}
          </div>
        )}
      </div>

      {/* ── Right: Live Intel ── */}
      <div style={{overflowY:'auto', background:'rgba(0,0,0,0.35)'}}>
        {selectedGame && boxScore && (boxScore.total_players || 0) > 0 && (
          <div style={{borderBottom:'1px solid var(--border)'}}>
            <div style={{padding:'12px 16px', fontSize:7, letterSpacing:5, color:'rgba(0,255,128,0.35)',
              borderBottom:'1px solid var(--border)', fontFamily:'Helvetica Neue, sans-serif'}}>
              ⬡ LIVE INTEL
            </div>
            {['away_players','home_players'].map(key => {
              const team = key === 'home_players' ? boxScore.home_team : boxScore.away_team;
              const players = (boxScore[key] || []).slice(0, 7);
              const isMyTeam = myTeam && team && myTeam.toLowerCase().includes((team.name||'').toLowerCase().split(' ').pop());
              return (
                <div key={key} style={{marginBottom:0}}>
                  <div style={{padding:'7px 16px 5px', display:'flex', alignItems:'center', gap:7,
                    color: isMyTeam ? 'var(--green)' : '#444',
                    background: isMyTeam ? 'rgba(0,255,128,0.03)' : 'transparent',
                    borderBottom:'1px solid rgba(255,255,255,0.03)'}}>
                    {teamLogoUrl(team?.abbreviation) && (
                      <img src={teamLogoUrl(team?.abbreviation)} alt={team?.abbreviation} width={18} height={18}
                        style={{objectFit:'contain', opacity: isMyTeam ? 1 : 0.35}}
                        onError={e=>e.currentTarget.style.display='none'}/>
                    )}
                    <span style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:7, letterSpacing:4}}>{team?.abbreviation} {isMyTeam ? '◎' : ''}</span>
                  </div>
                  <div style={{padding:'4px 0 8px'}}>
                    {players.map((p, i) => (
                      <div key={i} style={{display:'flex', justifyContent:'space-between', alignItems:'center',
                        padding:'5px 16px', borderBottom:'1px solid rgba(255,255,255,0.02)'}}>
                        <span style={{fontSize:10, letterSpacing:.5, fontWeight:700, color:'#888',
                          fontFamily:'Helvetica Neue, sans-serif', flex:1}}>{formatName(p.player)}</span>
                        <span className={heatClass(p.pts, p.min)}
                          style={{fontSize:10, letterSpacing:1, fontFamily:'Helvetica Neue, sans-serif', fontWeight:700}}>
                          {p.pts}
                        </span>
                        <span style={{fontSize:9, color:'#333', letterSpacing:1, marginLeft:6,
                          fontFamily:'Helvetica Neue, sans-serif'}}>{p.reb}r {p.ast}a</span>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        <div style={{padding:'16px'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
            <div style={{fontSize:7, letterSpacing:4, color:'rgba(255,255,255,0.62)', fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontWeight:700, textTransform:'uppercase'}}>Call History & Intel</div>
          </div>
          <div style={{fontSize:7, letterSpacing:3, color:'var(--green)', fontFamily:'Helvetica Neue, Helvetica, Arial, sans-serif', fontWeight:700, marginBottom:14, opacity:0.6}}>[ SYSTEM READY ]</div>
          {history.length === 0 && (
            <div style={{display:'flex', flexDirection:'column', gap:6}}>
              {[0,1,2,3].map(i => (
                <div key={i} style={{padding:'12px 10px', borderRadius:4,
                  border:'1px dashed rgba(255,255,255,0.1)',
                  background:'transparent', opacity: 1 - i * 0.18}}>
                  <div style={{height:6, width:'55%', background:'rgba(255,255,255,0.06)', borderRadius:2, marginBottom:6}}/>
                  <div style={{height:6, width:'35%', background:'rgba(255,255,255,0.04)', borderRadius:2}}/>
                </div>
              ))}
            </div>
          )}
          {history.map((h, i) => (
            <div key={i} onClick={() => setResult(h)} style={{padding:'10px 12px', marginBottom:4, cursor:'pointer',
              border:'1px solid rgba(255,255,255,0.04)', background:'rgba(0,0,0,0.3)',
              transition:'border-color 0.1s'}}
              onMouseEnter={e => e.currentTarget.style.borderColor='rgba(0,255,128,0.2)'}
              onMouseLeave={e => e.currentTarget.style.borderColor='rgba(255,255,255,0.04)'}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:3}}>
                <span style={{fontSize:7, letterSpacing:3, color: h.mode==='timeout'?'#FFB800':'var(--green)',
                  fontFamily:'Helvetica Neue, sans-serif'}}>{h.mode?.toUpperCase()}</span>
                <span style={{fontSize:7, letterSpacing:1, color:'#222', fontFamily:'Helvetica Neue, sans-serif'}}>{h.timestamp}</span>
              </div>
              <div style={{fontSize:9, letterSpacing:1, color:'#555', fontFamily:'Helvetica Neue, sans-serif'}}>
                {h.my_team}{h.quarter ? ` · Q${h.quarter}` : ''}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function PlayerSearchBox({ label, onSelect, side }) {

  const accent      = side === 'b' ? 'rgba(160,120,255,1)'   : 'rgba(0,255,128,1)';
  const accentDim   = side === 'b' ? 'rgba(160,120,255,0.35)' : 'rgba(0,255,128,0.35)';
  const accentGlow  = side === 'b' ? 'rgba(160,120,255,0.18)' : 'rgba(0,255,128,0.18)';
  const isRight     = side === 'b';

  const fetchSugg = async (val) => {
    if (val.length < 2) { setSuggestions([]); return; }
    try {
      const r = await fetch(`${API}/nba/players?name=${encodeURIComponent(val)}`);
      if (r.ok) { const d = await r.json(); setSuggestions((d.players||[]).slice(0,6)); }
    } catch(_) {}
  };

  const pick = (p) => {
    setQuery(`${p.first_name} ${p.last_name}`);
    setChosen(p); setSuggestions([]); setShowSugg(false);
    onSelect(p);
  };

  const clear = () => { setQuery(''); setChosen(null); setSuggestions([]); onSelect(null); };

  return (
    <div style={{flex:1, minWidth:0}}>
      {/* Label */}
      <div style={{fontFamily:BC, fontSize:11, letterSpacing:5, color:accent, fontWeight:700, textTransform:'uppercase', marginBottom:12, textAlign: isRight ? 'right' : 'left'}}>{label}</div>

      {/* Search input */}
      <div style={{position:'relative'}}>
        <div style={{
          display:'flex', alignItems:'center',
          background:'rgba(16,20,28,0.92)',
          border:`1.5px solid ${chosen ? accentDim : 'rgba(255,255,255,0.08)'}`,
          borderRadius:8,
          boxShadow: chosen ? `0 0 24px ${accentGlow}, inset 0 0 16px rgba(0,0,0,0.3)` : 'inset 0 0 16px rgba(0,0,0,0.3)',
          transition:'border-color 0.2s, box-shadow 0.2s',
          flexDirection: isRight ? 'row-reverse' : 'row',
        }}>
          <span style={{padding:'0 14px', color: accent, fontSize:16, flexShrink:0, opacity:0.7}}>⌕</span>
          <input
            style={{flex:1, background:'transparent', border:'none', outline:'none', color:'var(--white)', fontFamily:BC, fontWeight:700, fontSize:18, letterSpacing:1, padding:'16px 0', textAlign: isRight ? 'right' : 'left'}}
            placeholder="Search player…"
            value={query}
            onChange={e => { setQuery(e.target.value); setChosen(null); fetchSugg(e.target.value); setShowSugg(true); onSelect(null); }}
            onKeyDown={e => { if(e.key==='Escape') setShowSugg(false); }}
            onBlur={() => setTimeout(() => setShowSugg(false), 150)}
          />
          {chosen && <button onClick={clear} style={{background:'none', border:'none', color:'rgba(255,255,255,0.3)', cursor:'pointer', padding:'0 14px', fontSize:18, flexShrink:0}}>×</button>}
        </div>
        {showSugg && suggestions.length > 0 && (
          <div style={{position:'absolute', top:'100%', left:0, right:0, background:'rgba(16,20,28,0.99)', backdropFilter:'blur(24px)', border:'1.5px solid var(--border-strong)', borderTop:'none', zIndex:9999, borderRadius:'0 0 10px 10px', overflow:'hidden', boxShadow:'0 24px 64px rgba(0,0,0,0.8)'}}>
            {suggestions.map(p => (
              <div key={p.id} onMouseDown={() => pick(p)}
                style={{padding:'13px 18px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent: isRight ? 'flex-end' : 'space-between', borderBottom:'1px solid rgba(255,255,255,0.04)', gap:12}}
                onMouseEnter={e => e.currentTarget.style.background=accentGlow}
                onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                {isRight && (
                  <div style={{display:'flex', gap:8}}>
                    {p.team?.abbreviation && <span style={{fontFamily:BC, fontSize:11, letterSpacing:2, color:accent, fontWeight:700}}>{p.team.abbreviation}</span>}
                    {p.position && <span style={{fontFamily:BC, fontSize:11, letterSpacing:2, color:'rgba(255,255,255,0.4)', fontWeight:700}}>{p.position}</span>}
                  </div>
                )}
                <span style={{fontFamily:BC, fontSize:16, fontWeight:700, color:'var(--white)', letterSpacing:0.5}}>{p.first_name} {p.last_name}</span>
                {!isRight && (
                  <div style={{display:'flex', gap:8}}>
                    {p.team?.abbreviation && <span style={{fontFamily:BC, fontSize:11, letterSpacing:2, color:accent, fontWeight:700}}>{p.team.abbreviation}</span>}
                    {p.position && <span style={{fontFamily:BC, fontSize:11, letterSpacing:2, color:'rgba(255,255,255,0.4)', fontWeight:700}}>{p.position}</span>}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Chosen player preview */}
      {chosen ? (
        <div style={{marginTop:14, textAlign: isRight ? 'right' : 'left'}}>
          <div style={{display:'flex', alignItems:'center', gap:8, justifyContent: isRight ? 'flex-end' : 'flex-start', marginBottom:6}}>
            {!isRight && teamLogoUrl(chosen.team?.abbreviation) && (
              <img src={teamLogoUrl(chosen.team?.abbreviation)} alt={chosen.team?.abbreviation}
                width={32} height={32} style={{objectFit:'contain'}}
                onError={e=>e.currentTarget.style.display='none'}/>
            )}
            <div style={{fontFamily:BC, fontSize:13, letterSpacing:4, color:accent, fontWeight:700}}>{chosen.team?.abbreviation}</div>
            {isRight && teamLogoUrl(chosen.team?.abbreviation) && (
              <img src={teamLogoUrl(chosen.team?.abbreviation)} alt={chosen.team?.abbreviation}
                width={32} height={32} style={{objectFit:'contain'}}
                onError={e=>e.currentTarget.style.display='none'}/>
            )}
          </div>
          <div style={{fontFamily:BC, fontSize:22, fontWeight:800, color:'var(--white)', letterSpacing:0.5, lineHeight:1.1}}>{chosen.first_name} {chosen.last_name}</div>
          <div style={{fontFamily:BC, fontSize:11, letterSpacing:3, color:'rgba(255,255,255,0.4)', fontWeight:700, marginTop:3}}>{chosen.position}</div>
        </div>
      ) : (
        /* Ghost placeholder */
        <div style={{marginTop:14, opacity:0.2, textAlign: isRight ? 'right' : 'left'}}>
          <div style={{height:10, width:50, background:'rgba(255,255,255,0.12)', borderRadius:3, marginBottom:6, marginLeft: isRight ? 'auto' : 0}}/>
          <div style={{height:18, width:140, background:'rgba(255,255,255,0.12)', borderRadius:4, marginBottom:6, marginLeft: isRight ? 'auto' : 0}}/>
          <div style={{height:10, width:70, background:'rgba(255,255,255,0.08)', borderRadius:3, marginLeft: isRight ? 'auto' : 0}}/>
        </div>
      )}
    </div>
  );
}

function StatBar({ label, aVal, bVal, fmt, higher='more', animDelay=0 }) {
  const a = parseFloat(aVal) || 0;
  const b = parseFloat(bVal) || 0;
  const total = a + b;
  const aPct = total > 0 ? (a / total) * 100 : 50;
  const aWins = higher === 'more' ? a > b : a < b;
  const bWins = higher === 'more' ? b > a : b < a;

  const aColor = aWins ? 'var(--green)' : 'rgba(255,255,255,0.75)';
  const bColor = bWins ? 'rgba(160,120,255,1)' : 'rgba(255,255,255,0.75)';
  const aBarColor = aWins ? 'var(--green)' : 'rgba(255,255,255,0.18)';
  const bBarColor = bWins ? 'rgba(160,120,255,0.85)' : 'rgba(255,255,255,0.18)';

  return (
    <div style={{marginBottom:14, animationDelay:`${animDelay}ms`}} className="cmp-reveal">
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:5}}>
        <div style={{fontFamily:BC, fontSize:18, fontWeight:700, color:aColor, textShadow: aWins ? '0 0 16px rgba(0,255,128,0.6)' : 'none', minWidth:70, letterSpacing:0.5}}>{fmt ? fmt(aVal) : (aVal ?? '—')}</div>
        <div style={{fontFamily:BC, fontSize:10, letterSpacing:4, color:'rgba(255,255,255,0.28)', fontWeight:700, textTransform:'uppercase', textAlign:'center', flex:1}}>{label}</div>
        <div style={{fontFamily:BC, fontSize:18, fontWeight:700, color:bColor, textAlign:'right', textShadow: bWins ? '0 0 16px rgba(160,120,255,0.6)' : 'none', minWidth:70, letterSpacing:0.5}}>{fmt ? fmt(bVal) : (bVal ?? '—')}</div>
      </div>
      <div style={{display:'flex', height:5, borderRadius:3, overflow:'hidden', background:'rgba(255,255,255,0.04)'}}>
        <div style={{width:`${aPct}%`, background: aBarColor, boxShadow: aWins ? '0 0 8px rgba(0,255,128,0.5)' : 'none', transition:'width 0.7s cubic-bezier(0.22,1,0.36,1)'}}/>
        <div style={{width:`${100-aPct}%`, background: bBarColor, boxShadow: bWins ? '0 0 8px rgba(160,120,255,0.5)' : 'none', transition:'width 0.7s cubic-bezier(0.22,1,0.36,1)'}}/>
      </div>
    </div>
  );
}

function Teams({ onPlayerClick }) {
  const [selected, setSelected] = React.useState(null);
  const [teamView, setTeamView]   = React.useState('roster');

  // Roster state — real player data
  const [roster, setRoster]             = React.useState([]);
  const [rosterLoading, setRosterLoading] = React.useState(false);
  const [rosterError, setRosterError]   = React.useState('');

  // Team DNA state — AI analysis
  const [dnaText, setDnaText]     = React.useState('');
  const [dnaLoading, setDnaLoading] = React.useState(false);
  const [dnaError, setDnaError]   = React.useState('');

  const selectTeam = (t) => {
    if (selected?.abbr === t.abbr) { setSelected(null); return; }
    setSelected(t);
    setRoster([]); setRosterError(''); setRosterLoading(false);
    setDnaText(''); setDnaError(''); setDnaLoading(false);
    setTeamView('roster');
  };

  const fetchRoster = (t) => {
    setRosterLoading(true); setRoster([]); setRosterError('');
    fetch(`${API}/nba/teams/roster?abbr=${encodeURIComponent(t.abbr)}`)
      .then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e.detail || 'Failed')))
      .then(d => { setRoster(d.players || []); setRosterLoading(false); })
      .catch(e => { setRosterError(String(e)); setRosterLoading(false); });
  };

  const fetchDna = (t) => {
    setDnaLoading(true); setDnaText(''); setDnaError('');
    fetch(`${API}/analysis/team-dna?team_name=${encodeURIComponent(t.name)}`)
      .then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e.detail || 'Failed')))
      .then(d => { setDnaText(d.analysis || ''); setDnaLoading(false); })
      .catch(e => { setDnaError(String(e)); setDnaLoading(false); });
  };

  const switchView = (v) => {
    setTeamView(v);
    if (!selected) return;
    if (v === 'roster' && !roster.length && !rosterLoading) fetchRoster(selected);
    if (v === 'dna'    && !dnaText       && !dnaLoading)    fetchDna(selected);
  };

  React.useEffect(() => {
    if (selected) fetchRoster(selected);
  }, [selected]);

  const byConf = { East: {}, West: {} };
  NBA_TEAMS.forEach(t => {
    if (!byConf[t.conf][t.div]) byConf[t.conf][t.div] = [];
    byConf[t.conf][t.div].push(t);
  });

  const HN = "'Helvetica Neue',Helvetica,Arial,sans-serif";

  return (
    <div style={{maxWidth:1200, margin:'0 auto', padding:'40px 32px 80px', boxSizing:'border-box'}}>

      {/* Page header */}
      <div style={{marginBottom:28}}>
        <div style={{fontFamily:HN, fontSize:9, letterSpacing:4, color:'rgba(0,255,128,0.9)', fontWeight:700, textTransform:'uppercase', marginBottom:8}}>NBA Teams</div>
        <div style={{fontFamily:HN, fontSize:28, letterSpacing:-0.5, color:'var(--white)', fontWeight:700, textTransform:'none'}}>Team Intelligence</div>
        <div style={{fontFamily:HN, fontSize:13, color:'rgba(255,255,255,0.4)', fontWeight:400, marginTop:6, textTransform:'none', letterSpacing:0}}>Select a team to browse the roster. Click any player to view their stats.</div>
      </div>

      {/* ── Conference logo grids ── */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom: selected ? 24 : 0}}>
        {['East','West'].map(conf => {
          const confTeams = NBA_TEAMS.filter(t => t.conf === conf);
          return (
            <div key={conf} style={{background:'rgba(15,17,21,0.7)', border:'1px solid var(--border)', borderRadius:12, padding:'20px 20px 16px', backdropFilter:'blur(8px)'}}>
              <div style={{fontFamily:HN, fontSize:8, letterSpacing:4, color:'rgba(0,255,128,0.7)', fontWeight:700, textTransform:'uppercase', marginBottom:16, paddingBottom:10, borderBottom:'1px solid var(--border)'}}>
                {conf === 'East' ? 'Eastern' : 'Western'} Conference
              </div>
              <div style={{display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:8}}>
                {confTeams.map(t => {
                  const active = selected?.abbr === t.abbr;
                  return (
                    <button key={t.abbr} onClick={() => handleSelect(t)}
                      title={t.name}
                      style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                        gap:6, padding:'12px 6px 10px',
                        background: active ? 'rgba(0,255,128,0.1)' : 'rgba(255,255,255,0.025)',
                        border: `1px solid ${active ? 'rgba(0,255,128,0.45)' : 'rgba(255,255,255,0.07)'}`,
                        borderRadius:9, cursor:'pointer', transition:'all 0.14s',
                        boxShadow: active ? '0 0 20px rgba(0,255,128,0.12)' : 'none'}}
                      onMouseEnter={e => { if (!active) { e.currentTarget.style.background='rgba(255,255,255,0.055)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.14)'; }}}
                      onMouseLeave={e => { if (!active) { e.currentTarget.style.background='rgba(255,255,255,0.025)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.07)'; }}}>
                      <img src={`https://a.espncdn.com/i/teamlogos/nba/500/${t.slug}.png`}
                        alt={t.abbr} width={44} height={44}
                        style={{objectFit:'contain', opacity: active ? 1 : 0.65, transition:'opacity 0.14s'}}
                        onError={e => e.currentTarget.style.visibility='hidden'}/>
                      <div style={{fontFamily:HN, fontSize:8, letterSpacing:1.5, fontWeight:700, textTransform:'uppercase',
                        color: active ? 'var(--green)' : 'rgba(255,255,255,0.45)', transition:'color 0.14s'}}>
                        {t.abbr}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* ── Detail panel ── */}
      {selected && (
        <div style={{background:'rgba(22,27,34,0.7)', border:'1px solid var(--border)', borderRadius:12, overflow:'hidden', backdropFilter:'blur(8px)'}}>

          {/* Header */}
          <div style={{padding:'22px 28px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:16, background:'rgba(0,0,0,0.25)'}}>
            <img src={`https://a.espncdn.com/i/teamlogos/nba/500/${selected.slug}.png`}
              alt={selected.abbr} width={56} height={56}
              style={{objectFit:'contain', flexShrink:0}}
              onError={e => e.currentTarget.style.visibility='hidden'}/>
            <div style={{flex:1}}>
              <div style={{fontFamily:HN, fontSize:24, fontWeight:700, color:'var(--white)', letterSpacing:-0.5, textTransform:'none'}}>{selected.name}</div>
              <div style={{fontFamily:HN, fontSize:9, letterSpacing:3, color:'rgba(255,255,255,0.35)', fontWeight:700, marginTop:4, textTransform:'uppercase'}}>
                {selected.conf === 'East' ? 'Eastern' : 'Western'} Conference · {selected.div} Division
              </div>
            </div>
            <button onClick={() => setSelected(null)}
              style={{fontFamily:HN, fontSize:11, color:'rgba(255,255,255,0.3)', background:'transparent', border:'none', cursor:'pointer', padding:'4px 8px', letterSpacing:0, textTransform:'none', fontWeight:400}}>
              ✕
            </button>
          </div>

          {/* Tab switcher */}
          <div style={{display:'flex', gap:8, padding:'12px 24px', borderBottom:'1px solid var(--border)'}}>
            {[['roster','Roster'],['dna','Team DNA']].map(([id,lbl]) => (
              <button key={id} onClick={() => switchView(id)}
                style={{fontFamily:HN, fontWeight:700, fontSize:9, letterSpacing:3, textTransform:'uppercase',
                  padding:'8px 18px', borderRadius:6, cursor:'pointer', transition:'all 0.15s',
                  background: teamView===id ? 'rgba(0,255,128,0.14)' : 'rgba(0,255,128,0.05)',
                  color: teamView===id ? 'var(--green)' : 'rgba(0,255,128,0.55)',
                  border: teamView===id ? '1px solid rgba(0,255,128,0.55)' : '1px solid rgba(0,255,128,0.2)',
                  boxShadow: teamView===id ? 'inset 0 1px 0 rgba(0,255,128,0.18),0 0 18px rgba(0,255,128,0.1)' : 'none'}}>
                {lbl}
              </button>
            ))}
          </div>

          {/* Content */}
          <div style={{padding:'24px 28px', minHeight:200}}>
            {teamView === 'roster' && (
              rosterLoading ? <Loader label="LOADING ROSTER"/> :
              rosterError   ? <div style={{fontFamily:HN, fontSize:12, color:'rgba(255,80,80,0.8)', textTransform:'none', letterSpacing:0}}>{rosterError}</div> :
              roster.length > 0 ? (() => {
                const posOrder = ['G','G-F','F-G','F','F-C','C-F','C',''];
                const grouped = {};
                roster.forEach(p => {
                  const pos = p.position || '';
                  if (!grouped[pos]) grouped[pos] = [];
                  grouped[pos].push(p);
                });
                const posLabel = pos => pos === 'G' ? 'Guards' : pos === 'F' ? 'Forwards' : pos === 'C' ? 'Centers' : pos ? pos : 'Other';
                const sortedKeys = Object.keys(grouped).sort((a,b) => posOrder.indexOf(a) - posOrder.indexOf(b));
                return (
                  <div>
                    <div style={{fontFamily:HN, fontSize:9, letterSpacing:3, color:'rgba(255,255,255,0.3)', marginBottom:18, textTransform:'uppercase'}}>
                      {roster.length} Players · Click a name to view stats
                    </div>
                    {sortedKeys.map(pos => (
                      <div key={pos} style={{marginBottom:20}}>
                        <div style={{fontFamily:HN, fontSize:8, letterSpacing:3, color:'rgba(0,255,128,0.6)', fontWeight:700, textTransform:'uppercase', marginBottom:10}}>
                          {posLabel(pos)}
                        </div>
                        <div style={{display:'flex', flexWrap:'wrap', gap:8}}>
                          {grouped[pos].map(p => (
                            <button key={p.id} onClick={() => onPlayerClick && onPlayerClick(p.id)}
                              style={{fontFamily:HN, fontSize:13, fontWeight:500, color:'rgba(255,255,255,0.85)',
                                background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.1)',
                                borderRadius:6, padding:'8px 14px', cursor:'pointer', transition:'all 0.12s',
                                textTransform:'none', letterSpacing:0, textAlign:'left'}}
                              onMouseEnter={e => { e.currentTarget.style.background='rgba(0,255,128,0.1)'; e.currentTarget.style.borderColor='rgba(0,255,128,0.35)'; e.currentTarget.style.color='var(--green)'; }}
                              onMouseLeave={e => { e.currentTarget.style.background='rgba(255,255,255,0.04)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.1)'; e.currentTarget.style.color='rgba(255,255,255,0.85)'; }}>
                              {p.first_name} {p.last_name}
                            </button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })() : null
            )}
            {teamView === 'dna' && (
              dnaLoading  ? <Loader label="ANALYZING TEAM DNA"/> :
              dnaError    ? <div style={{fontFamily:HN, fontSize:12, color:'rgba(255,80,80,0.8)', textTransform:'none', letterSpacing:0}}>{dnaError}</div> :
              dnaText     ? <div style={{fontFamily:HN, fontSize:14, lineHeight:1.95, color:'rgba(255,255,255,0.85)', whiteSpace:'pre-wrap', fontWeight:400, textTransform:'none', letterSpacing:0}}>{dnaText}</div>
                          : null
            )}
          </div>
        </div>
      )}
    </div>
  );
}

  { value: 'tactician', label: 'The Tactician (Scheme & Positioning)' },
  { value: 'players_coach', label: "The Player's Coach (Role Fit)" },
  { value: 'disciplinarian', label: 'The Disciplinarian (Defense & Effort)' },
  { value: 'innovator', label: 'The Innovator (Pace & Space)' },
  { value: 'closer', label: 'The Closer (Clutch & High-Stakes)' },
];

const COMPARE_CONTEXTS = [
  { value: '', label: 'General comparison' },
  { value: 'contender_starter', label: 'Starting role on a contender' },
  { value: 'next_to_star_pg', label: 'Fit next to a star PG' },
  { value: 'next_to_star_big', label: 'Fit next to a dominant big' },
  { value: 'rebuild_development', label: 'Rebuild / developmental situation' },
  { value: 'best_value', label: 'Best available value' },
  { value: 'playoff_minutes', label: 'Playoff rotation minutes' },
  { value: 'max_contract_decision', label: 'Max contract decision' },
];

function Compare() {
  const [playerA, setPlayerA] = React.useState(null);
  const [playerB, setPlayerB] = React.useState(null);
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [archetype, setArchetype] = React.useState('');
  const [compareContext, setCompareContext] = React.useState('');

  const canCompare = playerA && playerB && playerA.id !== playerB.id;

  const runCompare = async (arch, ctx) => {
    if (!canCompare) return;
    const activeArch = arch !== undefined ? arch : archetype;
    const activeCtx  = ctx  !== undefined ? ctx  : compareContext;
    setLoading(true); setError(null); setResult(null);
    try {
      const arcParam = activeArch ? `&archetype=${activeArch}` : '';
      const ctxParam = activeCtx  ? `&compare_context=${activeCtx}` : '';
      const r = await fetch(`${API}/analysis/compare?player_a=${playerA.id}&player_b=${playerB.id}&season=2025${arcParam}${ctxParam}`, {
        headers: {'X-Pivot-Session': _pivotSessionId},
      });
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      if (data.error) throw new Error(data.error);
      const mapPlayer = (p) => ({
        id: p.id,
        name: p.name,
        team: p.team,
        position: p.position,
        games_played: p.games_played,
        pts: p.avg_pts,
        reb: p.avg_reb,
        ast: p.avg_ast,
        stl: p.avg_stl,
        blk: p.avg_blk,
        fg3a: p.avg_fg3a,
        fg_pct: p.avg_fg,
        fg3_pct: p.avg_fg3,
        ft_pct: p.avg_ft,
        ts: p.ts_pct,
        efg: p.efg_pct,
        recent_pts: p.recent_pts != null ? p.recent_pts.toFixed(1) : '-',
        recent_reb: p.recent_reb != null ? p.recent_reb.toFixed(1) : '-',
        recent_ast: p.recent_ast != null ? p.recent_ast.toFixed(1) : '-',
        nba_id: p.nba_id,
        trend_flag: p.trend_flag || null,
      });
      setResult({ a: mapPlayer(data.player_a), b: mapPlayer(data.player_b), analysis: data.analysis, structured: data.structured || null, contextLabel: data.context_label || null });
    } catch(e) { setError(friendlyError(e.message)); } finally { setLoading(false); }
  };

  const fmtPct = v => v!=null ? `${(v*100).toFixed(1)}%` : '-';

  /* ── Court arc texture backdrop ── */
  const courtBg = {
    position:'absolute', inset:0, pointerEvents:'none',
    background:`
      radial-gradient(ellipse 70% 55% at 50% 100%, rgba(0,255,128,0.03) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 50% 100%, rgba(255,255,255,0.025) 0%, transparent 60%)
    `,
    zIndex:0,
  };

  return (
    <div style={{maxWidth:1140, margin:'0 auto', padding:'40px 32px', width:'100%', boxSizing:'border-box'}}>

      {/* ── Hero face-off panel ── */}
      <div style={{position:'relative', overflow:'hidden', borderRadius:16, border:'1px solid rgba(255,255,255,0.07)', background:'rgba(10,13,18,0.85)', marginBottom:28, boxShadow:'0 24px 80px rgba(0,0,0,0.6)'}}>
        <div style={courtBg}/>

        {/* Side glows */}
        <div style={{position:'absolute', top:0, left:0, width:'45%', height:'100%', background:'radial-gradient(ellipse 80% 60% at 10% 50%, rgba(0,255,128,0.07) 0%, transparent 70%)', pointerEvents:'none', zIndex:0}}/>
        <div style={{position:'absolute', top:0, right:0, width:'45%', height:'100%', background:'radial-gradient(ellipse 80% 60% at 90% 50%, rgba(160,120,255,0.07) 0%, transparent 70%)', pointerEvents:'none', zIndex:0}}/>

        {/* Center divider line */}
        <div style={{position:'absolute', top:'10%', bottom:'10%', left:'50%', transform:'translateX(-50%)', width:1, background:'linear-gradient(to bottom, transparent, rgba(255,255,255,0.12) 30%, rgba(255,255,255,0.12) 70%, transparent)', zIndex:1}}/>

        {/* Content */}
        <div style={{position:'relative', zIndex:2, display:'grid', gridTemplateColumns:'1fr auto 1fr', gap:0, alignItems:'center'}}>
          <div style={{padding:'40px 36px 36px'}}>
            <PlayerSearchBox label="Player A" side="a" onSelect={p=>{setPlayerA(p);setResult(null);setError(null);}}/>
          </div>

          {/* VS badge */}
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'0 20px', minWidth:90}}>
            <div className="cmp-vs-text" style={{fontFamily:BC, fontSize:52, fontWeight:900, letterSpacing:3, color:'rgba(0,255,128,0.55)', lineHeight:1, userSelect:'none'}}>VS</div>
            {canCompare && !result && !loading && (
              <button onClick={()=>runCompare()}
                style={{marginTop:20, background:'var(--green)', color:'#080A0E', border:'none', padding:'10px 22px', fontSize:12, letterSpacing:3, fontWeight:800, fontFamily:BC, textTransform:'uppercase', cursor:'pointer', borderRadius:6, transition:'opacity 0.15s', whiteSpace:'nowrap'}}
                onMouseEnter={e=>e.currentTarget.style.opacity='0.85'}
                onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                RUN →
              </button>
            )}
          </div>

          <div style={{padding:'40px 36px 36px'}}>
            <PlayerSearchBox label="Player B" side="b" onSelect={p=>{setPlayerB(p);setResult(null);setError(null);}}/>
          </div>
        </div>

        {/* Empty state hint */}
        {!playerA && !playerB && (
          <div style={{textAlign:'center', padding:'0 0 32px', position:'relative', zIndex:2}}>
            <div style={{fontFamily:BC, fontSize:11, letterSpacing:5, color:'rgba(255,255,255,0.15)', fontWeight:700}}>SELECT TWO PLAYERS TO BEGIN</div>
          </div>
        )}
      </div>

      {/* ── Analysis controls toolbar ── */}
      {canCompare && (
        <div style={{marginBottom:20, background:'rgba(12,15,22,0.8)', border:'1px solid rgba(255,255,255,0.07)', borderRadius:10, overflow:'hidden'}}>
          {/* Row 1: Coaching lens */}
          <div style={{display:'flex', alignItems:'center', gap:12, padding:'12px 20px', borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
            <div style={{fontFamily:BC, fontSize:10, letterSpacing:4, color:'rgba(255,255,255,0.35)', fontWeight:700, whiteSpace:'nowrap', minWidth:72}}>VIEW AS</div>
            <select
              value={archetype}
              onChange={e=>{
                const v = e.target.value;
                setArchetype(v);
                if (result) runCompare(v, undefined);
              }}
              style={{flex:1, background:'rgba(20,25,35,0.9)', border:'1px solid rgba(255,255,255,0.12)', color:'rgba(255,255,255,0.85)', padding:'8px 12px', fontSize:12, fontFamily:BC, letterSpacing:1, borderRadius:6, cursor:'pointer', outline:'none', appearance:'none', WebkitAppearance:'none'}}>
              {COACHING_ARCHETYPES.map(a => (
                <option key={a.value} value={a.value}>{a.label}</option>
              ))}
            </select>
            {archetype && (
              <div style={{fontFamily:BC, fontSize:9, letterSpacing:3, color:'rgba(160,120,255,0.7)', fontWeight:700, whiteSpace:'nowrap'}}>LENS ACTIVE</div>
            )}
          </div>
          {/* Row 2: Situation context */}
          <div style={{display:'flex', alignItems:'center', gap:12, padding:'12px 20px'}}>
            <div style={{fontFamily:BC, fontSize:10, letterSpacing:4, color:'rgba(255,255,255,0.35)', fontWeight:700, whiteSpace:'nowrap', minWidth:72}}>SITUATION</div>
            <select
              value={compareContext}
              onChange={e=>{
                const v = e.target.value;
                setCompareContext(v);
                if (result) runCompare(undefined, v);
              }}
              style={{flex:1, background:'rgba(20,25,35,0.9)', border:'1px solid rgba(255,255,255,0.12)', color:'rgba(255,255,255,0.85)', padding:'8px 12px', fontSize:12, fontFamily:BC, letterSpacing:1, borderRadius:6, cursor:'pointer', outline:'none', appearance:'none', WebkitAppearance:'none'}}>
              {COMPARE_CONTEXTS.map(c => (
                <option key={c.value} value={c.value}>{c.label}</option>
              ))}
            </select>
            {compareContext && (
              <div style={{fontFamily:BC, fontSize:9, letterSpacing:3, color:'rgba(0,255,128,0.6)', fontWeight:700, whiteSpace:'nowrap'}}>CONTEXT SET</div>
            )}
          </div>
        </div>
      )}

      {error && <div className="err" style={{margin:'0 0 24px'}}>{error}</div>}

      {loading && (
        <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:16, padding:'60px 0'}}>
          <Loader label="PIVOT COMPUTING"/>
          <div style={{fontFamily:BC, fontSize:11, letterSpacing:5, color:'rgba(0,255,128,0.5)', fontWeight:700}}>COMPUTING MATCHUP</div>
        </div>
      )}

      {/* ── Ghost / empty stat skeleton shown before results ── */}
      {!loading && !result && (playerA || playerB) && (
        <div style={{opacity:0.22, pointerEvents:'none'}}>
          <div style={{background:'rgba(16,20,28,0.6)', border:'1px solid rgba(255,255,255,0.06)', borderRadius:12, padding:'24px 28px', marginBottom:20}}>
            {['PTS','REB','AST','STL','BLK','TS%','eFG%','3PA/G'].map(lbl => (
              <div key={lbl} style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12, gap:12}}>
                <div style={{height:14, width:50, background:'rgba(255,255,255,0.12)', borderRadius:3}}/>
                <div style={{fontFamily:BC, fontSize:9, letterSpacing:3, color:'rgba(255,255,255,0.4)', fontWeight:700}}>{lbl}</div>
                <div style={{height:14, width:50, background:'rgba(255,255,255,0.12)', borderRadius:3}}/>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── Results ── */}
      {!loading && result && (() => {
        const {a, b} = result;
        const paras = (result.analysis||'').split(/\n{2,}/).filter(Boolean);
        return (
          <div>
            {/* Player header card */}
            <div className="cmp-reveal" style={{animationDelay:'0ms', background:'rgba(10,13,18,0.9)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:14, padding:'24px 32px', marginBottom:20, boxShadow:'0 8px 40px rgba(0,0,0,0.5)', overflow:'hidden', position:'relative'}}>
              {/* Side glow tints */}
              <div style={{position:'absolute', inset:0, background:'linear-gradient(to right, rgba(0,255,128,0.04) 0%, transparent 40%, transparent 60%, rgba(160,120,255,0.04) 100%)', pointerEvents:'none'}}/>
              <div style={{display:'grid', gridTemplateColumns:'1fr auto 1fr', alignItems:'center', gap:24, position:'relative', zIndex:1}}>
                {/* Player A */}
                <div>
                  <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:8}}>
                    {teamLogoUrl(a.team) && (
                      <img src={teamLogoUrl(a.team)} alt={a.team} width={36} height={36}
                        style={{objectFit:'contain'}} onError={e=>e.currentTarget.style.display='none'}/>
                    )}
                    <div style={{fontFamily:BC, fontSize:13, letterSpacing:4, color:'rgba(0,255,128,0.7)', fontWeight:700}}>{a.team}</div>
                  </div>
                  <div style={{fontFamily:BC, fontSize:32, fontWeight:900, color:'var(--white)', letterSpacing:0.5, lineHeight:1.0}}>{a.name}</div>
                  <div style={{fontFamily:BC, fontSize:11, letterSpacing:3, color:'rgba(0,255,128,0.6)', fontWeight:700, marginTop:6}}>{a.position} · {a.games_played} GP</div>
                </div>
                <div style={{fontFamily:BC, fontSize:14, letterSpacing:5, color:'rgba(255,255,255,0.2)', fontWeight:700, textAlign:'center'}}>VS</div>
                {/* Player B */}
                <div style={{textAlign:'right'}}>
                  <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:8, justifyContent:'flex-end'}}>
                    <div style={{fontFamily:BC, fontSize:13, letterSpacing:4, color:'rgba(160,120,255,0.8)', fontWeight:700}}>{b.team}</div>
                    {teamLogoUrl(b.team) && (
                      <img src={teamLogoUrl(b.team)} alt={b.team} width={36} height={36}
                        style={{objectFit:'contain'}} onError={e=>e.currentTarget.style.display='none'}/>
                    )}
                  </div>
                  <div style={{fontFamily:BC, fontSize:32, fontWeight:900, color:'var(--white)', letterSpacing:0.5, lineHeight:1.0}}>{b.name}</div>
                  <div style={{fontFamily:BC, fontSize:11, letterSpacing:3, color:'rgba(160,120,255,0.7)', fontWeight:700, marginTop:6}}>{b.position} · {b.games_played} GP</div>
                </div>
              </div>
            </div>

            {/* Stat bars card */}
            <div className="cmp-reveal" style={{animationDelay:'80ms', background:'rgba(10,13,18,0.9)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:14, padding:'28px 32px', marginBottom:20, boxShadow:'0 8px 40px rgba(0,0,0,0.5)'}}>
              <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:22}}>
                <div style={{fontFamily:BC, fontSize:11, letterSpacing:5, color:'rgba(0,255,128,0.7)', fontWeight:700}}>2025–26 SEASON AVERAGES</div>
                <div style={{display:'flex', gap:16}}>
                  <div style={{display:'flex', alignItems:'center', gap:6}}>
                    <div style={{width:8, height:8, borderRadius:'50%', background:'var(--green)', boxShadow:'0 0 6px rgba(0,255,128,0.6)'}}/>
                    <span style={{fontFamily:BC, fontSize:10, letterSpacing:2, color:'rgba(0,255,128,0.7)', fontWeight:700}}>{a.name.split(' ').pop()}</span>
                  </div>
                  <div style={{display:'flex', alignItems:'center', gap:6}}>
                    <div style={{width:8, height:8, borderRadius:'50%', background:'rgba(160,120,255,0.85)', boxShadow:'0 0 6px rgba(160,120,255,0.5)'}}/>
                    <span style={{fontFamily:BC, fontSize:10, letterSpacing:2, color:'rgba(160,120,255,0.8)', fontWeight:700}}>{b.name.split(' ').pop()}</span>
                  </div>
                </div>
              </div>
              <StatBar label="PTS"    aVal={a.pts}  bVal={b.pts}   animDelay={100}/>
              <StatBar label="REB"    aVal={a.reb}  bVal={b.reb}   animDelay={130}/>
              <StatBar label="AST"    aVal={a.ast}  bVal={b.ast}   animDelay={160}/>
              <StatBar label="STL"    aVal={a.stl}  bVal={b.stl}   animDelay={190}/>
              <StatBar label="BLK"    aVal={a.blk}  bVal={b.blk}   animDelay={220}/>
              <StatBar label="TS%"    aVal={a.ts!=null?+(a.ts*100).toFixed(1):null}   bVal={b.ts!=null?+(b.ts*100).toFixed(1):null}   fmt={v=>v!=null?`${v}%`:'—'} animDelay={250}/>
              <StatBar label="eFG%"   aVal={a.efg!=null?+(a.efg*100).toFixed(1):null} bVal={b.efg!=null?+(b.efg*100).toFixed(1):null} fmt={v=>v!=null?`${v}%`:'—'} animDelay={280}/>
              <StatBar label="3PA/G"  aVal={a.fg3a} bVal={b.fg3a}  animDelay={310}/>
              <StatBar label="3P%"    aVal={a.fg3_pct!=null?+(a.fg3_pct*100).toFixed(1):null} bVal={b.fg3_pct!=null?+(b.fg3_pct*100).toFixed(1):null} fmt={v=>v!=null?`${v}%`:'—'} animDelay={340}/>

              {/* L10 context row */}
              <div style={{borderTop:'1px solid rgba(255,255,255,0.06)', paddingTop:16, marginTop:8, display:'grid', gridTemplateColumns:'1fr auto 1fr', gap:12, alignItems:'center'}}>
                <div>
                  <div style={{fontFamily:BC, fontSize:13, fontWeight:700, color:'rgba(255,255,255,0.45)', letterSpacing:0.3}}>L10: {a.recent_pts}pts / {a.recent_reb}reb / {a.recent_ast}ast</div>
                  {a.trend_flag && <div style={{marginTop:4, fontFamily:BC, fontSize:9, letterSpacing:2, fontWeight:700, padding:'2px 7px', borderRadius:3, display:'inline-block', ...(a.trend_flag==='trending_down' ? {color:'rgba(255,100,80,0.9)', background:'rgba(255,100,80,0.1)', border:'1px solid rgba(255,100,80,0.3)'} : {color:'rgba(80,255,160,0.9)', background:'rgba(80,255,160,0.08)', border:'1px solid rgba(80,255,160,0.25)'})}}>
                    {a.trend_flag==='trending_down' ? '↓ TRENDING DOWN' : '↑ TRENDING UP'}
                  </div>}
                </div>
                <div style={{fontFamily:BC, fontSize:9, letterSpacing:3, color:'rgba(255,255,255,0.18)', fontWeight:700, textAlign:'center'}}>LAST 10</div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:BC, fontSize:13, fontWeight:700, color:'rgba(255,255,255,0.45)', letterSpacing:0.3}}>L10: {b.recent_pts}pts / {b.recent_reb}reb / {b.recent_ast}ast</div>
                  {b.trend_flag && <div style={{marginTop:4, fontFamily:BC, fontSize:9, letterSpacing:2, fontWeight:700, padding:'2px 7px', borderRadius:3, display:'inline-block', ...(b.trend_flag==='trending_down' ? {color:'rgba(255,100,80,0.9)', background:'rgba(255,100,80,0.1)', border:'1px solid rgba(255,100,80,0.3)'} : {color:'rgba(80,255,160,0.9)', background:'rgba(80,255,160,0.08)', border:'1px solid rgba(80,255,160,0.25)'})}}>
                    {b.trend_flag==='trending_down' ? '↓ TRENDING DOWN' : '↑ TRENDING UP'}
                  </div>}
                </div>
              </div>
            </div>

            {/* AI Analysis card */}
            <div className="cmp-reveal" style={{animationDelay:'160ms', background:'rgba(8,10,16,0.95)', border:'1px solid rgba(0,255,128,0.18)', borderRadius:14, padding:'28px 32px', boxShadow:'0 0 60px rgba(0,255,128,0.06), 0 8px 40px rgba(0,0,0,0.6)', position:'relative', overflow:'hidden'}}>
              <div style={{position:'absolute', top:0, left:0, right:0, height:1, background:'linear-gradient(to right, transparent, rgba(0,255,128,0.4), transparent)'}}/>
              <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:22, flexWrap:'wrap'}}>
                <div style={{fontFamily:BC, fontSize:16, color:'rgba(0,255,128,0.9)', lineHeight:1}}>✦</div>
                <div style={{fontFamily:BC, fontSize:11, letterSpacing:5, color:'rgba(0,255,128,0.85)', fontWeight:700, textTransform:'uppercase'}}>PIVOT Matchup Analysis</div>
                {archetype && (() => {
                  const a = COACHING_ARCHETYPES.find(x=>x.value===archetype);
                  return a ? (
                    <div style={{marginLeft:6, fontFamily:BC, fontSize:9, letterSpacing:3, color:'rgba(160,120,255,0.8)', fontWeight:700, background:'rgba(160,120,255,0.08)', border:'1px solid rgba(160,120,255,0.2)', borderRadius:4, padding:'3px 8px'}}>
                      {a.label.split('(')[0].trim().toUpperCase()}
                    </div>
                  ) : null;
                })()}
              </div>

              {result.structured ? (() => {
                const s = result.structured;
                return (
                  <div style={{display:'flex', flexDirection:'column', gap:20}}>

                    {/* Key Differences */}
                    {s.key_differences?.length > 0 && (
                      <div>
                        <div style={{fontFamily:BC, fontSize:9, letterSpacing:4, color:'rgba(0,255,128,0.6)', fontWeight:700, textTransform:'uppercase', marginBottom:12}}>Key Differences</div>
                        <div style={{display:'flex', flexDirection:'column', gap:8}}>
                          {s.key_differences.map((diff, i) => (
                            <div key={i} style={{display:'flex', alignItems:'flex-start', gap:10}}>
                              <div style={{width:4, height:4, borderRadius:'50%', background:'rgba(0,255,128,0.5)', marginTop:6, flexShrink:0}}/>
                              <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, lineHeight:1.7, color:'rgba(255,255,255,0.8)', fontWeight:400}}>{diff}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Verdict + Reasoning */}
                    {(s.better_for_context || s.better_player) && (() => {
                      const verdict = s.better_for_context || s.better_player;
                      const edgeLabel = result.contextLabel
                        ? result.contextLabel.toUpperCase()
                        : 'OVERALL EDGE';
                      // Determine if verdict is a full sentence or just a name
                      const isFullSentence = verdict && verdict.includes(' ');
                      return (
                        <div style={{background:'rgba(0,255,128,0.05)', border:'1px solid rgba(0,255,128,0.15)', borderRadius:10, padding:'16px 20px'}}>
                          <div style={{fontFamily:BC, fontSize:9, letterSpacing:4, color:'rgba(0,255,128,0.6)', fontWeight:700, textTransform:'uppercase', marginBottom:10}}>{edgeLabel}</div>
                          {isFullSentence ? (
                            <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:15, fontWeight:700, color:'var(--green)', lineHeight:1.65, marginBottom: s.reasoning ? 12 : 0}}>{verdict}</div>
                          ) : (
                            <div style={{fontFamily:BC, fontSize:18, fontWeight:900, color:'var(--green)', letterSpacing:0.5, marginBottom: s.reasoning ? 10 : 0}}>{verdict}</div>
                          )}
                          {s.reasoning && <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:13, lineHeight:1.75, color:'rgba(255,255,255,0.75)', fontWeight:400}}>{s.reasoning}</div>}
                        </div>
                      );
                    })()}

                    {/* Limitation */}
                    {s.limitation && (
                      <div style={{display:'flex', alignItems:'flex-start', gap:10, opacity:0.65}}>
                        <div style={{fontFamily:BC, fontSize:9, letterSpacing:3, color:'rgba(255,255,255,0.4)', fontWeight:700, textTransform:'uppercase', flexShrink:0, paddingTop:1}}>Note</div>
                        <div style={{fontFamily:'Helvetica Neue, sans-serif', fontSize:11, lineHeight:1.6, color:'rgba(255,255,255,0.5)', fontWeight:400}}>{s.limitation}</div>
                      </div>
                    )}
                  </div>
                );
              })() : (
                <div style={{display:'flex', flexDirection:'column', gap:18}}>
                  {paras.map((p,i)=>(
                    <p key={i} style={{margin:0, fontFamily:'Helvetica Neue, sans-serif', fontSize:14, lineHeight:1.9,
                      color: i===paras.length-1 ? 'var(--white)' : 'rgba(255,255,255,0.8)',
                      fontWeight: i===paras.length-1 ? 700 : 400}}>{p}</p>
                  ))}
                </div>
              )}

              <div style={{marginTop:24, display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                <div style={{fontFamily:BC, fontSize:10, letterSpacing:3, color:'rgba(255,255,255,0.18)', fontWeight:700}}>POWERED BY CLAUDE AI</div>

                  style={{background:'none', border:'1px solid rgba(0,255,128,0.3)', color:'rgba(0,255,128,0.8)', padding:'9px 22px', fontSize:11, letterSpacing:4, fontWeight:700, fontFamily:BC, textTransform:'uppercase', cursor:'pointer', borderRadius:6, transition:'border-color 0.15s, color 0.15s'}}

                  onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(0,255,128,0.3)';e.currentTarget.style.color='rgba(0,255,128,0.8)';}}>
                  REFRESH →
                </button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// Generate a stable session UUID once per page load (persists across React re-renders)
const _pivotSessionId = (() => {
  const k = 'pivot_session_id';
  let id = sessionStorage.getItem(k);
  if (!id) { id = crypto.randomUUID(); sessionStorage.setItem(k, id); }
  return id;
})();
